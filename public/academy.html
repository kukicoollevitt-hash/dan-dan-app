<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브레인 문해원 학생 로그인</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F7F1E5;
            min-height: 100vh;
        }

        .landing-container {
            max-width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
            background: transparent;
        }

        /* 섹션 공통 스타일 */
        .section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            margin-bottom: 40px;
        }

        .section.no-margin {
            margin-bottom: 0;
        }

        .section img,
        .section video {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            background: transparent;
        }

        /* 비디오 섹션 */
        .video-section video {
            width: 100%;
            max-width: 100%;
            height: auto;
        }

        /* FAQ 섹션 */
        .faq-section {
            background: linear-gradient(180deg, #F7F1E5 0%, #EDE7D9 100%);
            padding: 80px 20px;
        }

        .faq-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .faq-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 50px;
        }

        .faq-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .faq-item {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .faq-question {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
            position: relative;
        }

        .faq-question:hover {
            background: #f9f7f4;
        }

        .faq-question .q-mark {
            background: #6B5B95;
            color: #fff;
            min-width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .faq-question .arrow {
            margin-left: auto;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
            color: #6B5B95;
        }

        .faq-item.active .faq-question .arrow {
            transform: rotate(180deg);
        }

        .faq-answer {
            font-size: 1rem;
            line-height: 1.9;
            color: #555;
            padding: 0 24px 0 68px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .faq-item.active .faq-answer {
            max-height: 500px;
            padding: 0 24px 24px 68px;
        }

        .faq-answer strong {
            color: #6B5B95;
        }

        .faq-answer .highlight {
            background: linear-gradient(transparent 60%, #E8E3F3 60%);
            font-weight: 600;
        }

        .faq-answer ul {
            margin: 12px 0;
            padding-left: 20px;
        }

        .faq-answer ul li {
            margin-bottom: 6px;
        }

        /* 학부모 후기 섹션 */
        .reviews-section {
            background: linear-gradient(180deg, #F7F1E5 0%, #EDE7D9 100%);
            padding: 80px 20px;
        }

        .reviews-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .reviews-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 50px;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .review-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .review-stars {
            color: #FFD700;
            font-size: 1.2rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .review-header {
            font-size: 0.95rem;
            font-weight: 700;
            color: #6B5B95;
            margin-bottom: 14px;
        }

        .review-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #555;
        }

        .reviews-footer {
            text-align: center;
            margin-top: 50px;
            padding: 40px;
            background: linear-gradient(135deg, #6B5B95 0%, #8B7BB5 100%);
            border-radius: 20px;
        }

        .reviews-footer p {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.7;
        }

        @media (max-width: 768px) {
            .reviews-section {
                padding: 50px 15px;
            }

            .reviews-title {
                font-size: 1.6rem;
                margin-bottom: 30px;
            }

            .reviews-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .review-card {
                padding: 24px;
            }

            .reviews-footer {
                padding: 30px 20px;
            }

            .reviews-footer p {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 768px) {
            .faq-section {
                padding: 50px 15px;
            }

            .faq-title {
                font-size: 1.6rem;
                margin-bottom: 30px;
            }

            .faq-question {
                font-size: 1rem;
                padding: 18px 16px;
                gap: 10px;
            }

            .faq-question .q-mark {
                min-width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }

            .faq-answer {
                padding: 0 16px 0 54px;
                font-size: 0.95rem;
            }

            .faq-item.active .faq-answer {
                padding: 0 16px 20px 54px;
            }

            .faq-footer {
                padding: 30px 20px;
            }

            .faq-footer p {
                font-size: 1.1rem;
            }
        }

        /* CTA 버튼 섹션 */
        .cta-section {
            padding: 60px 20px;
            text-align: center;
            background: #F7F1E5;
        }

        .cta-button {
            display: inline-block;
            padding: 20px 60px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .section img,
            .section video {
                max-width: 100%;
            }

            .cta-button {
                padding: 16px 40px;
                font-size: 1.1rem;
            }

            .cta-section {
                padding: 40px 15px;
            }
        }

        /* 고정 헤더 버튼 컨테이너 */
        .fixed-header-btns {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 고정 헤더 버튼 */
        .fixed-header-btn {
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6B5B95 100%);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            box-shadow:
                0 4px 15px rgba(102, 126, 234, 0.4),
                0 8px 30px rgba(118, 75, 162, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            cursor: pointer;
            animation: shake 2.5s ease-in-out infinite;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .fixed-header-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .fixed-header-btn:hover {
            transform: scale(1.05);
            box-shadow:
                0 6px 20px rgba(102, 126, 234, 0.5),
                0 12px 40px rgba(118, 75, 162, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: none;
        }

        /* 진단테스트 버튼 (오렌지색) */
        .fixed-header-btn.diagnostic {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6f35 100%);
            box-shadow:
                0 4px 15px rgba(255, 154, 86, 0.4),
                0 8px 30px rgba(255, 111, 53, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .fixed-header-btn.diagnostic:hover {
            box-shadow:
                0 6px 20px rgba(255, 154, 86, 0.5),
                0 12px 40px rgba(255, 111, 53, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* 개인정보문의 버튼 (초록색) */
        .fixed-header-btn.privacy {
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
            box-shadow:
                0 4px 15px rgba(67, 160, 71, 0.4),
                0 8px 30px rgba(46, 125, 50, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            font-size: 13px;
            padding: 10px 18px;
        }

        .fixed-header-btn.privacy:hover {
            box-shadow:
                0 6px 20px rgba(67, 160, 71, 0.5),
                0 12px 40px rgba(46, 125, 50, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* 개인정보문의 모달 */
        .privacy-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .privacy-modal-overlay.show {
            display: flex;
        }
        .privacy-modal-card {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            width: min(400px, 90vw);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .privacy-modal-card h2 {
            margin: 0 0 8px;
            font-size: 20px;
            color: #2e7d32;
        }
        .privacy-modal-card p {
            margin: 0 0 20px;
            font-size: 14px;
            color: #666;
        }
        .privacy-modal-card label {
            display: block;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
        }
        .privacy-modal-card select,
        .privacy-modal-card input,
        .privacy-modal-card textarea {
            width: 100%;
            margin-top: 6px;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }
        .privacy-modal-card textarea {
            resize: vertical;
            min-height: 80px;
        }
        .privacy-modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .privacy-modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .privacy-modal-btns .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }
        .privacy-modal-btns .submit-btn {
            background: #2e7d32;
            color: #fff;
        }

        @keyframes shake {
            0%, 100% {
                transform: rotate(0deg);
            }
            10% {
                transform: rotate(-3deg);
            }
            20% {
                transform: rotate(3deg);
            }
            30% {
                transform: rotate(-3deg);
            }
            40% {
                transform: rotate(3deg);
            }
            50%, 100% {
                transform: rotate(0deg);
            }
        }

        @media (max-width: 768px) {
            .fixed-header-btns {
                top: 15px;
                right: 15px;
                gap: 8px;
            }

            .fixed-header-btn {
                padding: 12px 22px;
                font-size: 0.95rem;
            }
        }

        /* 스크롤 애니메이션 */
        .section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 로딩 시 첫 번째 섹션은 바로 보이게 */
        .section:first-child {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 로그인 모달 (학원용 - 보라톤) ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: radial-gradient(
                circle at top,
                rgba(200, 180, 255, 0.65) 0,
                rgba(0, 0, 0, 0.55) 55%
            );
            z-index: 2000;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            width: min(420px, 92vw);
            background: linear-gradient(145deg, #f5f0ff 0%, #e8e0f5 45%, #ddd5f0 100%);
            border-radius: 22px;
            padding: 20px 22px 24px;
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(150, 130, 200, 0.7);
            position: relative;
            color: #3d2b5a;
            font-family: "Apple SD Gothic Neo", "Noto Sans KR", -apple-system,
                BlinkMacSystemFont, system-ui, sans-serif;
            overflow: hidden;
        }

        .modal-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.9) 0, transparent 45%),
                radial-gradient(circle at bottom right, rgba(180, 160, 220, 0.6) 0, transparent 55%);
            opacity: 0.9;
            pointer-events: none;
            z-index: -1;
        }

        .modal-header-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            border: 1px solid rgba(100, 80, 140, 0.25);
            background: #e8e0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: #6B5B95;
        }
        .modal-close:hover {
            background: #ddd5f0;
        }

        .modal-title-wrap {
            flex: 1;
        }
        .modal-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #3d2b5a;
        }
        .modal-subtitle {
            margin: 2px 0 0;
            font-size: 12px;
            color: #6B5B95;
        }

        .admin-pill {
            border-radius: 999px;
            padding: 5px 12px;
            font-size: 11px;
            border: 1px solid rgba(107, 91, 149, 0.3);
            background: #f0e8ff;
            color: #5a4a7a;
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
        }
        .admin-pill:hover {
            background: #e0d5f5;
        }

        .modal-form {
            margin-top: 14px;
        }
        .modal-form label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin: 10px 0 4px;
            color: #4a3a6a;
        }
        .modal-input {
            width: 100%;
            padding: 9px 10px;
            border-radius: 10px;
            border: 1px solid #c8b8e0;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
        }
        .modal-input::placeholder {
            color: #a090c0;
        }
        .modal-input:focus {
            border-color: #8B7BB5;
            box-shadow: 0 0 0 1px rgba(139, 123, 181, 0.3);
        }

        /* 학원 검색 드롭다운 */
        .academy-search-wrapper {
            position: relative;
        }
        .academy-search-input {
            width: 100%;
            padding: 9px 10px;
            border-radius: 10px;
            border: 1px solid #c8b8e0;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
        }
        .academy-search-input:focus {
            border-color: #8B7BB5;
            box-shadow: 0 0 0 1px rgba(139, 123, 181, 0.3);
        }
        .academy-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 180px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #c8b8e0;
            border-top: none;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
        }
        .academy-dropdown.show {
            display: block;
        }
        .academy-dropdown-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 14px;
            color: #3d2b5a;
            border-bottom: 1px solid #f0e8f8;
        }
        .academy-dropdown-item:last-child {
            border-bottom: none;
        }
        .academy-dropdown-item:hover,
        .academy-dropdown-item.highlight {
            background: #f5f0ff;
        }
        .academy-dropdown-item.new-entry {
            color: #6B5B95;
            font-style: italic;
        }
        .academy-no-result {
            padding: 10px 12px;
            font-size: 13px;
            color: #999;
            text-align: center;
        }

        .modal-btn {
            margin-top: 18px;
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 11px 0;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #8B7BB5 0%, #6B5B95 45%, #5a4a85 100%);
            color: #fff;
            box-shadow: 0 10px 20px rgba(107, 91, 149, 0.5);
        }
        .modal-btn:hover {
            filter: brightness(1.03);
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(107, 91, 149, 0.55);
        }

        .modal-footer {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            color: #6B5B95;
        }
        .modal-footer a,
        .modal-footer button {
            color: #8B7BB5;
            font-weight: 600;
            text-decoration: none;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0 4px;
            font-size: 12px;
        }
        .modal-footer a:hover,
        .modal-footer button:hover {
            text-decoration: underline;
        }

        /* 로그인/회원가입 패널 토글 공통 */
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        /* ===== 로그인 오류/승인 대기 모달 ===== */
        .login-error-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
            z-index: 2100;
        }
        .login-error-overlay.active {
            display: flex;
        }

        .login-error-card {
            width: min(420px, 90vw);
            background: #f5f0ff;
            border-radius: 24px;
            padding: 26px 26px 22px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: #3d2b5a;
        }

        .login-error-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8e0f5;
            color: #c54632;
            font-size: 26px;
        }

        .login-error-title {
            margin: 0 0 6px;
            font-size: 18px;
            font-weight: 700;
        }

        .login-error-msg {
            margin: 0 0 18px;
            font-size: 14px;
            line-height: 1.5;
            color: #6B5B95;
        }

        .login-error-btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .login-error-btn {
            flex: 1;
            border-radius: 999px;
            padding: 9px 0;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-error-btn.cancel {
            background: #e0d5f5;
            color: #6B5B95;
        }
        .login-error-btn.cancel:hover {
            background: #d5c8ea;
        }
        .login-error-btn.retry {
            background: #6B5B95;
            color: #fff;
        }
        .login-error-btn.retry:hover {
            filter: brightness(1.05);
        }

        /* 승인 대기 모달 */
        .login-error-overlay.show {
            display: flex;
        }
        .login-error-modal {
            background: #f5f0ff;
            border-radius: 18px;
            padding: 24px 26px 22px;
            width: 320px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.16);
            border: 1px solid rgba(107, 91, 149, 0.1);
        }
        .login-error-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .login-error-btn.primary {
            background: #6B5B95;
            color: #fff;
            min-width: 90px;
        }
    </style>
</head>
<body>

    <!-- ✅ 로그인 / 회원가입 모달 (학원용) -->

                <div class="modal-title-wrap">

                <a href="/academy-admin-login" class="admin-pill">선생님모드</a>

            <!-- 🔹 로그인 패널 -->
            <div id="login-panel" class="panel active">
                <form action="/academy-login" method="post" class="modal-form" id="login-form">
                    <label>

                            <input type="hidden" name="academyName" id="loginAcademyValue" required />

                            <a href="/privacy.html" target="_blank" style="color: #6B5B95; text-decoration: underline; font-weight: 600;">개인정보처리방침</a>에 동의합니다. (필수)
                        </span>

                    <!-- 서비스 이용 안내 -->
                    <div style="margin-top: 12px; padding: 12px; background: #f5f0ff; border-radius: 8px; font-size: 12px; color: #666; line-height: 1.6; text-align: center;">
                        본 서비스는 학원 승인 후 이용 가능합니다.<br>

    <!-- ✅ 로그인 오류 / 승인 대기 모달 -->
    <div id="loginErrorOverlay" class="login-error-overlay">
        <div class="login-error-card">
            <div class="login-error-icon">🚫</div>
            <h2 class="login-error-title" id="loginErrorTitle">로그인 오류입니다</h2>
            <p class="login-error-msg" id="loginErrorMsg">

            </p>

                    닫기
                </button>
                <button type="button" class="login-error-btn retry" id="loginErrorRetryBtn">
                    다시 입력하기
                </button>
            </div>
        </div>
    </div>

    <!-- 승인 대기 안내 모달 -->
    <div class="login-error-overlay" id="signupPendingOverlay">
        <div class="login-error-modal">
            <div class="login-error-icon">🚫</div>
            <div class="login-error-title">승인 대기 중입니다</div>
            <div class="login-error-msg">
                현재 '승인 대기' 상태입니다.<br />
                학원 관리자에게 승인 요청을 해 주세요 🙂
            </div>
            <div class="login-error-actions">
                <button type="button" class="login-error-btn primary" id="signupPendingCloseBtn">
                    확인
                </button>
            </div>
        </div>
    </div>

    <div class="landing-container">
        <!-- 메인 영상 -->
        <section class="section video-section">
            <video src="images/brain/브레인문메인.mp4" autoplay muted loop playsinline></video>
        </section>
    </div>

    <script>
        // 스크롤 애니메이션
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.section').forEach(section => {
            observer.observe(section);
        });

        // 비디오 자동 재생 보장
        document.querySelectorAll('video').forEach(video => {
            video.play().catch(() => {
                // 자동 재생 실패 시 무시
            });
        });

        // ========== 로그인 모달 제어 ==========
        // 🔧 학생 key 생성 (로그인 시 localStorage용)
        function buildStudentKey(stu) {
            const cleanPhone = (stu.phone || "").replace(/\D/g, "");
            const cleanName  = (stu.name  || "").trim();
            const cleanAcademy = (stu.academyName || "").trim();
            return `academy_${cleanAcademy}_${cleanName}_${cleanPhone}`;
        }

        // 🔧 로그인/회원가입 패널 토글
        function showPanel(which) {
            const loginPanel    = document.getElementById("login-panel");
            const registerPanel = document.getElementById("register-panel");
            const titleEl       = document.getElementById("modalTitle");
            const subtitleEl    = document.getElementById("modalSubtitle");

            if (!loginPanel || !registerPanel) return;

            if (which === "register") {
                registerPanel.classList.add("active");
                loginPanel.classList.remove("active");
                if (titleEl)    titleEl.textContent    = "학원용 회원가입";
                if (subtitleEl) subtitleEl.textContent = "학원명·학년·이름·전화번호를 입력해 주세요.";
            } else {
                loginPanel.classList.add("active");
                registerPanel.classList.remove("active");
                if (titleEl)    titleEl.textContent    = "학원용 로그인";
                if (subtitleEl) subtitleEl.textContent = "학원명·학년·이름·전화번호로 로그인해 주세요.";
            }
        }

        // 🔧 URL 쿼리에서 loginError 타입 가져오기
        function getLoginErrorType() {
            const params = new URLSearchParams(window.location.search);
            return params.get("loginError");
        }

        // 🔧 오류 모달 열기
        function openLoginErrorModal(type) {
            const overlay = document.getElementById("loginErrorOverlay");
            const titleEl = document.getElementById("loginErrorTitle");
            const msgEl   = document.getElementById("loginErrorMsg");
            if (!overlay || !titleEl || !msgEl) return;

            if (type === "pending") {
                titleEl.textContent = "승인 대기 중입니다";
                msgEl.innerHTML =
                    "아직 학원 관리자 승인 전이라 로그인할 수 없어요.<br>" +
                    "학원 관리자에게 승인 요청을 해 주세요 🙂";
            } else if (type === "trashed") {
                titleEl.textContent = "휴지 상태 계정입니다";
                msgEl.innerHTML =
                    "현재 사용 중지된 계정이에요.<br>" +
                    "학원 관리자에게 다시 복구가 가능한지 문의해 주세요.";
            } else if (type === "duplicate") {
                titleEl.textContent = "이미 등록된 전화번호입니다";
                msgEl.innerHTML =
                    "동일한 전화번호로 이미 가입되어 있습니다.<br>" +
                    "로그인을 시도해 주세요.";
            } else if (type === "1") {
                titleEl.textContent = "로그인 정보가 올바르지 않습니다";
                msgEl.innerHTML =
                    "학원명·이름·전화번호를 다시 한 번 확인해 주세요.";
            } else {
                titleEl.textContent = "로그인 오류입니다";
                msgEl.textContent = "다시 한 번 입력해 주세요.";
            }

            overlay.classList.add("active");
        }

        // 🔧 회원가입 상태 확인
        function getSignupStatus() {
            const params = new URLSearchParams(window.location.search);
            return params.get("signup");
        }

        function openSignupPendingModal() {
            const overlay = document.getElementById("signupPendingOverlay");
            if (!overlay) return;
            overlay.classList.add("show");

            if (window.history && window.history.replaceState) {
                const clean = window.location.origin + window.location.pathname;
                window.history.replaceState({}, document.title, clean);
            }
        }

        function closeSignupPendingModal() {
            const overlay = document.getElementById("signupPendingOverlay");
            if (overlay) overlay.classList.remove("show");
        }

        document.addEventListener("DOMContentLoaded", () => {
            const openBtn      = document.getElementById("openLoginBtn");
            const overlay      = document.getElementById("loginOverlay");
            const closeBtn     = document.getElementById("closeLoginBtn");
            const openRegBtn   = document.getElementById("open-register");
            const backLoginBtn = document.getElementById("back-to-login");
            const loginForm    = document.getElementById("login-form");

            const errOverlay   = document.getElementById("loginErrorOverlay");
            const errCloseBtn  = document.getElementById("loginErrorCloseBtn");
            const errRetryBtn  = document.getElementById("loginErrorRetryBtn");

            // ========== 학원 검색 드롭다운 ==========
            let academyList = [];

            // 서버에서 학원 목록 가져오기
            async function loadAcademies() {
                try {
                    const res = await fetch('/api/academies');
                    const data = await res.json();
                    if (data.ok && data.academies) {
                        academyList = data.academies;
                    }
                } catch (err) {
                    console.error('학원 목록 로드 실패:', err);
                }
            }

            // 학원 검색 드롭다운 초기화 (allowCustom: 회원가입용 - 새 학원 입력 가능)
            function initAcademySearch(searchInputId, hiddenInputId, dropdownId, allowCustom = false) {
                const searchInput = document.getElementById(searchInputId);
                const hiddenInput = document.getElementById(hiddenInputId);
                const dropdown = document.getElementById(dropdownId);

                if (!searchInput || !hiddenInput || !dropdown) return;

                let highlightIndex = -1;

                // 드롭다운 렌더링 (검색어가 있을 때만 결과 표시)
                function renderDropdown(query) {
                    dropdown.innerHTML = '';
                    highlightIndex = -1;

                    if (!query.trim()) {
                        dropdown.classList.remove('show');
                        return;
                    }

                    const filtered = academyList.filter(name =>
                        name.toLowerCase().includes(query.toLowerCase())
                    );

                    if (filtered.length === 0) {
                        if (allowCustom && query.trim()) {
                            // 회원가입: 새 학원 입력 옵션
                            const newItem = document.createElement('div');
                            newItem.className = 'academy-dropdown-item new-entry';
                            newItem.textContent = `"${query}" (새 학원으로 등록)`;
                            newItem.addEventListener('click', () => {
                                searchInput.value = query.trim();
                                hiddenInput.value = query.trim();
                                dropdown.classList.remove('show');
                            });
                            dropdown.appendChild(newItem);
                        } else {
                            const noResult = document.createElement('div');
                            noResult.className = 'academy-no-result';
                            noResult.textContent = '검색 결과가 없습니다';
                            dropdown.appendChild(noResult);
                        }
                    } else {
                        filtered.forEach((name, idx) => {
                            const item = document.createElement('div');
                            item.className = 'academy-dropdown-item';
                            item.textContent = name;
                            item.addEventListener('click', () => {
                                searchInput.value = name;
                                hiddenInput.value = name;
                                dropdown.classList.remove('show');
                            });
                            dropdown.appendChild(item);
                        });
                    }

                    dropdown.classList.add('show');
                }

                // 입력 이벤트
                searchInput.addEventListener('input', () => {
                    renderDropdown(searchInput.value);
                    hiddenInput.value = '';  // 검색 중에는 hidden 값 초기화
                });

                // 포커스 시 드롭다운 표시 (값이 있을 때만)
                searchInput.addEventListener('focus', () => {
                    if (searchInput.value.trim()) {
                        renderDropdown(searchInput.value);
                    }
                });

                // 키보드 네비게이션
                searchInput.addEventListener('keydown', (e) => {
                    const items = dropdown.querySelectorAll('.academy-dropdown-item');
                    if (!items.length) return;

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
                        updateHighlight(items);
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        highlightIndex = Math.max(highlightIndex - 1, 0);
                        updateHighlight(items);
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (highlightIndex >= 0 && items[highlightIndex]) {
                            items[highlightIndex].click();
                        } else if (allowCustom && searchInput.value.trim()) {
                            // 회원가입: 엔터로 새 학원 입력
                            hiddenInput.value = searchInput.value.trim();
                            dropdown.classList.remove('show');
                        }
                    } else if (e.key === 'Escape') {
                        dropdown.classList.remove('show');
                    }
                });

                function updateHighlight(items) {
                    items.forEach((item, idx) => {
                        item.classList.toggle('highlight', idx === highlightIndex);
                    });
                }

                // 외부 클릭 시 드롭다운 닫기
                document.addEventListener('click', (e) => {
                    if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.classList.remove('show');
                        // 선택되지 않은 경우 (allowCustom이면 입력값 유지)
                        if (!hiddenInput.value && searchInput.value.trim()) {
                            if (allowCustom) {
                                hiddenInput.value = searchInput.value.trim();
                            } else {
                                searchInput.value = '';
                            }
                        }
                    }
                });
            }

            // 페이지 로드 시 학원 목록 불러오기 및 검색 초기화
            (async () => {
                await loadAcademies();
                initAcademySearch('loginAcademySearch', 'loginAcademyValue', 'loginAcademyDropdown', false);  // 로그인: 기존 학원만
                initAcademySearch('registerAcademySearch', 'registerAcademyValue', 'registerAcademyDropdown', true);  // 회원가입: 새 학원 입력 가능
            })();

            // ✅ 기본 로그인 모달 열기/닫기
            if (openBtn && overlay && closeBtn) {
                overlay.classList.remove("active");

                openBtn.addEventListener("click", () => {
                    overlay.classList.add("active");
                    showPanel("login");
                });

                closeBtn.addEventListener("click", () => {
                    overlay.classList.remove("active");
                });

                overlay.addEventListener("click", (e) => {
                    if (e.target === overlay) {
                        overlay.classList.remove("active");
                    }
                });
            }

            // ✅ "회원가입" 클릭 → 같은 모달 안에서 회원가입 패널로 전환
            if (openRegBtn && overlay) {
                openRegBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    overlay.classList.add("active");
                    showPanel("register");
                });
            }

            // ✅ "로그인으로 돌아가기"
            if (backLoginBtn) {
                backLoginBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    showPanel("login");
                });
            }

            // ✅ 로그인 시 localStorage에 학생 정보 저장
            if (loginForm) {
                loginForm.addEventListener("submit", () => {
                    const formData = new FormData(loginForm);
                    const student = {
                        academyName: formData.get("academyName") || "",
                        grade: formData.get("grade") || "",
                        name:  formData.get("name")  || "",
                        phone: formData.get("phone") || ""
                    };
                    localStorage.setItem("currentStudent", JSON.stringify(student));
                    localStorage.setItem("currentStudentKey", buildStudentKey(student));
                    localStorage.setItem("userType", "academy");
                    localStorage.setItem("loginSource", "academy");

                    sessionStorage.setItem("justLoggedIn", "true");
                });
            }

            // ✅ 로그인 오류 / 승인 대기 쿼리 처리
            const errType = getLoginErrorType();
            if (errType) {
                openLoginErrorModal(errType);

                const url = new URL(window.location.href);
                url.searchParams.delete("loginError");
                window.history.replaceState({}, "", url.pathname + url.search);
            }

            // ✅ 오류 모달 버튼 동작
            if (errOverlay && errCloseBtn) {
                errCloseBtn.addEventListener("click", () => {
                    errOverlay.classList.remove("active");
                });
            }
            if (errOverlay && errRetryBtn && overlay) {
                errRetryBtn.addEventListener("click", () => {
                    errOverlay.classList.remove("active");
                    overlay.classList.add("active");
                    showPanel("login");
                });
            }

            // ✅ 회원가입 승인 대기 처리
            const signupStatus = getSignupStatus();
            if (signupStatus === "pending") {
                openSignupPendingModal();
            }

            const signupCloseBtn = document.getElementById("signupPendingCloseBtn");
            if (signupCloseBtn) {
                signupCloseBtn.addEventListener("click", closeSignupPendingModal);
            }

            const signupOverlay = document.getElementById("signupPendingOverlay");
            if (signupOverlay) {
                signupOverlay.addEventListener("click", function (e) {
                    if (e.target === signupOverlay) closeSignupPendingModal();
                });
            }

            // ✅ 개인정보문의 모달
            const privacyOpenBtn = document.getElementById("openPrivacyInquiryBtn");
            const privacyOverlay = document.getElementById("privacyInquiryOverlay");
            const privacyCloseBtn = document.getElementById("closePrivacyInquiryBtn");
            const privacySubmitBtn = document.getElementById("submitPrivacyInquiryBtn");

            if (privacyOpenBtn && privacyOverlay) {
                privacyOpenBtn.addEventListener("click", () => {
                    privacyOverlay.classList.add("show");
                });
            }

            if (privacyCloseBtn && privacyOverlay) {
                privacyCloseBtn.addEventListener("click", () => {
                    privacyOverlay.classList.remove("show");
                });
            }

            if (privacyOverlay) {
                privacyOverlay.addEventListener("click", (e) => {
                    if (e.target === privacyOverlay) {
                        privacyOverlay.classList.remove("show");
                    }
                });
            }

            if (privacySubmitBtn) {
                privacySubmitBtn.addEventListener("click", () => {
                    const requestType = document.getElementById("privacyRequestType").value;
                    const name = document.getElementById("privacyRequesterName").value.trim();
                    const contact = document.getElementById("privacyRequesterContact").value.trim();
                    const detail = document.getElementById("privacyRequestDetail").value.trim();

                    if (!requestType) {
                        alert("요청 유형을 선택해주세요.");
                        return;
                    }
                    if (!name) {
                        alert("이름을 입력해주세요.");
                        return;
                    }
                    if (!contact) {
                        alert("연락처를 입력해주세요.");
                        return;
                    }

                    const subject = encodeURIComponent(`[개인정보 ${requestType} 요청] ${name}`);
                    const body = encodeURIComponent(
                        `안녕하세요, 개인정보 ${requestType} 요청드립니다.\n\n` +
                        `■ 요청 유형: ${requestType}\n` +
                        `■ 이름: ${name}\n` +
                        `■ 연락처: ${contact}\n` +
                        `■ 상세 내용:\n${detail || '(없음)'}\n\n` +
                        `확인 후 회신 부탁드립니다.\n감사합니다.`
                    );

                    window.location.href = `mailto:kukikukilove@naver.com?subject=${subject}&body=${body}`;
                    privacyOverlay.classList.remove("show");
                });
            }

            // ✅ 전화번호 입력 시 숫자만 허용
            const phoneInputs = document.querySelectorAll('input[type="tel"]');
            phoneInputs.forEach(input => {
                input.addEventListener("input", (e) => {
                    e.target.value = e.target.value.replace(/\D/g, "");
                });
            });
        });
    </script>
</body>
</html>
