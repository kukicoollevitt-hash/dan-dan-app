<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>브레인창작도서 수업 지침서 - 교사용 가이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- PDF 생성용 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      --panel: #ffffff;
      --accent: #d97706;
      --accent-hover: #b45309;
      --accent-dark: #92400e;
      --text: #1f2937;
      --text-light: #6b7280;
      --line: #fde68a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      background: var(--bg);
      font-family: "Gmarket Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.3);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 24px;
    }
    .back-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }
    .header-left {
      flex: 1;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-dark);
    }
    .sub {
      margin: 0;
      font-size: 16px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* 검색 박스 */
    .search-box {
      position: relative;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .search-box input {
      width: 220px;
      padding: 12px 16px;
      border: 2px solid rgba(217, 119, 6, 0.2);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .search-box input:focus {
      border-color: var(--accent);
    }
    .search-box button {
      padding: 12px 16px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .search-box button:hover {
      background: var(--accent-hover);
    }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 8px;
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.2);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-height: 320px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-results.show { display: block; }
    .search-result-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s ease;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #fef3c7; }
    .search-result-item .title {
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
    }
    .search-result-item .meta {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }
    .search-result-item .meta .season-badge {
      display: inline-block;
      padding: 2px 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      font-size: 10px;
      margin-right: 6px;
    }
    .search-no-result {
      padding: 16px;
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
    }

    /* 시즌 탭 메뉴 */
    .tab-menu {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      min-width: 200px;
      padding: 20px 24px;
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.2);
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
    }
    .tab-btn .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }
    .tab-btn .grade {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.8;
    }

    /* 탭 콘텐츠 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 과목 아코디언 */
    .subject-accordion {
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.15);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .subject-accordion:hover {
      border-color: rgba(217, 119, 6, 0.3);
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.1);
    }
    .subject-header {
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .subject-header:hover { background: #fef3c7; }
    .subject-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .subject-title .icon { font-size: 22px; }
    .subject-title .count {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      background: #fef3c7;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .subject-arrow {
      font-size: 18px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }
    .subject-accordion.open .subject-arrow { transform: rotate(180deg); }
    .subject-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .subject-accordion.open .subject-content { max-height: 5000px; }
    .subject-body {
      padding: 0 24px 20px 24px;
      border-top: 1px solid #e9ecef;
    }

    /* 도서 아코디언 */
    .book-accordion {
      background: #fafafa;
      border: 1px solid rgba(217, 119, 6, 0.1);
      border-radius: 10px;
      margin-top: 12px;
      overflow: hidden;
    }
    .book-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .book-header:hover { background: #fef3c7; }
    .book-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .book-title .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .book-arrow {
      font-size: 16px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }
    .book-accordion.open .book-arrow { transform: rotate(180deg); }
    .book-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .book-accordion.open .book-content { max-height: 10000px; }
    .book-body {
      padding: 20px;
      border-top: 1px solid #e9ecef;
      background: #fff;
    }

    /* 도서 정보 헤더 */
    .book-info-header {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
    }
    .book-info-header .subject-badge {
      display: inline-block;
      padding: 4px 12px;
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .book-info-header h3 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-dark);
    }
    .book-info-header .subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--text-light);
    }

    /* Q&A 섹션 */
    .qa-section {
      margin-bottom: 24px;
    }
    .qa-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--line);
    }
    .qa-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      color: #fff;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 700;
    }
    .qa-question {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent-dark);
    }
    .qa-answer {
      background: #f9fafb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .qa-answer-label {
      display: inline-block;
      padding: 4px 10px;
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .qa-answer p {
      margin: 0;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
    }
    .teaching-point {
      background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
      border-left: 4px solid #059669;
      border-radius: 0 12px 12px 0;
      padding: 16px 20px;
    }
    .teaching-point-label {
      font-size: 13px;
      font-weight: 700;
      color: #059669;
      margin-bottom: 8px;
    }
    .teaching-point p {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: #065f46;
    }

    /* 마인드맵 섹션 */
    .mindmap-section {
      background: #f0f9ff;
      border-radius: 12px;
      padding: 20px;
    }
    .mindmap-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    .mindmap-table th, .mindmap-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0f2fe;
      font-size: 13px;
    }
    .mindmap-table th {
      background: #0ea5e9;
      color: #fff;
      font-weight: 600;
    }
    .mindmap-table td { color: var(--text); }

    /* PDF 다운로드 버튼 */
    .pdf-download-wrap {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px dashed #fde68a;
      text-align: center;
    }
    .pdf-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
    }
    .pdf-download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(217, 119, 6, 0.4);
    }
    .pdf-download-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .pdf-download-btn .icon {
      font-size: 20px;
    }

    /* 플레이스홀더 */
    .placeholder-notice {
      background: #fef3c7;
      border: 2px dashed var(--accent);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      color: var(--accent-dark);
    }
    .placeholder-notice .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .placeholder-notice h4 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .placeholder-notice p {
      margin: 0;
      font-size: 14px;
      color: var(--text-light);
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .header-row { flex-direction: column; }
      .search-box { width: 100%; }
      .search-box input { flex: 1; width: auto; }
      .tab-btn { min-width: 100%; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/academy_admin_dashboard.html" class="back-btn">← 대시보드로 돌아가기</a>

    <div class="header-row">
      <div class="header-left">
        <h1>📙 브레인창작도서 수업 지침서</h1>
        <p class="sub">
          교과기반 창작도서의 <b>독서활동 모범답안</b>과 <b>지도 포인트</b>를 확인할 수 있습니다.
        </p>
      </div>
      <div class="search-box">
        <input type="text" id="bookSearch" placeholder="도서명 검색..." />
        <button id="searchBtn">🔍</button>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>

    <!-- 시즌 탭 -->
    <div class="tab-menu">
      <button class="tab-btn active" data-season="season1_34">
        <span class="icon">📖</span>
        시즌1 (3,4학년)
        <div class="grade">교과기반 창작도서</div>
      </button>
      <button class="tab-btn" data-season="season1">
        <span class="icon">📕</span>
        시즌2 (5,6학년)
        <div class="grade">교과기반 창작도서</div>
      </button>
      <button class="tab-btn" data-season="season3">
        <span class="icon">📗</span>
        시즌3 (중1,2)
        <div class="grade">교과기반 창작도서</div>
      </button>
    </div>

    <!-- 탭 콘텐츠: 시즌1 (3,4학년) -->
    <div id="tab-season1_34" class="tab-content active">
      <div class="loading">과목 목록 로딩 중...</div>
    </div>

    <!-- 탭 콘텐츠: 시즌2 (5,6학년) -->
    <div id="tab-season1" class="tab-content">
      <div class="loading">과목 목록 로딩 중...</div>
    </div>

    <!-- 탭 콘텐츠: 시즌3 (중1,2) -->
    <div id="tab-season3" class="tab-content">
      <div class="loading">과목 목록 로딩 중...</div>
    </div>
  </div>

            teachingPoint: `느낀 점은 ① 책의 내용에서 출발하되, ② 자신의 경험이나 생활과 연결하고, ③ 앞으로의 다짐이나 변화까지 이어지도록 지도합니다. '재미있었다', '감동적이었다'와 같은 단순 감상에 머무르지 않도록, '왜 감동적이었는지', '나의 삶에 어떤 변화를 줄 수 있는지'까지 서술하게 합니다. 교과 연결 질문으로 '생물과 무생물의 차이점'을 과학 개념으로 정리해보게 하면 교과 학습과도 자연스럽게 연결됩니다.`
          },
          {
            q: '내용과 생각·느낌을 마인드맵으로 나타내어 봅시다',
            isMindmap: true,
            mindmapData: [
              { branch: '생물의 특징', content: '성장 / 반응 / 번식' },
              { branch: '무생물의 역할', content: '흙, 물, 공기, 돌' },
              { branch: '4정령의 다툼', content: '물 / 빛 / 바람 / 온도' },
              { branch: '씨앗의 발아', content: '스스로 깨어남' },
              { branch: '하늘의 성장', content: '편견 → 깨달음' },
              { branch: '바위의 외로움', content: '살아 있지 않지만 가장 소중한 존재' },
              { branch: '교훈', content: '모든 존재는 서로 연결' },
              { branch: '나의 느낌', content: '자연을 소중히 여기겠다' }
            ],
            teachingPoint: `마인드맵 활동에서는 ① 중심 주제를 가운데에 크게 쓰고, ② 내용 가지(이야기 속 사건·개념)와 생각/느낌 가지(자신의 감상·교훈)를 구분하여 뻗어나가도록 안내합니다. 색깔이나 아이콘을 사용하면 시각적 구조화 능력을 함께 기를 수 있습니다.`
          }
        ]
      }
    };

    // =============================================
    // 탭 전환
    // =============================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const season = btn.dataset.season;
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        document.getElementById('tab-' + season).classList.add('active');

        renderSubjects(season);
      });
    });

    // =============================================
    // 과목 목록 렌더링
    // =============================================
    function renderSubjects(season) {
      const container = document.getElementById('tab-' + season);
      if (container.querySelector('.subject-accordion')) return;

      const seasonData = BOOKS[season];
      let html = '';

      for (const [key, subject] of Object.entries(seasonData)) {
        html += `
          <div class="subject-accordion" data-subject="${key}" data-season="${season}">
            <div class="subject-header" onclick="toggleSubject(this)">
              <span class="subject-title">
                <span class="icon">${subject.icon}</span>
                ${subject.name}
                <span class="count">${subject.books.length}권</span>
              </span>
              <span class="subject-arrow">▼</span>
            </div>
            <div class="subject-content">
              <div class="subject-body">
                ${renderBooks(subject.books, season)}
              </div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    // =============================================
    // 도서 목록 렌더링
    // =============================================
    function renderBooks(books, season) {
      return books.map(book => `
        <div class="book-accordion" data-book="${book.code}">
          <div class="book-header" onclick="toggleBook(this)">
            <span class="book-title">
              <span class="num">${book.num}</span>
              ${book.title}
            </span>
            <span class="book-arrow">▼</span>
          </div>
          <div class="book-content">
            <div class="book-body">
              ${renderBookDetail(book)}
            </div>
          </div>
        </div>
      `).join('');
    }

    // =============================================
    // 도서 상세 렌더링
    // =============================================
    function renderBookDetail(book) {
      const guide = READING_GUIDES[book.code];

      if (!guide) {
        return `
          <div class="placeholder-notice">
            <div class="icon">📝</div>
            <h4>독서활동 모범답안 준비 중</h4>
            <p>이 도서의 독서활동 모범답안은 곧 업데이트될 예정입니다.</p>
          </div>
        `;
      }

      let html = `
        <div class="book-info-header">
          <div class="subject-badge">${guide.subjectBadge}</div>
          <h3>${guide.bookTitle}</h3>
          <p class="subtitle">${guide.subtitle}</p>
        </div>
      `;

      guide.questions.forEach((q, idx) => {
        html += `<div class="qa-section">`;
        html += `
          <div class="qa-header">
            <span class="qa-number">Q${idx + 1}</span>
            <span class="qa-question">${q.q}</span>
          </div>
        `;

        if (q.isMindmap) {
          html += `
            <div class="mindmap-section">
              <div class="qa-answer-label">마인드맵 구성 예시</div>
              <table class="mindmap-table">
                <thead>
                  <tr><th>가지 주제</th><th>포함할 세부 내용</th></tr>
                </thead>
                <tbody>
                  ${q.mindmapData.map(item => `
                    <tr><td>${item.branch}</td><td>${item.content}</td></tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
        } else {
          html += `
            <div class="qa-answer">
              <div class="qa-answer-label">모범답안</div>
              <p>${q.answer.replace(/\n/g, '<br>')}</p>
            </div>
          `;
        }

        html += `
          <div class="teaching-point">
            <div class="teaching-point-label">📌 지도 포인트</div>
            <p>${q.teachingPoint}</p>
          </div>
        `;

        html += `</div>`;
      });

      // PDF 다운로드 버튼 추가
      html += `
        <div class="pdf-download-wrap">
          <button class="pdf-download-btn" onclick="downloadPDF('${book.code}', '${guide.bookTitle.replace(/'/g, "\\'")}')">
            <span class="icon">📥</span>
            <span>수업 지침서 PDF 다운로드</span>
          </button>
        </div>
      `;

      return html;
    }

    // =============================================
    // PDF 다운로드 기능
    // =============================================
    async function downloadPDF(bookCode, bookTitle) {
      const btn = event.target.closest('.pdf-download-btn');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="icon">⏳</span><span>PDF 생성 중...</span>';

      try {
        // 해당 도서의 book-body 요소 찾기
        const targetBody = btn.closest('.book-body');

        if (!targetBody) {
          alert('PDF 생성에 실패했습니다. 콘텐츠를 찾을 수 없습니다.');
          btn.disabled = false;
          btn.innerHTML = originalText;
          return;
        }

        // PDF 생성을 위한 임시 컨테이너 생성
        const pdfContainer = document.createElement('div');
        pdfContainer.style.cssText = 'position: absolute; left: -9999px; top: 0; width: 800px; padding: 30px; background: #fff; font-family: "Noto Sans KR", sans-serif;';

        // 제목 추가
        const headerHtml = `
          <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid #d97706;">
            <h1 style="font-size: 24px; color: #92400e; margin: 0 0 10px 0;">브레인창작도서 수업 지침서</h1>
            <h2 style="font-size: 18px; color: #1f2937; margin: 0;">${bookTitle}</h2>
            <p style="font-size: 12px; color: #6b7280; margin-top: 10px;">도서 코드: ${bookCode}</p>
          </div>
        `;

        pdfContainer.innerHTML = headerHtml + targetBody.innerHTML;

        // PDF 다운로드 버튼 제거
        const downloadWrap = pdfContainer.querySelector('.pdf-download-wrap');
        if (downloadWrap) downloadWrap.remove();

        document.body.appendChild(pdfContainer);

        // html2canvas로 캡처
        const canvas = await html2canvas(pdfContainer, {
          scale: 1.5,
          useCORS: true,
          logging: false,
          backgroundColor: '#ffffff'
        });

        // PDF 생성
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL('image/jpeg', 0.8);

        const pdfWidth = 210;
        const pdfHeight = 297;
        const imgWidth = pdfWidth - 20;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        const pdf = new jsPDF('p', 'mm', 'a4');

        let heightLeft = imgHeight;
        let position = 10;
        let pageCount = 0;

        while (heightLeft > 0) {
          if (pageCount > 0) {
            pdf.addPage();
            position = 10;
          }

          pdf.addImage(imgData, 'JPEG', 10, position - (pageCount * (pdfHeight - 20)), imgWidth, imgHeight);
          heightLeft -= (pdfHeight - 20);
          pageCount++;
        }

        pdf.save(`창작도서지침서_${bookCode}.pdf`);

        document.body.removeChild(pdfContainer);

        btn.disabled = false;
        btn.innerHTML = originalText;
      } catch (error) {
        console.error('PDF 생성 오류:', error);
        alert('PDF 생성 중 오류가 발생했습니다.');
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    // =============================================
    // 아코디언 토글
    // =============================================
    function toggleSubject(headerEl) {
      const accordion = headerEl.closest('.subject-accordion');
      accordion.classList.toggle('open');
    }

    function toggleBook(headerEl) {
      const accordion = headerEl.closest('.book-accordion');
      accordion.classList.toggle('open');
    }

    // =============================================
    // 검색 기능
    // =============================================
    const SEASON_NAMES = {
      'season1_34': '시즌1 (3,4학년)',
      'season1': '시즌2 (5,6학년)',
      'season3': '시즌3 (중1,2)'
    };

    let searchIndex = [];

    function buildSearchIndex() {
      searchIndex = [];
      for (const [season, subjects] of Object.entries(BOOKS)) {
        for (const [subjectKey, subject] of Object.entries(subjects)) {
          for (const book of subject.books) {
            searchIndex.push({
              season,
              seasonName: SEASON_NAMES[season],
              subjectKey,
              subjectName: subject.name,
              subjectIcon: subject.icon,
              bookCode: book.code,
              bookNum: book.num,
              bookTitle: book.title
            });
          }
        }
      }
    }

    function searchBooks(query) {
      if (!query || query.trim().length < 1) return [];
      const q = query.toLowerCase().trim();
      return searchIndex.filter(item => {
        return item.bookTitle.toLowerCase().includes(q) ||
               item.subjectName.toLowerCase().includes(q);
      }).slice(0, 10);
    }

    function showSearchResults(results) {
      const container = document.getElementById('searchResults');
      if (results.length === 0) {
        container.innerHTML = '<div class="search-no-result">검색 결과가 없습니다.</div>';
        container.classList.add('show');
        return;
      }

      let html = '';
      results.forEach(item => {
        html += `
          <div class="search-result-item" data-season="${item.season}" data-subject="${item.subjectKey}" data-book="${item.bookCode}">
            <div class="title">${item.subjectIcon} ${item.bookTitle}</div>
            <div class="meta">
              <span class="season-badge">${item.seasonName}</span>
              ${item.subjectName} ${item.bookNum}
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      container.classList.add('show');

      container.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          navigateToBook(el.dataset.season, el.dataset.subject, el.dataset.book);
          container.classList.remove('show');
          document.getElementById('bookSearch').value = '';
        });
      });
    }

    async function navigateToBook(season, subjectKey, bookCode) {
      // 탭 전환
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tab-btn[data-season="${season}"]`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      document.getElementById('tab-' + season).classList.add('active');

      renderSubjects(season);
      await new Promise(r => setTimeout(r, 50));

      // 과목 아코디언 열기
      const subjectAccordion = document.querySelector(`#tab-${season} .subject-accordion[data-subject="${subjectKey}"]`);
      if (subjectAccordion) {
        document.querySelectorAll(`#tab-${season} .subject-accordion`).forEach(a => a.classList.remove('open'));
        subjectAccordion.classList.add('open');

        await new Promise(r => setTimeout(r, 50));

        // 도서 아코디언 열기
        const bookAccordion = subjectAccordion.querySelector(`.book-accordion[data-book="${bookCode}"]`);
        if (bookAccordion) {
          subjectAccordion.querySelectorAll('.book-accordion').forEach(a => a.classList.remove('open'));
          bookAccordion.classList.add('open');

          setTimeout(() => {
            bookAccordion.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
      }
    }

    // 검색 이벤트
    document.getElementById('bookSearch').addEventListener('input', (e) => {
      const query = e.target.value;
      if (query.length >= 1) {
        const results = searchBooks(query);
        showSearchResults(results);
      } else {
        document.getElementById('searchResults').classList.remove('show');
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box')) {
        document.getElementById('searchResults').classList.remove('show');
      }
    });

    document.getElementById('bookSearch').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const firstResult = document.querySelector('.search-result-item');
        if (firstResult) firstResult.click();
      }
    });

    // =============================================
    // 초기화
    // =============================================
    document.addEventListener('DOMContentLoaded', () => {
      renderSubjects('season1_34');
      buildSearchIndex();
    });
  </script>
</body>
</html>
