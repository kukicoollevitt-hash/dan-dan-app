<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>브레인창작도서 수업 지침서 - 교사용 가이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- PDF 생성용 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      --panel: #ffffff;
      --accent: #d97706;
      --accent-hover: #b45309;
      --accent-dark: #92400e;
      --text: #1f2937;
      --text-light: #6b7280;
      --line: #fde68a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      background: var(--bg);
      font-family: "Gmarket Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.3);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 24px;
    }
    .back-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }
    .header-left {
      flex: 1;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-dark);
    }
    .sub {
      margin: 0;
      font-size: 16px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* 검색 박스 */
    .search-box {
      position: relative;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .search-box input {
      width: 220px;
      padding: 12px 16px;
      border: 2px solid rgba(217, 119, 6, 0.2);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .search-box input:focus {
      border-color: var(--accent);
    }
    .search-box button {
      padding: 12px 16px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .search-box button:hover {
      background: var(--accent-hover);
    }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 8px;
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.2);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-height: 320px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-results.show { display: block; }
    .search-result-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s ease;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #fef3c7; }
    .search-result-item .title {
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
    }
    .search-result-item .meta {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }
    .search-result-item .meta .season-badge {
      display: inline-block;
      padding: 2px 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      font-size: 10px;
      margin-right: 6px;
    }
    .search-no-result {
      padding: 16px;
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
    }

    /* 시즌 탭 메뉴 */
    .tab-menu {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      min-width: 200px;
      padding: 20px 24px;
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.2);
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
    }
    .tab-btn .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }
    .tab-btn .grade {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.8;
    }

    /* 탭 콘텐츠 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 과목 아코디언 */
    .subject-accordion {
      background: #fff;
      border: 2px solid rgba(217, 119, 6, 0.15);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .subject-accordion:hover {
      border-color: rgba(217, 119, 6, 0.3);
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.1);
    }
    .subject-header {
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .subject-header:hover { background: #fef3c7; }
    .subject-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .subject-title .icon { font-size: 22px; }
    .subject-title .count {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      background: #fef3c7;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .subject-arrow {
      font-size: 18px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }
    .subject-accordion.open .subject-arrow { transform: rotate(180deg); }
    .subject-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .subject-accordion.open .subject-content { max-height: 5000px; }
    .subject-body {
      padding: 0 24px 20px 24px;
      border-top: 1px solid #e9ecef;
    }

    /* 도서 아코디언 */
    .book-accordion {
      background: #fafafa;
      border: 1px solid rgba(217, 119, 6, 0.1);
      border-radius: 10px;
      margin-top: 12px;
      overflow: hidden;
    }
    .book-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .book-header:hover { background: #fef3c7; }
    .book-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .book-title .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .book-arrow {
      font-size: 16px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }
    .book-accordion.open .book-arrow { transform: rotate(180deg); }
    .book-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .book-accordion.open .book-content { max-height: 10000px; }
    .book-body {
      padding: 20px;
      border-top: 1px solid #e9ecef;
      background: #fff;
    }

    /* 도서 정보 헤더 */
    .book-info-header {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
    }
    .book-info-header .subject-badge {
      display: inline-block;
      padding: 4px 12px;
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .book-info-header h3 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-dark);
    }
    .book-info-header .subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--text-light);
    }

    /* Q&A 섹션 */
    .qa-section {
      margin-bottom: 24px;
    }
    .qa-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--line);
    }
    .qa-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      color: #fff;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 700;
    }
    .qa-question {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent-dark);
    }
    .qa-answer {
      background: #f9fafb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .qa-answer-label {
      display: inline-block;
      padding: 4px 10px;
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .qa-answer p {
      margin: 0;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
    }
    .teaching-point {
      background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
      border-left: 4px solid #059669;
      border-radius: 0 12px 12px 0;
      padding: 16px 20px;
    }
    .teaching-point-label {
      font-size: 13px;
      font-weight: 700;
      color: #059669;
      margin-bottom: 8px;
    }
    .teaching-point p {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: #065f46;
    }

    /* 마인드맵 섹션 */
    .mindmap-section {
      background: #f0f9ff;
      border-radius: 12px;
      padding: 20px;
    }
    .mindmap-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    .mindmap-table th, .mindmap-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0f2fe;
      font-size: 13px;
    }
    .mindmap-table th {
      background: #0ea5e9;
      color: #fff;
      font-weight: 600;
    }
    .mindmap-table td { color: var(--text); }

    /* PDF 다운로드 버튼 */
    .pdf-download-wrap {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px dashed #fde68a;
      text-align: center;
    }
    .pdf-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
    }
    .pdf-download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(217, 119, 6, 0.4);
    }
    .pdf-download-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .pdf-download-btn .icon {
      font-size: 20px;
    }

    /* 플레이스홀더 */
    .placeholder-notice {
      background: #fef3c7;
      border: 2px dashed var(--accent);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      color: var(--accent-dark);
    }
    .placeholder-notice .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .placeholder-notice h4 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .placeholder-notice p {
      margin: 0;
      font-size: 14px;
      color: var(--text-light);
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .header-row { flex-direction: column; }
      .search-box { width: 100%; }
      .search-box input { flex: 1; width: auto; }
      .tab-btn { min-width: 100%; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/academy_admin_dashboard.html" class="back-btn">← 대시보드로 돌아가기</a>

    <div class="header-row">
      <div class="header-left">
        <h1>📙 브레인창작도서 수업 지침서</h1>
        <p class="sub">
          교과기반 창작도서의 <b>독서활동 모범답안</b>과 <b>지도 포인트</b>를 확인할 수 있습니다.
        </p>
      </div>
      <div class="search-box">
        <input type="text" id="bookSearch" placeholder="도서명 검색..." />
        <button id="searchBtn">🔍</button>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>

    <!-- 시즌 탭 -->
    <div class="tab-menu">
      <button class="tab-btn active" data-season="season1_34">
        <span class="icon">📖</span>
        시즌1 (3,4학년)
        <div class="grade">교과기반 창작도서</div>
      </button>
      <button class="tab-btn" data-season="season1">
        <span class="icon">📕</span>
        시즌2 (5,6학년)
        <div class="grade">교과기반 창작도서</div>
      </button>
      <button class="tab-btn" data-season="season3">
        <span class="icon">📗</span>
        시즌3 (중1,2)
        <div class="grade">교과기반 창작도서</div>
      </button>
    </div>

    <!-- 탭 콘텐츠: 시즌1 (3,4학년) -->
    <div id="tab-season1_34" class="tab-content active">
      <div class="loading">과목 목록 로딩 중...</div>
    </div>

    <!-- 탭 콘텐츠: 시즌2 (5,6학년) -->
    <div id="tab-season1" class="tab-content">
      <div class="loading">과목 목록 로딩 중...</div>
    </div>

    <!-- 탭 콘텐츠: 시즌3 (중1,2) -->
    <div id="tab-season3" class="tab-content">
      <div class="loading">과목 목록 로딩 중...</div>
    </div>
  </div>

'결정 대장'이 이끄는 설탕 덩어리가 물 분자들의 공격(?)을 받아 분해되는 장면, '열이'가 등장해 물 분자들을 더 빠르게 움직이게 만드는 장면을 통해 온도와 용해 속도의 관계도 배웁니다. 브라운 운동으로 분자들이 끊임없이 춤추는 모습도 관찰합니다.

다은이는 증거 수집을 위해 설탕물을 증발시키는 실험을 합니다. 물이 사라지자 설탕 결정이 다시 나타납니다! "보이지 않았을 뿐, 설탕은 계속 거기 있었구나!" 질량 보존의 법칙을 체감한 다은이는 사건을 해결하고, "보이지 않는다고 없는 게 아니야"라는 깨달음을 얻습니다.`,
            teachingPoint: `이 이야기는 용해 현상을 '실종 사건'이라는 미스터리 형식으로 풀어냅니다. 줄거리를 정리할 때 ① 사건 발생(설탕 실종) → ② 탐정 출동(분자 세계 진입) → ③ 증거 수집(용해 과정 관찰) → ④ 진실 발견(재결정화) → ⑤ 사건 해결(질량 보존 법칙)의 5단계로 나누어 정리하도록 안내합니다. 각 단계에서 과학 개념(용해, 수화, 확산, 증발, 재결정화)이 어떻게 등장하는지 연결하면 이해가 깊어집니다.`
          },
          {
            q: '주인공의 성격을 분석해 봅시다',
            answer: `**다은이의 성격**

1. **호기심이 강함**: 설탕이 사라지는 당연한 현상을 그냥 넘기지 않고 "실종 사건"이라고 선포할 정도로 궁금해합니다. "왜?"라는 질문을 멈추지 않는 성격입니다.

2. **탐정 기질**: 현상을 관찰하고, 증거를 수집하고, 논리적으로 추론합니다. 설탕물을 증발시켜 설탕을 다시 찾아내는 실험도 직접 설계합니다.

3. **열린 마음**: 분자 크기로 축소되어 물컵 속에 들어가는 황당한 상황도 거부하지 않고 받아들입니다. 새로운 경험에 두려움보다 흥미를 느낍니다.

4. **끈기가 있음**: 사건을 중간에 포기하지 않고 끝까지 추적합니다. 증거가 부족하면 새로운 방법(증발 실험)을 시도합니다.

**수크(설탕 분자)의 성격**
- 친절하고 설명을 잘해줌
- "우리는 실종된 게 아니야"라며 오해를 바로잡아줌
- 자신의 존재 방식을 당당하게 설명함

**아쿠아(물 분자)의 성격**
- 활발하고 에너지가 넘침
- 수크를 둘러싸는 것을 좋아함(수화)
- 열이와 함께 있으면 더 빠르게 움직임`,
            teachingPoint: `다은이는 '과학자의 자세'를 보여주는 캐릭터입니다. 학생들에게 ① 호기심(왜?라고 묻기), ② 관찰력(현상 자세히 보기), ③ 실험 정신(직접 확인하기), ④ 끈기(포기하지 않기)가 과학 탐구의 기본 태도임을 연결해서 설명합니다. 수크와 아쿠아의 성격 분석은 분자의 성질(설탕의 용질 성질, 물의 용매 성질)을 의인화한 것임을 알려주세요.`
          },
          {
            q: '주인공에게 배울 점은 무엇인가요?',
            answer: `다은이에게 배울 점은 다음과 같습니다.

**1. 당연한 것에 질문하는 용기**
설탕이 물에 녹는 것은 누구나 매일 보는 현상입니다. 하지만 다은이는 "왜 사라지지?"라고 질문했습니다. 당연하게 여기는 것에 "왜?"라고 묻는 것이 과학의 시작입니다. 뉴턴이 떨어지는 사과를 보고 만유인력을 발견한 것처럼요.

**2. 보이지 않는 것도 존재한다는 믿음**
다은이는 설탕이 눈에 보이지 않아도 "분명히 어딘가에 있을 거야"라고 믿었습니다. 그리고 그 믿음을 증발 실험으로 증명했습니다. 과학에서는 눈에 보이지 않는 것(원자, 분자, 전자, 중력 등)이 많습니다. "안 보이니까 없다"고 생각하면 아무것도 발견할 수 없습니다.

**3. 직접 확인하는 실험 정신**
다은이는 수크와 아쿠아의 말만 믿지 않고, 직접 증발 실험을 해서 설탕이 정말 남아있는지 확인했습니다. "들은 것을 믿지 말고, 본 것을 믿고, 확인한 것만 안다고 하라"는 과학자의 자세입니다.

**4. 과정을 즐기는 태도**
다은이는 사건 해결이라는 결과보다, 분자 세계를 탐험하는 과정 자체를 즐겼습니다. 수크와 춤추고, 아쿠아와 수영하고, 결정 대장의 분해를 지켜보는 모든 순간이 즐거움이었습니다.

**5. 질량 보존의 법칙에 대한 직관**
"사라진 것은 없다, 형태가 바뀌었을 뿐이다"라는 깨달음은 과학의 핵심 원리입니다.`,
            teachingPoint: `이 책의 핵심 교훈은 '보이지 않는 것도 존재한다'입니다. 학생들에게 실생활에서 보이지 않지만 존재하는 것들을 찾아보게 하세요: 공기, 소리, 전기, 냄새, 와이파이 등. 또한 "설탕이 사라진 게 아니라 형태가 바뀐 것"이라는 개념을 질량 보존의 법칙으로 확장하여, 물이 증발해도 수증기로 존재하고, 나무가 타도 재와 연기로 존재한다는 예시를 들어주세요.`
          },
          {
            q: '재미있었던 장면은 어디인가요?',
            answer: `가장 재미있었던 장면은 다은이가 분자 크기로 축소되어 물컵 속에 들어가는 장면입니다.

분자경 박사가 "이 분자경을 쓰면 분자 세계가 보일 거야"라고 말했을 때, 다은이가 정말 축소되어 물컵 속으로 빨려 들어갔습니다! 거대한 물 분자들이 춤추듯 움직이고, 설탕 분자들이 결정 형태로 뭉쳐 있는 광경이 마치 외계 행성에 온 것 같았습니다.

또 다른 재미있는 장면은 '결정 대장'이 물 분자들에게 포위당하는 장면입니다. 설탕 결정 덩어리를 이끄는 결정 대장이 "후퇴하라!"고 외치지만, 아쿠아 군단이 사방에서 달라붙어 설탕 분자들을 하나씩 떼어냅니다. 마치 성이 무너지듯 결정이 분해되는 장면이 역동적이었습니다.

'열이'가 등장하는 장면도 인상적이었습니다. 뜨거운 물이 들어오자 열이가 나타나서 물 분자들을 더 빠르게 움직이게 만들고, 용해 속도가 급격히 빨라집니다. 온도가 높으면 왜 설탕이 빨리 녹는지 눈으로 보는 느낌이었습니다.

다은이가 증발 실험을 하는 장면도 좋았습니다. 물이 점점 줄어들면서 아쿠아들이 하나씩 날아가고, 마지막에 하얀 설탕 결정들이 다시 모습을 드러내는 장면. "너희 여기 있었구나!"라고 다은이가 외치는 순간이 감동적이었습니다.`,
            teachingPoint: `재미있었던 장면을 서술할 때 ① 장면의 구체적 묘사, ② 감정(놀라움, 흥분, 감동), ③ 과학적 의미(용해, 수화, 확산, 온도와 용해 속도)를 함께 쓰도록 안내합니다. 특히 '열이' 장면은 온도와 분자 운동의 관계를, '증발 실험' 장면은 재결정화와 질량 보존을 시각적으로 보여주는 핵심 장면입니다.`
          },
          {
            q: '내가 만약 주인공이라면 어떻게 했을까요?',
            answer: `내가 만약 다은이였다면, 다음과 같이 행동했을 것입니다.

첫째, 더 다양한 실험을 해봤을 것입니다. 설탕뿐만 아니라 소금, 밀가루, 모래를 물에 넣어보고 무엇이 녹고 무엇이 안 녹는지 비교했을 것입니다. "왜 설탕은 녹고 모래는 안 녹을까?"라는 새로운 질문이 생겼을 것입니다.

둘째, 분자 세계에서 더 오래 머물렀을 것입니다. 수크와 아쿠아에게 더 많은 질문을 했을 것입니다. "너희는 왜 서로 끌리니?", "물 분자끼리는 안 붙어?", "설탕 분자는 몇 개의 원자로 되어 있어?" 같은 질문들이요.

셋째, 다른 친구들도 분자 세계에 데려왔을 것입니다. 이런 신비한 경험을 혼자만 하기 아까우니까요. 친구들과 함께 물컵 속을 탐험하면 더 재미있었을 것입니다.

다은이와 비슷하게 행동했을 부분도 있습니다. 설탕이 사라지는 것을 보고 "실종 사건!"이라고 외치는 것처럼, 나도 평범한 현상을 재미있게 바라보는 것을 좋아합니다. 또 증발 실험으로 직접 확인하는 것도 똑같이 했을 것입니다. 백문이 불여일견이니까요.

다르게 행동했을 부분은 기록입니다. 나라면 분자 세계에서 본 것들을 그림으로 그리고 메모했을 것입니다. 수크의 모양, 아쿠아의 움직임, 결정 대장의 분해 과정 등을 기록해서 과학 보고서를 만들었을 것입니다.`,
            teachingPoint: `이 문항은 과학적 호기심의 확장을 유도합니다. 학생들이 ① 비교 실험(다른 물질도 녹일까?), ② 추가 질문(왜 어떤 건 녹고 어떤 건 안 녹을까?), ③ 기록과 공유의 중요성을 생각해보도록 안내합니다. 실제로 "소금, 설탕, 밀가루, 모래를 물에 넣으면?" 실험을 해보면 용해와 현탁액의 차이를 체험할 수 있습니다.`

          {
            q: '책을 읽고 느낀 점을 써 봅시다',
            answer: `이 책을 읽고 가장 크게 느낀 점은, '보이지 않는다고 없는 게 아니다'라는 것입니다.

나는 그동안 설탕이 물에 녹으면 "설탕이 사라졌다"고 생각했습니다. 하지만 이 책을 읽고 깨달았습니다. 설탕은 사라진 게 아니라, 분자 단위로 쪼개져서 물 분자들 사이에 퍼진 것입니다. 눈에 안 보일 뿐, 설탕은 분명히 거기 있습니다. 증발시키면 다시 나타나니까요!

'용해'라는 과학 용어가 무엇인지 처음으로 제대로 이해했습니다. 용질(설탕)이 용매(물)에 녹아 용액(설탕물)이 되는 과정. 그리고 수화(물 분자가 설탕 분자를 둘러싸는 것), 확산(설탕 분자가 물속에 퍼지는 것), 브라운 운동(분자들의 무작위 움직임)까지. 어려운 개념들이 이야기 속에서 자연스럽게 이해되었습니다.

특히 '질량 보존의 법칙'이 인상 깊었습니다. 설탕 10g을 물 100g에 녹이면, 설탕물의 질량은 정확히 110g입니다. 설탕이 안 보여도 질량은 그대로입니다. 이것은 우주의 근본 원리입니다. 무엇도 사라지지 않고, 형태만 바뀔 뿐입니다.

            teachingPoint: `느낀 점 서술 시 ① 기존 생각의 변화(사라짐 → 형태 변화), ② 새로 배운 과학 개념(용해, 수화, 확산, 질량 보존), ③ 일상과의 연결(증발, 연소 등)의 세 방향으로 확장할 수 있습니다. 질량 보존의 법칙은 화학의 가장 기본적인 원리이므로, "설탕물 무게 재기" 실험으로 직접 확인하면 감동이 배가됩니다.`

    // =============================================

    function renderSubjects(season) {
      const container = document.getElementById('tab-' + season);
      if (container.querySelector('.subject-accordion')) return;

      const seasonData = BOOKS[season];
      let html = '';

      for (const [key, subject] of Object.entries(seasonData)) {
        html += `

            </div>
            <div class="subject-content">
              <div class="subject-body">

    // =============================================
    function renderBookDetail(book) {
      const guide = READING_GUIDES[book.code];

      if (!guide) {
        return `
          <div class="placeholder-notice">
            <div class="icon">📝</div>
            <h4>독서활동 모범답안 준비 중</h4>

        `;
      }

      let html = `
        <div class="book-info-header">
          <div class="subject-badge">${guide.subjectBadge}</div>
          <h3>${guide.bookTitle}</h3>
          <p class="subtitle">${guide.subtitle}</p>
        </div>
      `;

      guide.questions.forEach((q, idx) => {
        html += `<div class="qa-section">`;

                  `).join('')}

            </div>
          `;
        } else {
          html += `

              <div class="qa-answer-label">모범답안</div>

      });

      // PDF 다운로드 버튼 추가
      html += `

    // =============================================
    // PDF 다운로드 기능
    // =============================================
    async function downloadPDF(bookCode, bookTitle) {
      const btn = event.target.closest('.pdf-download-btn');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="icon">⏳</span><span>PDF 생성 중...</span>';

      try {
        // 해당 도서의 book-body 요소 찾기
        const targetBody = btn.closest('.book-body');

        if (!targetBody) {
          alert('PDF 생성에 실패했습니다. 콘텐츠를 찾을 수 없습니다.');
          btn.disabled = false;
          btn.innerHTML = originalText;
          return;
        }

        // PDF 생성을 위한 임시 컨테이너 생성
        const pdfContainer = document.createElement('div');
        pdfContainer.style.cssText = 'position: absolute; left: -9999px; top: 0; width: 800px; padding: 30px; background: #fff; font-family: "Noto Sans KR", sans-serif;';

        // 제목 추가
        const headerHtml = `
          <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid #d97706;">
            <h1 style="font-size: 24px; color: #92400e; margin: 0 0 10px 0;">브레인창작도서 수업 지침서</h1>
            <h2 style="font-size: 18px; color: #1f2937; margin: 0;">${bookTitle}</h2>
            <p style="font-size: 12px; color: #6b7280; margin-top: 10px;">도서 코드: ${bookCode}</p>
          </div>
        `;

        pdfContainer.innerHTML = headerHtml + targetBody.innerHTML;

        // PDF 다운로드 버튼 제거
        const downloadWrap = pdfContainer.querySelector('.pdf-download-wrap');
        if (downloadWrap) downloadWrap.remove();

        document.body.appendChild(pdfContainer);

        // html2canvas로 캡처
        const canvas = await html2canvas(pdfContainer, {
          scale: 1.5,
          useCORS: true,
          logging: false,
          backgroundColor: '#ffffff'
        });

        // PDF 생성
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL('image/jpeg', 0.8);

        const pdfWidth = 210;
        const pdfHeight = 297;
        const imgWidth = pdfWidth - 20;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        const pdf = new jsPDF('p', 'mm', 'a4');

        let heightLeft = imgHeight;
        let position = 10;
        let pageCount = 0;

        while (heightLeft > 0) {
          if (pageCount > 0) {
            pdf.addPage();
            position = 10;
          }

          pdf.addImage(imgData, 'JPEG', 10, position - (pageCount * (pdfHeight - 20)), imgWidth, imgHeight);
          heightLeft -= (pdfHeight - 20);
          pageCount++;
        }

        pdf.save(`창작도서지침서_${bookCode}.pdf`);

        document.body.removeChild(pdfContainer);

        btn.disabled = false;
        btn.innerHTML = originalText;
      } catch (error) {
        console.error('PDF 생성 오류:', error);
        alert('PDF 생성 중 오류가 발생했습니다.');
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

      const accordion = headerEl.closest('.subject-accordion');

    // =============================================

    const SEASON_NAMES = {
      'season1_34': '시즌1 (3,4학년)',
      'season1': '시즌2 (5,6학년)',
      'season3': '시즌3 (중1,2)'
    };

    let searchIndex = [];

    function buildSearchIndex() {
      searchIndex = [];
      for (const [season, subjects] of Object.entries(BOOKS)) {
        for (const [subjectKey, subject] of Object.entries(subjects)) {
          for (const book of subject.books) {
            searchIndex.push({
              season,
              seasonName: SEASON_NAMES[season],
              subjectKey,
              subjectName: subject.name,
              subjectIcon: subject.icon,
              bookCode: book.code,
              bookNum: book.num,
              bookTitle: book.title
            });
          }
        }
      }
    }

    function searchBooks(query) {
      if (!query || query.trim().length < 1) return [];
      const q = query.toLowerCase().trim();
      return searchIndex.filter(item => {
        return item.bookTitle.toLowerCase().includes(q) ||
               item.subjectName.toLowerCase().includes(q);
      }).slice(0, 10);
    }

    function showSearchResults(results) {
      const container = document.getElementById('searchResults');
      if (results.length === 0) {
        container.innerHTML = '<div class="search-no-result">검색 결과가 없습니다.</div>';
        container.classList.add('show');
        return;
      }

      let html = '';
      results.forEach(item => {
        html += `
          <div class="search-result-item" data-season="${item.season}" data-subject="${item.subjectKey}" data-book="${item.bookCode}">
            <div class="title">${item.subjectIcon} ${item.bookTitle}</div>
            <div class="meta">
              <span class="season-badge">${item.seasonName}</span>
              ${item.subjectName} ${item.bookNum}
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      container.classList.add('show');

      container.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          navigateToBook(el.dataset.season, el.dataset.subject, el.dataset.book);
          container.classList.remove('show');
          document.getElementById('bookSearch').value = '';
        });
      });
    }

    async function navigateToBook(season, subjectKey, bookCode) {
      // 탭 전환
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tab-btn[data-season="${season}"]`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      document.getElementById('tab-' + season).classList.add('active');

      renderSubjects(season);
      await new Promise(r => setTimeout(r, 50));

      // 과목 아코디언 열기
      const subjectAccordion = document.querySelector(`#tab-${season} .subject-accordion[data-subject="${subjectKey}"]`);
      if (subjectAccordion) {
        document.querySelectorAll(`#tab-${season} .subject-accordion`).forEach(a => a.classList.remove('open'));
        subjectAccordion.classList.add('open');

        await new Promise(r => setTimeout(r, 50));

        // 도서 아코디언 열기
        const bookAccordion = subjectAccordion.querySelector(`.book-accordion[data-book="${bookCode}"]`);
        if (bookAccordion) {
          subjectAccordion.querySelectorAll('.book-accordion').forEach(a => a.classList.remove('open'));
          bookAccordion.classList.add('open');

          setTimeout(() => {
            bookAccordion.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
      }
    }

    // 검색 이벤트
    document.getElementById('bookSearch').addEventListener('input', (e) => {
      const query = e.target.value;
      if (query.length >= 1) {
        const results = searchBooks(query);
        showSearchResults(results);
      } else {
        document.getElementById('searchResults').classList.remove('show');
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box')) {
        document.getElementById('searchResults').classList.remove('show');
      }
    });

    document.getElementById('bookSearch').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const firstResult = document.querySelector('.search-result-item');
        if (firstResult) firstResult.click();
      }
    });

    // =============================================
    // 초기화
    // =============================================
    document.addEventListener('DOMContentLoaded', () => {
      renderSubjects('season1_34');
      buildSearchIndex();
    });
  </script>
</body>
</html>
