<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>브레인문해력 수업 지침서 - 교사용 가이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- PDF 생성용 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
      --panel: #ffffff;
      --accent: #059669;
      --accent-hover: #047857;
      --accent-dark: #065f46;
      --text: #1f2937;
      --text-light: #6b7280;
      --line: #d1fae5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      background: var(--bg);
      font-family: "Gmarket Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: #fff;
      border: 2px solid rgba(5, 150, 105, 0.3);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 24px;
    }
    .back-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-dark);
    }
    .sub {
      margin: 0 0 30px;
      font-size: 16px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* 시리즈 탭 메뉴 */
    .tab-menu {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      min-width: 120px;
      padding: 16px 24px;
      background: #fff;
      border: 2px solid rgba(5, 150, 105, 0.2);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);
    }
    .tab-btn .icon {
      font-size: 24px;
      display: block;
      margin-bottom: 8px;
    }

    /* 탭 콘텐츠 */
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* 과목 아코디언 (1단계) */
    .subject-accordion {
      background: #fff;
      border: 2px solid rgba(5, 150, 105, 0.15);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .subject-accordion:hover {
      border-color: rgba(5, 150, 105, 0.3);
      box-shadow: 0 4px 15px rgba(5, 150, 105, 0.1);
    }
    .subject-header {
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .subject-header:hover {
      background: #f0fdf4;
    }
    .subject-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .subject-title .icon {
      font-size: 22px;
    }
    .subject-arrow {
      font-size: 18px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }
    .subject-accordion.open .subject-arrow {
      transform: rotate(180deg);
    }
    .subject-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .subject-accordion.open .subject-content {
      max-height: 5000px;
    }
    .subject-body {
      padding: 0 24px 20px 24px;
      border-top: 1px solid #e9ecef;
    }

    /* 단원 아코디언 (2단계) */
    .unit-accordion {
      background: #fafafa;
      border: 1px solid rgba(5, 150, 105, 0.1);
      border-radius: 10px;
      margin-top: 12px;
      overflow: hidden;
    }
    .unit-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .unit-header:hover {
      background: #f0fdf4;
    }
    .unit-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .unit-title .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .unit-arrow {
      font-size: 16px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }
    .unit-accordion.open .unit-arrow {
      transform: rotate(180deg);
    }
    .unit-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .unit-accordion.open .unit-content {
      max-height: 10000px;
    }
    .unit-body {
      padding: 16px 18px;
      border-top: 1px solid #e9ecef;
      background: #fff;
    }

    /* 단원 상세 영역 */
    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section:last-child {
      margin-bottom: 0;
    }
    .detail-section h4 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-dark);
      margin: 0 0 12px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--line);
    }
    .detail-section h4 .badge {
      display: inline-block;
      padding: 3px 8px;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* 문단별 중심내용 */
    .paragraph-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .paragraph-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px dashed #e9ecef;
    }
    .paragraph-item:last-child {
      border-bottom: none;
    }
    .paragraph-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      background: #e0f2f1;
      color: var(--accent-dark);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
    }
    .paragraph-content {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    /* 교사용 가이드 */
    .teacher-guide {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: #78350f;
    }
    .teacher-guide .placeholder {
      color: #b45309;
      font-style: italic;
    }
    .teacher-guide h5 {
      margin: 16px 0 10px 0;
      font-size: 15px;
      font-weight: 700;
      color: #92400e;
    }
    .teacher-guide h5:first-child {
      margin-top: 0;
    }
    .teacher-guide ul {
      margin: 8px 0;
      padding-left: 20px;
    }
    .teacher-guide li {
      margin-bottom: 6px;
    }
    .teacher-guide b {
      color: #78350f;
    }

    /* PDF 다운로드 버튼 */
    .pdf-download-wrap {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px dashed #d1fae5;
      text-align: center;
    }
    .pdf-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);
    }
    .pdf-download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(5, 150, 105, 0.4);
    }
    .pdf-download-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .pdf-download-btn .icon {
      font-size: 20px;
    }

    /* 창의활동 예시답안 */
    .creative-topic {
      background: #f0fdf4;
      border-left: 4px solid var(--accent);
      padding: 12px 16px;
      margin-bottom: 12px;
      font-weight: 600;
      color: var(--accent-dark);
    }
    .creative-hint {
      background: #fefce8;
      border-left: 4px solid #eab308;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #854d0e;
    }
    .creative-examples {
      background: #f9fafb;
      border-radius: 10px;
      padding: 16px;
    }
    .creative-example-item {
      padding: 10px 0;
      border-bottom: 1px dashed #e5e7eb;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }
    .creative-example-item:last-child {
      border-bottom: none;
    }
    .creative-example-item .label {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
    }
    .creative-example-item .placeholder {
      color: #9ca3af;
      font-style: italic;
    }

    /* 문제풀이 정답 및 해설 */
    .quiz-section {
      background: #f0f9ff;
      border-radius: 12px;
      padding: 20px;
      margin-top: 8px;
    }
    .quiz-item {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #bae6fd;
    }
    .quiz-item:last-child {
      margin-bottom: 0;
    }
    .quiz-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .quiz-index-badge {
      display: inline-block;
      background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .quiz-index-name {
      font-size: 13px;
      color: #0369a1;
      font-weight: 600;
    }
    .quiz-question {
      background: #f8fafc;
      border-left: 3px solid #0284c7;
      padding: 12px 14px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #1e293b;
      line-height: 1.6;
    }
    .quiz-options {
      margin-bottom: 12px;
    }
    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 4px;
      border-radius: 6px;
      font-size: 13px;
      color: #475569;
      transition: all 0.2s ease;
    }
    .quiz-option.correct {
      background: #dcfce7;
      color: #166534;
      font-weight: 600;
    }
    .quiz-option.correct::before {
      content: '✓';
      color: #16a34a;
      font-weight: 700;
    }
    .quiz-option-num {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e2e8f0;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
    }
    .quiz-option.correct .quiz-option-num {
      background: #16a34a;
      color: #fff;
    }
    .quiz-detail {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: #78350f;
    }
    .quiz-detail-title {
      font-weight: 700;
      color: #92400e;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .quiz-essay {
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: #581c87;
    }
    .quiz-essay-title {
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 8px;
    }
    .quiz-no-data {
      text-align: center;
      padding: 30px;
      color: #9ca3af;
      font-style: italic;
    }

    /* 로딩 스피너 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }
    .loading .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 헤더 레이아웃 */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }
    .header-left {
      flex: 1;
    }
    .header-left h1 {
      margin-bottom: 12px;
    }
    .header-left .sub {
      margin-bottom: 0;
    }

    /* 검색 박스 */
    .search-box {
      position: relative;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .search-box input {
      width: 220px;
      padding: 12px 16px;
      border: 2px solid rgba(5, 150, 105, 0.2);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .search-box input:focus {
      border-color: var(--accent);
    }
    .search-box button {
      padding: 12px 16px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .search-box button:hover {
      background: var(--accent-hover);
    }

    /* 검색 결과 드롭다운 */
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 8px;
      background: #fff;
      border: 2px solid rgba(5, 150, 105, 0.2);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-height: 320px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-results.show {
      display: block;
    }
    .search-result-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s ease;
    }
    .search-result-item:last-child {
      border-bottom: none;
    }
    .search-result-item:hover {
      background: #f0fdf4;
    }
    .search-result-item .title {
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
    }
    .search-result-item .meta {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }
    .search-result-item .meta .series-badge {
      display: inline-block;
      padding: 2px 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      font-size: 10px;
      margin-right: 6px;
    }
    .search-no-result {
      padding: 16px;
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .header-row {
        flex-direction: column;
      }
      .search-box {
        width: 100%;
      }
      .search-box input {
        flex: 1;
        width: auto;
      }
      .tab-btn {
        flex: none;
        width: calc(50% - 6px);
        padding: 14px 16px;
        font-size: 14px;
      }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/academy_admin_dashboard.html" class="back-btn">← 대시보드로 돌아가기</a>

    <div class="header-row">
      <div class="header-left">
        <h1>📗 브레인문해력 수업 지침서</h1>
        <p class="sub">
          각 시리즈별 과목과 단원을 선택하면 <b>문단별 중심내용</b>, <b>교사용 지도 가이드</b>, <b>창의활동 예시답안</b>을 확인할 수 있습니다.
        </p>
      </div>
      <div class="search-box">
        <input type="text" id="unitSearch" placeholder="단원명 검색..." />
        <button id="searchBtn">🔍</button>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>

    <!-- 시리즈 탭 -->
    <div class="tab-menu">
      <button class="tab-btn active" data-series="brainon">
        <span class="icon">🌱</span>
        브레인온
      </button>
      <button class="tab-btn" data-series="brainup">
        <span class="icon">🚀</span>
        브레인업
      </button>
      <button class="tab-btn" data-series="brainfit">
        <span class="icon">💪</span>
        브레인핏
      </button>
      <button class="tab-btn" data-series="braindeep">
        <span class="icon">🎯</span>
        브레인딥
      </button>
    </div>

    <!-- 탭 콘텐츠: 브레인온 -->
    <div id="tab-brainon" class="tab-content active">
      <div class="loading">
        <div class="spinner"></div>
        <p>과목 목록 로딩 중...</p>
      </div>
    </div>

    <!-- 탭 콘텐츠: 브레인업 -->
    <div id="tab-brainup" class="tab-content">
      <div class="loading">
        <div class="spinner"></div>
        <p>과목 목록 로딩 중...</p>
      </div>
    </div>

    <!-- 탭 콘텐츠: 브레인핏 -->
    <div id="tab-brainfit" class="tab-content">
      <div class="loading">
        <div class="spinner"></div>
        <p>과목 목록 로딩 중...</p>
      </div>
    </div>

    <!-- 탭 콘텐츠: 브레인딥 -->
    <div id="tab-braindeep" class="tab-content">
      <div class="loading">
        <div class="spinner"></div>
        <p>과목 목록 로딩 중...</p>
      </div>
    </div>
  </div>

  <script>
    // =============================================
    // 과목 및 시리즈 설정
    // =============================================
    const SUBJECTS = {
      // 과학 (4개)
      bio: { name: '생물', icon: '🧬', folder: 'science' },
      earth: { name: '지구과학', icon: '🌍', folder: 'science' },
      physics: { name: '물리', icon: '⚡', folder: 'science' },
      chem: { name: '화학', icon: '🧪', folder: 'science' },
      // 사회 (4개)
      soc: { name: '사회문화', icon: '🏛️', folder: 'social' },
      geo: { name: '지리', icon: '🗺️', folder: 'social' },
      law: { name: '법', icon: '⚖️', folder: 'social' },
      pol: { name: '정치경제', icon: '📊', folder: 'social' },
      // 국어문학 (2개)
      modern: { name: '현대문학', icon: '📖', folder: 'korlit' },
      classic: { name: '고전문학', icon: '📜', folder: 'korlit' },
      // 세계문학 (2개)
      world1: { name: '세계문학1', icon: '🌏', folder: 'worldlit' },
      world2: { name: '세계문학2', icon: '🌎', folder: 'worldlit' },
      // 인물 (2개)
      people1: { name: '한국인물', icon: '🇰🇷', folder: 'person' },
      people2: { name: '세계인물', icon: '🌐', folder: 'person' }
    };

    // 시리즈별 content.js 파일명 접두사
    const SERIES_PREFIX = {
      brainon: 'on_',      // on_physics_content.js
      brainup: '',         // physics_content.js
      brainfit: 'fit_',    // fit_physics_content.js
      braindeep: 'deep_'   // deep_physics_content.js
    };

    // 캐시된 콘텐츠 데이터
    const contentCache = {};

    // =============================================
    // 탭 전환
    // =============================================
    function switchToSeries(series) {
      // 탭 버튼 활성화
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const targetBtn = document.querySelector(`.tab-btn[data-series="${series}"]`);
      if (targetBtn) targetBtn.classList.add('active');

      // 탭 콘텐츠 전환
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      document.getElementById('tab-' + series).classList.add('active');

      // 과목 목록 렌더링
      renderSubjects(series);

      // localStorage에 저장
      localStorage.setItem('teaching_guide_series', series);
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const series = btn.dataset.series;
        switchToSeries(series);
      });
    });

    // 페이지 로드 시 저장된 시리즈 복원
    const savedSeries = localStorage.getItem('teaching_guide_series');
    if (savedSeries && document.querySelector(`.tab-btn[data-series="${savedSeries}"]`)) {
      switchToSeries(savedSeries);
    }

    // =============================================
    // 과목 목록 렌더링
    // =============================================
    function renderSubjects(series) {
      const container = document.getElementById('tab-' + series);

      // 이미 렌더링 되었으면 스킵
      if (container.querySelector('.subject-accordion')) return;

      let html = '';
      for (const [key, subject] of Object.entries(SUBJECTS)) {
        html += `
          <div class="subject-accordion" data-subject="${key}" data-series="${series}">
            <div class="subject-header" onclick="toggleSubject(this)">
              <span class="subject-title">
                <span class="icon">${subject.icon}</span>
                ${subject.name}
              </span>
              <span class="subject-arrow">▼</span>
            </div>
            <div class="subject-content">
              <div class="subject-body">
                <div class="loading">
                  <div class="spinner"></div>
                  <p>단원 목록 로딩 중...</p>
                </div>
              </div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    // =============================================
    // 과목 아코디언 토글
    // =============================================
    function toggleSubject(headerEl) {
      const accordion = headerEl.closest('.subject-accordion');
      const isOpen = accordion.classList.contains('open');

      // 다른 과목 닫기 (선택적)
      // accordion.parentElement.querySelectorAll('.subject-accordion').forEach(a => a.classList.remove('open'));

      if (isOpen) {
        accordion.classList.remove('open');
      } else {
        accordion.classList.add('open');
        // 단원 목록 로드
        const series = accordion.dataset.series;
        const subject = accordion.dataset.subject;
        loadUnits(series, subject, accordion.querySelector('.subject-body'));
      }
    }

    // =============================================
    // 단원 목록 로드
    // =============================================
    async function loadUnits(series, subjectKey, containerEl) {
      // 이미 로드되었으면 스킵
      if (containerEl.querySelector('.unit-accordion')) return;

      const subject = SUBJECTS[subjectKey];
      const prefix = SERIES_PREFIX[series];
      const contentFile = `/BRAINUP/${subject.folder}/${prefix}${subjectKey}_content.js`;

      // 캐시 확인
      const cacheKey = `${series}_${subjectKey}`;
      if (contentCache[cacheKey]) {
        renderUnits(contentCache[cacheKey], subjectKey, containerEl);
        return;
      }

      try {
        // content.js 파일 로드 (스크립트로 주입)
        const response = await fetch(contentFile);
        if (!response.ok) {
          containerEl.innerHTML = `<p style="color: #ef4444;">해당 시리즈의 ${subject.name} 콘텐츠가 아직 준비되지 않았습니다.</p>`;
          return;
        }

        const scriptText = await response.text();

        // CONTENTS 객체 추출
        const contents = extractContents(scriptText, prefix, subjectKey);
        contentCache[cacheKey] = contents;

        renderUnits(contents, subjectKey, containerEl);
      } catch (err) {
        console.error('Error loading content:', err);
        containerEl.innerHTML = `<p style="color: #ef4444;">콘텐츠 로드 중 오류가 발생했습니다.</p>`;
      }
    }

    // =============================================
    // content.js에서 CONTENTS 객체 추출
    // =============================================
    function extractContents(scriptText, prefix, subjectKey) {
      const contents = {};
      const unitPrefix = prefix + subjectKey + '_';

      // 정규식으로 각 단원 블록 찾기
      const unitRegex = new RegExp(`(${prefix}${subjectKey}_\\d{2}):\\s*\\{`, 'g');
      let match;

      while ((match = unitRegex.exec(scriptText)) !== null) {
        const unitKey = match[1];
        const startIdx = match.index;

        // 해당 단원의 데이터 추출 (간단한 파싱)
        let braceCount = 0;
        let endIdx = startIdx;
        let inString = false;
        let stringChar = '';

        for (let i = scriptText.indexOf('{', startIdx); i < scriptText.length; i++) {
          const char = scriptText[i];

          if (!inString) {
            if (char === "'" || char === '"' || char === '`') {
              inString = true;
              stringChar = char;
            } else if (char === '{') {
              braceCount++;
            } else if (char === '}') {
              braceCount--;
              if (braceCount === 0) {
                endIdx = i + 1;
                break;
              }
            }
          } else {
            if (char === stringChar && scriptText[i-1] !== '\\') {
              inString = false;
            }
          }
        }

        const unitBlock = scriptText.substring(scriptText.indexOf('{', startIdx), endIdx);

        // 필요한 필드 추출
        const labelNo = extractField(unitBlock, 'labelNo');
        const title = extractField(unitBlock, 'title');
        const paragraphMain = extractArray(unitBlock, 'paragraphMain');
        const creative = extractCreative(unitBlock);
        const quiz = extractQuiz(unitBlock);
        const answerKey = extractAnswerKey(unitBlock);
        const detail = extractDetail(unitBlock);

        contents[unitKey] = {
          labelNo,
          title,
          paragraphMain,
          creative,
          quiz,
          answerKey,
          detail
        };
      }

      return contents;
    }

    function extractField(block, fieldName) {
      // 여러 줄 지원을 위해 [\s\S] 사용, 하지만 greedy하지 않게 *? 사용
      // 먼저 작은따옴표 시도
      let regex = new RegExp(`${fieldName}:\\s*'([^']*)'`);
      let match = block.match(regex);
      if (match) return match[1];

      // 큰따옴표 시도
      regex = new RegExp(`${fieldName}:\\s*"([^"]*)"`);
      match = block.match(regex);
      if (match) return match[1];

      // 백틱 시도 (여러 줄 가능)
      regex = new RegExp(`${fieldName}:\\s*\`([^\`]*)\``);
      match = block.match(regex);
      if (match) return match[1];

      return '';
    }

    function extractArray(block, fieldName) {
      const regex = new RegExp(`${fieldName}:\\s*\\[([\\s\\S]*?)\\]`);
      const match = block.match(regex);
      if (!match) return [];

      const arrayContent = match[1];
      const items = [];
      const itemRegex = /['"`]([^'"`]+)['"`]/g;
      let itemMatch;
      while ((itemMatch = itemRegex.exec(arrayContent)) !== null) {
        items.push(itemMatch[1]);
      }
      return items;
    }

    function extractCreative(block) {
      // creative 블록 찾기 - examples 배열의 닫는 ] 이후 } 찾기
      const creativeStart = block.indexOf('creative:');
      if (creativeStart === -1) return null;

      // creative: { 이후의 내용 추출
      const afterCreative = block.substring(creativeStart);
      let braceCount = 0;
      let startIdx = afterCreative.indexOf('{');
      let endIdx = -1;
      let inString = false;
      let stringChar = '';

      for (let i = startIdx; i < afterCreative.length; i++) {
        const char = afterCreative[i];

        if (!inString) {
          if (char === "'" || char === '"' || char === '`') {
            inString = true;
            stringChar = char;
          } else if (char === '{') {
            braceCount++;
          } else if (char === '}') {
            braceCount--;
            if (braceCount === 0) {
              endIdx = i + 1;
              break;
            }
          }
        } else {
          if (char === stringChar && afterCreative[i-1] !== '\\') {
            inString = false;
          }
        }
      }

      if (endIdx === -1) return null;

      const creativeBlock = afterCreative.substring(startIdx, endIdx);

      // topic 또는 title 필드 추출 (일부 파일은 title 사용)
      let topic = extractField(creativeBlock, 'topic');
      if (!topic) {
        topic = extractField(creativeBlock, 'title');
      }

      // hint 또는 instruction 필드 추출
      let hint = extractField(creativeBlock, 'hint');
      if (!hint) {
        hint = extractField(creativeBlock, 'instruction');
      }

      // examples 배열 추출
      let examples = extractArray(creativeBlock, 'examples');

      // examples가 없으면 steps에서 example 추출 시도
      if (examples.length === 0) {
        // steps 배열에서 example 필드들 추출
        const stepsMatch = creativeBlock.match(/steps:\s*\[([\s\S]*?)\]\s*$/);
        if (stepsMatch) {
          const stepsContent = stepsMatch[1];
          const exampleRegex = /example:\s*['"`]([^'"`]+)['"`]/g;
          let exMatch;
          while ((exMatch = exampleRegex.exec(stepsContent)) !== null) {
            examples.push(exMatch[1]);
          }
        }
      }

      return {
        topic,
        hint,
        examples
      };
    }

    // quiz 객체 추출 (q1_text, q1_opts, q2_text, q2_opts, ... q5_text)
    function extractQuiz(block) {
      const quizMatch = block.match(/quiz:\s*\{([\s\S]*?)\n\s*\},?\s*\n/);
      if (!quizMatch) return null;

      const quizBlock = quizMatch[1];
      const quiz = {};

      // q1~q5의 text, html, opts 추출
      for (let i = 1; i <= 5; i++) {
        // q{i}_text 추출
        const textRegex = new RegExp(`q${i}_text:\\s*['"\`]([\\s\\S]*?)['"\`]\\s*,`);
        const textMatch = quizBlock.match(textRegex);
        if (textMatch) {
          quiz[`q${i}_text`] = textMatch[1];
        }

        // q{i}_html 추출 (브레인업 Q3, Q4 빈칸 채우기용)
        // 백틱, 작은따옴표, 큰따옴표 모두 지원
        let htmlMatch = quizBlock.match(new RegExp(`q${i}_html:\\s*\`([\\s\\S]*?)\`\\s*,`));
        if (!htmlMatch) htmlMatch = quizBlock.match(new RegExp(`q${i}_html:\\s*'([^']*)'\\s*,`));
        if (!htmlMatch) htmlMatch = quizBlock.match(new RegExp(`q${i}_html:\\s*"([^"]*)"\\s*,`));
        if (htmlMatch) {
          quiz[`q${i}_html`] = htmlMatch[1];
        }

        // q{i}_opts 추출 (배열)
        const optsRegex = new RegExp(`q${i}_opts:\\s*\\[([\\s\\S]*?)\\]`);
        const optsMatch = quizBlock.match(optsRegex);
        if (optsMatch) {
          const optsContent = optsMatch[1];
          const opts = [];
          const optRegex = /['"`]([^'"`]+)['"`]/g;
          let optMatch;
          while ((optMatch = optRegex.exec(optsContent)) !== null) {
            opts.push(optMatch[1]);
          }
          quiz[`q${i}_opts`] = opts;
        }
      }

      return quiz;
    }

    // answerKey 객체 추출 { q1:'3', q2:'3', ... }
    function extractAnswerKey(block) {
      const answerMatch = block.match(/answerKey:\s*\{([^}]*)\}/);
      if (!answerMatch) return null;

      const answerBlock = answerMatch[1];
      const answerKey = {};

      for (let i = 1; i <= 5; i++) {
        const regex = new RegExp(`q${i}:\\s*['"\`]([^'"\`]*)['"\`]`);
        const match = answerBlock.match(regex);
        if (match) {
          answerKey[`q${i}`] = match[1];
        }
      }

      return answerKey;
    }

    // detail 객체 추출 { q1:'해설...', q2:'해설...', ... }
    function extractDetail(block) {
      const detailMatch = block.match(/detail:\s*\{([\s\S]*?)\n\s*\},?\s*\n/);
      if (!detailMatch) return null;

      const detailBlock = detailMatch[1];
      const detail = {};

      for (let i = 1; i <= 5; i++) {
        // 여러 줄 문자열을 지원하기 위해 백틱도 고려
        const regex = new RegExp(`q${i}:\\s*['"\`]([\\s\\S]*?)['"\`]\\s*,?\\s*(?=q\\d|$)`);
        const match = detailBlock.match(regex);
        if (match) {
          detail[`q${i}`] = match[1].trim();
        }
      }

      return detail;
    }

    // =============================================
    // 단원 목록 렌더링
    // =============================================
    function renderUnits(contents, subjectKey, containerEl) {
      const units = Object.entries(contents).sort((a, b) => a[0].localeCompare(b[0]));

      if (units.length === 0) {
        containerEl.innerHTML = '<p style="color: #6b7280;">등록된 단원이 없습니다.</p>';
        return;
      }

      let html = '';
      units.forEach(([unitKey, data]) => {
        html += `
          <div class="unit-accordion" data-unit="${unitKey}">
            <div class="unit-header" onclick="toggleUnit(this)">
              <span class="unit-title">
                <span class="num">${data.labelNo || unitKey.split('_').pop()}</span>
                ${data.title || unitKey}
              </span>
              <span class="unit-arrow">▼</span>
            </div>
            <div class="unit-content">
              <div class="unit-body">
                ${renderUnitDetail(data, unitKey)}
              </div>
            </div>
          </div>
        `;
      });
      containerEl.innerHTML = html;
    }

    // =============================================
    // 단원 상세 렌더링
    // =============================================
    function renderUnitDetail(data, unitKey) {
      let html = '';
      const guideData = TEACHER_GUIDES[unitKey];

      // 1. 문단별 중심내용
      html += `
        <div class="detail-section">
          <h4>📌 문단별 중심내용</h4>
          <ul class="paragraph-list">
      `;
      if (data.paragraphMain && data.paragraphMain.length > 0) {
        data.paragraphMain.forEach((content, idx) => {
          html += `
            <li class="paragraph-item">
              <span class="paragraph-num">${idx + 1}</span>
              <span class="paragraph-content">${content}</span>
            </li>
          `;
        });
      } else {
        html += `<li class="paragraph-item"><span class="paragraph-content" style="color: #9ca3af; font-style: italic;">(문단별 중심내용 데이터 없음)</span></li>`;
      }
      html += `</ul></div>`;

      // 2. 5개 지수 문제풀이 정답 및 해설
      html += `<div class="detail-section">
        <h4>📝 5개 지수 문제풀이 정답 및 해설</h4>
      `;

      if (data.quiz && data.answerKey) {
        html += `<div class="quiz-section">`;

        const indexNames = {
          1: '사실적 이해',
          2: '구조적 이해',
          3: '어휘력',
          4: '추론적 이해',
          5: '비판적 이해(서술형)'
        };

        for (let i = 1; i <= 5; i++) {
          const qText = data.quiz[`q${i}_text`];
          const qHtml = data.quiz[`q${i}_html`];  // 빈칸 채우기용 (브레인업 Q3, Q4)
          const qOpts = data.quiz[`q${i}_opts`];
          const answer = data.answerKey[`q${i}`];
          const detail = data.detail ? data.detail[`q${i}`] : null;

          // q_text 또는 q_html 둘 중 하나라도 있으면 표시
          if (!qText && !qHtml) continue;

          html += `
            <div class="quiz-item">
              <div class="quiz-item-header">
                <span class="quiz-index-badge">Q${i}</span>
                <span class="quiz-index-name">${indexNames[i] || ''}</span>
              </div>
              <div class="quiz-question">${qText || qHtml}</div>
          `;

          // 객관식 (Q1~Q4) - opts가 있을 때만
          if (qOpts && qOpts.length > 0) {
            html += `<div class="quiz-options">`;
            qOpts.forEach((opt, idx) => {
              const optNum = idx + 1;
              const isCorrect = answer === String(optNum);
              html += `
                <div class="quiz-option ${isCorrect ? 'correct' : ''}">
                  <span class="quiz-option-num">${optNum}</span>
                  <span>${opt}</span>
                </div>
              `;
            });
            html += `</div>`;
          }

          // 해설
          if (detail) {
            if (i === 5) {
              // 서술형 문제는 예시 답안
              html += `
                <div class="quiz-essay">
                  <div class="quiz-essay-title">💡 예시 답안</div>
                  ${detail.replace(/\\n/g, '<br>')}
                </div>
              `;
            } else {
              html += `
                <div class="quiz-detail">
                  <div class="quiz-detail-title">📖 해설</div>
                  ${detail.replace(/\\n/g, '<br>')}
                </div>
              `;
            }
          }

          html += `</div>`;
        }
        html += `</div>`;
      } else {
        html += `<div class="quiz-no-data">(문제풀이 데이터가 없습니다)</div>`;
      }
      html += `</div>`;

      // 3. 교사용 지도 가이드
      if (guideData && guideData.teacherGuide) {
        html += `
          <div class="detail-section">
            <h4>📚 교사용 지도 가이드</h4>
            <div class="teacher-guide">
              ${guideData.teacherGuide}
            </div>
          </div>
        `;
      } else {
        html += `
          <div class="detail-section">
            <h4>📚 교사용 지도 가이드 <span class="badge">작성 필요</span></h4>
            <div class="teacher-guide">
              <p class="placeholder">
                [이 영역에 교사용 지도 가이드가 표시됩니다]<br><br>
                • 단원 학습 목표<br>
                • 핵심 개념 설명 포인트<br>
                • 학생 질문 예상 및 답변 가이드<br>
                • 추가 설명 자료 및 활동 제안
              </p>
            </div>
          </div>
        `;
      }

      // 4. 창의활동 예시답안
      html += `<div class="detail-section">
        <h4>✍️ 창의활동 예시답안</h4>
      `;

      if (data.creative) {
        html += `
          <div class="creative-topic">📝 주제: ${data.creative.topic || '(주제 없음)'}</div>
          <div class="creative-hint">${data.creative.hint || '(힌트 없음)'}</div>
          <div class="creative-examples">
        `;

        // 작성된 예시답안이 있으면 사용, 없으면 content.js의 examples 사용
        const examples = (guideData && guideData.creativeExamples) ? guideData.creativeExamples :
                         (data.creative.examples && data.creative.examples.length > 0) ? data.creative.examples : null;

        if (examples && examples.length > 0) {
          examples.forEach((example, idx) => {
            html += `
              <div class="creative-example-item">
                <span class="label">예시 ${idx + 1}</span>
                ${example}
              </div>
            `;
          });
        } else {
          html += `
            <div class="creative-example-item">
              <span class="placeholder">[150자 이상의 예시 답안 3개가 필요합니다]</span>
            </div>
          `;
        }
        html += `</div>`;
      } else {
        html += `
          <div class="creative-examples">
            <div class="creative-example-item">
              <span class="placeholder">[창의활동 데이터가 없습니다. content.js에 creative 블록 추가 필요]</span>
            </div>
          </div>
        `;
      }
      html += `</div>`;

      // PDF 다운로드 버튼 추가
      const titleText = data.title || unitKey;
      html += `
        <div class="pdf-download-wrap">
          <button class="pdf-download-btn" onclick="downloadPDF('${unitKey}', '${titleText.replace(/'/g, "\\'")}')">
            <span class="icon">📥</span>
            <span>수업 지침서 PDF 다운로드</span>
          </button>
        </div>
      `;

      return html;
    }

    // =============================================
    // PDF 다운로드 기능
    // =============================================
    async function downloadPDF(unitKey, title) {
      const btn = event.target.closest('.pdf-download-btn');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="icon">⏳</span><span>PDF 생성 중...</span>';

      try {
        // 해당 단원의 unit-body 요소 찾기
        const unitAccordions = document.querySelectorAll('.unit-accordion');
        let targetBody = null;

        unitAccordions.forEach(accordion => {
          const header = accordion.querySelector('.unit-header');
          if (header && header.getAttribute('onclick')?.includes(unitKey)) {
            targetBody = accordion.querySelector('.unit-body');
          }
        });

        // unitKey로 직접 찾기 (onclick에 unitKey가 없는 경우)
        if (!targetBody) {
          unitAccordions.forEach(accordion => {
            const titleEl = accordion.querySelector('.unit-title');
            if (titleEl && titleEl.textContent.includes(title.substring(0, 10))) {
              targetBody = accordion.querySelector('.unit-body');
            }
          });
        }

        // 여전히 못 찾으면 버튼의 가장 가까운 unit-body 사용
        if (!targetBody) {
          targetBody = btn.closest('.unit-body');
        }

        if (!targetBody) {
          alert('PDF 생성에 실패했습니다. 단원을 찾을 수 없습니다.');
          btn.disabled = false;
          btn.innerHTML = originalText;
          return;
        }

        // PDF 생성을 위한 임시 컨테이너 생성
        const pdfContainer = document.createElement('div');
        pdfContainer.style.cssText = 'position: absolute; left: -9999px; top: 0; width: 800px; padding: 30px; background: #fff; font-family: "Noto Sans KR", sans-serif;';

        // 제목 추가
        const headerHtml = `
          <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid #059669;">
            <h1 style="font-size: 24px; color: #065f46; margin: 0 0 10px 0;">브레인문해력 수업 지침서</h1>
            <h2 style="font-size: 18px; color: #1f2937; margin: 0;">${title}</h2>
            <p style="font-size: 12px; color: #6b7280; margin-top: 10px;">단원 코드: ${unitKey}</p>
          </div>
        `;

        pdfContainer.innerHTML = headerHtml + targetBody.innerHTML;

        // PDF 다운로드 버튼 제거
        const downloadWrap = pdfContainer.querySelector('.pdf-download-wrap');
        if (downloadWrap) downloadWrap.remove();

        document.body.appendChild(pdfContainer);

        // html2canvas로 캡처
        const canvas = await html2canvas(pdfContainer, {
          scale: 1.5, // 품질과 용량 균형
          useCORS: true,
          logging: false,
          backgroundColor: '#ffffff'
        });

        // PDF 생성
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL('image/jpeg', 0.8); // JPEG 압축으로 용량 최소화

        const pdfWidth = 210; // A4 가로 (mm)
        const pdfHeight = 297; // A4 세로 (mm)
        const imgWidth = pdfWidth - 20; // 여백 10mm씩
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        const pdf = new jsPDF('p', 'mm', 'a4');

        let heightLeft = imgHeight;
        let position = 10;
        let pageCount = 0;

        // 여러 페이지로 분할
        while (heightLeft > 0) {
          if (pageCount > 0) {
            pdf.addPage();
            position = 10;
          }

          pdf.addImage(imgData, 'JPEG', 10, position - (pageCount * (pdfHeight - 20)), imgWidth, imgHeight);
          heightLeft -= (pdfHeight - 20);
          pageCount++;
        }

        // 다운로드
        pdf.save(`수업지침서_${unitKey}.pdf`);

        // 임시 컨테이너 제거
        document.body.removeChild(pdfContainer);

        btn.disabled = false;
        btn.innerHTML = originalText;
      } catch (error) {
        console.error('PDF 생성 오류:', error);
        alert('PDF 생성 중 오류가 발생했습니다.');
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    // =============================================
    // 검색 기능
    // =============================================
    const SERIES_NAMES = {
      brainon: '브레인온',
      brainup: '브레인업',
      brainfit: '브레인핏',
      braindeep: '브레인딥'
    };

    let searchIndex = []; // 전체 단원 검색 인덱스

    // 검색 인덱스 구축 (모든 시리즈/과목의 content.js 로드)
    async function buildSearchIndex() {
      searchIndex = [];
      const seriesList = ['brainon', 'brainup', 'brainfit', 'braindeep'];

      for (const series of seriesList) {
        const prefix = SERIES_PREFIX[series];
        for (const [subjectKey, subject] of Object.entries(SUBJECTS)) {
          const contentFile = `/BRAINUP/${subject.folder}/${prefix}${subjectKey}_content.js`;
          try {
            const response = await fetch(contentFile);
            if (!response.ok) continue;

            const scriptText = await response.text();
            const contents = extractContents(scriptText, prefix, subjectKey);

            // 캐시에 저장
            const cacheKey = `${series}_${subjectKey}`;
            contentCache[cacheKey] = contents;

            // 검색 인덱스에 추가
            for (const [unitKey, data] of Object.entries(contents)) {
              searchIndex.push({
                series,
                seriesName: SERIES_NAMES[series],
                subjectKey,
                subjectName: subject.name,
                subjectIcon: subject.icon,
                unitKey,
                labelNo: data.labelNo,
                title: data.title || unitKey
              });
            }
          } catch (err) {
            // 해당 시리즈/과목 없음 - 무시
          }
        }
      }
      console.log('검색 인덱스 구축 완료:', searchIndex.length, '개 단원');
    }

    // 검색 실행
    function searchUnits(query) {
      if (!query || query.trim().length < 1) return [];

      const q = query.toLowerCase().trim();
      return searchIndex.filter(item => {
        const titleMatch = item.title.toLowerCase().includes(q);
        const subjectMatch = item.subjectName.toLowerCase().includes(q);
        const seriesMatch = item.seriesName.toLowerCase().includes(q);
        return titleMatch || subjectMatch || seriesMatch;
      }).slice(0, 10); // 최대 10개
    }

    // 검색 결과 표시
    function showSearchResults(results) {
      const container = document.getElementById('searchResults');

      if (results.length === 0) {
        container.innerHTML = '<div class="search-no-result">검색 결과가 없습니다.</div>';
        container.classList.add('show');
        return;
      }

      let html = '';
      results.forEach(item => {
        html += `
          <div class="search-result-item" data-series="${item.series}" data-subject="${item.subjectKey}" data-unit="${item.unitKey}">
            <div class="title">${item.subjectIcon} ${item.title}</div>
            <div class="meta">
              <span class="series-badge">${item.seriesName}</span>
              ${item.subjectName} ${item.labelNo}단원
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      container.classList.add('show');

      // 클릭 이벤트
      container.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          navigateToUnit(el.dataset.series, el.dataset.subject, el.dataset.unit);
          container.classList.remove('show');
          document.getElementById('unitSearch').value = '';
        });
      });
    }

    // 검색 결과 숨기기
    function hideSearchResults() {
      document.getElementById('searchResults').classList.remove('show');
    }

    // 단원으로 이동 (시리즈 탭 → 과목 아코디언 → 단원 아코디언 열기)
    async function navigateToUnit(series, subjectKey, unitKey) {
      // 1. 시리즈 탭 전환
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tab-btn[data-series="${series}"]`).classList.add('active');

      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      document.getElementById('tab-' + series).classList.add('active');

      // 2. 과목 목록 렌더링 (아직 안 되어 있으면)
      renderSubjects(series);

      // 약간의 딜레이 후 진행 (DOM 렌더링 대기)
      await new Promise(r => setTimeout(r, 50));

      // 3. 과목 아코디언 찾아서 열기
      const subjectAccordion = document.querySelector(`#tab-${series} .subject-accordion[data-subject="${subjectKey}"]`);
      if (subjectAccordion) {
        // 다른 과목들 닫기
        document.querySelectorAll(`#tab-${series} .subject-accordion`).forEach(a => a.classList.remove('open'));
        subjectAccordion.classList.add('open');

        // 단원 목록 로드
        const subjectBody = subjectAccordion.querySelector('.subject-body');
        await loadUnits(series, subjectKey, subjectBody);

        // 4. 단원 아코디언 찾아서 열기
        await new Promise(r => setTimeout(r, 50));
        const unitAccordion = subjectBody.querySelector(`.unit-accordion[data-unit="${unitKey}"]`);
        if (unitAccordion) {
          // 다른 단원들 닫기
          subjectBody.querySelectorAll('.unit-accordion').forEach(a => a.classList.remove('open'));
          unitAccordion.classList.add('open');

          // 스크롤 이동
          setTimeout(() => {
            unitAccordion.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
      }
    }

    // 검색 이벤트 바인딩
    document.getElementById('unitSearch').addEventListener('input', (e) => {
      const query = e.target.value;
      if (query.length >= 1) {
        const results = searchUnits(query);
        showSearchResults(results);
      } else {
        hideSearchResults();
      }
    });

    document.getElementById('unitSearch').addEventListener('focus', (e) => {
      if (e.target.value.length >= 1) {
        const results = searchUnits(e.target.value);
        showSearchResults(results);
      }
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      const query = document.getElementById('unitSearch').value;
      if (query.length >= 1) {
        const results = searchUnits(query);
        showSearchResults(results);
      }
    });

    // 검색창 외부 클릭 시 결과 숨기기
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box')) {
        hideSearchResults();
      }
    });

    // Enter 키로 첫 번째 결과 선택
    document.getElementById('unitSearch').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const firstResult = document.querySelector('.search-result-item');
        if (firstResult) {
          firstResult.click();
        }
      }
    });

    // =============================================
    // 초기화
    // =============================================
    document.addEventListener('DOMContentLoaded', () => {
      renderSubjects('brainon');
      // 백그라운드에서 검색 인덱스 구축
      buildSearchIndex();
    });
  </script>
</body>
</html>
