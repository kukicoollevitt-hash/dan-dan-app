<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 부여 - 시리즈 선택</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .back-btn {
      display: inline-block;
      color: #667eea;
      text-decoration: none;
      font-size: 16px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      color: #764ba2;
      transform: translateX(-5px);
    }

    h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 16px;
      margin-bottom: 40px;
    }

    .series-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 30px;
    }

    .series-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
      border: 2px solid #e9ecef;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: block;
    }

    .series-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
      border-color: #667eea;
    }

    .series-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .series-name {
      font-size: 24px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    .series-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }

    /* 시리즈별 색상 */
    .series-card.brainon:hover {
      border-color: #00d2ff;
      background: linear-gradient(135deg, #e0f7ff 0%, #f8f9fa 100%);
    }

    .series-card.brainup:hover {
      border-color: #ff6b6b;
      background: linear-gradient(135deg, #ffe5e5 0%, #f8f9fa 100%);
    }

    .series-card.brainfit:hover {
      border-color: #4ecdc4;
      background: linear-gradient(135deg, #e0fff8 0%, #f8f9fa 100%);
    }

    .series-card.braindip:hover {
      border-color: #ffd93d;
      background: linear-gradient(135deg, #fff9e0 0%, #f8f9fa 100%);
    }

    .series-card.brainjunior:hover {
      border-color: #a8e6cf;
      background: linear-gradient(135deg, #f0ffe5 0%, #f8f9fa 100%);
    }

    .series-card.brainhigh:hover {
      border-color: #dda15e;
      background: linear-gradient(135deg, #fff4e5 0%, #f8f9fa 100%);
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 24px;
      }

      .series-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/admin/dashboard" class="back-btn">← 대시보드로 돌아가기</a>

    <h1>📚 과제 부여 - 시리즈 선택</h1>
    <p class="subtitle">학습 시리즈를 선택하여 학생들에게 과제를 부여하세요</p>

    <div class="series-grid">
      <a href="/admin-assign-tasks?series=BRAINON" class="series-card brainon">
        <div class="series-icon">🌊</div>
        <div class="series-name">BRAIN온</div>
        <div class="series-desc">기초 문해력 다지기</div>
      </a>

      <a href="/admin-assign-tasks?series=BRAINUP" class="series-card brainup">
        <div class="series-icon">🚀</div>
        <div class="series-name">BRAIN업</div>
        <div class="series-desc">실전 문해력 향상</div>
      </a>

      <a href="/admin-assign-tasks?series=BRAINFIT" class="series-card brainfit">
        <div class="series-icon">💪</div>
        <div class="series-name">BRAIN핏</div>
        <div class="series-desc">문해력 완성 단계</div>
      </a>

      <a href="/admin-assign-tasks?series=BRAINDIP" class="series-card braindip">
        <div class="series-icon">🎯</div>
        <div class="series-name">BRAIN딥</div>
        <div class="series-desc">심화 문해력 학습</div>
      </a>

      <a href="/admin-assign-tasks?series=BRAINJUNIOR" class="series-card brainjunior">
        <div class="series-icon">📖</div>
        <div class="series-name">BRAIN중등</div>
        <div class="series-desc">중학교 문해력 대비</div>
      </a>

      <a href="/admin-assign-tasks?series=BRAINHIGH" class="series-card brainhigh">
        <div class="series-icon">🎓</div>
        <div class="series-name">BRAIN고등</div>
        <div class="series-desc">고등학교 문해력 완성</div>
      </a>
    </div>
  </div>
</body>
</html>
