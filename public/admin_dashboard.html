<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <title>브레인문해력 선생님 대시보드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      --panel: #ffffff;
      --accent: #495057;
      --accent-hover: #212529;
      --text: #212529;
      --text-light: #495057;
      --line: #dee2e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      background: var(--bg);
      font-family: "Gmarket Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      font-weight: 700;
      color: #212529;
      text-shadow: none;
    }
    .sub {
      margin: 0 0 30px;
      font-size: 16px;
      color: #495057;
      line-height: 1.6;
    }
    .card {
      background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
      border: 2px solid rgba(73, 80, 87, 0.15);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #495057 0%, #6c757d 100%);
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(73, 80, 87, 0.15);
      border-color: rgba(73, 80, 87, 0.3);
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn.primary {
      background: linear-gradient(135deg, #495057 0%, #212529 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(73, 80, 87, 0.25);
    }
    .btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(73, 80, 87, 0.35);
    }
    .btn.primary:active {
      transform: translateY(0);
    }
    .btn.small {
      font-size: 13px;
      padding: 8px 16px;
    }
    .top-right {
      position: absolute;
      top: 40px;
      right: 40px;
      font-size: 14px;
      color: #212529;
      text-align: right;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 12px;
      border: 2px solid rgba(73, 80, 87, 0.2);
    }
    .top-right a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      padding: 6px 12px;
      background: linear-gradient(135deg, #495057 0%, #212529 100%);
      border-radius: 8px;
      transition: all 0.3s ease;
      display: inline-block;
      margin-left: 10px;
    }
    .top-right a:hover {
      background: linear-gradient(135deg, #212529 0%, #000000 100%);
      transform: translateY(-2px);
    }
    .section-title {
      font-size: 22px;
      margin: 0 0 12px;
      font-weight: 700;
      color: var(--accent);
    }
    .desc {
      font-size: 15px;
      color: var(--text-light);
      margin-bottom: 16px;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 12px;
      }
      h1 {
        font-size: 28px;
      }
      .top-right {
        position: static;
        margin-bottom: 20px;
      }
      .card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-right">
      <!-- 필요하면 여기 나중에 "원장님 성함"도 서버 렌더로 바꿔줄 수 있음 -->
      <a href="/admin/logout">로그아웃</a>
    </div>

    <h1 id="dashboard-title">브레인문해력 선생님 대시보드</h1>
    <p class="sub" id="dashboard-sub">담당 선생님이 맡은 학교/학년/학급 학생들의 학습 현황을 한눈에 확인하는 화면입니다.</p>

    <div class="card">
      <p class="section-title">📚 내 학급 학생 관리</p>
      <p class="desc">
        아래 버튼을 눌러 <b>내 학급에 소속된 학생 목록</b>과 각 학생의 <b>학습현황</b>을 확인할 수 있습니다.
      </p>
      <div class="btn-row">
        <!-- 🔗 여기서 /admin/branch/users 로 바로 이동 -->
        <a class="btn primary" href="/admin/branch/users">내 학급 학생 목록 보기</a>
      </div>
    </div>

    <div class="card">
      <p class="section-title">📝 진단테스트 및 결과 관리</p>
      <p class="desc">
        내 학급에서 <b>문해력 진단테스트를 신청한 학생</b>들의 목록을 확인할 수 있습니다.
      </p>
      <div class="btn-row">
        <a class="btn primary" href="/admin/diagnostic-management">진단테스트 신청 목록 보기</a>
      </div>
    </div>
  </div>

    <!-- ... admin_dashboard.html의 나머지 내용 ... -->

  <!-- ✅ 지점명 가져와서 제목에 표시 -->
  <script>
    // 페이지 로드 시 지점명 가져오기
    async function loadBranchName() {
      try {
        const response = await fetch('/api/admin/info');
        const result = await response.json();
        if (result.success && result.academyName) {
          const grade = result.grade || '';
          const classNum = result.classNum || '';
          const gradeClassText = [grade, classNum].filter(Boolean).join(' ');

          // 🔥 학원용인 경우 텍스트 변경
          if (result.userType === 'academy') {
            document.getElementById('dashboard-title').textContent =
              `브레인문해력 ${result.academyName} 선생님 대시보드`;
            document.getElementById('dashboard-sub').textContent =
              `담당 선생님이 맡은 학원 학생들의 학습 현황을 한눈에 확인하는 화면입니다.`;
          } else {
            document.getElementById('dashboard-title').textContent =
              `브레인문해력 ${result.academyName} ${gradeClassText} 선생님 대시보드`;
          }
        }
      } catch (error) {
        console.error('지점명 로드 오류:', error);
      }
    }
    window.addEventListener('DOMContentLoaded', loadBranchName);
  </script>

  <!-- ✅ 브라우저 뒤로가기 시 로그아웃 확인 -->
  <script>
    (function () {
      // 히스토리 API 없으면 그냥 무시
      if (!window.history || !history.pushState) return;

      // 현재 페이지 위에 "가짜 히스토리" 한 칸 쌓아두기
      history.pushState({ page: "admin-dashboard" }, "", location.href);

      window.addEventListener("popstate", function (e) {
        // 사용자가 뒤로가기를 눌렀을 때 호출됨
        const ok = confirm("관리자에서 로그아웃하고 로그인 화면으로 이동할까요?");

        if (ok) {
          // ✅ 관리자 로그아웃 라우트로 이동
          window.location.href = "/admin/logout";
        } else {
          // 취소하면 다시 현재 페이지 상태를 하나 더 쌓아서 머무르게 함
          history.pushState({ page: "admin-dashboard" }, "", location.href);
        }
      });
    })();
  </script>
</body>
</html>


</body>
</html>
