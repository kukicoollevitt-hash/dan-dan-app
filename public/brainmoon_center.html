<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브레인문해원 - Brain Literacy Academy</title>

  <!-- Open Graph / 카카오톡 미리보기 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="브레인문해원 가맹 공식 홈페이지">
  <meta property="og:description" content="문해력 전문 교육 브랜드">
  <meta property="og:image" content="https://brainmoon.kr/images/브레인문해원_외부입간판.jpeg">
  <meta property="og:url" content="https://brainmoon.kr/brainmoon_center.html">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #2d3223;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 배경 비디오 */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
    }

    /* PC에서 모바일 영상 숨김 */
    .video-mobile {
      display: none;
    }

    /* 모바일에서 PC 영상 숨기고 모바일 영상 표시 */
    @media (max-width: 768px) {
      .video-pc {
        display: none;
      }
      .video-mobile {
        display: block;
      }
    }

    /* 비디오 위 오버레이 (투명) */
    .video-overlay {
      display: none;
    }

    /* 배경 파티클 효과 */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* 메인 컨테이너 */
    .entrance-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      padding: 40px;
    }

    /* 상단 슬로건 */
    .slogan {
      font-size: 1.8rem;
      font-weight: 500;
      font-style: italic;
      background: linear-gradient(135deg, #d4af37 0%, #f4e4a6 25%, #d4af37 50%, #aa8c2c 75%, #d4af37 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShine 4s ease-in-out infinite;
      margin-bottom: 50px;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    @keyframes goldShine {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* 로고 이미지 */
    .logo-container {
      margin-bottom: 40px;
      animation: logoFloat 4s ease-in-out infinite;
    }

    .logo-image {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 서브 타이틀 */
    .sub-title {
      font-size: 1.1rem;
      color: #d4af37;
      letter-spacing: 4px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    /* 메인 타이틀 */
    .main-title {
      font-size: 4.5rem;
      font-weight: 900;
      background: linear-gradient(180deg, #f4e4a6 0%, #d4af37 40%, #aa8c2c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 8px;
      margin-bottom: 15px;
      text-shadow: 0 4px 30px rgba(212, 175, 55, 0.5);
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
      100% { filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.6)); }
    }

    /* 영문 서브타이틀 */
    .english-title {
      font-size: 1.3rem;
      color: #b8976b;
      letter-spacing: 6px;
      font-weight: 300;
      margin-bottom: 60px;
    }

    /* 입장 버튼 */
    .enter-button {
      display: inline-block;
      padding: 18px 50px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #0f1724;
      background: linear-gradient(135deg, #f4e4a6 0%, #d4af37 50%, #aa8c2c 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 3px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
      z-index: 20;
      box-shadow:
        0 4px 15px rgba(212, 175, 55, 0.4),
        0 0 30px rgba(212, 175, 55, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      text-decoration: none;
    }

    .enter-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.6s ease;
    }

    .enter-button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 8px 25px rgba(212, 175, 55, 0.5),
        0 0 50px rgba(212, 175, 55, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .enter-button:hover::before {
      left: 100%;
    }

    .enter-button:active {
      transform: translateY(-1px) scale(0.98);
    }

    /* 버튼 펄스 애니메이션 */
    .button-wrapper {
      position: relative;
      display: inline-block;
    }

    .button-wrapper::before,
    .button-wrapper::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border-radius: 50px;
      border: 2px solid rgba(212, 175, 55, 0.3);
      animation: pulse 2.5s ease-out infinite;
    }

    .button-wrapper::after {
      animation-delay: 1.25s;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
    }

    /* 하단 장식 라인 */
    .decorative-line {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 15px;
      opacity: 0.5;
    }

    .line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }

    .diamond {
      width: 8px;
      height: 8px;
      background: #d4af37;
      transform: rotate(45deg);
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .slogan {
        font-size: 1.3rem;
        letter-spacing: 2px;
      }

      .logo-image {
        width: 120px;
      }

      .main-title {
        font-size: 2.8rem;
        letter-spacing: 4px;
      }

      .english-title {
        font-size: 1rem;
        letter-spacing: 4px;
      }

      .enter-button {
        padding: 10px 20px;
        font-size: 0.75rem;
        letter-spacing: 1px;
      }

      .sub-title {
        font-size: 0.8rem;
        letter-spacing: 1px;
      }

      /* 팝업 모바일 스타일 */
      .golden-card {
        padding: 35px 30px !important;
        border-radius: 15px !important;
        margin: 15px !important;
        transform: scale(1) !important;
      }
      .popup-overlay.active .golden-card {
        transform: scale(1) !important;
      }
      .popup-message {
        font-size: 0.9rem !important;
        line-height: 1.4 !important;
      }
      .countdown-container {
        margin-top: 15px !important;
      }
      .countdown-text {
        font-size: 0.75rem !important;
      }
      .countdown-number {
        font-size: 2rem !important;
      }
      .light-rays {
        width: 200px !important;
        height: 200px !important;
      }
      .light-ray {
        height: 100px !important;
      }
    }

    @media (max-width: 480px) {
      .slogan {
        font-size: 1.1rem;
      }

      .main-title {
        font-size: 2.2rem;
      }

      .entrance-container {
        padding: 20px;
      }
    }

    /* 팝업 오버레이 */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.5s ease;
      overflow: hidden;
    }

    .popup-overlay.active {
      display: flex;
      opacity: 1;
    }

    /* 팝업 배경 파티클 */
    .popup-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .popup-particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #f4e4a6 0%, #d4af37 50%, transparent 100%);
      border-radius: 50%;
      animation: popupFloat 4s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
    }

    @keyframes popupFloat {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      20% {
        opacity: 1;
        transform: scale(1);
      }
      80% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
      }
    }

    /* 빛줄기 효과 */
    .light-rays {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      pointer-events: none;
    }

    .light-ray {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 400px;
      background: linear-gradient(to top, transparent, rgba(212, 175, 55, 0.3), transparent);
      transform-origin: bottom center;
      animation: rayRotate 20s linear infinite;
    }

    @keyframes rayRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 원형 파동 효과 */
    .ripple-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      border: 2px solid rgba(212, 175, 55, 0.6);
      border-radius: 50%;
      animation: rippleExpand 3s ease-out infinite;
    }

    .ripple:nth-child(2) { animation-delay: 0.75s; }
    .ripple:nth-child(3) { animation-delay: 1.5s; }
    .ripple:nth-child(4) { animation-delay: 2.25s; }

    @keyframes rippleExpand {
      0% {
        width: 100px;
        height: 100px;
        opacity: 1;
      }
      100% {
        width: 800px;
        height: 800px;
        opacity: 0;
      }
    }

    /* 별빛 반짝임 */
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #f4e4a6;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(244, 228, 166, 0.8);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* 황금 카드 */
    .golden-card {
      background: linear-gradient(145deg, #1a2634 0%, #253141 50%, #1a2634 100%);
      border: 3px solid;
      border-image: linear-gradient(135deg, #d4af37 0%, #f4e4a6 25%, #d4af37 50%, #aa8c2c 75%, #d4af37 100%) 1;
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      box-shadow:
        0 0 60px rgba(212, 175, 55, 0.3),
        0 0 100px rgba(212, 175, 55, 0.1),
        inset 0 0 60px rgba(212, 175, 55, 0.05);
      transform: scale(0.8);
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .golden-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 40%,
        rgba(212, 175, 55, 0.1) 50%,
        transparent 60%
      );
      animation: cardShine 3s ease-in-out infinite;
    }

    @keyframes cardShine {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    .popup-overlay.active .golden-card {
      transform: scale(1);
      opacity: 1;
    }

    .popup-message {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d4af37 0%, #f4e4a6 25%, #d4af37 50%, #aa8c2c 75%, #d4af37 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShine 3s ease-in-out infinite;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .countdown-container {
      margin-top: 40px;
      position: relative;
      z-index: 1;
    }

    .countdown-text {
      font-size: 1.2rem;
      color: #b8976b;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .countdown-number {
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(180deg, #f4e4a6 0%, #d4af37 40%, #aa8c2c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: countPulse 1s ease-in-out infinite;
    }

    @keyframes countPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* 카드 테두리 반짝임 */
    .golden-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 17px;
      border: 2px solid transparent;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.5), transparent, rgba(212, 175, 55, 0.5)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: borderGlow 2s ease-in-out infinite alternate;
    }

    @keyframes borderGlow {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- 배경 비디오 (PC) -->
  <video class="video-background video-pc" id="videoPc" autoplay muted loop playsinline webkit-playsinline>
    <source src="images/브레인문해원 설명회 홈페이지 메인.mp4" type="video/mp4">
  </video>
  <!-- 배경 비디오 (모바일) -->
  <video class="video-background video-mobile" id="videoMobile" autoplay muted loop playsinline webkit-playsinline>
    <source src="images/브레인문해원 설명회 홈페이지 메인_모바일.mp4" type="video/mp4">
  </video>

  <!-- 모바일 영상 자동 재생 강제 -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const videos = document.querySelectorAll('video');
      videos.forEach(function(video) {
        video.muted = true;
        video.play().catch(function() {
          // 자동 재생 실패 시 터치로 재생
          document.body.addEventListener('touchstart', function() {
            video.play();
          }, { once: true });
        });
      });
    });
  </script>

  <!-- 비디오 오버레이 -->
  <div class="video-overlay"></div>

  <!-- 배경 파티클 -->
  <div class="particles" id="particles"></div>

  <!-- 메인 컨텐츠 -->
  <div class="entrance-container">
    <!-- 입장 버튼 -->
    <div class="button-wrapper">
      <a href="#main" class="enter-button">바로 입장하기</a>
    </div>
  </div>

  <!-- 하단 장식 -->
  <div class="decorative-line">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>

  <!-- 팝업 -->
  <div class="popup-overlay" id="popupOverlay">
    <!-- 빛줄기 -->
    <div class="light-rays" id="lightRays"></div>

    <!-- 원형 파동 -->
    <div class="ripple-container">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
    </div>

    <!-- 파티클 -->
    <div class="popup-particles" id="popupParticles"></div>

    <!-- 별빛 -->
    <div class="stars-container" id="starsContainer"></div>

    <div class="golden-card">
      <div class="popup-message">
        당신의 성공은<br>
        지금 이 순간부터 시작됩니다
      </div>
      <div class="countdown-container">
        <div class="countdown-text">입장까지</div>
        <div class="countdown-number" id="countdownNumber">5</div>
      </div>
    </div>
  </div>

  <script>
    // 파티클 생성
    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = 30;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        particle.style.width = (2 + Math.random() * 3) + 'px';
        particle.style.height = particle.style.width;
        container.appendChild(particle);
      }
    }

    createParticles();

    // 팝업 파티클 생성
    function createPopupParticles() {
      const container = document.getElementById('popupParticles');
      container.innerHTML = '';
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'popup-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 4 + 's';
        particle.style.animationDuration = (3 + Math.random() * 3) + 's';
        particle.style.width = (3 + Math.random() * 5) + 'px';
        particle.style.height = particle.style.width;
        container.appendChild(particle);
      }
    }

    // 빛줄기 생성
    function createLightRays() {
      const container = document.getElementById('lightRays');
      container.innerHTML = '';
      for (let i = 0; i < 12; i++) {
        const ray = document.createElement('div');
        ray.className = 'light-ray';
        ray.style.transform = `rotate(${i * 30}deg)`;
        ray.style.animationDelay = `${i * 0.5}s`;
        container.appendChild(ray);
      }
    }

    // 별빛 생성
    function createStars() {
      const container = document.getElementById('starsContainer');
      container.innerHTML = '';
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        star.style.animationDuration = (1 + Math.random() * 2) + 's';
        container.appendChild(star);
      }
    }

    // 버튼 클릭 이벤트
    document.querySelector('.enter-button').addEventListener('click', function(e) {
      e.preventDefault();

      const popup = document.getElementById('popupOverlay');
      const countdownEl = document.getElementById('countdownNumber');

      // 팝업 표시
      popup.classList.add('active');

      // 팝업 파티클 생성
      createPopupParticles();
      // 빛줄기 생성
      createLightRays();
      // 별빛 생성
      createStars();

      // 5초 카운트다운
      let count = 5;
      countdownEl.textContent = count;

      const countdown = setInterval(() => {
        count--;
        countdownEl.textContent = count;

        if (count <= 0) {
          clearInterval(countdown);
          // 메인 페이지로 이동
          window.location.href = 'brainmoon_main.html';
        }
      }, 1000);
    });
  </script>
</body>
</html>
