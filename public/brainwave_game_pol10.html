<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>브레인웨이브 창의노트 - 정치10</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
      background: linear-gradient(135deg, #e8f4ec 0%, #d1e7dd 100%);
    }
    .scale-container {
      width: 1024px;
      height: 768px;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }
    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }
    .header {
      position: absolute;
      top: 16px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #2d9a5f 0%, #1e7a4a 100%);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.4rem;
      box-shadow: 0 3px 8px rgba(45, 154, 95, 0.35);
    }
    .brand-text {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.25rem;
      color: #1e7a4a;
      letter-spacing: 0.5px;
    }
    .brand-sub {
      font-family: 'Gaegu', cursive;
      font-size: 0.75rem;
      color: #5a9a7a;
      margin-top: -2px;
    }
    .unit-badge {
      background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'Gaegu', cursive;
      font-size: 0.9rem;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(16, 185, 129, 0.3);
    }
    .score-display {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      gap: 18px;
      z-index: 10;
    }
    .score-item { text-align: center; }
    .score-item .num {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.5rem;
      color: #2d9a5f;
    }
    .score-item .label {
      font-family: 'Gaegu', cursive;
      font-size: 0.85rem;
      color: #5a9a7a;
      font-weight: 700;
    }
    .wave-center {
      position: absolute;
      left: 32%;
      top: 45%;
      transform: translate(-50%, -50%) scale(0.85);
      width: 520px;
      height: 520px;
    }
    .wave-ring {
      position: absolute;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .wave-ring.r1 {
      width: 140px;
      height: 140px;
      background: rgba(254, 243, 199, 0.5);
      border: 3px solid #fcd34d;
      box-shadow: 0 0 20px rgba(252, 211, 77, 0.3);
      animation: pulse1 3s ease-in-out infinite;
    }
    .wave-ring.r2 {
      width: 240px;
      height: 240px;
      background: rgba(209, 250, 229, 0.4);
      border: 3px solid #6ee7b7;
      box-shadow: 0 0 25px rgba(110, 231, 183, 0.25);
      animation: pulse2 3s ease-in-out infinite 0.3s;
    }
    .wave-ring.r3 {
      width: 340px;
      height: 340px;
      background: rgba(219, 234, 254, 0.35);
      border: 3px solid #93c5fd;
      box-shadow: 0 0 30px rgba(147, 197, 253, 0.2);
      animation: pulse3 3s ease-in-out infinite 0.6s;
    }
    .wave-ring.r4 {
      width: 440px;
      height: 440px;
      background: rgba(237, 233, 254, 0.3);
      border: 3px solid #c4b5fd;
      box-shadow: 0 0 35px rgba(196, 181, 253, 0.15);
      animation: pulse4 3s ease-in-out infinite 0.9s;
    }
    @keyframes pulse1 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
    }
    @keyframes pulse2 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.04); opacity: 0.9; }
    }
    @keyframes pulse3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.03); opacity: 0.8; }
    }
    @keyframes pulse4 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.02); opacity: 0.7; }
    }
    .core {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #ffffff, #f0fdf4);
      border: 3px solid #34d399;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(52, 211, 153, 0.3);
      z-index: 5;
    }
    .core-whale { font-size: 2rem; }
    .core-text {
      font-family: 'Gaegu', cursive;
      font-size: 0.65rem;
      color: #059669;
      font-weight: 700;
      margin-top: 1px;
    }
    .node {
      position: absolute;
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      border: 2.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 8px 10px;
      min-width: 90px;
      max-width: 155px;
      text-align: center;
      cursor: default;
      transition: all 0.3s ease;
      z-index: 10;
    }
    .node:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
    }
    .node-title {
      font-family: 'Gaegu', cursive;
      font-size: 0.95rem;
      font-weight: 700;
      color: #475569;
      line-height: 1.3;
    }
    .node-content {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 3px;
    }
    .n-w1 { border-color: #fcd34d; box-shadow: 0 3px 10px rgba(252, 211, 77, 0.25); }
    .n-w2 { border-color: #6ee7b7; box-shadow: 0 3px 10px rgba(110, 231, 183, 0.25); }
    .n-w3 { border-color: #93c5fd; box-shadow: 0 3px 10px rgba(147, 197, 253, 0.25); }
    .n-w4 { border-color: #c4b5fd; box-shadow: 0 3px 10px rgba(196, 181, 253, 0.25); }
    .node-1a { top: 140px; left: 200px; }
    .node-1b { top: 140px; left: 370px; }
    .node-2a { top: 235px; left: 80px; }
    .node-2b { top: 235px; left: 420px; }
    .node-3a { top: 395px; left: 65px; }
    .node-3b { top: 395px; left: 400px; }
    .node-4a { top: 510px; left: 145px; }
    .node-4b { top: 510px; left: 345px; }
    .blank-slot {
      display: inline-block;
      min-width: 54px;
      height: 22px;
      background: #fefce8;
      border: 2px dashed #fbbf24;
      border-radius: 6px;
      vertical-align: middle;
      text-align: center;
      line-height: 18px;
      font-size: 0.75rem;
      transition: all 0.3s ease;
      margin: 1px 0;
    }
    .blank-slot.drag-over {
      background: #fef3c7;
      border-color: #f59e0b;
      transform: scale(1.05);
    }
    .blank-slot.filled {
      background: linear-gradient(135deg, #34d399, #10b981);
      border: 2px solid #059669;
      color: white;
      font-weight: 700;
    }
    .right-panel {
      position: absolute;
      top: 70px;
      right: 16px;

      flex-direction: column;
      gap: 10px;

    .summary-card {

      box-shadow: 0 3px 10px rgba(16, 185, 129, 0.1);

    .question-card {

      padding: 12px 14px;

    .question-card h3 {

      color: #047857;
      font-size: 0.85rem;

    .question-card p {

      border-color: #34d399;
    }
    .word-bank {
      position: absolute;
      bottom: 12px;
      left: 16px;
      width: 660px;
      background: linear-gradient(145deg, #ffffff, #f0fdf4);
      border: 2px solid #a7f3d0;
      border-radius: 14px;
      padding: 10px 16px;
      box-shadow: 0 3px 10px rgba(16, 185, 129, 0.1);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .word-bank h3 {
      font-family: 'Black Han Sans', sans-serif;
      color: #059669;
      font-size: 0.85rem;

    }
    .word-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .word-chip {
      background: linear-gradient(145deg, #34d399, #10b981);
      color: white;
      padding: 5px 11px;
      border-radius: 16px;
      font-family: 'Gaegu', cursive;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: grab;
      transition: all 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-shadow: 0 2px 6px rgba(16, 185, 129, 0.3);
    }
    .word-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
    }
    .word-chip.dragging {
      opacity: 0.5;
      transform: scale(1.1);
    }
    .word-chip.used {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
      background: #9ca3af;
    }
    .download-btn {
      position: absolute;
      bottom: 12px;
      right: 16px;
      background: linear-gradient(145deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 3px 8px rgba(5, 150, 105, 0.3);
      z-index: 10;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(5, 150, 105, 0.4);
    }
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #ffffff, #f0fdf4);
      border: 3px solid #34d399;

      padding: 30px 40px;

      box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
      animation: modalPop 0.4s ease;
    }
    @keyframes modalPop {
      0% { transform: scale(0.7); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-icon { font-size: 3rem; margin-bottom: 10px; }
    .modal-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.5rem;
      color: #059669;
      margin-bottom: 6px;
    }
    .modal-text {
      font-family: 'Gaegu', cursive;
      font-size: 1rem;
      color: #374151;
      font-weight: 700;
    }
    .modal-close {
      margin-top: 16px;
      background: linear-gradient(145deg, #34d399, #10b981);
      color: white;
      border: none;
      padding: 8px 24px;
      border-radius: 16px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>
<div class="scale-container" id="scaleContainer">
  <div class="canvas" id="canvas">
    <div class="particles" id="particles"></div>

    <div class="header">

        <div class="brand-icon">☮️</div>
        <div>

    <div class="node n-w3 node-3a">

      <div class="node-title">2000년 <span class="blank-slot" data-answer="6·15"></span> 공동선언</div>
    </div>
    <div class="node n-w4 node-4a">
      <div class="node-title">2018년 <span class="blank-slot" data-answer="판문점"></span> 선언</div>
    </div>
    <div class="node n-w4 node-4b">
      <div class="node-title">하나로 합쳐지는 <span class="blank-slot" data-answer="통일"></span></div>
    </div>

    <div class="right-panel">
      <div class="summary-card">
        <h3>📚 개념 구조도</h3>
        <ul>
          <li><span class="blank-slot" data-answer="분단"></span>: 1945년 광복 후 남북 분단</li>
          <li><span class="blank-slot" data-answer="한국전쟁"></span>: 1950년 발발</li>
          <li>남북 교류: 금강산, 개성공단</li>

<div class="modal-overlay" id="completeModal">

    <button class="modal-close" onclick="closeModal()">확인</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const WORDS = ['분단','한국전쟁','휴전선','이산가족','남북정상회담','6·15','판문점','통일'];
let correctCount = 0, wrongCount = 0, remainCount = 11;
let usedBlanks = new Set();
let draggedChip = null, touchClone = null, currentDrop = null;

function init() {
  createParticles();
  createWordChips();
  setupBlanks();
  adjustScale();
  window.addEventListener('resize', adjustScale);
}

function adjustScale() {
  const container = document.getElementById('scaleContainer');
  const w = window.innerWidth, h = window.innerHeight;
  const scale = Math.min(w / 1024, h / 768, 1);
  container.style.transform = `scale(${scale})`;
  container.style.marginLeft = ((w - 1024 * scale) / 2) + 'px';
  container.style.marginTop = ((h - 768 * scale) / 2) + 'px';
}

function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#34d399', '#6ee7b7', '#a7f3d0', '#fcd34d', '#93c5fd'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (Math.random() * 8 + 4) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (Math.random() * 8 + 6) + 's';
    p.style.animationDelay = (Math.random() * 5) + 's';
    container.appendChild(p);
  }
}

function createWordChips() {
  const container = document.getElementById('wordChips');
  const shuffled = [...WORDS].sort(() => Math.random() - 0.5);
  shuffled.forEach(word => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.textContent = word;
    chip.draggable = true;
    chip.dataset.word = word;
    chip.addEventListener('dragstart', onDragStart);
    chip.addEventListener('dragend', onDragEnd);
    chip.addEventListener('touchstart', onTouchStart, { passive: false });
    chip.addEventListener('touchmove', onTouchMove, { passive: false });
    chip.addEventListener('touchend', onTouchEnd);
    container.appendChild(chip);
  });
}

function setupBlanks() {
  document.querySelectorAll('.blank-slot').forEach(blank => {
    blank.addEventListener('dragover', e => { e.preventDefault(); blank.classList.add('drag-over'); });
    blank.addEventListener('dragleave', () => blank.classList.remove('drag-over'));
    blank.addEventListener('drop', e => {
      e.preventDefault();
      blank.classList.remove('drag-over');
      if (draggedChip && !blank.classList.contains('filled')) handleDrop(blank, draggedChip.dataset.word);
    });
  });
}

function onDragStart(e) {
  draggedChip = e.target;
  e.target.classList.add('dragging');
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
  draggedChip = null;
}

function onTouchStart(e) {
  if (e.target.classList.contains('used')) return;
  e.preventDefault();
  draggedChip = e.target;
  const touch = e.touches[0];
  touchClone = draggedChip.cloneNode(true);
  touchClone.style.position = 'fixed';
  touchClone.style.left = (touch.clientX - 30) + 'px';
  touchClone.style.top = (touch.clientY - 15) + 'px';
  touchClone.style.zIndex = '9999';
  touchClone.style.pointerEvents = 'none';
  touchClone.style.opacity = '0.9';
  touchClone.style.transform = 'scale(1.1)';
  document.body.appendChild(touchClone);
  draggedChip.classList.add('dragging');
}

function onTouchMove(e) {
  if (!touchClone) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchClone.style.left = (touch.clientX - 30) + 'px';
  touchClone.style.top = (touch.clientY - 15) + 'px';
  const elem = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.blank-slot').forEach(b => b.classList.remove('drag-over'));
  if (elem && elem.classList.contains('blank-slot') && !elem.classList.contains('filled')) {
    elem.classList.add('drag-over');
    currentDrop = elem;
  } else {
    currentDrop = null;
  }
}

function onTouchEnd(e) {
  if (touchClone) {
    touchClone.remove();
    touchClone = null;
  }
  if (draggedChip) {
    draggedChip.classList.remove('dragging');
    if (currentDrop) {
      handleDrop(currentDrop, draggedChip.dataset.word);
      currentDrop.classList.remove('drag-over');
    }
    draggedChip = null;
    currentDrop = null;
  }
}

function handleDrop(blank, word) {
  const answer = blank.dataset.answer;
  const blankId = Array.from(document.querySelectorAll('.blank-slot')).indexOf(blank);
  if (word === answer) {
    if (!usedBlanks.has(blankId)) {
      correctCount++;
      usedBlanks.add(blankId);
      remainCount--;
    }
    blank.textContent = word;
    blank.classList.add('filled');
    document.querySelectorAll(`.word-chip[data-word="${word}"]`).forEach(c => c.classList.add('used'));
    updateScore();
    if (remainCount === 0) showComplete();
  } else {
    wrongCount++;
    updateScore();
    blank.style.animation = 'shake 0.4s ease';
    setTimeout(() => blank.style.animation = '', 400);
  }
}

function updateScore() {
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;
  document.getElementById('remain').textContent = remainCount;
}

function showComplete() {
  document.getElementById('completeModal').classList.add('show');
  createConfetti();
}

function closeModal() {
  document.getElementById('completeModal').classList.remove('show');
}

function createConfetti() {
  const colors = ['#34d399', '#fcd34d', '#93c5fd', '#f472b6', '#a78bfa'];
  for (let i = 0; i < 50; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.top = '-10px';
    conf.style.width = (Math.random() * 8 + 5) + 'px';
    conf.style.height = conf.style.width;
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    conf.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(conf);
    conf.animate([
      { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
      { transform: `translateY(100vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }
    ], { duration: Math.random() * 2000 + 2000, easing: 'ease-out' })
    .onfinish = () => conf.remove();
  }
}

async function downloadPDF() {
  const canvas = await html2canvas(document.getElementById('scaleContainer'), { scale: 2, useCORS: true, backgroundColor: null });
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1024, 768] });
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 1024, 768);
  pdf.save('브레인웨이브_정치10_평화통일.pdf');
}

init();
</script>
