<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>브레인웨이브 창의노트 - 정치12</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
      background: linear-gradient(135deg, #f5f0e6 0%, #e8e0d0 100%);
    }

    .container {
      width: 1024px;
      height: 768px;
      display: flex;
      gap: 20px;
      padding: 20px;
      transform-origin: center center;
    }

    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .title-area {
      text-align: center;
      padding: 10px;
    }

    .title-area h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.6rem;
      color: #3b82f6;
      text-shadow: 2px 2px 0 rgba(59, 130, 246, 0.15);
      letter-spacing: 1px;
    }

    .title-area p {
      font-family: 'Gaegu', cursive;
      font-size: 1rem;
      color: #6b5c4c;
      margin-top: 4px;
    }

    .wave-container {
      position: relative;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wave-center {
      position: relative;
      width: 380px;
      height: 380px;
    }

    .wave-ring {
      position: absolute;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .wave-ring:nth-child(1) {
      width: 90px;
      height: 90px;
      border: 4px solid #fcd34d;
      animation: pulse1 3s ease-in-out infinite;
    }

    .wave-ring:nth-child(2) {
      width: 150px;
      height: 150px;
      border: 4px solid #86efac;
      animation: pulse2 3s ease-in-out infinite 0.3s;
    }

    .wave-ring:nth-child(3) {
      width: 220px;
      height: 220px;
      border: 4px solid #93c5fd;
      animation: pulse3 3s ease-in-out infinite 0.6s;
    }

    .wave-ring:nth-child(4) {
      width: 290px;
      height: 290px;
      border: 4px solid #c4b5fd;
      animation: pulse4 3s ease-in-out infinite 0.9s;
    }

    @keyframes pulse1 {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    }

    @keyframes pulse2 {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.06); }
    }

    @keyframes pulse3 {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes pulse4 {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.02); }
    }

    .center-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.8rem;
      z-index: 10;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
    }

    .node-card {
      position: absolute;
      background: linear-gradient(145deg, #ffffff, #f8f4ee);
      border: 2px solid #e8dcc8;
      border-radius: 16px;
      padding: 12px 14px;
      min-width: 110px;
      max-width: 150px;
      text-align: center;
      cursor: default;
      transition: all 0.3s ease;
      font-family: 'Gaegu', cursive;
      font-size: 0.95rem;
      font-weight: 700;
      color: #5c4d3d;
      box-shadow: 4px 4px 0 rgba(139, 119, 91, 0.2);
    }

    .node-card:hover {
      transform: scale(1.05);
      border-color: #3b82f6;
      box-shadow: 4px 4px 0 rgba(59, 130, 246, 0.3);
    }

    .node-num {
      position: absolute;
      top: -10px;
      left: -10px;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 2px 2px 0 rgba(59, 130, 246, 0.3);
    }

    .blank {
      display: inline-block;
      min-width: 55px;
      height: 26px;
      background: #fffbeb;
      border: 2px dashed #d4a853;
      border-radius: 6px;
      margin: 3px;
      vertical-align: middle;
      text-align: center;
      line-height: 22px;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .blank.drag-over {
      background: #fef3c7;
      border-color: #f59e0b;
      transform: scale(1.05);
    }

    .blank.filled {
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      border: 2px solid #2563eb;
      color: #fff;
      font-weight: 700;
    }

    .right-panel {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .score-bar {
      display: flex;
      justify-content: space-around;
      padding: 10px 16px;
      background: linear-gradient(145deg, #ffffff, #f8f4ee);
      border: 2px solid #e8dcc8;
      border-radius: 16px;
      box-shadow: 3px 3px 0 rgba(139, 119, 91, 0.15);
    }

    .score-item {
      text-align: center;
    }

    .score-item .num {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.4rem;
      color: #3b82f6;
    }

    .score-item .label {
      font-family: 'Gaegu', cursive;
      font-size: 0.8rem;
      color: #8b775b;
      font-weight: 700;
    }

    .concept-map {
      background: linear-gradient(145deg, #ffffff, #f8f4ee);
      border: 2px solid #e8dcc8;
      border-radius: 16px;
      padding: 15px;
      flex: 1;
      box-shadow: 3px 3px 0 rgba(139, 119, 91, 0.15);
    }

    .concept-map h3 {
      font-family: 'Black Han Sans', sans-serif;
      color: #3b82f6;
      font-size: 1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .map-content {
      font-family: 'Gaegu', cursive;
      color: #5c4d3d;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.9;
    }

    .map-content ul {
      list-style: none;
      padding-left: 0;
    }

    .map-content li {
      padding: 5px 0;
      padding-left: 20px;
      position: relative;
    }

    .map-content li:before {
      content: "🔹";
      position: absolute;
      left: 0;
      font-size: 0.7rem;
    }

    .question-card {
      background: linear-gradient(145deg, #fefce8, #fef9c3);
      border: 2px solid #facc15;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 3px 3px 0 rgba(250, 204, 21, 0.3);
    }

    .question-card h3 {
      font-family: 'Black Han Sans', sans-serif;
      color: #ca8a04;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    .question-card p {
      font-family: 'Gaegu', cursive;
      color: #713f12;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .question-card textarea {
      width: 100%;
      height: 60px;
      border: 2px solid #e5d49a;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Gaegu', cursive;
      font-size: 0.95rem;
      resize: none;
      background: #fffef5;
      color: #5c4d3d;
    }

    .question-card textarea:focus {
      outline: none;
      border-color: #facc15;
    }

    .word-bank {
      background: linear-gradient(145deg, #ffffff, #f8f4ee);
      border: 2px solid #e8dcc8;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 3px 3px 0 rgba(139, 119, 91, 0.15);
    }

    .word-bank h3 {
      font-family: 'Black Han Sans', sans-serif;
      color: #3b82f6;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .word-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .word-chip {
      background: linear-gradient(145deg, #3b82f6, #2563eb);
      color: #fff;
      padding: 8px 14px;
      border-radius: 25px;
      font-family: 'Gaegu', cursive;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: grab;
      transition: all 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-shadow: 2px 2px 0 rgba(37, 99, 235, 0.3);
    }

    .word-chip:hover {
      transform: translateY(-2px);
      box-shadow: 3px 3px 0 rgba(37, 99, 235, 0.4);
    }

    .word-chip.dragging {
      opacity: 0.6;
      transform: scale(1.1);
    }

    .word-chip.used {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
      background: #9ca3af;
    }

    .download-btn {
      background: linear-gradient(145deg, #10b981, #059669);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 3px 3px 0 rgba(5, 150, 105, 0.3);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 4px 4px 0 rgba(5, 150, 105, 0.4);
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }

    /* Completion Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(145deg, #ffffff, #f8f4ee);
      border: 3px solid #3b82f6;
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 8px 8px 0 rgba(59, 130, 246, 0.3);
      animation: modalPop 0.4s ease;
    }

    @keyframes modalPop {
      0% { transform: scale(0.7); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-icon {
      font-size: 4rem;
      margin-bottom: 15px;
    }

    .modal-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.8rem;
      color: #3b82f6;
      margin-bottom: 10px;
    }

    .modal-text {
      font-family: 'Gaegu', cursive;
      font-size: 1.2rem;
      color: #5c4d3d;
      font-weight: 700;
    }

    .modal-close {
      margin-top: 20px;
      background: linear-gradient(145deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(37, 99, 235, 0.3);
    }

    @media (max-width: 1024px) or (max-height: 768px) {
      body {
        align-items: flex-start;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="left-panel">
      <div class="title-area">
        <h1>🏪 시장에서 만나는 수요와 공급</h1>
        <p>브레인웨이브 창의노트 | 정치 12단원</p>
      </div>
      <div class="wave-container">
        <div class="wave-center">
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="center-icon">🏪</div>

          <div class="node-card" style="top: -35px; left: 50%; transform: translateX(-50%);">
            <div class="node-num">1</div>
            물건 사고파는 곳 <span class="blank" data-answer="시장"></span>
          </div>

          <div class="node-card" style="top: 20px; right: -70px;">
            <div class="node-num">2</div>
            사려는 욕구 <span class="blank" data-answer="수요"></span>
          </div>

          <div class="node-card" style="top: 130px; right: -85px;">
            <div class="node-num">3</div>
            팔려는 것 <span class="blank" data-answer="공급"></span>
          </div>

          <div class="node-card" style="bottom: 50px; right: -55px;">
            <div class="node-num">4</div>
            사려는 양 <span class="blank" data-answer="수요량"></span>
          </div>

          <div class="node-card" style="bottom: -35px; left: 50%; transform: translateX(-50%);">
            <div class="node-num">5</div>
            가격↑ 수요↓ <span class="blank" data-answer="수요법칙"></span>
          </div>

          <div class="node-card" style="bottom: 50px; left: -65px;">
            <div class="node-num">6</div>
            가격↑ 공급↑ <span class="blank" data-answer="공급법칙"></span>
          </div>

          <div class="node-card" style="top: 130px; left: -85px;">
            <div class="node-num">7</div>
            수요 공급 일치 <span class="blank" data-answer="균형"></span>
          </div>

          <div class="node-card" style="top: 20px; left: -65px;">
            <div class="node-num">8</div>
            팔려는 양 <span class="blank" data-answer="공급량"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="score-bar">
        <div class="score-item">
          <div class="num" id="correct">0</div>
          <div class="label">정답</div>
        </div>
        <div class="score-item">
          <div class="num" id="wrong">0</div>
          <div class="label">오답</div>
        </div>
        <div class="score-item">
          <div class="num" id="remain">13</div>
          <div class="label">남음</div>
        </div>
      </div>

      <div class="concept-map">
        <h3>📚 개념 구조도</h3>
        <div class="map-content">
          <ul>
            <li><span class="blank" data-answer="시장"></span>: 사는 사람 + 파는 사람</li>
            <li><span class="blank" data-answer="수요법칙"></span>: 가격↑ → 수요량↓</li>
            <li><span class="blank" data-answer="공급법칙"></span>: 가격↑ → 공급량↑</li>
            <li><span class="blank" data-answer="균형"></span>: 수요·공급 교차점</li>
            <li><span class="blank" data-answer="수요"></span>와 <span class="blank" data-answer="공급"></span>의 원리</li>
          </ul>
        </div>
      </div>

      <div class="question-card">
        <h3>💡 생각 쓰기</h3>
        <p>가격이 오르면 왜 사람들이 덜 사게 될까요?</p>
        <textarea placeholder="나의 생각을 자유롭게 적어보세요..."></textarea>
      </div>

      <div class="word-bank">
        <h3>🎯 단어 카드</h3>
        <div class="word-chips" id="wordChips"></div>
      </div>

      <button class="download-btn" onclick="downloadPDF()">📥 PDF로 저장하기</button>
    </div>
  </div>

  <div class="modal-overlay" id="completeModal">
    <div class="modal-content">
      <div class="modal-icon">🎉</div>
      <div class="modal-title">완성했어요!</div>
      <div class="modal-text">모든 빈칸을 멋지게 채웠어요!</div>
      <button class="modal-close" onclick="closeModal()">확인</button>
    </div>
  </div>

<script>
const GAME_DATA = {
  answers: ['시장', '수요', '공급', '수요량', '수요법칙', '공급법칙', '균형', '공급량', '시장', '수요법칙', '공급법칙', '균형', '수요', '공급']
};

let correctCount = 0, wrongCount = 0, remainCount = 14;
let usedBlanks = new Set();

function init() {
  const uniqueWords = [...new Set(GAME_DATA.answers)];
  const chips = uniqueWords.slice().sort(() => Math.random() - 0.5);
  const container = document.getElementById('wordChips');

  chips.forEach(word => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.textContent = word;
    chip.draggable = true;
    chip.dataset.word = word;
    chip.addEventListener('dragstart', dragStart);
    chip.addEventListener('dragend', dragEnd);
    chip.addEventListener('touchstart', touchStart, { passive: false });
    chip.addEventListener('touchmove', touchMove, { passive: false });
    chip.addEventListener('touchend', touchEnd);
    container.appendChild(chip);
  });

  document.querySelectorAll('.blank').forEach((blank, idx) => {
    blank.dataset.index = idx;
    blank.addEventListener('dragover', e => e.preventDefault());
    blank.addEventListener('dragenter', e => {
      e.preventDefault();
      if (!blank.classList.contains('filled')) {
        blank.classList.add('drag-over');
      }
    });
    blank.addEventListener('dragleave', () => blank.classList.remove('drag-over'));
    blank.addEventListener('drop', drop);
  });

  fitScale();
  window.addEventListener('resize', fitScale);
}

function fitScale() {
  const c = document.getElementById('container');
  const w = window.innerWidth;
  const h = window.innerHeight;
  const s = Math.min(w / 1024, h / 768, 1);
  c.style.transform = `scale(${s})`;
}

let draggedChip = null, touchClone = null, currentDropTarget = null;

function dragStart(e) {
  draggedChip = e.target;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragEnd(e) {
  e.target.classList.remove('dragging');
  draggedChip = null;
}

function drop(e) {
  e.preventDefault();
  const blank = e.target.closest('.blank');
  if (!blank) return;
  blank.classList.remove('drag-over');
  if (!draggedChip || blank.classList.contains('filled')) return;
  checkAnswer(blank, draggedChip.dataset.word, draggedChip);
}

function touchStart(e) {
  if (e.target.classList.contains('used')) return;
  e.preventDefault();
  draggedChip = e.target;
  const touch = e.touches[0];
  const rect = draggedChip.getBoundingClientRect();
  touchClone = draggedChip.cloneNode(true);
  touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:10000;pointer-events:none;opacity:0.9;`;
  document.body.appendChild(touchClone);
  draggedChip.classList.add('dragging');
}

function touchMove(e) {
  if (!touchClone) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchClone.style.left = touch.clientX - touchClone.offsetWidth / 2 + 'px';
  touchClone.style.top = touch.clientY - touchClone.offsetHeight / 2 + 'px';

  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.blank.drag-over').forEach(b => b.classList.remove('drag-over'));

  const blank = el?.closest('.blank');
  if (blank && !blank.classList.contains('filled')) {
    blank.classList.add('drag-over');
    currentDropTarget = blank;
  } else {
    currentDropTarget = null;
  }
}

function touchEnd(e) {
  if (!touchClone) return;
  e.preventDefault();
  if (touchClone.parentNode) touchClone.parentNode.removeChild(touchClone);
  if (draggedChip) draggedChip.classList.remove('dragging');
  document.querySelectorAll('.blank.drag-over').forEach(b => b.classList.remove('drag-over'));

  if (currentDropTarget && draggedChip) {
    checkAnswer(currentDropTarget, draggedChip.dataset.word, draggedChip);
  }

  touchClone = null;
  draggedChip = null;
  currentDropTarget = null;
}

function checkAnswer(blank, word, chip) {
  const blankIndex = parseInt(blank.dataset.index);

  if (usedBlanks.has(blankIndex)) return;

  if (blank.dataset.answer === word) {
    blank.textContent = word;
    blank.classList.add('filled');
    usedBlanks.add(blankIndex);
    correctCount++;
    remainCount--;
    createConfetti(blank);

    // Check if all instances of this word are filled
    const allBlanksForWord = document.querySelectorAll(`.blank[data-answer="${word}"]`);
    const allFilled = Array.from(allBlanksForWord).every(b => b.classList.contains('filled'));
    if (allFilled) {
      chip.classList.add('used');
    }

    if (remainCount === 0) {
      setTimeout(() => showCompletionModal(), 600);
    }
  } else {
    wrongCount++;
    blank.style.animation = 'shake 0.5s';
    setTimeout(() => blank.style.animation = '', 500);
  }

  updateScore();
}

function updateScore() {
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;
  document.getElementById('remain').textContent = remainCount;
}

function createConfetti(el) {
  const rect = el.getBoundingClientRect();
  const colors = ['#3b82f6', '#60a5fa', '#fbbf24', '#10b981', '#ec4899', '#8b5cf6'];

  for (let i = 0; i < 12; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.cssText = `position:fixed;left:${rect.left + rect.width/2}px;top:${rect.top}px;width:${6 + Math.random()*6}px;height:${6 + Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random() > 0.5 ? '50%' : '2px'};pointer-events:none;z-index:9999;`;
    document.body.appendChild(conf);

    const angle = Math.random() * Math.PI * 2;
    const velocity = 40 + Math.random() * 40;
    const vx = Math.cos(angle) * velocity;
    const vy = Math.sin(angle) * velocity - 25;
    let x = 0, y = 0, opacity = 1, rotation = 0;

    const animate = () => {
      x += vx * 0.04;
      y += vy * 0.04 + 0.8;
      opacity -= 0.018;
      rotation += 5;
      conf.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
      conf.style.opacity = opacity;
      if (opacity > 0) requestAnimationFrame(animate);
      else conf.remove();
    };
    requestAnimationFrame(animate);
  }
}

function showCompletionModal() {
  document.getElementById('completeModal').classList.add('show');
  createCelebration();
}

function closeModal() {
  document.getElementById('completeModal').classList.remove('show');
}

function createCelebration() {
  const colors = ['#3b82f6', '#60a5fa', '#fbbf24', '#10b981', '#ec4899', '#8b5cf6', '#f97316'];

  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const conf = document.createElement('div');
      conf.className = 'confetti';
      const startX = Math.random() * window.innerWidth;
      conf.style.cssText = `position:fixed;left:${startX}px;top:-20px;width:${8 + Math.random()*8}px;height:${8 + Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random() > 0.5 ? '50%' : '2px'};pointer-events:none;z-index:10001;`;
      document.body.appendChild(conf);

      let y = 0, rotation = 0;
      const speed = 2 + Math.random() * 3;
      const wobble = Math.random() * 2 - 1;

      const fall = () => {
        y += speed;
        rotation += 3;
        conf.style.transform = `translateY(${y}px) translateX(${Math.sin(y * 0.02) * 30 * wobble}px) rotate(${rotation}deg)`;
        if (y < window.innerHeight + 50) requestAnimationFrame(fall);
        else conf.remove();
      };
      requestAnimationFrame(fall);
    }, i * 30);
  }
}

async function downloadPDF() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '생성 중...';

  try {
    const canvas = await html2canvas(document.getElementById('container'), {
      scale: 2,
      backgroundColor: '#f5f0e6',
      useCORS: true
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4'
    });

    const w = pdf.internal.pageSize.getWidth();
    const h = pdf.internal.pageSize.getHeight();
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, h);
    pdf.save('브레인웨이브_정치12_수요와공급.pdf');
  } catch (err) {
    alert('PDF 생성 실패: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📥 PDF로 저장하기';
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
