<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>브레인웨이브 창의노트 - 정치17</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;touch-action:none;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}.container{width:1024px;height:768px;display:flex;gap:20px;padding:20px;transform-origin:center center}.left-panel{flex:1;display:flex;flex-direction:column;gap:15px}.title-area{text-align:center;padding:10px}.title-area h1{font-size:1.5rem;color:#fff;text-shadow:0 0 20px rgba(59,130,246,.5)}.title-area p{font-size:.85rem;color:rgba(255,255,255,.7);margin-top:4px}.wave-container{position:relative;flex:1;display:flex;justify-content:center;align-items:center}.wave-center{position:relative;width:340px;height:340px}.wave-ring{position:absolute;border-radius:50%;border:2px solid rgba(59,130,246,.3);top:50%;left:50%;transform:translate(-50%,-50%)}.wave-ring:nth-child(1){width:100px;height:100px;animation:pulse 2s ease-in-out infinite}.wave-ring:nth-child(2){width:160px;height:160px;animation:pulse 2s ease-in-out infinite .3s}.wave-ring:nth-child(3){width:220px;height:220px;animation:pulse 2s ease-in-out infinite .6s}.wave-ring:nth-child(4){width:280px;height:280px;animation:pulse 2s ease-in-out infinite .9s}@keyframes pulse{0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:.7;transform:translate(-50%,-50%) scale(1.05)}}.center-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;z-index:10}.node-card{position:absolute;background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(96,165,250,.1));backdrop-filter:blur(10px);border:1px solid rgba(59,130,246,.3);border-radius:12px;padding:10px 12px;min-width:100px;max-width:140px;text-align:center;cursor:default;transition:all .3s ease;font-size:.75rem;color:#fff}.node-card:hover{transform:scale(1.05);border-color:rgba(59,130,246,.6);box-shadow:0 0 20px rgba(59,130,246,.3)}.node-num{position:absolute;top:-8px;left:-8px;width:20px;height:20px;background:linear-gradient(135deg,#3b82f6,#60a5fa);border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:.7rem;font-weight:700}.blank{display:inline-block;min-width:50px;height:22px;background:rgba(255,255,255,.15);border:1px dashed rgba(255,255,255,.4);border-radius:4px;margin:2px;vertical-align:middle;text-align:center;line-height:20px;font-size:.7rem;transition:all .3s ease}.blank.drag-over{background:rgba(59,130,246,.4);border-color:#60a5fa}.blank.filled{background:linear-gradient(135deg,#3b82f6,#60a5fa);border:none;color:#fff;font-weight:600}.right-panel{width:320px;display:flex;flex-direction:column;gap:12px}.concept-map{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(96,165,250,.1));backdrop-filter:blur(10px);border:1px solid rgba(59,130,246,.3);border-radius:16px;padding:15px;flex:1}.concept-map h3{color:#60a5fa;font-size:.9rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}.map-content{color:rgba(255,255,255,.9);font-size:.75rem;line-height:1.7}.map-content ul{list-style:none;padding-left:0}.map-content li{padding:4px 0;padding-left:16px;position:relative}.map-content li:before{content:"→";position:absolute;left:0;color:#60a5fa}.question-box{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(251,191,36,.1));border:1px solid rgba(245,158,11,.3);border-radius:16px;padding:15px}.question-box h3{color:#fbbf24;font-size:.85rem;margin-bottom:8px}.question-box p{color:rgba(255,255,255,.9);font-size:.8rem;line-height:1.6}.word-bank{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(96,165,250,.1));backdrop-filter:blur(10px);border:1px solid rgba(59,130,246,.3);border-radius:16px;padding:15px}.word-bank h3{color:#60a5fa;font-size:.85rem;margin-bottom:10px}.word-chips{display:flex;flex-wrap:wrap;gap:6px}.word-chip{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;padding:6px 12px;border-radius:20px;font-size:.75rem;cursor:grab;transition:all .3s ease;user-select:none;-webkit-user-select:none;touch-action:none}.word-chip:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(59,130,246,.5)}.word-chip.dragging{opacity:.5;transform:scale(1.1)}.word-chip.used{opacity:.3;cursor:not-allowed;pointer-events:none}.score-bar{display:flex;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,.2);border-radius:12px}.score-item{text-align:center}.score-item .num{font-size:1.2rem;font-weight:700;color:#60a5fa}.score-item .label{font-size:.65rem;color:rgba(255,255,255,.6)}.download-btn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:12px;border-radius:12px;font-size:.85rem;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;justify-content:center;gap:8px}.download-btn:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(16,185,129,.4)}.confetti{position:fixed;pointer-events:none;z-index:9999}@media (max-width:1024px) or (max-height:768px){body{align-items:flex-start;padding:10px}}</style>
</head>
<body>
  <div class="container" id="container">
    <div class="left-panel">
      <div class="title-area">
        <h1>📊 국가 경제와 경제 성장</h1>
        <p>브레인웨이브 창의노트 | 정치 17단원</p>
      </div>
      <div class="wave-container">
        <div class="wave-center">
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="center-icon">📊</div>
          <div class="node-card" style="top:-30px;left:50%;transform:translateX(-50%)">
            <div class="node-num">1</div>
            나라 총생산 <span class="blank" data-answer="GDP"></span>
          </div>
          <div class="node-card" style="top:15px;right:-60px">
            <div class="node-num">2</div>
            경제 규모 커짐 <span class="blank" data-answer="성장"></span>
          </div>
          <div class="node-card" style="top:120px;right:-80px">
            <div class="node-num">3</div>
            경기 오르내림 <span class="blank" data-answer="변동"></span>
          </div>
          <div class="node-card" style="bottom:40px;right:-50px">
            <div class="node-num">4</div>
            경기 좋을 때 <span class="blank" data-answer="호황"></span>
          </div>
          <div class="node-card" style="bottom:-30px;left:50%;transform:translateX(-50%)">
            <div class="node-num">5</div>
            경기 나쁠 때 <span class="blank" data-answer="불황"></span>
          </div>
          <div class="node-card" style="bottom:40px;left:-60px">
            <div class="node-num">6</div>
            물가 계속 오름 <span class="blank" data-answer="인플레이션"></span>
          </div>
          <div class="node-card" style="top:120px;left:-80px">
            <div class="node-num">7</div>
            일자리 없음 <span class="blank" data-answer="실업"></span>
          </div>
          <div class="node-card" style="top:15px;left:-60px">
            <div class="node-num">8</div>
            돈 빌릴 때 비용 <span class="blank" data-answer="금리"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="right-panel">
      <div class="score-bar">
        <div class="score-item"><div class="num" id="correct">0</div><div class="label">정답</div></div>
        <div class="score-item"><div class="num" id="wrong">0</div><div class="label">오답</div></div>
        <div class="score-item"><div class="num" id="remain">8</div><div class="label">남음</div></div>
      </div>
      <div class="concept-map">
        <h3>📚 개념지도</h3>
        <div class="map-content">
          <ul>
            <li><b>GDP</b>: 국내총생산, 경제 규모</li>
            <li><b>경기 변동</b>: 호황과 불황 반복</li>
            <li><b>인플레이션</b>: 물가 지속 상승</li>
            <li><b>금리</b>: 이자율, 통화정책 수단</li>
          </ul>
        </div>
      </div>
      <div class="question-box">
        <h3>💡 생각해보기</h3>
        <p>경제 성장이 항상 좋은 것일까요? 부작용은 없을까요?</p>
      </div>
      <div class="word-bank">
        <h3>🎯 단어 카드</h3>
        <div class="word-chips" id="wordChips"></div>
      </div>
      <button class="download-btn" onclick="downloadPDF()">📥 PDF로 저장하기</button>
    </div>
  </div>
<script>
const GAME_DATA={answers:['GDP','성장','변동','호황','불황','인플레이션','실업','금리']};
let correctCount=0,wrongCount=0,remainCount=8;
function init(){const chips=GAME_DATA.answers.slice().sort(()=>Math.random()-.5);const container=document.getElementById('wordChips');chips.forEach(word=>{const chip=document.createElement('div');chip.className='word-chip';chip.textContent=word;chip.draggable=true;chip.dataset.word=word;chip.addEventListener('dragstart',dragStart);chip.addEventListener('dragend',dragEnd);chip.addEventListener('touchstart',touchStart,{passive:false});chip.addEventListener('touchmove',touchMove,{passive:false});chip.addEventListener('touchend',touchEnd);container.appendChild(chip)});document.querySelectorAll('.blank').forEach(blank=>{blank.addEventListener('dragover',e=>e.preventDefault());blank.addEventListener('dragenter',e=>{e.preventDefault();blank.classList.add('drag-over')});blank.addEventListener('dragleave',()=>blank.classList.remove('drag-over'));blank.addEventListener('drop',drop)});fitScale();window.addEventListener('resize',fitScale)}
function fitScale(){const c=document.getElementById('container'),w=window.innerWidth,h=window.innerHeight,s=Math.min(w/1024,h/768,1);c.style.transform=`scale(${s})`}
let draggedChip=null,touchClone=null,currentDropTarget=null;
function dragStart(e){draggedChip=e.target;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dragEnd(e){e.target.classList.remove('dragging');draggedChip=null}
function drop(e){e.preventDefault();const blank=e.target;blank.classList.remove('drag-over');if(!draggedChip||blank.classList.contains('filled'))return;checkAnswer(blank,draggedChip.dataset.word,draggedChip)}
function touchStart(e){if(e.target.classList.contains('used'))return;e.preventDefault();draggedChip=e.target;const touch=e.touches[0],rect=draggedChip.getBoundingClientRect();touchClone=draggedChip.cloneNode(true);touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:10000;pointer-events:none;opacity:0.9;`;document.body.appendChild(touchClone);draggedChip.classList.add('dragging')}
function touchMove(e){if(!touchClone)return;e.preventDefault();const touch=e.touches[0];touchClone.style.left=touch.clientX-touchClone.offsetWidth/2+'px';touchClone.style.top=touch.clientY-touchClone.offsetHeight/2+'px';const el=document.elementFromPoint(touch.clientX,touch.clientY);document.querySelectorAll('.blank.drag-over').forEach(b=>b.classList.remove('drag-over'));if(el&&el.classList.contains('blank')&&!el.classList.contains('filled')){el.classList.add('drag-over');currentDropTarget=el}else{currentDropTarget=null}}
function touchEnd(e){if(!touchClone)return;e.preventDefault();if(touchClone.parentNode)touchClone.parentNode.removeChild(touchClone);if(draggedChip)draggedChip.classList.remove('dragging');document.querySelectorAll('.blank.drag-over').forEach(b=>b.classList.remove('drag-over'));if(currentDropTarget&&draggedChip){checkAnswer(currentDropTarget,draggedChip.dataset.word,draggedChip)}touchClone=null;draggedChip=null;currentDropTarget=null}
function checkAnswer(blank,word,chip){if(blank.dataset.answer===word){blank.textContent=word;blank.classList.add('filled');chip.classList.add('used');correctCount++;remainCount--;createConfetti(blank);if(remainCount===0)setTimeout(()=>alert('🎉 모든 빈칸을 완성했어요!'),500)}else{wrongCount++;blank.style.animation='shake 0.5s';setTimeout(()=>blank.style.animation='',500)}updateScore()}
function updateScore(){document.getElementById('correct').textContent=correctCount;document.getElementById('wrong').textContent=wrongCount;document.getElementById('remain').textContent=remainCount}
function createConfetti(el){const rect=el.getBoundingClientRect(),colors=['#3b82f6','#60a5fa','#fbbf24','#10b981','#ec4899'];for(let i=0;i<15;i++){const conf=document.createElement('div');conf.className='confetti';conf.style.cssText=`position:fixed;left:${rect.left+rect.width/2}px;top:${rect.top}px;width:8px;height:8px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:50%;pointer-events:none;z-index:9999;`;document.body.appendChild(conf);const angle=Math.random()*Math.PI*2,velocity=50+Math.random()*50,vx=Math.cos(angle)*velocity,vy=Math.sin(angle)*velocity-30;let x=0,y=0,opacity=1;const animate=()=>{x+=vx*.05;y+=vy*.05+1;opacity-=.02;conf.style.transform=`translate(${x}px,${y}px)`;conf.style.opacity=opacity;if(opacity>0)requestAnimationFrame(animate);else conf.remove()};requestAnimationFrame(animate)}}
async function downloadPDF(){const btn=event.target;btn.disabled=true;btn.textContent='생성 중...';try{const canvas=await html2canvas(document.getElementById('container'),{scale:2,backgroundColor:'#1a1a2e',useCORS:true});const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});const w=pdf.internal.pageSize.getWidth(),h=pdf.internal.pageSize.getHeight();pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h);pdf.save('브레인웨이브_정치17_국가경제.pdf')}catch(err){alert('PDF 생성 실패: '+err.message)}finally{btn.disabled=false;btn.innerHTML='📥 PDF로 저장하기'}}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
