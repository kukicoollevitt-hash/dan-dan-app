<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고양이 섬 - 시즌2 관문</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url(https://cdn.jsdelivr.net/gh/kukicoollevitt-hash/dan-dan-app@main/public/images/cat-island-story/cat_part1_main.jpg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 36px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 20px;
      color: #FF8FAB;
      font-weight: 600;
      background: linear-gradient(135deg, #FF8FAB 0%, #FFB347 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #FF8FAB 0%, #FFB347 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #FF8FAB;
    }

    .question-text {
      font-size: 22px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.6;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 18px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
    }

    .option-btn:hover {
      border-color: #FF8FAB;
      background: #fff4f0;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #FF8FAB;
      background: linear-gradient(135deg, #FF8FAB 0%, #FFB347 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #FF8FAB 0%, #FFB347 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 143, 171, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 20px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .back-btn {
      background: white;
      border: 2px solid #FF8FAB;
      color: #FF8FAB;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #FF8FAB;
      color: white;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 28px;
      }
      .question-text {
        font-size: 18px;
      }
      .option-btn {
        font-size: 16px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 (시즌1 스토리 기반)
    const quizData = [
      {
        gate: 1,
        question: "하늘과 세나가 처음 고양이 섬에 도착했을 때 모래사장에 가득했던 것은?",
        options: [
          "사람 발자국",
          "고양이 발자국",
          "조개껍질",
          "바위"
        ],
        correct: 1
      },
      {
        gate: 2,
        question: "하늘과 세나를 처음 만난 회색 줄무늬 고양이의 이름은?",
        options: [
          "미엘",
          "루모",
          "카일",
          "로엘"
        ],
        correct: 1
      },
      {
        gate: 3,
        question: "고양이 나무마을에서 책 대신 떠다니며 공부에 사용되는 것은?",
        options: [
          "별 모양의 빛",
          "물음표 모양의 빛",
          "하트 모양의 빛",
          "달 모양의 빛"
        ],
        correct: 1
      },
      {
        gate: 4,
        question: "인간이 고양이 섬에 들어오면 언제까지 돌아가야 하나요?",
        options: [
          "해가 한 번 지기 전",
          "해가 두 번 지기 전",
          "해가 세 번 지기 전",
          "해가 네 번 지기 전"
        ],
        correct: 2
      },
      {
        gate: 5,
        question: "졸림고양이 모래언덕에서 하늘이 들은 단서는?",
        options: [
          "섬의 중심으로 가려면 빛의 규칙을 따라가라",
          "섬의 중심으로 가려면 바람의 길을 따라가라",
          "섬의 중심으로 가려면 별의 길을 따라가라",
          "섬의 중심으로 가려면 달의 길을 따라가라"
        ],
        correct: 0
      },
      {
        gate: 6,
        question: "바람고양이 절벽에서 섬의 중심부로 가기 위해 건너야 하는 것은?",
        options: [
          "별 바위",
          "달 바위",
          "날개 바위",
          "구름 바위"
        ],
        correct: 2
      },
      {
        gate: 7,
        question: "고양이 마법사의 도서관에서 지식이 담긴 것은?",
        options: [
          "빛나는 조약돌",
          "빛나는 수정",
          "빛나는 책",
          "빛나는 구슬"
        ],
        correct: 0
      },
      {
        gate: 8,
        question: "달빛 시험에서 하늘에게 나타난 것은?",
        options: [
          "두려움의 그림자",
          "놓치고 싶은 것 없는 욕심",
          "슬픔의 그림자",
          "외로움의 그림자"
        ],
        correct: 1
      },
      {
        gate: 9,
        question: "시험을 통과한 후 하늘 위에 만들어진 것은?",
        options: [
          "무지개 길",
          "별빛 길",
          "은색 달빛 길",
          "황금빛 길"
        ],
        correct: 2
      },
      {
        gate: 10,
        question: "섬을 떠날 때 루모가 마지막으로 한 말은?",
        options: [
          "잘 가, 인간 친구들아",
          "다시 만나자, 인간 친구들아",
          "안녕, 인간 친구들아",
          "고마워, 인간 친구들아"
        ],
        correct: 1
      }
    ];

    let currentGate = 0;
    let selectedAnswer = null;

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🐱 시즌2 관문 ${quiz.gate}</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      if (selectedAnswer === quiz.correct) {
        // 정답!
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');

        showResult(true);
      } else {
        // 오답!
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');

        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      if (isCorrect) {
        // 정답 메시지 추가
        const resultMsg = document.createElement('div');
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
        container.insertBefore(resultMsg, container.firstChild);

        // 1.5초 후 다음 문제로
        setTimeout(() => {
          currentGate++;
          selectedAnswer = null;

          if (currentGate >= quizData.length) {
            // 모든 관문 통과!
            showCongratulations();
          } else {
            renderQuiz();
          }
        }, 1500);
      } else {
        // 오답 메시지 추가
        const resultMsg = document.createElement('div');
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다! 관문 1로 돌아갑니다...';
        container.insertBefore(resultMsg, container.firstChild);

        // 2초 후 관문 1로
        setTimeout(() => {
          currentGate = 0;
          selectedAnswer = null;
          renderQuiz();
        }, 2000);
      }
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 축하합니다! 🎊</h2>
          <p>
            10개의 관문을 모두 통과했습니다!<br>
            시즌1의 이야기를 완벽하게 기억하고 계시네요.<br><br>
            <strong>시즌2의 모험이 곧 시작됩니다...</strong>
          </p>
          <button class="back-btn" onclick="goBack()">
            ← 시즌1로 돌아가기
          </button>
          <button class="submit-btn" onclick="goToSeason2()" style="margin-top: 10px;">
            🐱 시즌2 시작하기
          </button>
        </div>
      `;
    }

    function goBack() {
      window.location.href = '/cat-island/cat_island_season1.html';
    }

    function goToSeason2() {
      window.location.href = '/cat-island/cat_island_season2.html';
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 시즌1로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
