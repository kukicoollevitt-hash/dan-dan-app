<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바위의 눈물과 씨앗의 노래 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작생물01/생물01_표지.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론

    // 시즌1 (3~4학년 수준) - 기본
    const quizDataSeason1 = [
      // 인물파악 (2문제)
      {
        gate: 1,
        category: "인물파악",
        question: "주인공 하늘의 특징으로 알맞은 것은?",
        options: [
          "조용하고 내성적인 성격을 가진 열 살 소년",
          "호기심이 많고 '왜?'라는 말이 입버릇인 소녀",
          "숲에서 길을 잃어버린 겁이 많은 어린이",
          "식물 연구를 좋아하는 과학자의 어린 딸"
        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "돌멩이 바위에 대한 설명으로 알맞은 것은?",
        options: [
          "최근에 숲으로 굴러온 아주 젊은 돌멩이",
          "말을 하지는 못하지만 마음을 전하는 돌",
          "수백 년을 버텨온 쓸쓸함을 품고 있는 돌",
          "햇빛을 받으면 움직이는 신비로운 마법의 돌"
        ],
        correct: 2
      },
      // 내용일치 (2문제)
      {
        gate: 3,
        category: "내용일치",
        question: "숲의 네 정령이 하는 역할로 알맞지 않은 것은?",
        options: [
          "솔라(햇빛)는 식물의 광합성을 도와준다",
          "아쿠아(물)는 뿌리로 영양분 흡수를 돕는다",
          "에어(바람)는 꽃가루를 전달해 번식을 돕는다",
          "떰프(온도)는 씨앗을 직접 땅에 심어준다"
        ],
        correct: 3
      },
      {
        gate: 4,
        category: "내용일치",
        question: "이야기에서 바위가 숲에서 하는 역할로 알맞은 것은?",
        options: [
          "비가 와도 흙이 쓸려가지 않게 잡아준다",
          "동물들에게 먹이를 제공하는 역할을 한다",
          "햇빛을 모아서 식물에게 전달해 준다",
          "씨앗이 발아할 수 있도록 물을 뿌려준다"
        ],
        correct: 0
      },
      // 내용구조 (2문제)
      {
        gate: 5,
        category: "내용구조",
        question: "이야기의 전개 순서로 알맞은 것은?",
        options: [
          "바위 발견 → 정령 등장 → 씨앗 발아 → 귀환",
          "바위 발견 → 대화 → 발아 관찰 → 정령 등장",
          "정령 등장 → 바위 발견 → 학습 → 씨앗 심기",
          "씨앗 발아 → 바위 발견 → 대화 → 숲 탐험"
        ],
        correct: 1
      },
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기의 핵심 주제로 가장 알맞은 것은?",
        options: [
          "숲에서 혼자 모험하는 것은 위험하다",
          "생물과 무생물은 서로 연결되어 있다",
          "정령들 사이의 경쟁과 갈등을 해결한다",
          "어린이가 과학자로 성장하는 과정이다"
        ],
        correct: 1
      },
      // 내용어휘 (2문제)
      {
        gate: 7,
        category: "내용어휘",
        question: "'발아'의 뜻으로 알맞은 것은?",
        options: [
          "꽃이 활짝 피는 것",
          "열매가 빨갛게 익는 것",
          "씨앗에서 싹이 트는 것",
          "잎이 바닥에 떨어지는 것"
        ],
        correct: 2
      },
      {
        gate: 8,
        category: "내용어휘",
        question: "이야기에서 '무생물'에 해당하는 것은?",
        options: [
          "개미, 나비, 새",
          "나무, 풀, 꽃",
          "씨앗, 이끼, 벌레",
          "돌, 물, 흙"
        ],
        correct: 3
      },
      // 내용추론 (2문제)
      {
        gate: 9,
        category: "내용추론",
        question: "바위가 '가끔은 외롭다'고 말한 이유로 가장 알맞은 것은?",
        options: [
          "숲에 친구가 한 명도 없기 때문에",
          "자라거나 번식할 수 없는 무생물이라서",
          "하늘이가 자주 찾아오지 않기 때문에",
          "정령들이 자신을 무시하기 때문에"
        ],
        correct: 1
      },
      {
        gate: 10,
        category: "내용추론",
        question: "이야기의 마지막에서 하늘이 깨달은 것으로 가장 알맞은 것은?",
        options: [
          "생물만 가치 있고 무생물은 쓸모없다",
          "바위는 말하니까 실제로는 생물이다",
          "모든 존재는 서로 연결되어 있다",
          "숲에서는 항상 어른과 함께 다녀야 한다"
        ],
        correct: 2
      }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      {
        gate: 1,
        category: "인물파악",
        question: "하늘의 '왜?'라는 질문 습관이 과학적 탐구에 중요한 이유는 무엇일까요?",
        options: [
          "질문이 많으면 선생님이 좋아해서",
          "궁금증을 품고 질문하는 것이 새로운 발견의 시작이기 때문에",
          "질문을 하면 친구가 많아져서",
          "질문하면 숙제가 줄어들어서"
        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "바위가 생물이 아님에도 외로움을 느끼는 것이 의미하는 바는 무엇일까요?",
        options: [
          "바위도 실제로 생물이라는 것",
          "오랜 시간 존재하면서 생명처럼 자라지 못하는 한계를 인식한다는 것",
          "바위가 마법을 부릴 수 있다는 것",
          "바위가 움직일 수 있다는 것"
        ],
        correct: 1
      },
      {
        gate: 3,
        category: "내용일치",
        question: "정령들(햇빛, 물, 바람, 온도)이 모두 협력해야 하는 이유는 무엇일까요?",
        options: [
          "혼자서도 잘할 수 있지만 심심해서",
          "식물이 자라려면 빛, 물, 공기, 적절한 온도가 모두 필요하기 때문에",
          "정령들이 싸우면 안 되어서",
          "왕이 명령해서"
        ],
        correct: 1
      },
      {
        gate: 4,
        category: "내용일치",
        question: "바위가 비가 올 때 흙을 잡아주는 역할이 중요한 이유는?",
        options: [
          "바위가 예뻐서",
          "흙이 쓸려 내려가면 식물이 뿌리를 내릴 곳이 없어지기 때문에",
          "바위가 무거워서",
          "비를 좋아해서"
        ],
        correct: 1
      },
      {
        gate: 5,
        category: "내용구조",
        question: "이야기가 '질문 → 관찰 → 깨달음' 순서로 진행되는 이유는?",
        options: [
          "그냥 재미있어서",
          "과학적 탐구 과정처럼 궁금증에서 시작해 관찰하고 결론을 얻는 과정을 보여주기 위해",
          "하늘이 급해서",
          "정령이 시켜서"
        ],
        correct: 1
      },
      {
        gate: 6,
        category: "내용구조",
        question: "'생물과 무생물이 연결되어 있다'는 주제가 중요한 이유는?",
        options: [
          "과학 시험에 나와서",
          "자연의 모든 것이 서로 영향을 주고받으며 함께 존재한다는 것을 알려주기 때문에",
          "이야기가 길어져서",
          "정령이 말해서"
        ],
        correct: 1
      },
      {
        gate: 7,
        category: "내용어휘",
        question: "'발아'가 생물의 특징을 보여주는 이유는 무엇일까요?",
        options: [
          "예쁘기 때문에",
          "씨앗이 스스로 자라는 '성장' 능력을 보여주기 때문에",
          "발아가 빠르기 때문에",
          "물이 필요 없기 때문에"
        ],
        correct: 1
      },
      {
        gate: 8,
        category: "내용어휘",
        question: "돌, 물, 흙이 '무생물'로 분류되는 과학적 이유는?",
        options: [
          "움직이지 않아서",
          "스스로 자라거나 번식하지 않고, 자극에 반응하지 않기 때문에",
          "작아서",
          "색깔이 없어서"
        ],
        correct: 1
      },
      {
        gate: 9,
        category: "내용추론",
        question: "바위의 외로움이 '생물과 무생물의 차이'를 이해하는 데 도움이 되는 이유는?",
        options: [
          "바위가 슬퍼해서",
          "자라지 못하는 무생물의 한계를 느끼게 함으로써 생물의 특별함을 깨닫게 하기 때문에",
          "하늘이 울어서",
          "정령이 설명해서"
        ],
        correct: 1
      },
      {
        gate: 10,
        category: "내용추론",
        question: "하늘이 '모든 존재가 연결되어 있다'고 깨달은 것이 중요한 이유는?",
        options: [
          "숙제를 안 해도 되어서",
          "자연을 이해하고 소중히 여기는 마음의 시작이 되기 때문에",
          "선생님이 좋아해서",
          "친구가 많아져서"
        ],
        correct: 1
      }
    ];

    // 시즌3 (중1~2 수준) - 표현 더 어렵게
    const quizDataSeason3 = [
      {
        gate: 1,
        category: "인물파악",
        question: "주인공 하늘의 인물 특성으로 가장 타당한 것은?",
        options: [
          "침착하고 내성적인 기질을 보이는 열 살 남아",
          "지적 호기심이 왕성하며 '왜?'라는 질문이 언어 습관화된 여덟 살 여아",
          "삼림 내에서 방향 감각을 상실하고 공포심에 사로잡힌 아동",
          "식물학 연구에 종사하는 학자의 자녀"
        ],
        correct: 1
      },
      {

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1'; // 기본값 season1
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;

    let currentGate = 0;
    let selectedAnswer = null;
    let categoryScores = {
      "인물파악": 0,
      "내용일치": 0,
      "내용구조": 0,
      "내용어휘": 0,
      "내용추론": 0
    };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🌿 관문평가</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
          <span class="category-badge">${quiz.category}</span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');
      if (isCorrect) {
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
      } else {
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      }
      container.insertBefore(resultMsg, container.firstChild);

      // 1.5초 후 다음 문제로
      setTimeout(() => {
        currentGate++;
        selectedAnswer = null;

        if (currentGate >= quizData.length) {
          // 모든 관문 완료!
          showCongratulations();
        } else {
          renderQuiz();
        }
      }, 1500);
    }

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      // 영역별 레이더 점수 계산 (10점 만점)
      const radarScores = {
        "인물파악": convertToRadarScore(categoryScores["인물파악"]),
        "내용일치": convertToRadarScore(categoryScores["내용일치"]),
        "내용구조": convertToRadarScore(categoryScores["내용구조"]),
        "내용어휘": convertToRadarScore(categoryScores["내용어휘"]),
        "내용추론": convertToRadarScore(categoryScores["내용추론"])
      };

      // 총점 계산 (100점 만점)
      const totalRadarScore = Object.values(radarScores).reduce((a, b) => a + b, 0);
      const totalScore100 = totalRadarScore * 2; // 50점 만점 → 100점 만점으로 환산

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 관문평가 완료! 🎊</h2>
          <p>
            10개의 관문을 모두 완료했습니다!<br>
            '바위의 눈물과 씨앗의 노래' 이야기를 잘 이해하셨네요.
          </p>

          <div class="radar-container">
            <canvas id="radarCanvas" width="280" height="280"></canvas>
          </div>

          <div class="score-summary">
            <h3>📊 영역별 점수 (각 10점 만점)</h3>
            <div class="score-item">
              <span class="category">👤 인물파악</span>
              <span class="score">${radarScores["인물파악"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">✅ 내용일치</span>
              <span class="score">${radarScores["내용일치"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🏗️ 내용구조</span>
              <span class="score">${radarScores["내용구조"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">📚 내용어휘</span>
              <span class="score">${radarScores["내용어휘"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🔍 내용추론</span>
              <span class="score">${radarScores["내용추론"]} / 10</span>
            </div>
            <div class="score-item" style="border-top: 2px solid #2d6a4f; margin-top: 10px; padding-top: 15px;">
              <span class="category" style="font-size: 18px;">총점</span>
              <span class="score" style="font-size: 22px; color: #1b4332;">${totalScore100}점</span>
            </div>
          </div>

          <button class="back-btn" onclick="goBack()">
            ← 목록으로 돌아가기
          </button>
          <button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">
            🔄 다시 풀기
          </button>
        </div>
      `;

      // 레이더 차트 그리기
      setTimeout(() => {
        drawRadarChart(radarScores);
      }, 100);

      // 결과 저장 (서버 API 호출)
      saveQuizResult(radarScores, totalScore100);

      // 결과 저장 (부모 창에 전달)
      if (window.parent !== window) {
        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'bio01',
          season: getSeasonFromUrl(),
          scores: radarScores,
          totalScore: totalScore100
        }, '*');
      }
    }

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'bio01',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
