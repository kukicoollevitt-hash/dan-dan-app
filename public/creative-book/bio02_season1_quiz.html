<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>몸이 뒤바뀐 그날 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작생물02/생물02_표지.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #d4a017;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #d4a017 0%, #8b6914 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #d4a017;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #d4a017;
      background: #fffbeb;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #d4a017;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 160, 23, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #d4a017;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #d4a017;
    }

    .back-btn {
      background: white;
      border: 2px solid #d4a017;
      color: #d4a017;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #d4a017;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론

    // 시즌1 (3~4학년 수준) - 기본
    const quizDataSeason1 = [
      // 인물파악 (2문제)
      {
        gate: 1,
        category: "인물파악",
        question: "사자 레오에 대한 설명으로 알맞은 것은?",
        options: [
          "토끼의 삶을 이해하고 존중하는 현명한 왕",
          "힘이 있어야 살아 있는 것이라 믿는 자존심 강한 왕",
          "숲속 동물들과 친하게 지내며 평화를 사랑하는 왕",
          "마법을 부릴 줄 아는 신비로운 능력을 가진 왕"
        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "올빼미 현자 오울에 대한 설명으로 알맞은 것은?",
        options: [
          "젊은 올빼미로서 마법을 열심히 배우고 있다",
          "레오와 루루를 처벌하기 위해 마법을 걸었다",
          "천 년 된 올빼미로 영혼 교환 마법을 사용한다",
          "남극에서 온 교환학생 올빼미로 낯선 존재이다"
        ],
        correct: 2
      },
      // 내용일치 (2문제)
      {
        gate: 3,
        category: "내용일치",
        question: "토끼 몸이 된 레오가 처음 경험한 것으로 알맞은 것은?",
        options: [
          "하이에나에게 쫓기며 공포를 느끼고 도망쳤다",
          "영양을 사냥하여 배고픔을 해결하는 데 성공했다",
          "기린 지노에게 진화에 대한 이야기를 자세히 들었다",
          "올빼미 오울과 함께 마법 주문을 크게 외웠다"
        ],
        correct: 0
      },
      {
        gate: 4,
        category: "내용일치",
        question: "사자 몸이 된 루루가 경험한 것으로 알맞지 않은 것은?",
        options: [
          "세상이 작게 보이고 자신이 큰 존재처럼 느껴졌다",
          "배고픔을 느꼈지만 당근이나 풀잎으론 못 채웠다",
          "영양 떼를 사냥하려 했지만 여러 번 실패했다",
          "하이에나에게 쫓겨 구멍에 숨어서 피신을 했다"
        ],
        correct: 3
      },
      // 내용구조 (2문제)
      {
        gate: 5,
        category: "내용구조",
        question: "이야기의 전개 순서로 알맞은 것은?",
        options: [
          "몸 교환 → 삶 체험 → 연못 만남 → 마법 해제 → 선언",
          "왕국 선언 → 몸 교환 → 마법 해제 → 서로의 삶 체험",
          "기린과 펭귄 만남 → 몸 교환 → 은빛 연못 → 해제",
          "마법 해제 → 몸 교환 → 서로의 삶 체험 → 왕국 선언"
        ],
        correct: 0
      },
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기의 핵심 주제로 가장 알맞은 것은?",
        options: [
          "사자가 토끼보다 더 강하고 위대한 존재이다",
          "마법은 위험하므로 절대 사용하면 안 된다",
          "다름은 환경이 빚어낸 생존의 예술이다",
          "동물들은 서로 싸우지 말고 평화롭게 살아야 한다"
        ],
        correct: 2
      },
      // 내용어휘 (2문제)
      {
        gate: 7,
        category: "내용어휘",
        question: "이야기에서 '진화'의 의미로 가장 알맞은 것은?",
        options: [
          "동물이 마법의 힘으로 다른 모습으로 변신하는 것",
          "환경에 적응하며 오랜 시간 몸의 특징이 변하는 것",
          "강한 동물이 약한 동물을 잡아먹어 살아가는 것",
          "동물이 짧은 시간 안에 빠르게 성장하는 것"
        ],
        correct: 1
      },
      {
        gate: 8,
        category: "내용어휘",
        question: "지노가 말한 토끼의 '긴 귀'를 비유한 표현으로 알맞은 것은?",
        options: [
          "비행기 날개",
          "로켓 엔진",
          "레이더 장치",
          "은신 망토"
        ],
        correct: 2
      },
      // 내용추론 (2문제)
      {
        gate: 9,
        category: "내용추론",
        question: "루루가 사자 몸에서 '강함에는 강함만의 무게가 있다'고 느낀 이유로 알맞은 것은?",
        options: [
          "사자의 몸이 너무 무거워서 움직이기가 힘들었다",
          "사냥에 실패하면 굶어야 하는 책임감을 느꼈다",
          "다른 동물들이 사자를 무서워해서 외로움을 느꼈다",
          "사자의 갈기가 더러워져서 깨끗이 씻어야 했다"
        ],
        correct: 1
      },
      {
        gate: 10,
        category: "내용추론",
        question: "이야기의 마지막에서 레오가 왕국에 새로운 법을 선언한 이유로 가장 알맞은 것은?",
        options: [
          "토끼의 몸을 경험해 보니 토끼가 불쌍했기 때문에",
          "올빼미 오울이 그렇게 하라고 명령을 내려서",
          "모든 동물이 자기만의 생존 전략이 있음을 깨달아서",
          "기린 지노와 펭귄 피피에게 칭찬을 받고 싶어서"
        ],
        correct: 2
      }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      {
        gate: 1,
        category: "인물파악",
        question: "레오가 '힘만이 진짜'라고 생각한 것이 문제인 이유는 무엇일까요?",
        options: [
          "힘이 없어서 다른 동물들에게 존경받지 못함",
          "다른 동물의 생존 방식을 이해하지 못하고 무시함",
          "사자가 약해서 다른 동물들이 무서워하지 않음",
          "왕이 아니어서 명령을 내릴 권한이 없기 때문"
        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "오울이 레오와 루루의 몸을 바꾼 이유는 무엇일까요?",
        options: [
          "재미있어서 장난을 치고 싶었기 때문에",
          "상대방의 입장이 되어봐야 진정한 이해가 가능함",
          "마법을 연습하려고 두 동물을 실험 대상으로 삼음",
          "벌을 주려고 잘못된 행동을 고치게 하기 위함"
        ],
        correct: 1
      },
      {
        gate: 3,
        category: "내용일치",
        question: "레오가 토끼 몸으로 하이에나에게 쫓겼을 때 느낀 공포가 중요한 이유는?",
        options: [
          "하이에나가 무서워서 도망가야 했기 때문에",
          "약자의 입장에서 느끼는 두려움을 직접 경험함",
          "달리기가 힘들어서 토끼 몸에 적응하기 어려웠음",
          "길을 잃어서 집으로 돌아가지 못했기 때문에"
        ],
        correct: 1
      },
      {
        gate: 4,
        category: "내용일치",
        question: "루루가 사자 몸으로 사냥에 실패한 것이 보여주는 교훈은?",
        options: [
          "사냥이 쉽다는 것을 보여주어 누구나 할 수 있음",
          "강한 몸이 있어도 기술과 경험이 필요하다는 것",
          "사자가 약하다는 것을 보여주어 힘이 전부가 아님",
          "토끼가 더 강하다는 것을 증명하는 사례가 됨"
        ],
        correct: 1
      },
      {
        gate: 5,
        category: "내용구조",
        question: "'몸 교환 → 체험 → 깨달음' 구조가 효과적인 이유는?",
        options: [
          "이야기가 길어져서 더 많은 내용을 담을 수 있음",
          "직접 경험해봐야 상대방의 삶을 진정으로 이해 가능",
          "마법이 재미있어서 독자들의 흥미를 끌 수 있음",
          "동물이 귀여워서 어린이들이 좋아하기 때문에"
        ],
        correct: 1
      },
      {
        gate: 6,
        category: "내용구조",
        question: "'다름은 약점이 아니라 생존의 기술'이라는 주제가 중요한 이유는?",
        options: [
          "이야기가 재미있어서 교훈을 쉽게 전달할 수 있음",
          "모든 생물이 환경에 맞게 진화해서 각자 특징에 이유 있음",
          "사자가 왕이어서 모든 동물을 보호해야 하기 때문에",
          "토끼가 예뻐서 사람들이 좋아하고 관심을 가짐"
        ],
        correct: 1
      },
      {
        gate: 7,
        category: "내용어휘",
        question: "'진화'가 동물의 다양한 특징을 설명해주는 이유는?",
        options: [
          "마법으로 변했기 때문에 다양한 모습이 가능해짐",
          "오랜 시간 환경에 적응하면서 생존에 유리한 특징 발달",
          "신이 만들어서 각 동물에게 다른 능력을 부여함",
          "우연히 생겨서 아무런 규칙 없이 특징이 나타남"
        ],
        correct: 1
      },
      {
        gate: 8,
        category: "내용어휘",
        question: "토끼의 긴 귀를 '레이더'에 비유한 이유는 무엇일까요?",
        options: [
          "귀가 예뻐서 다른 동물들이 부러워하기 때문에",
          "멀리서 오는 위험한 소리를 감지하는 기능이 비슷함",
          "귀가 크기 때문에 다른 동물과 구별이 되기 때문",
          "토끼가 똑똑해서 귀를 잘 활용할 수 있기 때문"
        ],
        correct: 1
      },
      {
        gate: 9,
        category: "내용추론",

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(212, 160, 23, 0.3)';
      ctx.strokeStyle = '#d4a017';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#8b6914';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'bio02',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
