<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>몸이 뒤바뀐 그날 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작생물02/생물02_표지.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #d4a017;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #d4a017 0%, #8b6914 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #d4a017;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #d4a017;
      background: #fffbeb;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #d4a017;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 160, 23, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #d4a017;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #d4a017;
    }

    .back-btn {
      background: white;
      border: 2px solid #d4a017;
      color: #d4a017;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #d4a017;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제

    // 시즌1 (3~4학년 수준) - 기본
    const quizDataSeason1 = [

      {

        correct: 2

      // 내용일치 (2문제)
      {
        gate: 3,
        category: "내용일치",

          "다름은 약점이 아니라 환경이 빚어낸 생존의 예술이다",

        correct: 2

      // 내용어휘 (2문제)
      {
        gate: 7,
        category: "내용어휘",

        ],
        correct: 2
      }
    ];

    // 시즌2 (5~6학년 수준) - 표현 약간 어렵게

        gate: 1,

        ],
        correct: 3
      },
      {
        gate: 5,
        category: "내용구조",
        question: "이야기의 서사 전개 순서로 가장 적절한 것은?",
        options: [

      },
      {

    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(212, 160, 23, 0.3)';
      ctx.strokeStyle = '#d4a017';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#8b6914';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'bio02',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
