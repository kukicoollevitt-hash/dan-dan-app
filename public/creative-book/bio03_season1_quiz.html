<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뼈 없는 기사들의 바다 대전쟁 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작생물03/생물03_표지.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #0077b6;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #0077b6 0%, #023e8a 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #0077b6;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #0077b6;
      background: #e6f4f9;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #0077b6;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 119, 182, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #0077b6;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #0077b6;
    }

    .back-btn {
      background: white;
      border: 2px solid #0077b6;
      color: #0077b6;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #0077b6;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론

    // 시즌1 (3~4학년 수준) - 기본
    const quizDataSeason1 = [
      // 인물파악 (2문제)
      {
        gate: 1,
        category: "인물파악",
        question: "문어 옥토에 대한 설명으로 알맞은 것은?",
        options: [
          "무척추 기사단에서 가장 느린 기사",
          "여덟 개의 팔로 동시에 여덟 가지 일을 처리하는 천재 전략가이자 단장",
          "투명한 몸으로 적을 속이는 정찰대장",
          "단단한 껍데기로 방어하는 전문가"
        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "샤크 장군에 대한 설명으로 알맞은 것은?",
        options: [
          "처음부터 무척추동물을 존경하는 현명한 지휘관",

          "강한 이빨과 단단한 뼈를 자랑하며 처음에 무척추동물을 무시했다",
          "해파리 젤리의 친구로 함께 싸운다"
        ],
        correct: 2
      },
      // 내용일치 (2문제)
      {
        gate: 3,
        category: "내용일치",
        question: "해파리 젤리의 촉수에 있는 '자포'에 대한 설명으로 알맞은 것은?",
        options: [
          "빛을 내어 적을 유인하는 세포",
          "수천 개의 미세한 독침 세포로 총알보다 빠른 속도로 발사된다",
          "색깔을 바꿔 위장하는 세포",
          "몸을 딱딱하게 만드는 세포"
        ],
        correct: 1
      },
      {
        gate: 4,
        category: "내용일치",
        question: "다크시드를 물리치기 위한 무척추 기사단의 작전 순서로 알맞은 것은?",

          "슬로 방어 → 옥토 공격 → 젤리 독침 → 카멜 정찰",
          "카멜 위장 정찰 → 젤리 독침으로 마비 → 슬로의 빛의 결정으로 정화",
          "젤리 공격 → 카멜 방어 → 슬로 정찰 → 옥토 지휘",
          "옥토 선제 공격 → 카멜 후퇴 → 젤리 방어"
        ],
        correct: 1
      },
      // 내용구조 (2문제)
      {
        gate: 5,
        category: "내용구조",
        question: "이야기의 전개 순서로 알맞은 것은?",
        options: [
          "다크시드 공격 → 기사단 모집 → 시험 → 갈등 → 협력 → 승리",
          "기사단 모집 → 시험 → 척추동물 승리 → 다크시드 등장",
          "다크시드 봉인 해제 → 기사단 모집 → 시험 → 갈등 → 협력하여 승리",
          "샤크 장군 등장 → 무척추 기사단 패배 → 다크시드 승리"
        ],
        correct: 2
      },
      {
        gate: 6,
        category: "내용구조",

          "뼈가 있는 동물이 뼈가 없는 동물보다 강하다",
          "바다 생물들은 서로 경쟁해야 살아남을 수 있다",
          "겉모습이 아닌 역할과 능력이 진짜 힘이며, 다름을 존중해야 한다",
          "무척추동물은 척추동물보다 더 뛰어나다"
        ],
        correct: 2
      },
      // 내용어휘 (2문제)
      {
        gate: 7,
        category: "내용어휘",
        question: "'무척추동물'의 의미로 알맞은 것은?",
        options: [
          "뼈가 매우 단단한 동물",
          "등뼈(척추)가 없는 동물",

          "몸집이 작은 동물"

        correct: 1
      },
      {
        gate: 8,
        category: "내용어휘",

        gate: 9,

          "달팽이는 원래 도망칠 수 없기 때문에",

          "다른 기사들이 대신 싸워주기 때문에"
        ],
        correct: 1
      },
      {
        gate: 10,
        category: "내용추론",

        options: [
          "옥토가 더 강해서 무서웠기 때문에",
          "그랜파 터틀이 사과하라고 명령했기 때문에",
          "뼈가 있다는 것만으로 강하다고 착각했음을 깨달았기 때문에",
          "전투에서 져서 부끄러웠기 때문에"
        ],
        correct: 2
      }
    ];

    // 시즌2 (5~6학년 수준) - 표현 약간 어렵게
    const quizDataSeason2 = [
      {
        gate: 1,
        category: "인물파악",
        question: "문어 옥토의 특성에 대한 설명으로 가장 적절한 것은?",
        options: [

          "투명한 신체를 활용하여 적을 기만하는 정찰 담당",

        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "샤크 장군의 인물 특성에 대한 설명으로 가장 적절한 것은?",
        options: [
          "초기부터 무척추동물에 대한 경의를 표하는 지혜로운 지휘관",

          "해파리 젤리와 우호 관계를 유지하며 함께 전투에 참여한다"
        ],
        correct: 2
      },
      {
        gate: 3,
        category: "내용일치",
        question: "해파리 젤리의 촉수에 존재하는 '자포'에 대한 설명으로 적절한 것은?",
        options: [
          "발광 기능으로 적을 유인하는 세포 구조",

          "체색 변환을 통해 위장 기능을 수행하는 세포",

        ],
        correct: 1
      },
      {
        gate: 4,
        category: "내용일치",
        question: "다크시드 격퇴를 위한 무척추 기사단의 전술적 순서로 적절한 것은?",
        options: [
          "슬로의 방어 → 옥토의 공격 → 젤리의 독침 → 카멜의 정찰",
          "카멜의 위장 정찰 → 젤리의 독침을 통한 마비 유도 → 슬로의 빛의 결정으로 정화",
          "젤리의 공격 → 카멜의 방어 → 슬로의 정찰 → 옥토의 지휘",
          "옥토의 선제 공격 → 카멜의 후퇴 → 젤리의 방어"
        ],
        correct: 1
      },
      {
        gate: 5,
        category: "내용구조",
        question: "이야기의 서사 전개 순서로 가장 적절한 것은?",
        options: [
          "다크시드 침공 → 기사단 모집 → 시험 → 갈등 → 협력 → 승리",
          "기사단 모집 → 시험 → 척추동물 승리 → 다크시드 등장",
          "다크시드 봉인 해제 → 기사단 모집 → 시험 → 갈등 발생 → 협력을 통한 승리",
          "샤크 장군 등장 → 무척추 기사단 패배 → 다크시드 승리"
        ],
        correct: 2
      },
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기가 전달하고자 하는 핵심 주제로 가장 적절한 것은?",

          "외형이 아닌 역할과 능력이 진정한 힘이며, 차이를 존중해야 한다",
          "무척추동물이 척추동물보다 더 우수하다"
        ],
        correct: 2
      },
      {
        gate: 7,
        category: "내용어휘",
        question: "'무척추동물'의 개념으로 적절한 것은?",
        options: [
          "골격이 매우 견고한 동물군",
          "척추(등뼈)가 부재한 동물군",
          "수중 환경에서만 서식하는 동물군",

      },
      {

      {

    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(0, 119, 182, 0.3)';
      ctx.strokeStyle = '#0077b6';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#023e8a';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'bio03',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
