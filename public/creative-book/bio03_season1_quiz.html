<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뼈 없는 기사들의 바다 대전쟁 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작생물03/생물03_표지.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #0077b6;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #0077b6 0%, #023e8a 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #0077b6;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #0077b6;
      background: #e6f4f9;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #0077b6;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 119, 182, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #0077b6;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #0077b6;
    }

    .back-btn {
      background: white;
      border: 2px solid #0077b6;
      color: #0077b6;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #0077b6;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론

    // 시즌1 (3~4학년 수준) - 기본
    const quizDataSeason1 = [
      // 인물파악 (2문제)
      {
        gate: 1,
        category: "인물파악",
        question: "문어 옥토에 대한 설명으로 알맞은 것은?",
        options: [
          "무척추 기사단에서 가장 느리게 움직이는 기사",
          "여덟 팔로 여덟 가지 일을 동시에 처리하는 단장",
          "투명한 몸으로 적을 잘 속이는 정찰대장 역할",
          "단단한 껍데기로 방어를 전문으로 하는 기사"
        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "샤크 장군에 대한 설명으로 알맞은 것은?",
        options: [
          "처음부터 무척추동물을 존경한 현명한 지휘관",
          "다크시드의 부하로서 왕국을 공격하는 악역",
          "강한 이빨과 뼈를 자랑하며 무척추동물을 무시함",
          "해파리 젤리의 친구로서 함께 싸운 동료"
        ],
        correct: 2
      },
      // 내용일치 (2문제)
      {
        gate: 3,
        category: "내용일치",
        question: "해파리 젤리의 촉수에 있는 '자포'에 대한 설명으로 알맞은 것은?",
        options: [
          "빛을 내어 적을 유인하는 발광 세포다",
          "수천 개의 독침 세포로 빠르게 발사된다",
          "색깔을 바꿔서 위장할 수 있는 세포다",
          "몸을 딱딱하게 만들어 방어하는 세포다"
        ],
        correct: 1
      },
      {
        gate: 4,
        category: "내용일치",
        question: "다크시드를 물리치기 위한 무척추 기사단의 작전 순서로 알맞은 것은?",
        options: [
          "슬로 방어 → 옥토 공격 → 젤리 독침 → 카멜 정찰",
          "카멜 정찰 → 젤리 마비 → 슬로 빛의 결정으로 정화",
          "젤리 공격 → 카멜 방어 → 슬로 정찰 → 옥토 지휘",
          "옥토 선제 공격 → 카멜 후퇴 → 젤리 방어 담당"
        ],
        correct: 1
      },
      // 내용구조 (2문제)
      {
        gate: 5,
        category: "내용구조",
        question: "이야기의 전개 순서로 알맞은 것은?",
        options: [
          "다크시드 공격 → 모집 → 시험 → 갈등 → 협력 승리",
          "기사단 모집 → 시험 → 척추동물 승리 → 다크시드 등장",
          "봉인 해제 → 모집 → 시험 → 갈등 → 협력하여 승리",
          "샤크 장군 등장 → 무척추 기사단 패배 → 다크시드 승리"
        ],
        correct: 2
      },
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기의 핵심 주제로 가장 알맞은 것은?",
        options: [
          "뼈가 있는 동물이 없는 동물보다 강하다",
          "바다 생물들은 서로 경쟁해야 살아남는다",
          "역할과 능력이 진짜 힘이며 다름을 존중한다",
          "무척추동물은 척추동물보다 더 뛰어나다"
        ],
        correct: 2
      },
      // 내용어휘 (2문제)
      {
        gate: 7,
        category: "내용어휘",
        question: "'무척추동물'의 의미로 알맞은 것은?",
        options: [
          "뼈가 매우 단단한 동물",
          "등뼈(척추)가 없는 동물",
          "물속에서만 사는 동물",
          "몸집이 아주 작은 동물"
        ],
        correct: 1
      },
      {
        gate: 8,
        category: "내용어휘",
        question: "이야기에서 오징어 카멜의 '색소포'에 대한 설명으로 알맞은 것은?",
        options: [
          "독을 만들어 내는 특별한 세포",
          "피부 색과 질감을 바꿀 수 있는 세포",
          "소리를 들을 수 있는 감각 세포",
          "빛을 내어 어둠을 밝히는 세포"
        ],
        correct: 1
      },
      // 내용추론 (2문제)
      {
        gate: 9,
        category: "내용추론",
        question: "달팽이 슬로가 '빠르게 도망치는 것만이 방어가 아니다'라고 말한 이유로 알맞은 것은?",
        options: [
          "달팽이는 원래 빨리 도망칠 수가 없어서",
          "껍데기 안에서 버티는 것도 좋은 방어이기에",
          "슬로가 기사단에서 가장 빠른 기사이기에",
          "다른 기사들이 대신 싸워 주기 때문에"
        ],
        correct: 1
      },
      {
        gate: 10,
        category: "내용추론",
        question: "샤크 장군이 마지막에 옥토에게 사과한 이유로 가장 알맞은 것은?",
        options: [
          "옥토가 자신보다 더 강해서 무서웠기에",
          "그랜파 터틀이 사과하라고 명령을 내려서",
          "뼈만으로 강하다고 착각했음을 깨달아서",
          "전투에서 져서 너무 부끄러웠기 때문에"
        ],
        correct: 2
      }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      {
        gate: 1,
        category: "인물파악",
        question: "문어 옥토의 8개 팔이 전략가로서 유용한 이유는 무엇일까요?",
        options: [
          "팔이 예뻐서 다른 동물들의 관심을 끌 수 있음",
          "여러 가지 일을 동시에 처리하며 상황 파악 가능",
          "팔이 길어서 멀리 있는 것도 잡을 수 있음",
          "수영을 잘해서 바다에서 빠르게 이동 가능"
        ],
        correct: 1
      },
      {
        gate: 2,
        category: "인물파악",
        question: "샤크 장군이 무척추동물을 처음에 무시한 것이 잘못인 이유는?",
        options: [
          "상어가 약해서 무척추동물에게 힘으로 밀렸기 때문",
          "뼈 유무로 능력을 판단하면 진정한 가치를 놓침",
          "무척추동물이 무서워서 함부로 대하면 안 되기 때문",
          "왕이 화를 내서 샤크 장군이 벌을 받게 되었음"
        ],
        correct: 1
      },
      {
        gate: 3,
        category: "내용일치",
        question: "해파리의 '자포'가 총알보다 빠른 것이 생존에 유리한 이유는?",
        options: [
          "소리가 크기 때문에 적을 놀라게 할 수 있음",
          "빠른 속도로 적을 공격해야 뼈 없이도 자신 보호",
          "예뻐 보이기 때문에 적이 공격하지 않게 됨",
          "물속에서 보이지 않기 때문에 숨을 수 있음"
        ],
        correct: 1
      },
      {
        gate: 4,
        category: "내용일치",
        question: "작전에서 각 기사의 특기를 순서대로 활용한 것이 효과적인 이유는?",
        options: [
          "순서가 중요해서 순서를 지키면 잘 되기 때문",
          "정찰→공격→정화 순서로 적의 약점을 파악하고 제거",
          "빨라서 적이 미처 대응하지 못하게 하기 때문",
          "재미있어서 기사들이 더 열심히 싸우게 됨"
        ],
        correct: 1
      },
      {
        gate: 5,
        category: "내용구조",
        question: "'갈등 → 협력 → 승리' 구조가 이야기에서 중요한 이유는?",
        options: [
          "싸움이 재미있어서 독자들이 좋아하기 때문에",
          "갈등을 극복하고 협력해야 큰 일을 이룰 수 있음을 보여줌",
          "이야기가 길어져서 더 많은 내용을 담을 수 있음",
          "다크시드가 무서워서 긴장감을 높이기 위해서"
        ],
        correct: 1
      },
      {
        gate: 6,
        category: "내용구조",
        question: "'겉모습이 아닌 역할이 진짜 힘'이라는 주제가 중요한 이유는?",
        options: [
          "예뻐 보이려고 노력해야 한다는 것을 알려주기 위해",
          "외모나 신체 조건으로 판단하면 안 된다는 교훈을 줌",
          "무척추동물이 많아서 그들의 이야기가 필요함",
          "바다가 넓어서 다양한 동물이 살고 있기 때문"
        ],
        correct: 1
      },
      {
        gate: 7,
        category: "내용어휘",
        question: "'무척추동물'이 지구상에서 가장 많은 동물 종류인 이유로 적절한 것은?",
        options: [
          "작아서 많은 곳에 숨어 살 수 있기 때문에",
          "다양한 환경에서 뼈 없이도 생존할 수 있는 적응력",
          "예뻐서 사람들이 보호해 주었기 때문에",
          "오래 살아서 개체수가 늘어났기 때문에"
        ],
        correct: 1
      },
      {
        gate: 8,
        category: "내용어휘",
        question: "오징어의 '색소포'가 생존에 도움이 되는 이유는?",
        options: [
          "예뻐 보여서 다른 동물들이 좋아하기 때문에",
          "주변 환경과 같은 색으로 변해 적에게 들키지 않음",
          "빛이 나서 어두운 바다에서 길을 찾을 수 있음",
          "소리가 나서 다른 동물과 의사소통할 수 있음"
        ],
        correct: 1
      },
      {
        gate: 9,
        category: "내용추론",
        question: "달팽이 슬로의 '버티는 방어'가 유효한 생존 전략인 이유는?",
        options: [
          "달팽이가 빨라서 도망갈 수 있기 때문에",
          "단단한 껍데기 안에서 기다리면 적이 포기하고 떠남",
          "달팽이가 무서워서 적이 감히 공격하지 못함",

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(0, 119, 182, 0.3)';
      ctx.strokeStyle = '#0077b6';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#023e8a';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'bio03',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
