<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 연필의 두 얼굴 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작화학01/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론
    const quizDataSeason1 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "펜슬의 정체성 여행을 이끄는 안내자 역할을 하는 캐릭터는 누구인가요?",
        options: [
          "네이밍 박사",
          "아나",
          "우디",
          "혼돈"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "펜슬의 심을 이루는 흑연의 화신으로, 다이아몬드와 같은 원소로 되어있다는 자부심이 있는 캐릭터는?",
        options: [
          "우디",
          "그래파",
          "혼돈",
          "네이밍 박사"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "연필의 나무 부분의 주성분은 무엇인가요?",
        options: [
          "흑연",
          "셀룰로스",
          "탄소",
          "플라스틱"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "흑연과 다이아몬드처럼 같은 원소로 이루어졌지만 배열이 달라 성질이 다른 물질을 무엇이라고 하나요?",
        options: [
          "화합물",
          "혼합물",
          "동소체",
          "순물질"
        ],
        correct: 2
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "이 이야기에서 '혼돈'이 상징하는 것은 무엇인가요?",
        options: [
          "정확한 분류와 이름의 중요성",
          "모든 것을 뒤섞고 구별을 없앰",
          "과학자들의 탐구 정신",
          "물질이 변화하는 과정"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기의 핵심 주제로 가장 적절한 것은?",
        options: [
          "연필을 만드는 자세한 방법",
          "이름을 알면 세상이 달라 보임",
          "나무와 흑연의 차이점 설명",
          "화학 실험의 중요성을 강조"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'물체'의 정의로 가장 적절한 것은?",
        options: [
          "물질을 이루고 있는 기본 단위",
          "일정한 모양과 쓰임새가 있는 것",
          "여러 원자들이 결합한 물질",
          "눈에 보이지 않는 작은 입자"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'물질'의 정의로 가장 적절한 것은?",
        options: [
          "모양과 기능으로 정의되는 것",
          "물체를 이루고 있는 재료",
          "특정한 용도로 사용되는 도구",
          "생물체의 구성 요소"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "은 숟가락과 플라스틱 숟가락이 뜨거운 국에서 다르게 느껴지는 이유로 가장 적절한 것은?",
        options: [
          "숟가락의 모양이 다르기 때문에",
          "물질이 달라 열전도율이 다르기 때문",
          "숟가락의 크기가 다르기 때문에",
          "숟가락의 색깔이 다르기 때문에"

        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "과학자들이 새로운 물질을 발견하거나 만들어내는 궁극적인 이유로 가장 적절한 것은?",
        options: [
          "이름을 더 많이 만들기 위해서",
          "더 좋은 물체를 만들기 위해서",
          "혼돈을 일으키기 위해서",
          "물체의 모양을 바꾸기 위해서"

    // 시즌2 (5~6학년 수준) - 물체와 물질의 관계, 동소체 개념 중심
    const quizDataSeason2 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",

        options: [
          "펜슬이 자신의 이름만 알면 되기 때문",
          "물체 구성 물질 알아야 정체성 이해 가능",
          "펜슬을 더 크게 만들기 위해",
          "펜슬의 색깔을 바꾸기 위해이라 함"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "그래파(흑연)가 다이아몬드와 같은 원소(탄소)로 이루어졌다는 것이 의미하는 화학적 개념은?",
        options: [
          "두 물질은 완전히 다른 원소로 이루어져 있다",
          "같은 원소, 다른 원자 배열로 다른 성질인 동소체",
          "흑연은 다이아몬드보다 원자 수가 적다",
          "다이아몬드는 흑연에서 색깔만 바뀐 것이다"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "연필의 나무 부분을 이루는 셀룰로스의 특성으로 적절한 것은?",
        options: [
          "금속처럼 전기를 잘 통한고 볼 수 있음",
          "식물 세포벽 탄수화물, 가볍고 가공 용이",
          "물에 잘 녹는다이라고 볼 수 있음",
          "흑연보다 단단하는 것으로 알려져 있음"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "흑연이 글씨를 쓸 수 있는 이유와 관련된 구조적 특성은?",
        options: [
          "원자들이 매우 강하게 결합되어 있어서",
          "층상 구조로 되어 있어 쉽게 벗겨져 종이에 남",
          "액체처럼 흐르기 때문이라 함",
          "빛을 반사하기 때문이라 볼 수 있음"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "'혼돈'이 물체와 물질의 구분을 없애려 하는 것이 위험한 이유는?",
        options: [
          "이름이 사라지면 더 편해지기 때문",
          "정확한 구분 없이 물질 특성 이해·활용 불가",
          "혼돈이 더 강해지기 때문이라 볼 수 있음",
          "색깔이 섞이기 때문이라고 할 수 있음"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기에서 '이름(분류)'의 중요성을 강조하는 이유로 적절한 것은?",
        options: [
          "이름이 예쁘면 좋기 때문이라 볼 수 있음",

        gate: 7,
        category: "내용어휘",

        options: [

          "물체는 모양·용도 있고, 물질은 물체의 재료",

        ],
        correct: 1
      },
      // 내용어휘 (8번째)

      // 내용추론 (9번째)
      {

        options: [
          "모양이 같으면 성질도 같고 볼 수 있음",

        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "새로운 물질을 연구하고 개발하는 것이 중요한 이유를 추론한 것으로 적절한 것은?",

    // 시즌3 (중1~2 수준) - 화학 학술 용어 적용
    const quizDataSeason3 = [
      // 인물파악 (1번째)
      {

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0;
    let selectedAnswer = null;
    let categoryScores = {
      "인물파악": 0,
      "내용일치": 0,
      "내용구조": 0,
      "내용어휘": 0,
      "내용추론": 0
    };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🌿 관문평가</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
          <span class="category-badge">${quiz.category}</span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');
      if (isCorrect) {
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
      } else {
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      }
      container.insertBefore(resultMsg, container.firstChild);

      // 1.5초 후 다음 문제로
      setTimeout(() => {
        currentGate++;
        selectedAnswer = null;

        if (currentGate >= quizData.length) {
          // 모든 관문 완료!
          showCongratulations();
        } else {
          renderQuiz();
        }
      }, 1500);
    }

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

      // 총점 계산 (100점 만점)
      const totalRadarScore = Object.values(radarScores).reduce((a, b) => a + b, 0);
      const totalScore100 = totalRadarScore * 2; // 50점 만점 → 100점 만점으로 환산

      container.innerHTML = `

          <button class="back-btn" onclick="goBack()">
            ← 목록으로 돌아가기

            🔄 다시 풀기
          </button>
        </div>
      `;

      // 레이더 차트 그리기
      setTimeout(() => {
        drawRadarChart(radarScores);

      // 결과 저장 (서버 API 호출)
      saveQuizResult(radarScores, totalScore100);

      // 결과 저장 (부모 창에 전달)
      if (window.parent !== window) {
        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'chem01',
          season: getSeasonFromUrl(),
          scores: radarScores,
          totalScore: totalScore100
        }, '*');
      }

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'chem01',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0

      renderQuiz();

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
