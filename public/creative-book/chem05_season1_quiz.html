<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧊 세 얼굴의 아쿠아 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작화학05/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론
    const quizDataSeason1 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "물의 상태를 바꾸는 핵심 열쇠로, 에너지를 주거나 빼앗으며 분자의 움직임을 조절하는 캐릭터는?",
        options: [
          "글라시",
          "리퀴드",
          "칼로",
          "스팀"
        ],
        correct: 2
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "눈에 보이지 않는 기체 상태의 물을 대표하며, 가장 자유롭지만 형체가 없어 외로운 캐릭터는?",
        options: [
          "아쿠아",
          "스팀",
          "리퀴드",
          "글라시"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "1기압에서 물의 끓는점은 몇 도인가요?",
        options: [
          "0도",
          "50도",
          "100도",
          "273도"
        ],
        correct: 2
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "얼음이 물보다 가벼워서 물 위에 뜨는 이유는?",
        options: [
          "얼음이 공기를 많이 포함하기 때문",
          "육각형 결정 구조로 부피가 약 9% 커서",
          "얼음이 완전히 투명하기 때문에",
          "분자가 더 작아지기 때문에"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "이 이야기에서 물의 상태 변화 6가지에 해당하지 않는 것은?",
        options: [
          "융해",
          "기화",
          "분해",
          "승화"
        ],
        correct: 2
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기의 핵심 주제로 가장 적절한 것은?",
        options: [
          "물의 색깔 변화",
          "모습은 변해도 본질(H₂O)은 같다",
          "물이 사라지는 방법이다",
          "얼음을 만드는 방법이다"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'융해열(잠열)'의 의미로 가장 적절한 것은?",
        options: [
          "물의 온도를 높이는 에너지",
          "결합을 끊어 온도 변화 없이 상태를 바꿈",
          "물이 얼 때 방출하는 빛 에너지",
          "물의 색깔을 바꾸는 에너지"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'응결'의 의미로 가장 적절한 것은?",
        options: [
          "얼음이 녹아 물이 되는 현상",
          "물이 열을 받아 끓는 현상",
          "수증기가 냉각되어 물로 변함",
          "물이 차가워져 얼어붙는 현상"
        ],
        correct: 2
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "겨울에 빨래를 밖에 널면 얼었다가 마르는 이유로 가장 적절한 것은?",
        options: [
          "바람이 강하게 불어서",
          "얼음이 바로 수증기로 승화하기 때문",
          "빨래가 햇빛에 뜨거워져서",
          "세제가 물을 없애기 때문에"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "여름에 물을 뿌리면 시원해지는 이유로 가장 적절한 것은?",
        options: [
          "물 자체가 차갑기 때문에",
          "물이 증발하면서 주변 열을 빼앗음",
          "물이 바람을 만들기 때문에",
          "물이 그늘을 만들기 때문에"
        ],
        correct: 1
      }
    ];

    // 시즌2 (5~6학년 수준) - 상태 변화와 에너지, 분자 배열 중심 질문
    const quizDataSeason2 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "칼로(열에너지)가 물의 상태 변화를 일으키는 원리로 적절한 것은?",
        options: [
          "열에너지가 물의 색깔을 투명에서 파란색으로 바꾼다",
          "열에너지가 분자의 운동 에너지를 변화시켜 배열을 바꾼다",
          "열에너지가 수소와 산소를 합쳐서 물 분자를 새로 만든다",
          "열에너지가 물 분자를 완전히 분해해서 없애버린다"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "스팀(수증기)이 기체 상태에서 '가장 자유롭다'는 것이 의미하는 분자의 특성은?",
        options: [
          "분자들이 규칙적으로 배열되어 있어서 움직이지 않는다",
          "분자들이 자유롭게 움직이며 거리가 멀고 결합이 약하다",
          "분자들이 완전히 정지해 있어서 에너지가 전혀 없다",
          "분자들이 액체보다 느리게 움직여서 안정적인 상태이다"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "물의 끓는점(100℃)과 어는점(0℃)이 일정한 이유로 적절한 것은?",
        options: [
          "온도계가 물의 끓는점과 어는점에 맞춰서 만들어졌기 때문",
          "상태 변화 중 열이 분자 간 결합 변화에 사용되기 때문",
          "물이 지구에서 가장 특별한 물질이어서 예외적인 성질이다",
          "압력과 관계없이 물의 온도는 항상 같게 유지되기 때문"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "얼음의 밀도가 물보다 낮아 물에 뜨는 것이 생태계에 미치는 영향으로 적절한 것은?",
        options: [
          "호수가 완전히 얼어버려서 모든 생물이 함께 얼어붙는다",
          "얼음이 표면을 덮어 아래 물은 얼지 않아 생물이 생존함",
          "물고기가 얼음 위에서 살면서 추위를 피해 생활한다",
          "호수 바닥부터 얼어서 물고기들이 위로 올라오게 된다"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "물의 6가지 상태 변화를 올바르게 짝지은 것은?",
        options: [
          "융해-기화-액화-응고-승화-분해 순서로 물이 변한다",
          "융해, 기화, 응결, 응고, 승화(고→기), 승화(기→고)",
          "녹음-끓음-식음-얼음-날아감-가라앉음 순서로 변한다",
          "융해-분해-합성-산화-환원-중화가 물의 변화이다"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "물이 고체·액체·기체로 변해도 본질은 같다는 것의 화학적 의미는?",
        options: [
          "모양이 같아서 고체나 액체나 기체나 동일하게 보인다",
          "분자 구성(H₂O)은 변하지 않고 배열만 달라지는 물리적 변화",
          "무게가 변하지 않아서 상태가 바뀌어도 질량이 동일하다",
          "색깔이 같아서 어떤 상태든 물은 투명하게 보인다"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'잠열'이 '잠겨 있다'는 의미를 갖는 이유로 적절한 것은?",
        options: [
          "열이 물속에 숨어 있어서 밖으로 나오지 않기 때문",
          "열이 온도 상승 대신 분자 결합 변화에 사용되기 때문",
          "열이 눈에 보이지 않아서 잠겨 있다고 표현하는 것",
          "열이 다른 물질로 이동해서 측정이 안 되기 때문"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'승화'의 예시와 그 특징으로 적절한 것은?",
        options: [
          "물이 끓어서 수증기가 되는 것으로 기화의 한 종류이다",
          "드라이아이스나 나프탈렌이 액체 없이 바로 기체가 됨",
          "얼음이 물로 녹는 것으로 융해라고 부르는 현상이다",
          "수증기가 물로 응결되는 것으로 액화라고 부르는 현상"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "겨울 빨래가 얼었다가 마르는 승화 현상이 가능한 조건을 추론한 것으로 적절한 것은?",
        options: [
          "온도가 매우 높아야 얼음이 녹아서 물이 된 뒤 증발한다",
          "기온이 낮아도 건조한 공기가 표면 분자의 탈출을 도움",
          "바람이 불지 않아야 얼음이 녹지 않고 승화할 수 있다",
          "빨래가 뜨거워야 얼음이 녹아서 물이 된 뒤 증발한다"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {

    // URL 파라미터에서 시즌 정보 가져오기

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();

    function renderQuiz() {
      const container = document.getElementById('quizContainer');

      container.innerHTML = `
        <div class="quiz-header">

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');

        resultMsg.className = 'result-message correct';

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

      // 레이더 차트 그리기

        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'chem05',

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'chem05',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
