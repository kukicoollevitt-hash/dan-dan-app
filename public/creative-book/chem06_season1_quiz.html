<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚛️ 118명의 원소 용사 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작화학06/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론
    const quizDataSeason1 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "원소 광장의 관리인으로, 118개 좌석의 배치를 누구보다 잘 아는 캐릭터는?",
        options: [
          "멘델",
          "라부아 할머니",
          "주기 선생님",
          "금이"
        ],
        correct: 2
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "79번 좌석에 앉아있으며, 황금빛 갑옷을 입은 위풍당당한 원소 용사는?",
        options: [
          "철이",
          "산소",
          "금이",
          "나트륨"
        ],
        correct: 2
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "원소의 '원자번호'를 결정하는 것은 무엇인가요?",
        options: [
          "전자 수",
          "양성자 수",
          "중성자 수",
          "원자량"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "우주에서 가장 많은 원소는 무엇인가요?",
        options: [
          "산소",
          "금",
          "철",
          "수소"
        ],
        correct: 3
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "주기율표에서 '같은 세로줄(족)'에 있는 원소들의 공통점은?",
        options: [
          "원자량이 같다는 것",
          "최외각 전자 수가 같아 성질이 비슷",
          "색깔이 같다는 것",
          "녹는점이 같다는 것"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기의 핵심 주제로 가장 적절한 것은?",
        options: [
          "금을 만드는 방법이다",
          "모든 것은 기본(원소)에서 시작된다",
          "별의 폭발 과정이다",
          "연금술사의 생활"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'동소체'의 의미로 가장 적절한 것은?",
        options: [
          "서로 다른 원소로 이루어진 물질",
          "같은 원소지만 배열이 달라 성질이 다름",
          "원자번호가 같은 물질을 의미함",
          "전자 수가 같은 물질을 의미함"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'비활성 기체'의 특징으로 맞는 것은?",
        options: [
          "물과 격렬하게 반응하는 성질",
          "전자를 쉽게 잃어버리는 성질",
          "최외각 전자 껍질이 꽉 차서 반응 안함",
          "녹이 잘 스는 성질을 가짐"
        ],
        correct: 2
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "철보다 무거운 원소(금, 백금, 우라늄 등)가 만들어지는 곳으로 가장 적절한 것은?",
        options: [
          "지구 내부",
          "초신성 폭발",
          "바다 속",
          "화산"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "같은 원소 118개로 무한에 가까운 물질이 만들어지는 이유로 가장 적절한 것은?",
        options: [
          "원소들이 계속 새로 생겨나서",
          "원소들이 결합하는 방식이 다양하기 때문에",
          "원소의 색깔이 변하기 때문에",
          "원소가 저절로 분열하기 때문에"
        ],
        correct: 1
      }
    ];

    // 시즌2 (5~6학년 수준) - 주기율표 구조와 원소의 성질 중심 질문
    const quizDataSeason2 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "주기 선생님이 원소들을 118개 좌석에 배치하는 기준으로 적절한 것은?",
        options: [
          "원소의 색깔 순서대로 빨주노초 무지개처럼 배열함",
          "원자번호 순서로 배열하고 비슷한 성질끼리 세로줄에 배치",
          "원소가 발견된 연도 순서대로 오래된 것부터 배열함",
          "원소의 무게인 원자량 순서만으로 가볍고 무거운 순 배열"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "금(Au, 원자번호 79)이 잘 변하지 않고 반짝이는 성질을 갖는 이유로 적절한 것은?",
        options: [
          "금이 가장 가벼운 원소이기 때문에 쉽게 날아가지 않아서",
          "금의 전자 배치가 안정적이어서 다른 원소와 반응하지 않음",
          "금이 가장 무거운 원소이기 때문에 녹이 슬지 않아서",
          "금이 가장 흔한 원소이기 때문에 어디서나 구할 수 있어서"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "원자번호가 원소의 정체성을 결정하는 이유로 적절한 것은?",
        options: [
          "원자번호는 원자의 색깔을 결정하는 역할을 하기 때문에",
          "양성자 수가 같으면 같은 원소이고 화학적 성질이 결정됨",
          "원자번호는 원자의 크기를 결정하는 역할을 하기 때문에",
          "원자번호가 클수록 더 좋은 원소라고 볼 수 있기 때문에"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "수소가 우주에서 가장 풍부한 원소인 이유로 적절한 것은?",
        options: [
          "수소가 가장 무거워서 우주에서 쉽게 날아가지 않기 때문에",
          "빅뱅 직후 가장 먼저, 가장 많이 만들어진 단순한 원소임",
          "수소가 가장 예쁜 색깔을 가지고 있어서 많이 생겼기 때문에",
          "수소가 가장 비싼 원소여서 우주가 아껴서 보관했기 때문에"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "같은 족(세로줄) 원소들이 비슷한 화학적 성질을 갖는 이유로 적절한 것은?",
        options: [
          "원소들의 모양이 비슷해서 성질도 비슷하게 나타나기 때문에",
          "최외각 전자 수가 같아서 결합하는 방식이 비슷하기 때문",
          "원소들의 무게가 비슷해서 성질도 비슷하게 나타나기 때문에",
          "원소들의 색깔이 비슷해서 성질도 비슷하게 나타나기 때문에"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "주기율표가 화학에서 중요한 이유로 적절한 것은?",
        options: [
          "원소 이름을 쉽게 외우기 편하게 정리되어 있어서",
          "원소의 성질과 반응성을 예측하고 이해하는 틀을 제공함",
          "원소들이 예쁘게 배열되어 있어서 보기 좋기 때문에",
          "모든 원소의 색깔을 한눈에 보여주기 때문에"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'동위원소'와 '동소체'의 차이로 적절한 것은?",
        options: [
          "둘 다 완전히 같은 의미로 사용되는 화학 용어이다",
          "동위원소는 중성자 수가 다르고, 동소체는 배열 구조가 다름",
          "동소체만 자연에 존재하고 동위원소는 인공적으로 만든다",
          "동위원소는 양성자 수가 달라서 다른 원소를 말한다"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "비활성 기체(헬륨, 네온, 아르곤 등)가 거의 반응하지 않는 이유로 적절한 것은?",
        options: [
          "너무 가벼워서 다른 원소와 부딪히기 전에 날아가 버림",
          "전자 껍질이 완전히 채워져서 전자를 주고받을 필요 없음",
          "색깔이 없어서 다른 원소들이 이 원소를 찾지 못하기 때문",
          "기체이기 때문에 다른 원소와 만나기가 어렵기 때문에"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "금이나 백금처럼 철보다 무거운 원소가 초신성에서만 만들어지는 이유를 추론한 것으로 적절한 것은?",
        options: [
          "지구 온도가 너무 높아서 무거운 원소가 녹아 없어지기 때문에",

    // URL 파라미터에서 시즌 정보 가져오기

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

      // 결과 저장 (서버 API 호출)
      saveQuizResult(radarScores, totalScore100);

      // 결과 저장 (부모 창에 전달)
      if (window.parent !== window) {
        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'chem06',
          season: getSeasonFromUrl(),
          scores: radarScores,
          totalScore: totalScore100
        }, '*');
      }
    }

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'chem06',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
