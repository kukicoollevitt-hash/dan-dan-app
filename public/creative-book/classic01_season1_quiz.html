<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 꺾이지 않는 꽃, 춘향 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작고전01/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론
    const quizDataSeason1 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "춘향의 어머니로, 전직 기생이며 딸의 행복을 바라지만 신분의 한계를 걱정하는 인물은?",
        options: [
          "향단",
          "월매",
          "변학도",
          "방자"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "새로 부임한 남원 부사로, 권력을 이용해 춘향에게 수청을 요구하는 악역은?",
        options: [
          "이한림",
          "방자",
          "변학도",
          "이몽룡"
        ],
        correct: 2
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "몽룡과 춘향이 처음 만난 장소는?",
        options: [
          "한양",
          "감옥",
          "광한루",
          "월매의 집"
        ],
        correct: 2
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "몽룡이 춘향에게 이별 선물로 준 것은?",
        options: [
          "옥반지",
          "거울",
          "비녀",
          "부채"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "이 이야기의 갈등 구조로 가장 적절한 것은?",
        options: [
          "춘향 vs 월매 - 세대 갈등",
          "몽룡 vs 아버지 - 진로 갈등",
          "춘향 vs 변학도 - 절개와 사랑 vs 권력과 탐욕",
          "향단 vs 방자 - 신분 갈등"
        ],
        correct: 2
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "이 이야기가 전달하는 핵심 주제로 가장 적절한 것은?",
        options: [
          "부모에게 효도해야 한다",
          "돈이 최고다",
          "사랑과 절개는 권력 앞에서도 꺾이지 않는다",
          "공부를 열심히 해야 한다"
        ],
        correct: 2
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'열녀불경이부'의 뜻으로 올바른 것은?",
        options: [
          "열녀는 경사스러운 날을 좋아한다",
          "열녀는 두 남편을 섬기지 않는다",
          "열녀는 항상 웃는다",
          "열녀는 책을 많이 읽는다"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'금준미주는 천인혈이요, 옥반가효는 만성고라'의 의미로 가장 적절한 것은?",
        options: [
          "금과 옥은 매우 귀하다",
          "술과 음식은 맛있다",
          "관리의 사치는 백성의 고혈로 이루어진다",
          "잔치는 즐거운 것이다"
        ],
        correct: 2
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "몽룡이 거지 행색으로 남원에 돌아온 이유로 가장 적절한 것은?",
        options: [
          "돈이 없어서",
          "암행어사로서 신분을 숨기기 위해",
          "춘향이 싫어져서",
          "과거에 떨어져서"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "춘향이 곤장을 맞으면서도 굴하지 않은 이유로 가장 적절한 것은?",
        options: [
          "통증을 못 느껴서",
          "몽룡과의 약속과 자신의 절개를 지키기 위해",
          "변학도가 무섭지 않아서",
          "감옥이 편해서"
        ],
        correct: 1
      }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "월매가 춘향과 몽룡의 사랑을 처음에 반대했던 이유는 무엇일까요?",
        options: [
          "몽룡이 마음에 들지 않기 때문에이다",
          "기생 출신 딸이 양반과 맺어지면 불행해질 것을 걱정",
          "경제적인 이유 때문에 없기 때문에이다",
          "춘향이 너무 어려서이라고 할 수 있음"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "변학도가 춘향에게 수청을 요구한 것은 어떤 사회 문제를 보여줄까요?",
        options: [
          "경제적인 이유 때문에 부족한 문제",
          "교육이 부족한 문제",
          "권력자가 약자를 함부로 대하는 문제",
          "날씨가 나쁜 문제이다"
        ],
        correct: 2
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "몽룡과 춘향이 광한루에서 만난 것이 특별한 이유는 무엇일까요?",
        options: [
          "광한루가 아름다워서라는 것은 두 사람 만남이 특별한 핵심 이유 아님",
          "신분이 다른 두 사람이 만나기 어려운 시대에 우연히 만났기 때문에",
          "날씨가 좋아서라는 것은 두 사람 만남이 특별한 이유를 설명하지 못함",
          "음식이 맛있어서라는 것은 두 사람의 만남과 전혀 관련 없는 설명임"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "몽룡이 춘향에게 옥반지를 준 이유는 무엇일까요?",
        options: [
          "반지가 모양이 예쁘고 아름답기 때문에",
          "변함없는 사랑의 약속을 담은 징표로",
          "다른 선물이 없기 때문에",
          "춘향이 달라고 하기 때문에"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "춘향전에서 '신분 차이'가 중요한 갈등 원인인 이유는 무엇일까요?",
        options: [
          "신분이 같으면 결혼할 수 없어서는 것이다",
          "조선시대 양반-기생 결혼 인정 어려움",
          "춘향이 신분을 숨겨서이라 볼 수 있음",
          "몽룡이 신분을 숨겨서이라 볼 수 있음"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "춘향전이 오랫동안 사랑받는 이유로 가장 적절한 것은?",
        options: [
          "이야기가 짧아서라는 것은 춘향전이 사랑받는 이유에 대한 설명 아님",
          "어려운 상황에서도 사랑과 절개를 지킨 감동적인 이야기이기 때문",
          "등장인물이 적어서라는 것은 춘향전이 사랑받는 이유와 관련 없음",
          "배경이 단순해서라는 것은 춘향전의 인기 이유를 설명하지 못함"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'열녀불경이부'라는 말이 춘향에게 중요한 이유는 무엇일까요?",
        options: [
          "춘향이 읽기를 좋아하기 때문에임",
          "한 사람만을 사랑하겠다는 춘향의 굳은 마음을 표현",
          "예쁜 말이기 때문이고 볼 수 있음",
          "어머니가 가르쳐줘서이라고 할 수 있음"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'금준미주는 천인혈이요'라는 시가 변학도의 잔치에서 읽힌 이유는?",
        options: [
          "시가 아름다워서 그렇게 되었는 것이다",
          "백성의 고통 위에서 즐기는 관리의 잔치를 비판위해",
          "술이 맛있기 기 때문라고 할 수 있다",
          "잔치를 축하하기 위하기 때문에임"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "암행어사 제도가 필요했던 이유로 가장 적절한 것은?",
        options: [
          "왕이 여행을 좋아하기 때문에임",
          "지방 관리 비리 조사→백성 보호 위해",
          "관리들이 힘이 세서이라고 할 수 있음",
          "한양이 멀기 기 때문이고 볼 수 있음"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "춘향이 고통을 참으면서도 변학도에게 굴복하지 않은 것이 감동적인 이유는?",
        options: [
          "춘향이 물리적인 힘 때문에 세서이다",
          "신념·사랑 위해 목숨까지 걺",
          "변학도가 약하기 때문에이라 함",
          "감옥이 편하기 때문임"
        ],
        correct: 1
      }
    ];

    // 시즌3 (중1~2 수준) - 고전문학 학술 용어 포함
    const quizDataSeason3 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "조선 시대 '기녀(妓女)' 출신으로 딸의 신분 상승을 염원하지만 양반과의 혼인이 '서얼 금고법'으로 제한됨을 걱정하는 인물은?",

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0;
    let selectedAnswer = null;
    let categoryScores = {
      "인물파악": 0,
      "내용일치": 0,
      "내용구조": 0,
      "내용어휘": 0,
      "내용추론": 0
    };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🌿 관문평가</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
          <span class="category-badge">${quiz.category}</span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');
      if (isCorrect) {
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
      } else {
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      }
      container.insertBefore(resultMsg, container.firstChild);

      // 1.5초 후 다음 문제로
      setTimeout(() => {
        currentGate++;
        selectedAnswer = null;

        if (currentGate >= quizData.length) {
          // 모든 관문 완료!
          showCongratulations();
        } else {
          renderQuiz();
        }
      }, 1500);
    }

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      // 영역별 레이더 점수 계산 (10점 만점)
      const radarScores = {
        "인물파악": convertToRadarScore(categoryScores["인물파악"]),
        "내용일치": convertToRadarScore(categoryScores["내용일치"]),
        "내용구조": convertToRadarScore(categoryScores["내용구조"]),
        "내용어휘": convertToRadarScore(categoryScores["내용어휘"]),
        "내용추론": convertToRadarScore(categoryScores["내용추론"])
      };

      // 총점 계산 (100점 만점)
      const totalRadarScore = Object.values(radarScores).reduce((a, b) => a + b, 0);
      const totalScore100 = totalRadarScore * 2; // 50점 만점 → 100점 만점으로 환산

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 관문평가 완료! 🎊</h2>
          <p>
            10개의 관문을 모두 완료했습니다!<br>
            '🌸 꺾이지 않는 꽃, 춘향' 이야기를 잘 이해하셨네요.
          </p>

          <div class="radar-container">
            <canvas id="radarCanvas" width="280" height="280"></canvas>
          </div>

          <div class="score-summary">
            <h3>📊 영역별 점수 (각 10점 만점)</h3>
            <div class="score-item">
              <span class="category">👤 인물파악</span>
              <span class="score">${radarScores["인물파악"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">✅ 내용일치</span>
              <span class="score">${radarScores["내용일치"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🏗️ 내용구조</span>
              <span class="score">${radarScores["내용구조"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">📚 내용어휘</span>
              <span class="score">${radarScores["내용어휘"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🔍 내용추론</span>
              <span class="score">${radarScores["내용추론"]} / 10</span>
            </div>
            <div class="score-item" style="border-top: 2px solid #2d6a4f; margin-top: 10px; padding-top: 15px;">
              <span class="category" style="font-size: 18px;">총점</span>
              <span class="score" style="font-size: 22px; color: #1b4332;">${totalScore100}점</span>
            </div>
          </div>

          <button class="back-btn" onclick="goBack()">
            ← 목록으로 돌아가기
          </button>
          <button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">
            🔄 다시 풀기
          </button>
        </div>
      `;

      // 레이더 차트 그리기
      setTimeout(() => {
        drawRadarChart(radarScores);
      }, 100);

      // 결과 저장 (서버 API 호출)
      saveQuizResult(radarScores, totalScore100);

      // 결과 저장 (부모 창에 전달)
      if (window.parent !== window) {
        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'classic01',
          season: getSeasonFromUrl(),
          scores: radarScores,
          totalScore: totalScore100
        }, '*');
      }
    }

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'classic01',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
