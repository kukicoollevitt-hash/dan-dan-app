<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메밀꽃 필 무렵 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/현대문학01/00.jpg');
      background-size: cover; background-position: center;
      background-repeat: no-repeat; background-attachment: fixed;
      min-height: 100vh; display: flex; justify-content: center;
      align-items: center; padding: 20px; position: relative;
    }
    body::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0;
    }
    .quiz-container {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
      border-radius: 30px; padding: 50px; max-width: 750px; width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out;
      position: relative; z-index: 1;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #5C6BC0; font-weight: 600; }
    .quiz-header .category-badge {
      display: inline-block; padding: 6px 16px;
      background: linear-gradient(135deg, #5C6BC0 0%, #3949AB 100%);
      color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px;
    }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #5C6BC0 0%, #3949AB 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #5C6BC0; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn {
      background: white; border: 2px solid #e0e0e0; padding: 20px 25px;
      border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer;
      transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5;
    }
    .option-btn:hover { border-color: #5C6BC0; background: #f0f4ff; transform: translateX(5px); }
    .option-btn.selected { border-color: #5C6BC0; background: linear-gradient(135deg, #5C6BC0 0%, #3949AB 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #5C6BC0 0%, #3949AB 100%);
      color: white; border: none; border-radius: 15px; font-size: 18px;
      font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(92, 107, 192, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #5C6BC0; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #5C6BC0; }
    .back-btn { background: white; border: 2px solid #5C6BC0; color: #5C6BC0; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #5C6BC0; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) {
      .quiz-container { padding: 30px 20px; }
      .quiz-header h1 { font-size: 24px; }
      .question-text { font-size: 17px; }
      .option-btn { font-size: 15px; padding: 15px 20px; }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "허생원의 직업은 무엇인가요?", options: ["마을의 농부 선택(개념)", "마을 대장장이 선택(항목)", "바다의 어부 선택(내용)", "장돌뱅이(떠돌이 장사꾼)"], correct: 3 },
      { gate: 2, category: "인물파악", question: "동이의 나이는 몇 살인가요?", options: ["열다섯 살", "열일곱 살", "열아홉 살", "스무 살"], correct: 1 },
      { gate: 3, category: "내용일치", question: "허생원이 젊은 시절 성 서방네 처녀를 만난 장소는?", options: ["장터(등장)", "주막(캐릭터)", "물레방앗간", "산길(등장)"], correct: 2 },
      { gate: 4, category: "내용일치", question: "동이와 허생원의 공통점으로 옳은 것은?", options: ["둘 다 왼손잡이이다", "같은 고향 출신이다", "같은 성씨으로 나타남", "같은 나이이다"], correct: 0 },
      { gate: 5, category: "내용구조", question: "이 작품에서 '메밀꽃'이 상징하는 것은?", options: ["물질적 부유함", "과거의 아련한 기억과 인연", "전쟁의 아픔이게 됨", "젊음의 열정이게 됨"], correct: 1 },
      { gate: 6, category: "내용구조", question: "작품의 배경이 되는 시간대는?", options: ["한낮이라 할 수 있음", "새벽이라 할 수 있음", "달이 뜬 밤", "해질녘"], correct: 2 },
      { gate: 7, category: "내용어휘", question: "'장돌뱅이'의 뜻으로 옳은 것은?", options: ["돌을 파는 사람 때문에 영향을 미침", "장례를 치르는 사람", "돌담을 쌓는 사람", "장터를 떠돌며 물건을 파는 사람"], correct: 3 },
      { gate: 8, category: "내용어휘", question: "'풍상(風霜)'이 의미하는 것은?", options: ["세상의 온갖 어려움과 고생", "바람과 서리이게 되었다", "좋은 날씨이는 것이다", "따뜻한 봄바람 선택"], correct: 0 },
      { gate: 9, category: "내용추론", question: "허생원이 동이에게 특별한 감정을 느끼는 이유를 추론하면?", options: ["동이가 돈이 많은 부잣집 자식이어서", "동이가 자신의 아들일지도 모른다고 느껴서", "동이가 마을에서 가장 유명한 인물이어서", "동이가 힘이 세고 씨름을 잘해서"], correct: 1 },
      { gate: 10, category: "내용추론", question: "이 작품의 주제로 가장 적절한 것은?", options: ["물질적 성공과 돈의 소중함", "전쟁으로 인한 이별과 비극", "떠돌이 삶 속에서 피어나는 인연과 혈육의 정", "도시 생활의 고단함과 외로움"], correct: 2 }
    ];
    const quizDataSeason2 = quizDataSeason1.map(q => ({...q, question: q.question.replace('인가요?', '입니까?').replace('은?', '은 무엇입니까?')}));
    const quizDataSeason3 = quizDataSeason1.map(q => ({...q, question: q.question.replace('인가요?', '인가?').replace('은?', '은 무엇인가?')}));

    function getSeasonFromUrl() { const urlParams = new URLSearchParams(window.location.search); return urlParams.get('season') || 'season1'; }
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1 : season === 'season2' ? quizDataSeason2 : quizDataSeason3;
    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];
      container.innerHTML = `
        <div class="quiz-header"><h1>🌙 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div>
        <div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div>
        <div class="question-box"><p class="question-text">${quiz.question}</p></div>
        <div class="options-container">${quiz.options.map((option, index) => `<button class="option-btn" onclick="selectAnswer(${index})">${index + 1}. ${option}</button>`).join('')}</div>
        <button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>`;
    }
    function selectAnswer(index) {
      selectedAnswer = index;
      document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
      document.querySelectorAll('.option-btn')[index].classList.add('selected');
      document.querySelector('.submit-btn').disabled = false;
    }
    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.disabled = true);
      document.querySelector('.submit-btn').disabled = true;
      const isCorrect = selectedAnswer === quiz.correct;
      if (isCorrect) { categoryScores[quiz.category]++; buttons[selectedAnswer].classList.add('correct'); }
      else { buttons[selectedAnswer].classList.add('wrong'); buttons[quiz.correct].classList.add('correct'); }
      showResult(isCorrect);
    }
    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');
      const resultMsg = document.createElement('div');
      resultMsg.className = isCorrect ? 'result-message correct' : 'result-message wrong';
      resultMsg.innerHTML = isCorrect ? '🎉 정답입니다! 다음 관문으로 이동합니다...' : '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      container.insertBefore(resultMsg, container.firstChild);
      setTimeout(() => { currentGate++; selectedAnswer = null; if (currentGate >= quizData.length) showCongratulations(); else renderQuiz(); }, 1500);
    }
    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas'); const ctx = canvas.getContext('2d');
      const centerX = 140, centerY = 140, maxRadius = 100;
      const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
      [1, 0.5, 0.1].forEach(ratio => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const angle = angles[i % 5]; const x = centerX + Math.cos(angle) * maxRadius * ratio; const y = centerY + Math.sin(angle) * maxRadius * ratio; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); });
      ctx.strokeStyle = '#d0d0d0'; angles.forEach(angle => { ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius); ctx.stroke(); });
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath(); ctx.fillStyle = 'rgba(92, 107, 192, 0.3)'; ctx.strokeStyle = '#5C6BC0'; ctx.lineWidth = 2;
      categories.forEach((cat, i) => { const ratio = scores[cat] / 10; const x = centerX + Math.cos(angles[i]) * maxRadius * ratio; const y = centerY + Math.sin(angles[i]) * maxRadius * ratio; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#3949AB'; categories.forEach((cat, i) => { const ratio = scores[cat] / 10; const x = centerX + Math.cos(angles[i]) * maxRadius * ratio; const y = centerY + Math.sin(angles[i]) * maxRadius * ratio; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill(); });
      ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px "Noto Sans KR", sans-serif'; ctx.textAlign = 'center';
      const labelOffset = 18; categories.forEach((label, i) => { const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset); const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset); ctx.fillText(label, x, y + 4); });
    }
    function showCongratulations() {
      const container = document.getElementById('quizContainer');
      const radarScores = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) };
      const totalScore100 = Object.values(radarScores).reduce((a, b) => a + b, 0) * 2;
      container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>10개의 관문을 모두 완료했습니다!<br>'메밀꽃 필 무렵' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수 (각 10점 만점)</h3><div class="score-item"><span class="category">👤 인물파악</span><span class="score">${radarScores["인물파악"]} / 10</span></div><div class="score-item"><span class="category">✅ 내용일치</span><span class="score">${radarScores["내용일치"]} / 10</span></div><div class="score-item"><span class="category">🏗️ 내용구조</span><span class="score">${radarScores["내용구조"]} / 10</span></div><div class="score-item"><span class="category">📚 내용어휘</span><span class="score">${radarScores["내용어휘"]} / 10</span></div><div class="score-item"><span class="category">🔍 내용추론</span><span class="score">${radarScores["내용추론"]} / 10</span></div><div class="score-item" style="border-top: 2px solid #5C6BC0; margin-top: 10px; padding-top: 15px;"><span class="category" style="font-size: 18px;">총점</span><span class="score" style="font-size: 22px; color: #3949AB;">${totalScore100}점</span></div></div><button class="back-btn" onclick="goBack()">← 목록으로 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">🔄 다시 풀기</button></div>`;
      setTimeout(() => drawRadarChart(radarScores), 100);
      saveQuizResult(radarScores, totalScore100);
    }
    async function saveQuizResult(scores, totalScore) {
      try {
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        if (!userInfo.grade || !userInfo.name) return;
        await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: userInfo.grade, name: userInfo.name, storyId: 'modern01', season: getSeasonFromUrl(), scores, totalScore }) });
      } catch (err) { console.error('[saveQuizResult] 오류:', err); }
    }
    function goBack() { if (window.parent !== window) window.parent.postMessage({ action: 'closeStory' }, '*'); else window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
  </script>
</body>
</html>
