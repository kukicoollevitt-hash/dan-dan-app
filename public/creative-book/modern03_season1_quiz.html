<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>봄봄 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Gmarket Sans", "Noto Sans KR", sans-serif; background: url('/images/창작도서/현대문학03/00.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
    body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .quiz-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; max-width: 750px; width: 100%; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out; position: relative; z-index: 1; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #66BB6A; font-weight: 600; }
    .quiz-header .category-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, #66BB6A 0%, #43A047 100%); color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #66BB6A 0%, #43A047 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #66BB6A; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: white; border: 2px solid #e0e0e0; padding: 20px 25px; border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer; transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5; }
    .option-btn:hover { border-color: #66BB6A; background: #e8f5e9; transform: translateX(5px); }
    .option-btn.selected { border-color: #66BB6A; background: linear-gradient(135deg, #66BB6A 0%, #43A047 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #66BB6A 0%, #43A047 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 187, 106, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #66BB6A; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #66BB6A; }
    .back-btn { background: white; border: 2px solid #66BB6A; color: #66BB6A; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #66BB6A; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) { .quiz-container { padding: 30px 20px; } .quiz-header h1 { font-size: 24px; } .question-text { font-size: 17px; } .option-btn { font-size: 15px; padding: 15px 20px; } }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "'나'(화자)는 봉필이네 집에서 어떤 일을 하고 있나요?", options: ["글공부하기 선택(개념)", "머슴살이(데릴사위)", "농사일 도움(내용)", "마을 장사 선택(선택)"], correct: 1 },
      { gate: 2, category: "인물파악", question: "봉필이 장인이 '나'의 결혼을 미루는 이유는?", options: ["돈이 없어서", "점순이가 어려서", "집이 없어서", "일손이 필요해서"], correct: 3 },
      { gate: 3, category: "내용일치", question: "'나'와 점순이가 싸움을 벌인 장소는?", options: ["닭장 앞", "마당 한가운데", "부엌 근처", "논밭 사이"], correct: 0 },
      { gate: 4, category: "내용일치", question: "장인이 '나'에게 성례(결혼)를 시켜주겠다고 한 조건은?", options: ["돈을 모으면", "집을 지으면", "점순이 키가 크면", "닭을 잘 키우면"], correct: 2 },
      { gate: 5, category: "내용구조", question: "이 작품의 서술 방식의 특징은?", options: ["3인칭 전지적 시점의 표준어 문체", "1인칭 주인공 시점의 사투리 구어체", "주고받는 편지글 형식의 서술", "날짜가 적힌 일기 형식의 서술"], correct: 1 },
      { gate: 6, category: "내용구조", question: "이 작품의 분위기로 가장 적절한 것은?", options: ["해학적이고 익살스러움", "비극적이고 슬픔 때문에 발생함", "공포스럽고 긴장", "신비롭고 환상적"], correct: 0 },
      { gate: 7, category: "내용어휘", question: "'성례'의 뜻으로 옳은 것은?", options: ["성인식", "제사", "졸업식", "결혼식"], correct: 3 },
      { gate: 8, category: "내용어휘", question: "'데릴사위'의 뜻으로 옳은 것은?", options: ["돈 많은 사위", "외국에서 온 사위", "처가에 들어가 사는 사위", "나이 많은 사위"], correct: 2 },
      { gate: 9, category: "내용추론", question: "점순이가 '나'에게 자꾸 시비를 거는 이유를 추론하면?", options: ["관심을 끌고 싶어서(좋아해서)", "나를 정말로 싫어하기 때문에(항목)", "할 일 없이 심심하고 지루해서(내용)", "아버지가 시켜서 어쩔 수 없이(선택)"], correct: 0 },
      { gate: 10, category: "내용추론", question: "이 작품이 비판하고자 하는 것은?", options: ["나태하고 게으른 삶의 태도", "발전하는 도시의 문화와 풍속", "힘들고 고된 농촌에서의 생활", "봉건적 결혼 제도와 장인의 탐욕"], correct: 3 }
    ];
    const quizDataSeason2 = quizDataSeason1.map(q => ({...q}));
    const quizDataSeason3 = quizDataSeason1.map(q => ({...q}));
    function getSeasonFromUrl() { return new URLSearchParams(window.location.search).get('season') || 'season1'; }
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1 : season === 'season2' ? quizDataSeason2 : quizDataSeason3;
    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };
    function renderQuiz() { const container = document.getElementById('quizContainer'); const quiz = quizData[currentGate]; container.innerHTML = `<div class="quiz-header"><h1>📖 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div><div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div><div class="question-box"><p class="question-text">${quiz.question}</p></div><div class="options-container">${quiz.options.map((opt, i) => `<button class="option-btn" onclick="selectAnswer(${i})">${i + 1}. ${opt}</button>`).join('')}</div><button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>`; }
    function selectAnswer(i) { selectedAnswer = i; document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected')); document.querySelectorAll('.option-btn')[i].classList.add('selected'); document.querySelector('.submit-btn').disabled = false; }
    function submitAnswer() { const quiz = quizData[currentGate]; const btns = document.querySelectorAll('.option-btn'); btns.forEach(b => b.disabled = true); document.querySelector('.submit-btn').disabled = true; if (selectedAnswer === quiz.correct) { categoryScores[quiz.category]++; btns[selectedAnswer].classList.add('correct'); } else { btns[selectedAnswer].classList.add('wrong'); btns[quiz.correct].classList.add('correct'); } showResult(selectedAnswer === quiz.correct); }
    function showResult(isCorrect) { const container = document.getElementById('quizContainer'); const msg = document.createElement('div'); msg.className = isCorrect ? 'result-message correct' : 'result-message wrong'; msg.innerHTML = isCorrect ? '🎉 정답입니다!' : '❌ 틀렸습니다.'; container.insertBefore(msg, container.firstChild); setTimeout(() => { currentGate++; selectedAnswer = null; currentGate >= quizData.length ? showCongratulations() : renderQuiz(); }, 1500); }
    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }
    function drawRadarChart(scores) { const canvas = document.getElementById('radarCanvas'); const ctx = canvas.getContext('2d'); const cX = 140, cY = 140, mR = 100; const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2); ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1; [1, 0.5, 0.1].forEach(r => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const a = angles[i % 5]; const x = cX + Math.cos(a) * mR * r; const y = cY + Math.sin(a) * mR * r; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); }); ctx.strokeStyle = '#d0d0d0'; angles.forEach(a => { ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(cX + Math.cos(a) * mR, cY + Math.sin(a) * mR); ctx.stroke(); }); const cats = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론']; ctx.beginPath(); ctx.fillStyle = 'rgba(102, 187, 106, 0.3)'; ctx.strokeStyle = '#66BB6A'; ctx.lineWidth = 2; cats.forEach((c, i) => { const r = scores[c] / 10; const x = cX + Math.cos(angles[i]) * mR * r; const y = cY + Math.sin(angles[i]) * mR * r; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#43A047'; cats.forEach((c, i) => { const r = scores[c] / 10; ctx.beginPath(); ctx.arc(cX + Math.cos(angles[i]) * mR * r, cY + Math.sin(angles[i]) * mR * r, 5, 0, Math.PI * 2); ctx.fill(); }); ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; cats.forEach((l, i) => { ctx.fillText(l, cX + Math.cos(angles[i]) * (mR + 18), cY + Math.sin(angles[i]) * (mR + 18) + 4); }); }
    function showCongratulations() { const container = document.getElementById('quizContainer'); const rs = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) }; const total = Object.values(rs).reduce((a, b) => a + b, 0) * 2; container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>'봄봄' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수</h3>${Object.entries(rs).map(([k,v]) => `<div class="score-item"><span class="category">${k}</span><span class="score">${v}/10</span></div>`).join('')}<div class="score-item" style="border-top:2px solid #66BB6A;margin-top:10px;padding-top:15px;"><span class="category" style="font-size:18px;">총점</span><span class="score" style="font-size:22px;">${total}점</span></div></div><button class="back-btn" onclick="goBack()">← 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top:10px;">🔄 다시 풀기</button></div>`; setTimeout(() => drawRadarChart(rs), 100); saveQuizResult(rs, total); }
    async function saveQuizResult(scores, totalScore) { try { const u = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}'); if (!u.grade || !u.name) return; await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: u.grade, name: u.name, storyId: 'modern03', season: getSeasonFromUrl(), scores, totalScore }) }); } catch (e) { console.error(e); } }
    function goBack() { window.parent !== window ? window.parent.postMessage({ action: 'closeStory' }, '*') : window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
  </script>
</body>
</html>
