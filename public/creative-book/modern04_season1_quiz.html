<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운수 좋은 날 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Gmarket Sans", "Noto Sans KR", sans-serif; background: url('/images/창작도서/현대문학04/00.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
    body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .quiz-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; max-width: 750px; width: 100%; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out; position: relative; z-index: 1; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #78909C; font-weight: 600; }
    .quiz-header .category-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, #78909C 0%, #546E7A 100%); color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #78909C 0%, #546E7A 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #78909C; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: white; border: 2px solid #e0e0e0; padding: 20px 25px; border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer; transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5; }
    .option-btn:hover { border-color: #78909C; background: #eceff1; transform: translateX(5px); }
    .option-btn.selected { border-color: #78909C; background: linear-gradient(135deg, #78909C 0%, #546E7A 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #78909C 0%, #546E7A 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(120, 144, 156, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #78909C; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #78909C; }
    .back-btn { background: white; border: 2px solid #78909C; color: #78909C; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #78909C; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) { .quiz-container { padding: 30px 20px; } .quiz-header h1 { font-size: 24px; } .question-text { font-size: 17px; } .option-btn { font-size: 15px; padding: 15px 20px; } }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "김첨지의 직업은 무엇인가요?", options: ["농부(인물)", "상인(캐릭터)", "인력거꾼", "공장 노동자"], correct: 2 },
      { gate: 2, category: "인물파악", question: "김첨지의 아내는 어떤 상태인가요?", options: ["병으로 앓아누워 있다", "건강하다 선택", "여행 중이다", "일하러 나갔다"], correct: 0 },
      { gate: 3, category: "내용일치", question: "이 날 김첨지에게 '운수 좋은 날'이었던 이유는?", options: ["복권에 당첨이 되어서", "귀한 선물을 받아서", "직장에서 승진을 해서", "손님이 많아 돈을 많이 벌어서"], correct: 3 },
      { gate: 4, category: "내용일치", question: "김첨지가 주막에서 한 행동은?", options: ["밥을 먹었는 것으로 나타남", "술을 마시고 설렁탕을 샀다", "잠을 잤는 것 선택", "친구를 만났는 것이다"], correct: 1 },
      { gate: 5, category: "내용구조", question: "제목 '운수 좋은 날'의 의미는?", options: ["정말로 행운이 따르는 좋은 날(개념)", "특별할 것 없는 평범한 하루(항목)", "반어적 표현(실제로는 불행한 날)", "모두가 기뻐하는 명절 축제일(선택)"], correct: 2 },
      { gate: 6, category: "내용구조", question: "김첨지가 집에 돌아왔을 때 아내의 상태는?", options: ["완쾌되었는 것이다", "요리를 하고 있었다", "병원에 갔다", "이미 세상을 떠났다"], correct: 3 },
      { gate: 7, category: "내용어휘", question: "'인력거'의 뜻으로 옳은 것은?", options: ["사람이 끄는 수레", "빠른 자동차", "증기 기차 때문에 발생함", "두발 자전거"], correct: 0 },
      { gate: 8, category: "내용어휘", question: "'행운'과 반대되는 의미의 단어는?", options: ["우연", "불운", "필연", "운명"], correct: 1 },
      { gate: 9, category: "내용추론", question: "김첨지가 아내의 부탁을 무시하고 일을 나간 이유를 추론하면?", options: ["아내가 미워지고 싫어져서", "힘든 현실에서 도망치려고", "약속한 친구를 만나러 가려고", "가난 때문에 돈을 벌어야 해서"], correct: 3 },
      { gate: 10, category: "내용추론", question: "이 작품이 비판하고자 하는 시대 상황은?", options: ["일제강점기 도시 빈민의 비극적 삶", "전쟁으로 인한 참상과 고통 때문에 발생함", "자연 재해로 인한 피해와 손실", "잘못된 교육 제도로 인한 문제"], correct: 0 }
    ];
    const quizDataSeason2 = quizDataSeason1.map(q => ({...q}));
    const quizDataSeason3 = quizDataSeason1.map(q => ({...q}));
    function getSeasonFromUrl() { return new URLSearchParams(window.location.search).get('season') || 'season1'; }
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1 : season === 'season2' ? quizDataSeason2 : quizDataSeason3;
    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };
    function renderQuiz() { const container = document.getElementById('quizContainer'); const quiz = quizData[currentGate]; container.innerHTML = `<div class="quiz-header"><h1>🚗 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div><div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div><div class="question-box"><p class="question-text">${quiz.question}</p></div><div class="options-container">${quiz.options.map((opt, i) => `<button class="option-btn" onclick="selectAnswer(${i})">${i + 1}. ${opt}</button>`).join('')}</div><button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>`; }
    function selectAnswer(i) { selectedAnswer = i; document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected')); document.querySelectorAll('.option-btn')[i].classList.add('selected'); document.querySelector('.submit-btn').disabled = false; }
    function submitAnswer() { const quiz = quizData[currentGate]; const btns = document.querySelectorAll('.option-btn'); btns.forEach(b => b.disabled = true); document.querySelector('.submit-btn').disabled = true; if (selectedAnswer === quiz.correct) { categoryScores[quiz.category]++; btns[selectedAnswer].classList.add('correct'); } else { btns[selectedAnswer].classList.add('wrong'); btns[quiz.correct].classList.add('correct'); } showResult(selectedAnswer === quiz.correct); }
    function showResult(isCorrect) { const container = document.getElementById('quizContainer'); const msg = document.createElement('div'); msg.className = isCorrect ? 'result-message correct' : 'result-message wrong'; msg.innerHTML = isCorrect ? '🎉 정답입니다!' : '❌ 틀렸습니다.'; container.insertBefore(msg, container.firstChild); setTimeout(() => { currentGate++; selectedAnswer = null; currentGate >= quizData.length ? showCongratulations() : renderQuiz(); }, 1500); }
    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }
    function drawRadarChart(scores) { const canvas = document.getElementById('radarCanvas'); const ctx = canvas.getContext('2d'); const cX = 140, cY = 140, mR = 100; const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2); ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1; [1, 0.5, 0.1].forEach(r => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const a = angles[i % 5]; const x = cX + Math.cos(a) * mR * r; const y = cY + Math.sin(a) * mR * r; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); }); ctx.strokeStyle = '#d0d0d0'; angles.forEach(a => { ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(cX + Math.cos(a) * mR, cY + Math.sin(a) * mR); ctx.stroke(); }); const cats = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론']; ctx.beginPath(); ctx.fillStyle = 'rgba(120, 144, 156, 0.3)'; ctx.strokeStyle = '#78909C'; ctx.lineWidth = 2; cats.forEach((c, i) => { const r = scores[c] / 10; const x = cX + Math.cos(angles[i]) * mR * r; const y = cY + Math.sin(angles[i]) * mR * r; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#546E7A'; cats.forEach((c, i) => { const r = scores[c] / 10; ctx.beginPath(); ctx.arc(cX + Math.cos(angles[i]) * mR * r, cY + Math.sin(angles[i]) * mR * r, 5, 0, Math.PI * 2); ctx.fill(); }); ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; cats.forEach((l, i) => { ctx.fillText(l, cX + Math.cos(angles[i]) * (mR + 18), cY + Math.sin(angles[i]) * (mR + 18) + 4); }); }
    function showCongratulations() { const container = document.getElementById('quizContainer'); const rs = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) }; const total = Object.values(rs).reduce((a, b) => a + b, 0) * 2; container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>'운수 좋은 날' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수</h3>${Object.entries(rs).map(([k,v]) => `<div class="score-item"><span class="category">${k}</span><span class="score">${v}/10</span></div>`).join('')}<div class="score-item" style="border-top:2px solid #78909C;margin-top:10px;padding-top:15px;"><span class="category" style="font-size:18px;">총점</span><span class="score" style="font-size:22px;">${total}점</span></div></div><button class="back-btn" onclick="goBack()">← 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top:10px;">🔄 다시 풀기</button></div>`; setTimeout(() => drawRadarChart(rs), 100); saveQuizResult(rs, total); }
    async function saveQuizResult(scores, totalScore) { try { const u = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}'); if (!u.grade || !u.name) return; await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: u.grade, name: u.name, storyId: 'modern04', season: getSeasonFromUrl(), scores, totalScore }) }); } catch (e) { console.error(e); } }
    function goBack() { window.parent !== window ? window.parent.postMessage({ action: 'closeStory' }, '*') : window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
  </script>
</body>
</html>
