<!DOCTYPE html>
<html lang="ko">
<head>

  <title>창작물리08 퀴즈 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작물리08/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #E91E63;
      font-weight: 600;
      background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #E91E63 0%, #9C27B0 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #E91E63;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #E91E63;
      background: #fce4ec;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #E91E63;
      background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(233, 30, 99, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #E91E63;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #E91E63;
    }

    .back-btn {
      background: white;
      border: 2px solid #E91E63;
      color: #E91E63;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #E91E63;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>

        question: "나침반의 바늘이 항상 남북 방향을 가리키는 이유는?",
        options: [
          "바람 때문에",
          "해가 뜨고 지는 방향 때문에",
          "지구가 거대한 자석이기 때문에",
          "바늘이 무거워서"
        ],
        correct: 2
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "이 이야기가 전하고자 하는 핵심 메시지는?",
        options: [
          "자석은 위험하다",
          "보이지 않는 힘도 방향이 있고 확실히 존재한다",
          "철은 모든 것에 붙는다",
          "지구는 자전하지 않는다"
        ],
        correct: 1
      }
    ];

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0;
    let selectedAnswer = null;
    let categoryScores = {
      "인물파악": 0,
      "내용일치": 0,
      "내용구조": 0,
      "내용어휘": 0,
      "내용추론": 0
    };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🧲 관문평가</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
          <span class="category-badge">${quiz.category}</span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));
      buttons[index].classList.add('selected');
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      const resultMsg = document.createElement('div');
      if (isCorrect) {
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
      } else {
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      }
      container.insertBefore(resultMsg, container.firstChild);

      setTimeout(() => {
        currentGate++;
        selectedAnswer = null;

        if (currentGate >= quizData.length) {
          showCongratulations();
        } else {
          renderQuiz();
        }
      }, 1500);
    }

    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(233, 30, 99, 0.3)';
      ctx.strokeStyle = '#E91E63';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#9C27B0';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      const radarScores = {
        "인물파악": convertToRadarScore(categoryScores["인물파악"]),
        "내용일치": convertToRadarScore(categoryScores["내용일치"]),
        "내용구조": convertToRadarScore(categoryScores["내용구조"]),
        "내용어휘": convertToRadarScore(categoryScores["내용어휘"]),
        "내용추론": convertToRadarScore(categoryScores["내용추론"])
      };

      const totalRadarScore = Object.values(radarScores).reduce((a, b) => a + b, 0);
      const totalScore100 = totalRadarScore * 2;

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 관문평가 완료! 🎊</h2>
          <p>
            10개의 관문을 모두 완료했습니다!<br>
            '자석' 이야기를 잘 이해하셨네요.
          </p>

          <div class="radar-container">
            <canvas id="radarCanvas" width="280" height="280"></canvas>
          </div>

          <div class="score-summary">
            <h3>📊 영역별 점수 (각 10점 만점)</h3>
            <div class="score-item">
              <span class="category">👤 인물파악</span>
              <span class="score">${radarScores["인물파악"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">✅ 내용일치</span>
              <span class="score">${radarScores["내용일치"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🏗️ 내용구조</span>
              <span class="score">${radarScores["내용구조"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">📚 내용어휘</span>
              <span class="score">${radarScores["내용어휘"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🔍 내용추론</span>
              <span class="score">${radarScores["내용추론"]} / 10</span>
            </div>
            <div class="score-item" style="border-top: 2px solid #E91E63; margin-top: 10px; padding-top: 15px;">
              <span class="category" style="font-size: 18px;">총점</span>
              <span class="score" style="font-size: 22px; color: #9C27B0;">${totalScore100}점</span>
            </div>
          </div>

          <button class="back-btn" onclick="goBack()">
            ← 목록으로 돌아가기
          </button>
          <button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">
            🔄 다시 풀기
          </button>
        </div>
      `;

      setTimeout(() => {
        drawRadarChart(radarScores);
      }, 100);

      saveQuizResult(radarScores, totalScore100);

      if (window.parent !== window) {
        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'physics08',
          season: getSeasonFromUrl(),
          scores: radarScores,
          totalScore: totalScore100
        }, '*');
      }
    }

    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season2';
    }

    async function saveQuizResult(scores, totalScore) {
      try {
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'physics08',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
