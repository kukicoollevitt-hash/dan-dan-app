<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작물리10 퀴즈 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Gmarket Sans", "Noto Sans KR", sans-serif; background: url('/images/창작도서/창작물리10/00.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
    body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .quiz-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; max-width: 750px; width: 100%; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out; position: relative; z-index: 1; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #00BCD4; font-weight: 600; background: linear-gradient(135deg, #00BCD4 0%, #009688 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .quiz-header .category-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, #00BCD4 0%, #009688 100%); color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #00BCD4 0%, #009688 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #00BCD4; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: white; border: 2px solid #e0e0e0; padding: 20px 25px; border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer; transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5; }
    .option-btn:hover { border-color: #00BCD4; background: #e0f7fa; transform: translateX(5px); }
    .option-btn.selected { border-color: #00BCD4; background: linear-gradient(135deg, #00BCD4 0%, #009688 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #00BCD4 0%, #009688 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 188, 212, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #00BCD4; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #00BCD4; }
    .back-btn { background: white; border: 2px solid #00BCD4; color: #00BCD4; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #00BCD4; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) { .quiz-container { padding: 30px 20px; } .quiz-header h1 { font-size: 24px; } .question-text { font-size: 17px; } .option-btn { font-size: 15px; padding: 15px 20px; } }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "파동 우체국에서 에너지를 전달하는 주인공 배달부는?", options: ["물결이", "웨이브", "진동이", "펄스"], correct: 1 },
      { gate: 2, category: "인물파악", question: "파동의 원리를 설명해주는 현명한 안내자는?", options: ["웨이브 국장", "진동 박사", "파장 선생님", "주기 아저씨"], correct: 0 },
      { gate: 3, category: "내용일치", question: "파동이 전달하는 것은 무엇인가요?", options: ["물질", "에너지", "공기", "색깔"], correct: 1 },
      { gate: 4, category: "내용일치", question: "파동에서 가장 높은 곳을 무엇이라 하나요?", options: ["골", "마루", "진폭", "파장"], correct: 1 },
      { gate: 5, category: "내용구조", question: "파동의 한 주기 동안 파동이 이동한 거리를 무엇이라 하나요?", options: ["진폭", "주기", "파장", "진동수"], correct: 2 },
      { gate: 6, category: "내용구조", question: "1초에 파동이 몇 번 진동하는지 나타내는 것은?", options: ["파장", "진폭", "진동수", "주기"], correct: 2 },
      { gate: 7, category: "내용어휘", question: "'진폭'의 의미로 올바른 것은?", options: ["파동이 1초에 진동하는 횟수", "파동의 가장 높은 곳과 평형점 사이의 거리", "파동이 한 번 진동하는 데 걸리는 시간", "파동이 이동하는 속도"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'횡파'의 특징으로 올바른 것은?", options: ["진동 방향과 파동 진행 방향이 같다", "진동 방향과 파동 진행 방향이 수직이다", "물질을 이동시킨다", "진공에서만 전달된다"], correct: 1 },
      { gate: 9, category: "내용추론", question: "소리가 물속에서 공기보다 빠르게 전달되는 이유는?", options: ["물이 더 가볍기 때문에", "물 분자가 더 촘촘하기 때문에", "공기가 더 무겁기 때문에", "소리가 물을 좋아하기 때문에"], correct: 1 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["파동은 위험하다", "에너지는 파동을 통해 전달되며 물질은 그 자리에 있다", "물질이 이동해야 에너지가 전달된다", "파동은 진공에서만 전달된다"], correct: 1 }
    ];

    // 시즌2 (5~6학년 수준) - 표현 약간 어렵게
    const quizDataSeason2 = [
      { gate: 1, category: "인물파악", question: "파동 우체국에서 에너지를 전달하는 주인공 배달부는?", options: ["물결이", "웨이브", "진동이", "펄스"], correct: 1 },
      { gate: 2, category: "인물파악", question: "파동의 원리를 설명해주는 현명한 안내자는?", options: ["웨이브 국장", "진동 박사", "파장 선생님", "주기 아저씨"], correct: 0 },
      { gate: 3, category: "내용일치", question: "파동이 전달하는 것은 무엇입니까?", options: ["물질", "에너지", "공기", "색깔"], correct: 1 },
      { gate: 4, category: "내용일치", question: "파동에서 가장 높은 곳을 무엇이라 합니까?", options: ["골", "마루", "진폭", "파장"], correct: 1 },
      { gate: 5, category: "내용구조", question: "파동의 한 주기 동안 파동이 이동한 거리를 무엇이라 합니까?", options: ["진폭", "주기", "파장", "진동수"], correct: 2 },
      { gate: 6, category: "내용구조", question: "1초에 파동이 몇 번 진동하는지 나타내는 것은?", options: ["파장", "진폭", "진동수", "주기"], correct: 2 },
      { gate: 7, category: "내용어휘", question: "'진폭'의 의미로 올바른 것은?", options: ["파동이 1초에 진동하는 횟수", "파동의 가장 높은 곳과 평형점 사이의 거리", "파동이 한 번 진동하는 데 걸리는 시간", "파동이 이동하는 속도"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'횡파'의 특징으로 올바른 것은?", options: ["진동 방향과 파동 진행 방향이 같다", "진동 방향과 파동 진행 방향이 수직이다", "물질을 이동시킨다", "진공에서만 전달된다"], correct: 1 },
      { gate: 9, category: "내용추론", question: "소리가 물속에서 공기보다 빠르게 전달되는 이유는?", options: ["물이 더 가볍기 때문에", "물 분자가 더 촘촘하기 때문에", "공기가 더 무겁기 때문에", "소리가 물을 좋아하기 때문에"], correct: 1 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["파동은 위험하다", "에너지는 파동을 통해 전달되며 물질은 그 자리에 있다", "물질이 이동해야 에너지가 전달된다", "파동은 진공에서만 전달된다"], correct: 1 }
    ];

    // 시즌3 (중1~2 수준) - 표현 더 어렵게
    const quizDataSeason3 = [
      { gate: 1, category: "인물파악", question: "파동 우체국에서 에너지를 전달하는 주인공 배달부는?", options: ["물결이", "웨이브", "진동이", "펄스"], correct: 1 },
      { gate: 2, category: "인물파악", question: "파동의 원리를 설명해주는 현명한 안내자는?", options: ["웨이브 국장", "진동 박사", "파장 선생님", "주기 아저씨"], correct: 0 },
      { gate: 3, category: "내용일치", question: "파동이 전달하는 것은 무엇인가?", options: ["물질", "에너지", "공기", "색깔"], correct: 1 },
      { gate: 4, category: "내용일치", question: "파동에서 가장 높은 곳을 무엇이라 하는가?", options: ["골", "마루", "진폭", "파장"], correct: 1 },
      { gate: 5, category: "내용구조", question: "파동의 한 주기 동안 파동이 이동한 거리를 무엇이라 하는가?", options: ["진폭", "주기", "파장", "진동수"], correct: 2 },
      { gate: 6, category: "내용구조", question: "1초에 파동이 몇 번 진동하는지 나타내는 것은?", options: ["파장", "진폭", "진동수", "주기"], correct: 2 },
      { gate: 7, category: "내용어휘", question: "'진폭'의 의미로 올바른 것은?", options: ["파동이 1초에 진동하는 횟수", "파동의 가장 높은 곳과 평형점 사이의 거리", "파동이 한 번 진동하는 데 걸리는 시간", "파동이 이동하는 속도"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'횡파'의 특징으로 올바른 것은?", options: ["진동 방향과 파동 진행 방향이 같다", "진동 방향과 파동 진행 방향이 수직이다", "물질을 이동시킨다", "진공에서만 전달된다"], correct: 1 },
      { gate: 9, category: "내용추론", question: "소리가 물속에서 공기보다 빠르게 전달되는 이유는?", options: ["물이 더 가볍기 때문에", "물 분자가 더 촘촘하기 때문에", "공기가 더 무겁기 때문에", "소리가 물을 좋아하기 때문에"], correct: 1 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["파동은 위험하다", "에너지는 파동을 통해 전달되며 물질은 그 자리에 있다", "물질이 이동해야 에너지가 전달된다", "파동은 진공에서만 전달된다"], correct: 1 }
    ];

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];
      container.innerHTML = `
        <div class="quiz-header"><h1>🌊 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div>
        <div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div>
        <div class="question-box"><p class="question-text">${quiz.question}</p></div>
        <div class="options-container">${quiz.options.map((option, index) => `<button class="option-btn" onclick="selectAnswer(${index})">${index + 1}. ${option}</button>`).join('')}</div>
        <button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;
      document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
      document.querySelectorAll('.option-btn')[index].classList.add('selected');
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.disabled = true);
      document.querySelector('.submit-btn').disabled = true;
      const isCorrect = selectedAnswer === quiz.correct;
      if (isCorrect) { categoryScores[quiz.category]++; buttons[selectedAnswer].classList.add('correct'); }
      else { buttons[selectedAnswer].classList.add('wrong'); buttons[quiz.correct].classList.add('correct'); }
      showResult(isCorrect);
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');
      const resultMsg = document.createElement('div');
      resultMsg.className = isCorrect ? 'result-message correct' : 'result-message wrong';
      resultMsg.innerHTML = isCorrect ? '🎉 정답입니다! 다음 관문으로 이동합니다...' : '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      container.insertBefore(resultMsg, container.firstChild);
      setTimeout(() => { currentGate++; selectedAnswer = null; currentGate >= quizData.length ? showCongratulations() : renderQuiz(); }, 1500);
    }

    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }

    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas'), ctx = canvas.getContext('2d');
      const centerX = 140, centerY = 140, maxRadius = 100;
      const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
      [1, 0.5, 0.1].forEach(ratio => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const angle = angles[i % 5], x = centerX + Math.cos(angle) * maxRadius * ratio, y = centerY + Math.sin(angle) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); });
      ctx.strokeStyle = '#d0d0d0'; angles.forEach(angle => { ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius); ctx.stroke(); });
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath(); ctx.fillStyle = 'rgba(0, 188, 212, 0.3)'; ctx.strokeStyle = '#00BCD4'; ctx.lineWidth = 2;
      categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#009688'; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill(); });
      ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px "Noto Sans KR", sans-serif'; ctx.textAlign = 'center';
      const labelOffset = 18; categories.forEach((label, i) => { const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset), y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset); ctx.fillText(label, x, y + 4); });
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');
      const radarScores = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) };
      const totalScore100 = Object.values(radarScores).reduce((a, b) => a + b, 0) * 2;
      container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>10개의 관문을 모두 완료했습니다!<br>'파동' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수 (각 10점 만점)</h3><div class="score-item"><span class="category">👤 인물파악</span><span class="score">${radarScores["인물파악"]} / 10</span></div><div class="score-item"><span class="category">✅ 내용일치</span><span class="score">${radarScores["내용일치"]} / 10</span></div><div class="score-item"><span class="category">🏗️ 내용구조</span><span class="score">${radarScores["내용구조"]} / 10</span></div><div class="score-item"><span class="category">📚 내용어휘</span><span class="score">${radarScores["내용어휘"]} / 10</span></div><div class="score-item"><span class="category">🔍 내용추론</span><span class="score">${radarScores["내용추론"]} / 10</span></div><div class="score-item" style="border-top: 2px solid #00BCD4; margin-top: 10px; padding-top: 15px;"><span class="category" style="font-size: 18px;">총점</span><span class="score" style="font-size: 22px; color: #009688;">${totalScore100}점</span></div></div><button class="back-btn" onclick="goBack()">← 목록으로 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">🔄 다시 풀기</button></div>`;
      setTimeout(() => drawRadarChart(radarScores), 100);
      saveQuizResult(radarScores, totalScore100);
      if (window.parent !== window) window.parent.postMessage({ action: 'quizComplete', storyId: 'physics10', season: getSeasonFromUrl(), scores: radarScores, totalScore: totalScore100 }, '*');
    }

    function getSeasonFromUrl() { return new URLSearchParams(window.location.search).get('season') || 'season2'; }
    async function saveQuizResult(scores, totalScore) { try { const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}'); if (!userInfo.grade || !userInfo.name) return; await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: userInfo.grade, name: userInfo.name, storyId: 'physics10', season: getSeasonFromUrl(), scores, totalScore }) }); } catch (err) { console.error('[saveQuizResult] 오류:', err); } }
    function goBack() { window.parent !== window ? window.parent.postMessage({ action: 'closeStory' }, '*') : window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) goBack(); });
  </script>
</body>
</html>
