<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작물리14 퀴즈 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Gmarket Sans", "Noto Sans KR", sans-serif; background: url('/images/창작도서/창작물리14/00.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
    body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .quiz-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; max-width: 750px; width: 100%; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out; position: relative; z-index: 1; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #FF5722; font-weight: 600; background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .quiz-header .category-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%); color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #FF5722 0%, #E64A19 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #FF5722; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: white; border: 2px solid #e0e0e0; padding: 20px 25px; border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer; transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5; }
    .option-btn:hover { border-color: #FF5722; background: #fbe9e7; transform: translateX(5px); }
    .option-btn.selected { border-color: #FF5722; background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255, 87, 34, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #FF5722; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #FF5722; }
    .back-btn { background: white; border: 2px solid #FF5722; color: #FF5722; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #FF5722; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) { .quiz-container { padding: 30px 20px; } .quiz-header h1 { font-size: 24px; } .question-text { font-size: 17px; } .option-btn { font-size: 15px; padding: 15px 20px; } }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "열의 비밀을 알려주는 춤추는 분자 소녀는?", options: ["써모", "몰리", "히트플로", "페이즈"], correct: 1 },
      { gate: 2, category: "인물파악", question: "열의 여행자로 뜨거운 곳에서 차가운 곳으로 이동하는 캐릭터는?", options: ["몰리", "써모", "히트플로", "비열"], correct: 2 },
      { gate: 3, category: "내용일치", question: "열이 전달되는 방향은?", options: ["차가운 곳에서 뜨거운 곳으로", "뜨거운 곳에서 차가운 곳으로", "무작위 방향으로", "위에서 아래로만"], correct: 1 },
      { gate: 4, category: "내용일치", question: "분자가 빠르게 움직이면 온도가 어떻게 되나요?", options: ["낮아진다", "높아진다", "변하지 않는다", "사라진다"], correct: 1 },
      { gate: 5, category: "내용구조", question: "열이 전달되는 세 가지 방법이 아닌 것은?", options: ["전도", "대류", "복사", "반사"], correct: 3 },
      { gate: 6, category: "내용구조", question: "냄비 손잡이를 플라스틱으로 만드는 이유는?", options: ["디자인이 예쁘고 보기 좋아서", "열을 잘 전달하지 않아서", "무게가 가벼워서 편리해서", "생산 비용이 싸서 경제적이라서"], correct: 1 },
      { gate: 7, category: "내용어휘", question: "'전도'의 의미로 올바른 것은?", options: ["물질이 이동하며 열을 전달", "접촉하여 열을 전달", "빛으로 열을 전달", "소리로 열을 전달"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'비열'의 의미로 올바른 것은?", options: ["물질이 열을 싫어하는 성질", "물질 1g의 온도를 1도 올리는 데 필요한 열량", "열이 전달되는 빠르기인 속도", "물질이 얼마나 차가운지 나타내는 정도"], correct: 1 },
      { gate: 9, category: "내용추론", question: "바다 근처가 여름에 덜 덥고 겨울에 덜 추운 이유는?", options: ["해안가에서는 바람이 많이 불어서 시원함", "물의 비열이 커서 온도 변화가 느리기 때문에", "해안가 지역에는 산이 없어서 그늘이 없음", "구름이 많아서 태양이 덜 비춰서 온도가 일정함"], correct: 1 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["열은 조심하지 않으면 위험하다", "보이지 않는 분자들의 춤이 세상의 모든 따뜻함을 만든다", "차가운 것이 뜨거운 것보다 좋다", "열은 한 곳에서 다른 곳으로 전달되지 않는다"], correct: 1 }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      { gate: 1, category: "인물파악", question: "몰리가 열의 비밀을 알려줄 수 있는 이유는?", options: ["나이가 많기 기 때문이다", "분자로서 열에너지에 따라 움직이는 것을 직접 보여줄 수 있어서", "키가 크고 덩치가 좋아서", "노래를 잘하기 기 때문이다"], correct: 1 },
      { gate: 2, category: "인물파악", question: "히트플로가 뜨거운 곳에서 차가운 곳으로만 이동하는 이유는?", options: ["차가운 곳이 좋기 때문에", "열은 항상 온도가 높은 곳에서 낮은 곳으로 흐르기 때문에", "명령을 받기 기 때문이다", "오랜 습관이기 기 때문이다"], correct: 1 },
      { gate: 3, category: "내용일치", question: "뜨거운 물체를 만지면 손이 뜨거워지는 원리는?", options: ["손이 약하기 기 때문이다", "열이 온도가 높은 물체에서 손으로 전도되기 때문에", "손에서 열에너지가 나서", "물체가 손을 미워하기 때문에"], correct: 1 },
      { gate: 4, category: "내용일치", question: "온도가 높아지면 분자가 더 빨리 움직이는 이유는?", options: ["분자들이 신나게 움직여서", "온도는 분자의 운동 에너지를 나타내기 때문에", "공기가 밀기 기 때문이다", "지구의 중력이 작용하기 때문에"], correct: 1 },
      { gate: 5, category: "내용구조", question: "난로 위 공기가 위로 올라가는 열 전달 방식은?", options: ["전도", "대류", "복사", "반사"], correct: 1 },
      { gate: 6, category: "내용구조", question: "태양열이 지구까지 전달되는 열 전달 방식은?", options: ["전도 - 접촉해서", "대류 - 공기로", "복사 - 빛(전자기파)으로", "반사 - 튕겨서"], correct: 2 },
      { gate: 7, category: "내용어휘", question: "'전도'와 '대류'의 차이점은?", options: ["둘 다 같은 방식으로 작동한다", "전도는 접촉으로 열이 전달되고, 대류는 물질이 이동하며 열을 전달한다", "열의 대류 현상이 더 뜨겁다", "열의 전도 현상만 느껴진다"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "물의 비열이 크다는 것이 의미하는 바는?", options: ["물의 성질 때문에 뜨거워서", "같은 열을 받아도 물의 온도 변화가 작다는 것", "물이 무게가 너무 무겁기 때문에", "물이 투명하기 기 때문이다"], correct: 1 },
      { gate: 9, category: "내용추론", question: "사막이 낮에 매우 덥고 밤에 매우 추운 이유는?", options: ["태양과 가까이 있기 때문에", "모래의 비열이 작아서 온도 변화가 크기 때문에", "바람이 안 불기 때문에", "구름이 없기 때문이다"], correct: 1 },
      { gate: 10, category: "내용추론", question: "보온병이 음료를 오래 따뜻하게 유지하는 원리는?", options: ["신비로운 마법의 힘 때문에", "진공층으로 전도와 대류를 막고, 반사면으로 복사를 막아서", "책의 두께가 매우 두꺼워서", "뚜껑이 있기 기 때문이다"], correct: 1 }
    ];

    // 시즌3 (중1~2 수준) - 표현 더 어렵게
    const quizDataSeason3 = [
      { gate: 1, category: "인물파악", question: "열의 비밀을 알려주는 춤추는 분자 소녀는?", options: ["써모", "몰리", "히트플로", "페이즈"], correct: 1 },
      { gate: 2, category: "인물파악", question: "열의 여행자로 뜨거운 곳에서 차가운 곳으로 이동하는 캐릭터는?", options: ["몰리", "써모", "히트플로", "비열"], correct: 2 },
      { gate: 3, category: "내용일치", question: "열이 전달되는 방향은?", options: ["차가운 곳에서 뜨거운 곳으로", "뜨거운 곳에서 차가운 곳으로", "무작위 방향으로", "위에서 아래로만"], correct: 1 },
      { gate: 4, category: "내용일치", question: "분자가 빠르게 움직이면 온도가 어떻게 되나요?", options: ["낮아진다", "높아진다", "변하지 않는다", "사라진다"], correct: 1 },
      { gate: 5, category: "내용구조", question: "열이 전달되는 세 가지 방법이 아닌 것은?", options: ["전도", "대류", "복사", "반사"], correct: 3 },
      { gate: 6, category: "내용구조", question: "냄비 손잡이를 플라스틱으로 만드는 이유는?", options: ["디자인이 예쁘고 보기 좋아서", "열을 잘 전달하지 않아서", "무게가 가벼워서 편리해서", "생산 비용이 싸서 경제적이라서"], correct: 1 },
      { gate: 7, category: "내용어휘", question: "'전도'의 의미로 올바른 것은?", options: ["물질이 이동하며 열을 전달", "접촉하여 열을 전달", "빛으로 열을 전달", "소리로 열을 전달"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'비열'의 의미로 올바른 것은?", options: ["물질이 열을 싫어하는 성질", "물질 1g의 온도를 1도 올리는 데 필요한 열량", "열이 전달되는 빠르기인 속도", "물질이 얼마나 차가운지 나타내는 정도"], correct: 1 },
      { gate: 9, category: "내용추론", question: "바다 근처가 여름에 덜 덥고 겨울에 덜 추운 이유는?", options: ["해안가에서는 바람이 많이 불어서 시원함", "물의 비열이 커서 온도 변화가 느리기 때문에", "해안가 지역에는 산이 없어서 그늘이 없음", "구름이 많아서 태양이 덜 비춰서 온도가 일정함"], correct: 1 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["열은 조심하지 않으면 위험하다", "보이지 않는 분자들의 춤이 세상의 모든 따뜻함을 만든다", "차가운 것이 뜨거운 것보다 좋다", "열은 한 곳에서 다른 곳으로 전달되지 않는다"], correct: 1 }
    ];

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };

    function renderQuiz() { const container = document.getElementById('quizContainer'); const quiz = quizData[currentGate]; container.innerHTML = `<div class="quiz-header"><h1>🔥 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div><div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div><div class="question-box"><p class="question-text">${quiz.question}</p></div><div class="options-container">${quiz.options.map((option, index) => `<button class="option-btn" onclick="selectAnswer(${index})">${index + 1}. ${option}</button>`).join('')}</div><button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>`; }
    function selectAnswer(index) { selectedAnswer = index; document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected')); document.querySelectorAll('.option-btn')[index].classList.add('selected'); document.querySelector('.submit-btn').disabled = false; }
    function submitAnswer() { const quiz = quizData[currentGate]; const buttons = document.querySelectorAll('.option-btn'); buttons.forEach(btn => btn.disabled = true); document.querySelector('.submit-btn').disabled = true; const isCorrect = selectedAnswer === quiz.correct; if (isCorrect) { categoryScores[quiz.category]++; buttons[selectedAnswer].classList.add('correct'); } else { buttons[selectedAnswer].classList.add('wrong'); buttons[quiz.correct].classList.add('correct'); } showResult(isCorrect); }
    function showResult(isCorrect) { const container = document.getElementById('quizContainer'); const resultMsg = document.createElement('div'); resultMsg.className = isCorrect ? 'result-message correct' : 'result-message wrong'; resultMsg.innerHTML = isCorrect ? '🎉 정답입니다! 다음 관문으로 이동합니다...' : '❌ 틀렸습니다. 다음 관문으로 이동합니다...'; container.insertBefore(resultMsg, container.firstChild); setTimeout(() => { currentGate++; selectedAnswer = null; currentGate >= quizData.length ? showCongratulations() : renderQuiz(); }, 1500); }
    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }
    function drawRadarChart(scores) { const canvas = document.getElementById('radarCanvas'), ctx = canvas.getContext('2d'); const centerX = 140, centerY = 140, maxRadius = 100; const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2); ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1; [1, 0.5, 0.1].forEach(ratio => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const angle = angles[i % 5], x = centerX + Math.cos(angle) * maxRadius * ratio, y = centerY + Math.sin(angle) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); }); ctx.strokeStyle = '#d0d0d0'; angles.forEach(angle => { ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius); ctx.stroke(); }); const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론']; ctx.beginPath(); ctx.fillStyle = 'rgba(255, 87, 34, 0.3)'; ctx.strokeStyle = '#FF5722'; ctx.lineWidth = 2; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#E64A19'; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill(); }); ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px "Noto Sans KR", sans-serif'; ctx.textAlign = 'center'; const labelOffset = 18; categories.forEach((label, i) => { const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset), y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset); ctx.fillText(label, x, y + 4); }); }
    function showCongratulations() { const container = document.getElementById('quizContainer'); const radarScores = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) }; const totalScore100 = Object.values(radarScores).reduce((a, b) => a + b, 0) * 2; container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>10개의 관문을 모두 완료했습니다!<br>'열' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수 (각 10점 만점)</h3><div class="score-item"><span class="category">👤 인물파악</span><span class="score">${radarScores["인물파악"]} / 10</span></div><div class="score-item"><span class="category">✅ 내용일치</span><span class="score">${radarScores["내용일치"]} / 10</span></div><div class="score-item"><span class="category">🏗️ 내용구조</span><span class="score">${radarScores["내용구조"]} / 10</span></div><div class="score-item"><span class="category">📚 내용어휘</span><span class="score">${radarScores["내용어휘"]} / 10</span></div><div class="score-item"><span class="category">🔍 내용추론</span><span class="score">${radarScores["내용추론"]} / 10</span></div><div class="score-item" style="border-top: 2px solid #FF5722; margin-top: 10px; padding-top: 15px;"><span class="category" style="font-size: 18px;">총점</span><span class="score" style="font-size: 22px; color: #E64A19;">${totalScore100}점</span></div></div><button class="back-btn" onclick="goBack()">← 목록으로 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">🔄 다시 풀기</button></div>`; setTimeout(() => drawRadarChart(radarScores), 100); saveQuizResult(radarScores, totalScore100); if (window.parent !== window) window.parent.postMessage({ action: 'quizComplete', storyId: 'physics14', season: getSeasonFromUrl(), scores: radarScores, totalScore: totalScore100 }, '*'); }
    function getSeasonFromUrl() { return new URLSearchParams(window.location.search).get('season') || 'season2'; }
    async function saveQuizResult(scores, totalScore) { try { const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}'); if (!userInfo.grade || !userInfo.name) return; await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: userInfo.grade, name: userInfo.name, storyId: 'physics14', season: getSeasonFromUrl(), scores, totalScore }) }); } catch (err) { console.error('[saveQuizResult] 오류:', err); } }
    function goBack() { window.parent !== window ? window.parent.postMessage({ action: 'closeStory' }, '*') : window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) goBack(); });
  </script>
