<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작물리16 퀴즈 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Gmarket Sans", "Noto Sans KR", sans-serif; background: url('/images/창작도서/창작물리16/00.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
    body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .quiz-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; max-width: 750px; width: 100%; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out; position: relative; z-index: 1; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #9C27B0; font-weight: 600; background: linear-gradient(135deg, #9C27B0 0%, #FFD600 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .quiz-header .category-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, #9C27B0 0%, #FFD600 100%); color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #9C27B0 0%, #FFD600 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #9C27B0; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: white; border: 2px solid #e0e0e0; padding: 20px 25px; border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer; transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5; }
    .option-btn:hover { border-color: #9C27B0; background: #f3e5f5; transform: translateX(5px); }
    .option-btn.selected { border-color: #9C27B0; background: linear-gradient(135deg, #9C27B0 0%, #FFD600 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #9C27B0 0%, #FFD600 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(156, 39, 176, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #9C27B0; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #9C27B0; }
    .back-btn { background: white; border: 2px solid #9C27B0; color: #9C27B0; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #9C27B0; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) { .quiz-container { padding: 30px 20px; } .quiz-header h1 { font-size: 24px; } .question-text { font-size: 17px; } .option-btn { font-size: 15px; padding: 15px 20px; } }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    // 시즌1 (3~4학년 수준) - 기본 이해
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "원자핵 안에 살며 (+) 전하를 가진 씩씩한 용사 캐릭터는?", options: ["양성이", "전자 때문", "중성이", "쿼크"], correct: 0 },
      { gate: 2, category: "인물파악", question: "전하가 없고 양성이와 함께 핵의 안정성을 담당하는 캐릭터는?", options: ["양성이", "전자", "중성이", "글루온"], correct: 2 },
      { gate: 3, category: "내용일치", question: "원자에 양성자가 몇 개 있느냐에 따라 결정되는 것은?", options: ["원자의 크기", "원자가 무슨 원소인지", "전자의 속도", "원자의 색깔"], correct: 1 },
      { gate: 4, category: "내용일치", question: "양성자가 6개인 원소는 무엇인가요?", options: ["수소", "산소", "금(금속)", "탄소"], correct: 3 },
      { gate: 5, category: "내용구조", question: "톰슨 박사가 처음 생각한 원자 모델은 무엇과 비슷했나요?", options: ["태양계", "축구공", "건포도 푸딩", "구름"], correct: 2 },
      { gate: 6, category: "내용구조", question: "러더퍼드의 금박 실험으로 알아낸 것은?", options: ["원자 중심에 작고 무거운 핵이 있다는 것", "전자가 존재한다는 사실", "중성자가 존재한다는 사실", "쿼크가 존재한다는 사실"], correct: 0 },
      { gate: 7, category: "내용어휘", question: "'원자번호'란 무엇을 말하나요?", options: ["전자의 개수 때문", "쿼크의 개수", "중성자의 개수", "양성자의 개수"], correct: 3 },
      { gate: 8, category: "내용어휘", question: "'동위원소'란 무엇인가요?", options: ["양성자 수가 다른 원소", "중성자 수가 다른 같은 원소", "전자가 없는 원소", "핵이 없는 원소"], correct: 1 },
      { gate: 9, category: "내용추론", question: "금속이 전기를 잘 통하는 이유는?", options: ["자유 전자가 자유롭게 움직여서", "양성자가 많이 있기 때문에", "원자핵의 크기가 커서 그래서", "원자 안에 중성자가 없어서"], correct: 0 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["원자는 항상 위험하고 조심해야 한다", "원자는 맨눈으로 직접 관찰할 수 있다", "원자는 어떤 상황에서도 영원히 변하지 않는다", "우주의 모든 것은 원자로 이루어져 있고 서로 연결되어 있다"], correct: 3 }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      { gate: 1, category: "인물파악", question: "양성이(양성자)가 원소의 정체성을 결정하는 이유는?", options: ["가장 무거워서", "양성자 수가 원자번호이고 원소의 종류를 결정하기 때문에", "전하가 없어서", "가장 빨라서"], correct: 1 },
      { gate: 2, category: "인물파악", question: "중성이(중성자)가 원자핵에서 중요한 역할을 하는 이유는?", options: ["전하를 가져서", "양성자들 사이의 척력을 완화하고 핵을 안정시켜서", "전자를 끌어당겨서", "색깔을 내서"], correct: 1 },
      { gate: 3, category: "내용일치", question: "러더퍼드가 톰슨의 푸딩 모델이 틀렸다고 증명한 실험은?", options: ["전자 발견 실험", "금박 실험", "중성자 발견 실험", "쿼크 분리 실험"], correct: 1 },
      { gate: 4, category: "내용일치", question: "전자가 정확한 위치와 속도를 동시에 알 수 없는 원리는?", options: ["에너지 보존 법칙", "하이젠베르크의 불확정성 원리", "뉴턴의 운동 법칙", "아르키메데스 원리"], correct: 1 },
      { gate: 5, category: "내용구조", question: "현대 주기율표에서 같은 '족'에 있는 원소들의 공통점은?", options: ["원자 크기가 같다", "비슷한 화학적 성질을 가진다", "전자 수가 같다", "색깔이 같다"], correct: 1 },
      { gate: 6, category: "내용구조", question: "이온 결합과 공유 결합의 차이점은?", options: ["둘 다 전자를 버린다", "이온 결합은 전자를 주고받고, 공유 결합은 전자를 함께 나눈다", "둘 다 같은 방식이다", "공유 결합만 실제로 존재한다"], correct: 1 },
      { gate: 7, category: "내용어휘", question: "'강한 핵력'이란 무엇인가요?", options: ["전자를 끌어당기는 힘", "양성자와 중성자를 묶어주는 매우 강한 힘", "원자들을 밀어내는 힘", "빛을 내는 힘"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'이온'이 되는 것은 어떤 변화인가요?", options: ["양성자 수가 변하는 것", "전자 수가 변해 전하를 띠게 되는 것", "중성자가 사라지는 것", "핵이 분열하는 것"], correct: 1 },
      { gate: 9, category: "내용추론", question: "우리 몸의 탄소 원자가 별에서 왔다는 말의 의미는?", options: ["외계인이 만들었다", "별 내부의 핵융합으로 원소가 만들어지고 퍼졌기 때문이다", "지구가 별이었다", "탄소는 반짝여서"], correct: 1 },
      { gate: 10, category: "내용추론", question: "쿼크가 절대 혼자 존재할 수 없는 이유와 관련된 힘은?", options: ["전자기력", "중력", "강한 핵력(글루온)", "약한 핵력"], correct: 2 }
    ];

    // 시즌3 (중1~2 수준) - 심화 개념
    const quizDataSeason3 = [
      { gate: 1, category: "인물파악", question: "양성자의 구성 요소인 쿼크의 조합으로 올바른 것은?", options: ["업 쿼크 2개 + 다운 쿼크 1개", "업 쿼크 3개로만 구성되어 있다 함이다", "다운 쿼크 3개로만 구성되어 있다", "업 쿼크 1개 + 다운 쿼크 2개"], correct: 0 },
      { gate: 2, category: "인물파악", question: "보어 모델에서 전자가 특정 에너지 준위에서만 존재한다는 개념을 무엇이라 하는가?", options: ["연속성 개념으로 인한 영향", "불확정성 원리", "양자화 개념", "상대성 이론으로 인한 영향"], correct: 2 },
      { gate: 3, category: "내용일치", question: "원자핵의 질량수를 구하는 방법은?", options: ["양성자 수만 센다", "양성자 수 + 중성자 수", "전자 수만 센다", "양성자 수 - 중성자 수"], correct: 1 },
      { gate: 4, category: "내용일치", question: "현대 양자역학에서 전자의 위치를 설명하는 개념은?", options: ["정확하게 예측 가능한 궤도(개념)", "직선으로 이동하는 운동(항목)", "항상 고정되어 있는 점(내용)", "확률 분포(오비탈/전자 구름)"], correct: 3 },
      { gate: 5, category: "내용구조", question: "주기율표에서 1족 원소들의 공통적인 화학적 성질은?", options: ["물과 반응하지 않는다", "상온에서 기체 상태이다", "물과 격렬하게 반응한다", "색깔이 모두 노랗다"], correct: 2 },
      { gate: 6, category: "내용구조", question: "이온 결합 물질의 특성으로 올바른 것은?", options: ["용융되거나 물에 녹으면 전기가 통한다", "고체 상태에서도 전기가 잘 통한다", "녹는점이 상당히 낮은 편에 속한다", "항상 기체 상태로만 존재하게 된다"], correct: 0 },
      { gate: 7, category: "내용어휘", question: "'전자 껍질'과 '오비탈'의 관계로 올바른 것은?", options: ["둘은 완전히 같은 의미이다", "서로 관련이 전혀 없다 하게 됨", "오비탈 안에 전자 껍질이 있다", "전자 껍질 안에 여러 오비탈이 있다"], correct: 3 },
      { gate: 8, category: "내용어휘", question: "금속의 '연성'과 '전성'의 의미로 올바른 것은?", options: ["부서지기 쉬운 성질을 의미함", "연성은 늘어나는 성질, 전성은 펴지는 성질", "전기가 통하는 성질을 의미함", "빛을 반사하는 성질을 의미함"], correct: 1 },
      { gate: 9, category: "내용추론", question: "물이 극성 분자여서 많은 물질을 녹일 수 있는 이유는?", options: ["물 분자의 전하 분포가 불균일하여 다른 물질과 상호작용하기 때문", "물 분자의 크기가 상대적으로 크기 때문", "물의 온도가 항상 높게 유지되기 때문", "물이 투명한 성질을 가지고 있기 때문"], correct: 0 },
      { gate: 10, category: "내용추론", question: "항성 핵합성을 통해 무거운 원소가 우주에 퍼진 과정은?", options: ["빅뱅 직후에 바로 생성되어 퍼졌다", "인간이 인공적으로 만들어서 퍼졌다", "지구 내부에서 생성되어 우주로 퍼졌다", "별 내부 핵융합 + 초신성 폭발"], correct: 3 }
    ];

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };

    function renderQuiz() { const container = document.getElementById('quizContainer'); const quiz = quizData[currentGate]; container.innerHTML = `<div class="quiz-header"><h1>✨ 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div><div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div><div class="question-box"><p class="question-text">${quiz.question}</p></div><div class="options-container">${quiz.options.map((option, index) => `<button class="option-btn" onclick="selectAnswer(${index})">${index + 1}. ${option}</button>`).join('')}</div><button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>`; }
    function selectAnswer(index) { selectedAnswer = index; document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected')); document.querySelectorAll('.option-btn')[index].classList.add('selected'); document.querySelector('.submit-btn').disabled = false; }
    function submitAnswer() { const quiz = quizData[currentGate]; const buttons = document.querySelectorAll('.option-btn'); buttons.forEach(btn => btn.disabled = true); document.querySelector('.submit-btn').disabled = true; const isCorrect = selectedAnswer === quiz.correct; if (isCorrect) { categoryScores[quiz.category]++; buttons[selectedAnswer].classList.add('correct'); } else { buttons[selectedAnswer].classList.add('wrong'); buttons[quiz.correct].classList.add('correct'); } showResult(isCorrect); }
    function showResult(isCorrect) { const container = document.getElementById('quizContainer'); const resultMsg = document.createElement('div'); resultMsg.className = isCorrect ? 'result-message correct' : 'result-message wrong'; resultMsg.innerHTML = isCorrect ? '🎉 정답입니다! 다음 관문으로 이동합니다...' : '❌ 틀렸습니다. 다음 관문으로 이동합니다...'; container.insertBefore(resultMsg, container.firstChild); setTimeout(() => { currentGate++; selectedAnswer = null; currentGate >= quizData.length ? showCongratulations() : renderQuiz(); }, 1500); }
    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }
    function drawRadarChart(scores) { const canvas = document.getElementById('radarCanvas'), ctx = canvas.getContext('2d'); const centerX = 140, centerY = 140, maxRadius = 100; const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2); ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1; [1, 0.5, 0.1].forEach(ratio => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const angle = angles[i % 5], x = centerX + Math.cos(angle) * maxRadius * ratio, y = centerY + Math.sin(angle) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); }); ctx.strokeStyle = '#d0d0d0'; angles.forEach(angle => { ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius); ctx.stroke(); }); const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론']; ctx.beginPath(); ctx.fillStyle = 'rgba(156, 39, 176, 0.3)'; ctx.strokeStyle = '#9C27B0'; ctx.lineWidth = 2; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#FFD600'; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill(); }); ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px "Noto Sans KR", sans-serif'; ctx.textAlign = 'center'; const labelOffset = 18; categories.forEach((label, i) => { const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset), y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset); ctx.fillText(label, x, y + 4); }); }
    function showCongratulations() { const container = document.getElementById('quizContainer'); const radarScores = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) }; const totalScore100 = Object.values(radarScores).reduce((a, b) => a + b, 0) * 2; container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>10개의 관문을 모두 완료했습니다!<br>'원자 구조' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수 (각 10점 만점)</h3><div class="score-item"><span class="category">👤 인물파악</span><span class="score">${radarScores["인물파악"]} / 10</span></div><div class="score-item"><span class="category">✅ 내용일치</span><span class="score">${radarScores["내용일치"]} / 10</span></div><div class="score-item"><span class="category">🏗️ 내용구조</span><span class="score">${radarScores["내용구조"]} / 10</span></div><div class="score-item"><span class="category">📚 내용어휘</span><span class="score">${radarScores["내용어휘"]} / 10</span></div><div class="score-item"><span class="category">🔍 내용추론</span><span class="score">${radarScores["내용추론"]} / 10</span></div><div class="score-item" style="border-top: 2px solid #9C27B0; margin-top: 10px; padding-top: 15px;"><span class="category" style="font-size: 18px;">총점</span><span class="score" style="font-size: 22px; color: #FFD600;">${totalScore100}점</span></div></div><button class="back-btn" onclick="goBack()">← 목록으로 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">🔄 다시 풀기</button></div>`; setTimeout(() => drawRadarChart(radarScores), 100); saveQuizResult(radarScores, totalScore100); if (window.parent !== window) window.parent.postMessage({ action: 'quizComplete', storyId: 'physics16', season: getSeasonFromUrl(), scores: radarScores, totalScore: totalScore100 }, '*'); }
    function getSeasonFromUrl() { return new URLSearchParams(window.location.search).get('season') || 'season1'; }
    async function saveQuizResult(scores, totalScore) { try { const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}'); if (!userInfo.grade || !userInfo.name) return; await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: userInfo.grade, name: userInfo.name, storyId: 'physics16', season: getSeasonFromUrl(), scores, totalScore }) }); } catch (err) { console.error('[saveQuizResult] 오류:', err); } }
    function goBack() { window.parent !== window ? window.parent.postMessage({ action: 'closeStory' }, '*') : window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) goBack(); });
  </script>
