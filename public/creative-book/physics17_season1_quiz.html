<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작물리17 퀴즈 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Gmarket Sans", "Noto Sans KR", sans-serif; background: url('/images/창작도서/창작물리17/00.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
    body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .quiz-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; max-width: 750px; width: 100%; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out; position: relative; z-index: 1; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #0288D1; font-weight: 600; background: linear-gradient(135deg, #0288D1 0%, #4DD0E1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .quiz-header .category-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, #0288D1 0%, #4DD0E1 100%); color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #0288D1 0%, #4DD0E1 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #0288D1; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: white; border: 2px solid #e0e0e0; padding: 20px 25px; border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer; transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5; }
    .option-btn:hover { border-color: #0288D1; background: #e1f5fe; transform: translateX(5px); }
    .option-btn.selected { border-color: #0288D1; background: linear-gradient(135deg, #0288D1 0%, #4DD0E1 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #0288D1 0%, #4DD0E1 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(2, 136, 209, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #0288D1; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #0288D1; }
    .back-btn { background: white; border: 2px solid #0288D1; color: #0288D1; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #0288D1; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) { .quiz-container { padding: 30px 20px; } .quiz-header h1 { font-size: 24px; } .question-text { font-size: 17px; } .option-btn { font-size: 15px; padding: 15px 20px; } }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    // 시즌1 (3~4학년 수준) - 기본 이해
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "2,300년 전 욕조에서 '유레카!'를 외치며 부력을 발견한 과학자는?", options: ["과학자 뉴턴", "아르키메데스", "과학자 갈릴레이", "과학자 아인슈타인"], correct: 1 },
      { gate: 2, category: "인물파악", question: "물고기 몸속에서 부력을 조절하는 공기주머니를 무엇이라 하나요?", options: ["부레", "아가미", "지느러미", "꼬리"], correct: 0 },
      { gate: 3, category: "내용일치", question: "무거운 철로 만든 배가 물에 뜨는 이유는?", options: ["철이 원래 가벼운 금속이어서", "바람이 배를 띄워 올려서", "물이 배를 위로 밀어올려서", "배 속이 비어있어 평균 밀도가 물보다 작아서"], correct: 3 },
      { gate: 4, category: "내용일치", question: "물체가 받는 부력의 크기는 무엇과 같나요?", options: ["물체의 무게 선택", "물의 깊이이는 것이다", "물체가 밀어낸 물의 무게", "물의 온도이는 것이다"], correct: 2 },
      { gate: 5, category: "내용구조", question: "바닷물에서 민물보다 더 잘 뜨는 이유는?", options: ["바닷물에 소금이 녹아있어 밀도가 높아서", "바닷물이 민물보다 더 깨끗해서 그래서 영향을 미침", "바다가 강보다 훨씬 더 넓어서", "바다에는 파도가 밀어 올려 줘서"], correct: 0 },
      { gate: 6, category: "내용구조", question: "열기구가 하늘로 떠오르는 원리는?", options: ["열기구에 프로펠러가 달려있어서", "바람이 열기구를 밀어 올려서", "열기구의 풍선이 매우 커서", "뜨거운 공기가 차가운 공기보다 가벼워서"], correct: 3 },
      { gate: 7, category: "내용어휘", question: "'밀도'란 무엇을 의미하나요?", options: ["물체의 크기 차이", "같은 크기에 얼마나 무거운가", "물의 깊이 차이", "물체의 색깔 차이"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'수압'이란 무엇인가요?", options: ["물의 색깔 때문에 발생함", "물의 온도", "물이 누르는 힘", "물의 맛 선택지"], correct: 2 },
      { gate: 9, category: "내용추론", question: "잠수함이 가라앉으려면 어떻게 해야 하나요?", options: ["속도를 높인는 것이다", "밸러스트 탱크에서 물을 뺀다", "엔진을 끈는 것이다", "밸러스트 탱크에 물을 넣는다"], correct: 3 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["물은 항상 위험하고 조심해야 한게 는다", "부력 원리를 이해하면 배도 띄우고 생명도 구할 수 있다", "수영은 배우기 정말 어렵게 는다", "바다는 깊고 무서운 곳이게 는다"], correct: 1 }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      { gate: 1, category: "인물파악", question: "아르키메데스가 왕관의 순금 여부를 확인할 수 있었던 원리는?", options: ["왕관의 색깔을 보고 금인지 아닌지 확인했다", "왕관이 밀어낸 물의 양으로 부피를 측정", "왕관의 무게만 측정해서 금의 무게와 비교했다", "왕관을 녹여서 성분을 분석하는 방법을 사용"], correct: 1 },
      { gate: 2, category: "인물파악", question: "상어가 부레 없이도 떠 있을 수 있는 방법은?", options: ["계속 헤엄치며 양력을 얻고, 기름이 든 큰 간으로 부력을 얻음", "아가미로 부력을 조절해서 물속에서 떠 있을 수 있다", "꼬리로 물을 밀어내서 위로 올라가는 힘을 만든다", "가만히 있으면 저절로 떠오르게 되어 있다"], correct: 0 },
      { gate: 3, category: "내용일치", question: "사해에서 사람이 물 위에 누워서 떠 있을 수 있는 이유는?", options: ["물이 따뜻해서 사람이 편하게 떠 있을 수 있다", "소금 농도가 매우 높아 밀도가 크기 때문", "파도가 없어서 물이 잔잔하게 유지되기 때문이다", "깊이가 얕아서 바닥에 가까이 떠 있을 수 있다"], correct: 1 },
      { gate: 4, category: "내용일치", question: "기름이 물 위에 뜨는 이유로 올바른 것은?", options: ["기름이 더 무거워서 물 아래로 가라앉지 않는다", "기름의 밀도가 물보다 낮고 섞이지 않아서", "물이 기름을 밀어내서 위로 올라오게 만든다", "기름이 투명해서 물과 구별이 잘 안 되기 때문"], correct: 1 },
      { gate: 5, category: "내용구조", question: "배의 안정성에서 메타센터(M)가 무게중심(G)보다 위에 있어야 하는 이유는?", options: ["배가 빨라지려고 속도를 높이기 위해서이다", "기울어도 복원력이 작용해 다시 똑바로 서기 때문", "배가 예뻐지려고 디자인을 좋게 만들기 위해", "물이 안 들어오려고 방수 기능을 강화하기 위해"], correct: 1 },
      { gate: 6, category: "내용구조", question: "수심이 깊어질수록 부력에 영향을 주는 요인은?", options: ["물의 색깔이 변해서 부력에 영향을 미친다", "수압 증가로 선체가 압축되어 부피 감소", "물의 온도가 변해서 부력이 달라지게 된다", "물고기 수가 증가해서 부력에 영향을 준다"], correct: 1 },
      { gate: 7, category: "내용어휘", question: "'중성 부력' 상태란 무엇인가요?", options: ["물체가 위로 떠오르는 상태를 말한다", "물체가 아래로 가라앉는 상태를 말한다", "물체가 일정 깊이에 그대로 떠 있는 상태", "물체가 흔들리면서 움직이는 상태를 말한다"], correct: 2 },
      { gate: 8, category: "내용어휘", question: "'밸러스트 탱크'의 역할은?", options: ["연료를 저장해서 잠수함이 움직이게 한다", "물을 넣거나 빼서 잠수함의 부력 조절", "음식을 보관해서 승무원들이 먹을 수 있게", "산소를 공급해서 승무원들이 숨을 쉴 수 있게"], correct: 1 },
      { gate: 9, category: "내용추론", question: "헬륨 풍선이 수소 풍선 대신 사용되는 이유는?", options: ["헬륨이 수소보다 더 가벼워서 더 잘 뜨기 때문", "헬륨은 불이 붙지 않아 안전하기 때문", "헬륨이 더 예쁜 색깔을 가지고 있기 때문이다", "헬륨이 수소보다 더 싸서 경제적이기 때문"], correct: 1 },
      { gate: 10, category: "내용추론", question: "타이타닉 사고 이후 현대 선박에 적용된 안전 기술은?", options: ["더 빠른 엔진을 달아서 빙산을 피하게 한다", "수밀 격벽과 이중 선체 구조", "더 예쁜 디자인으로 승객들이 좋아하게 한다", "더 작은 크기로 만들어서 충돌을 피하게 한다"], correct: 1 }
    ];

    // 시즌3 (중1~2 수준) - 심화 개념
    const quizDataSeason3 = [
      { gate: 1, category: "인물파악", question: "아르키메데스가 발견한 원리를 수식으로 표현하면?", options: ["부력 = 물체의 전체 무게를 나타낸다", "부력 = 밀어낸 유체의 무게 = ρVg", "부력 = 물이 누르는 깊이를 나타낸다", "부력 = 물체의 전체 부피를 나타낸다"], correct: 1 },
      { gate: 2, category: "인물파악", question: "스쿠버 다이버가 부력 조절을 위해 사용하는 장비의 명칭은?", options: ["BCD(부력조절장치)", "산소통(호흡용 공기 공급 장치)", "오리발(추진력 보조 장치)", "마스크(시야 확보용 장비)"], correct: 0 },
      { gate: 3, category: "내용일치", question: "부력이 발생하는 근본적인 원인은?", options: ["물의 색깔에 따른 밀도 변화", "물의 맛을 결정하는 성분 차이", "물의 온도에 따른 분자 운동", "물체 위아래에 작용하는 압력 차이"], correct: 3 },
      { gate: 4, category: "내용일치", question: "마리아나 해구 바닥에서의 수압은 대략 얼마인가?", options: ["1기압 정도로 낮은 수준", "약 10기압 정도의 압력", "1,000기압 이상의 극한 압력", "약 100기압 정도의 압력"], correct: 2 },
      { gate: 5, category: "내용구조", question: "잠수함이 '파괴 심도'에 도달하면 발생하는 현상은?", options: ["수압으로 선체가 찌그러지거나 파괴된다", "엔진 출력이 올라가서 속도가 빨라진다", "수온이 높아지면서 물이 따뜻해진다 함이다", "밀도 변화로 인해 부력이 증가하게 된다"], correct: 0 },
      { gate: 6, category: "내용구조", question: "열기구 내부 공기의 밀도가 낮아지는 이유는?", options: ["공기가 차가워지면서 부피가 줄어들어서", "헬륨 가스를 주입하여 밀도를 낮춰서", "공기가 작은 구멍으로 점점 빠져나가서", "가열되면 분자가 빠르게 움직이며 팽창하여 단위 부피당 분자 수가 줄어서"], correct: 3 },
      { gate: 7, category: "내용어휘", question: "'양성 부력'과 '음성 부력'의 차이는?", options: ["물체 표면의 색깔 차이에 따른 구분", "양성 부력은 떠오르고 음성 부력은 가라앉는 상태", "주변 물의 온도 차이에 따른 구분", "물속에서의 이동 속도 차이에 따른 구분"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "선박의 '흘수선(water line)'이란?", options: ["배가 얼마나 빠르게 항해하는지 나타내는 선", "선박의 전체 길이가 얼마인지 표시하는 선", "배가 물에 잠기는 부분과 물 위에 있는 부분의 경계선", "배의 도장 색상을 구분하여 표시하는 선 때문에 영향을 미침"], correct: 2 },
      { gate: 9, category: "내용추론", question: "같은 물체가 바닷물과 민물에서 받는 부력의 차이는?", options: ["바닷물이나 민물이나 부력은 같다", "물의 종류는 부력과 전혀 무관하다", "민물에서 부력이 더 크게 작용함", "바닷물에서 더 크다(밀도가 높으므로)"], correct: 3 },
      { gate: 10, category: "내용추론", question: "아르키메데스 원리가 적용되는 분야가 아닌 것은?", options: ["선박 설계으로 인한 영향", "전기 회로 설계", "열기구 비행으로 인한 영향", "잠수함 운용으로 인한 영향"], correct: 1 }
    ];

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };

    function renderQuiz() { const container = document.getElementById('quizContainer'); const quiz = quizData[currentGate]; container.innerHTML = `<div class="quiz-header"><h1>✨ 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div><div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div><div class="question-box"><p class="question-text">${quiz.question}</p></div><div class="options-container">${quiz.options.map((option, index) => `<button class="option-btn" onclick="selectAnswer(${index})">${index + 1}. ${option}</button>`).join('')}</div><button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>`; }
    function selectAnswer(index) { selectedAnswer = index; document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected')); document.querySelectorAll('.option-btn')[index].classList.add('selected'); document.querySelector('.submit-btn').disabled = false; }
    function submitAnswer() { const quiz = quizData[currentGate]; const buttons = document.querySelectorAll('.option-btn'); buttons.forEach(btn => btn.disabled = true); document.querySelector('.submit-btn').disabled = true; const isCorrect = selectedAnswer === quiz.correct; if (isCorrect) { categoryScores[quiz.category]++; buttons[selectedAnswer].classList.add('correct'); } else { buttons[selectedAnswer].classList.add('wrong'); buttons[quiz.correct].classList.add('correct'); } showResult(isCorrect); }
    function showResult(isCorrect) { const container = document.getElementById('quizContainer'); const resultMsg = document.createElement('div'); resultMsg.className = isCorrect ? 'result-message correct' : 'result-message wrong'; resultMsg.innerHTML = isCorrect ? '🎉 정답입니다! 다음 관문으로 이동합니다...' : '❌ 틀렸습니다. 다음 관문으로 이동합니다...'; container.insertBefore(resultMsg, container.firstChild); setTimeout(() => { currentGate++; selectedAnswer = null; currentGate >= quizData.length ? showCongratulations() : renderQuiz(); }, 1500); }
    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }
    function drawRadarChart(scores) { const canvas = document.getElementById('radarCanvas'), ctx = canvas.getContext('2d'); const centerX = 140, centerY = 140, maxRadius = 100; const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2); ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1; [1, 0.5, 0.1].forEach(ratio => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const angle = angles[i % 5], x = centerX + Math.cos(angle) * maxRadius * ratio, y = centerY + Math.sin(angle) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); }); ctx.strokeStyle = '#d0d0d0'; angles.forEach(angle => { ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius); ctx.stroke(); }); const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론']; ctx.beginPath(); ctx.fillStyle = 'rgba(2, 136, 209, 0.3)'; ctx.strokeStyle = '#0288D1'; ctx.lineWidth = 2; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#4DD0E1'; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill(); }); ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px "Noto Sans KR", sans-serif'; ctx.textAlign = 'center'; const labelOffset = 18; categories.forEach((label, i) => { const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset), y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset); ctx.fillText(label, x, y + 4); }); }
    function showCongratulations() { const container = document.getElementById('quizContainer'); const radarScores = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) }; const totalScore100 = Object.values(radarScores).reduce((a, b) => a + b, 0) * 2; container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>10개의 관문을 모두 완료했습니다!<br>'부력' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수 (각 10점 만점)</h3><div class="score-item"><span class="category">👤 인물파악</span><span class="score">${radarScores["인물파악"]} / 10</span></div><div class="score-item"><span class="category">✅ 내용일치</span><span class="score">${radarScores["내용일치"]} / 10</span></div><div class="score-item"><span class="category">🏗️ 내용구조</span><span class="score">${radarScores["내용구조"]} / 10</span></div><div class="score-item"><span class="category">📚 내용어휘</span><span class="score">${radarScores["내용어휘"]} / 10</span></div><div class="score-item"><span class="category">🔍 내용추론</span><span class="score">${radarScores["내용추론"]} / 10</span></div><div class="score-item" style="border-top: 2px solid #0288D1; margin-top: 10px; padding-top: 15px;"><span class="category" style="font-size: 18px;">총점</span><span class="score" style="font-size: 22px; color: #4DD0E1;">${totalScore100}점</span></div></div><button class="back-btn" onclick="goBack()">← 목록으로 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">🔄 다시 풀기</button></div>`; setTimeout(() => drawRadarChart(radarScores), 100); saveQuizResult(radarScores, totalScore100); if (window.parent !== window) window.parent.postMessage({ action: 'quizComplete', storyId: 'physics17', season: getSeasonFromUrl(), scores: radarScores, totalScore: totalScore100 }, '*'); }
    function getSeasonFromUrl() { return new URLSearchParams(window.location.search).get('season') || 'season1'; }
    async function saveQuizResult(scores, totalScore) { try { const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}'); if (!userInfo.grade || !userInfo.name) return; await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: userInfo.grade, name: userInfo.name, storyId: 'physics17', season: getSeasonFromUrl(), scores, totalScore }) }); } catch (err) { console.error('[saveQuizResult] 오류:', err); } }
    function goBack() { window.parent !== window ? window.parent.postMessage({ action: 'closeStory' }, '*') : window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) goBack(); });
  </script>
