<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작물리19 퀴즈 - 시즌1 관문평가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Gmarket Sans", "Noto Sans KR", sans-serif; background: url('/images/창작도서/창작물리19/00.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
    body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .quiz-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; max-width: 750px; width: 100%; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3); animation: slideIn 0.5s ease-out; position: relative; z-index: 1; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-header { text-align: center; margin-bottom: 40px; }
    .quiz-header h1 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
    .quiz-header .gate-number { font-size: 18px; color: #512DA8; font-weight: 600; background: linear-gradient(135deg, #5C6BC0 0%, #7E57C2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .quiz-header .category-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, #5C6BC0 0%, #7E57C2 100%); color: white; border-radius: 20px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .progress-bar-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #5C6BC0 0%, #7E57C2 100%); border-radius: 10px; transition: width 0.5s ease; }
    .question-box { background: #f8f9fa; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid #512DA8; }
    .question-text { font-size: 20px; color: #2c3e50; font-weight: 600; line-height: 1.7; }
    .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: white; border: 2px solid #e0e0e0; padding: 20px 25px; border-radius: 15px; font-size: 17px; color: #2c3e50; cursor: pointer; transition: all 0.3s ease; text-align: left; font-weight: 500; line-height: 1.5; }
    .option-btn:hover { border-color: #512DA8; background: #ede7f6; transform: translateX(5px); }
    .option-btn.selected { border-color: #512DA8; background: linear-gradient(135deg, #5C6BC0 0%, #7E57C2 100%); color: white; }
    .option-btn.correct { border-color: #27ae60; background: #27ae60; color: white; }
    .option-btn.wrong { border-color: #e74c3c; background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #5C6BC0 0%, #7E57C2 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(126, 87, 194, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-message { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 18px; font-weight: 600; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-message.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .result-message.wrong { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .congrats-container { text-align: center; animation: scaleIn 0.6s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .congrats-container h2 { font-size: 44px; margin-bottom: 20px; }
    .congrats-container p { font-size: 18px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .score-summary { background: #f8f9fa; padding: 25px; border-radius: 16px; margin: 25px 0; text-align: left; }
    .score-summary h3 { font-size: 18px; color: #512DA8; margin-bottom: 15px; text-align: center; }
    .score-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
    .score-item:last-child { border-bottom: none; }
    .score-item .category { font-weight: 600; color: #2c3e50; }
    .score-item .score { font-weight: 700; color: #512DA8; }
    .back-btn { background: white; border: 2px solid #512DA8; color: #512DA8; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-right: 10px; }
    .back-btn:hover { background: #512DA8; color: white; }
    .radar-container { display: flex; justify-content: center; margin: 25px 0; }
    @media (max-width: 768px) { .quiz-container { padding: 30px 20px; } .quiz-header h1 { font-size: 24px; } .question-text { font-size: 17px; } .option-btn { font-size: 15px; padding: 15px 20px; } }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer"></div>
  <script>
    // 시즌1 (3~4학년 수준) - 기본 이해
    const quizDataSeason1 = [
      { gate: 1, category: "인물파악", question: "4억 년을 여행해서 갈릴에게 도착한 빛 알갱이 캐릭터의 이름은?", options: ["스펙트라", "레드시프트", "다크매터", "루미"], correct: 3 },
      { gate: 2, category: "인물파악", question: "빛의 색을 읽어 별의 비밀을 알아내는 캐릭터는?", options: ["루미(캐릭터)", "스펙트라", "갈릴(등장)", "라이트이어 할머니"], correct: 1 },
      { gate: 3, category: "내용일치", question: "빛이 1초에 이동하는 거리는 약 얼마인가요?", options: ["3킬로미터", "3천 킬로미터", "30만 킬로미터", "3억 킬로미터"], correct: 2 },
      { gate: 4, category: "내용일치", question: "1광년이란 무엇인가요?", options: ["빛이 1년 동안 가는 거리", "빛이 1초 동안 가는 거리", "지구에서 달까지의 거리 때문에 발생함", "지구에서 태양까지의 거리"], correct: 0 },
      { gate: 5, category: "내용구조", question: "밤하늘에서 별빛을 보는 것은 무엇과 같나요?", options: ["미래를 보는 것", "과거를 보는 것", "현재를 보는 것", "꿈을 보는 것"], correct: 1 },
      { gate: 6, category: "내용구조", question: "별의 색이 붉은색일 때와 푸른색일 때, 더 뜨거운 것은?", options: ["붉은색 별", "둘 다 같다", "푸른색 별", "색과 온도는 관계없다"], correct: 2 },
      { gate: 7, category: "내용어휘", question: "'스펙트럼'이란 무엇인가요?", options: ["별의 이름이는 것이라고 함", "별의 거리이는 것", "망원경 종류이게 됨", "빛을 색깔별로 펼쳐놓은 것"], correct: 3 },
      { gate: 8, category: "내용어휘", question: "'적색편이'란 무엇인가요?", options: ["우주가 팽창하면서 빛의 파장이 길어져 붉게 보이는 현상", "별 자체가 빨갛게 변해서 색이 바뀌는 것", "별이 지구로 가까워져서 크게 보이는 것", "빛이 점점 사라져서 어두워지는 것"], correct: 0 },
      { gate: 9, category: "내용추론", question: "은하를 하나로 묶어주는 보이지 않는 존재는?", options: ["루미(빛 알갱이)", "암흑물질(다크매터)", "스펙트라(빛 분석)", "밤하늘 별빛"], correct: 1 },
      { gate: 10, category: "내용추론", question: "이 이야기가 전하고자 하는 핵심 메시지는?", options: ["별은 항상 위험하고 조심해야 하니까 멀리해야 한다 하게 됨", "빛은 생각보다 매우 느려서 도달하는 데 오래 걸린다", "밤하늘은 우주의 타임머신이다 - 별빛은 시간을 담아 여행한다", "우주는 생각보다 매우 작아서 금방 탐험할 수 있다"], correct: 2 }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      { gate: 1, category: "인물파악", question: "루미가 4억 년을 여행했다는 것이 의미하는 바는?", options: ["루미가 느려서 그렇게 오래 걸린 것이다", "루미를 보낸 별이 4억 광년 떨어져 있어서", "루미가 길을 잃어서 헤매다 보니 그랬다", "루미가 중간에 쉬어서 그렇게 된 것이다"], correct: 1 },
      { gate: 2, category: "인물파악", question: "다크매터(암흑물질)가 '보이지 않지만 중요하다'고 한 이유는?", options: ["색깔이 검어서 보이지 않는 것이다", "중력으로 은하를 묶어주기 때문에", "너무 멀어서 관측이 불가능하다", "너무 작아서 눈에 보이지 않는다"], correct: 1 },
      { gate: 3, category: "내용일치", question: "프리즘으로 빛을 분해했을 때 나타나는 검은 선(흡수선)의 의미는?", options: ["프리즘이 고장나서 생긴 현상이다", "별 대기의 원소가 특정 파장의 빛을 흡수한 흔적", "먼지가 묻어서 나타나는 현상이다", "빛이 약해서 일부가 사라진 것이다"], correct: 1 },
      { gate: 4, category: "내용일치", question: "지구에서 태양까지 빛이 도달하는 데 걸리는 시간은?", options: ["약 1초 정도 걸린다", "약 8분 정도 걸린다", "약 1시간 정도 걸린다", "약 1일 정도 걸린다"], correct: 1 },
      { gate: 5, category: "내용구조", question: "별의 색-밝기 그래프(HR도)에서 '주계열'이란?", options: ["별이 죽은 단계를 의미하는 것이다", "별이 안정적으로 수소를 융합하는 청년기", "별이 폭발하는 순간을 가리키는 말이다", "별이 태어나기 전 단계를 말하는 것이다"], correct: 1 },
      { gate: 6, category: "내용구조", question: "적색 거성이 붉게 보이는 이유는?", options: ["온도가 높아져서 붉게 보이는 것이다", "크기가 커지면서 표면 온도가 낮아져서", "색을 칠해서 그렇게 보이는 것이다", "가까워져서 붉게 보이는 것일 뿐이다"], correct: 1 },
      { gate: 7, category: "내용어휘", question: "'은하년'이란 무엇인가요?", options: ["1년과 같은 시간 단위를 말하는 것이다", "태양계가 은하 중심을 한 바퀴 도는 시간(약 2.25억 년)", "빛이 은하를 통과하는 데 걸리는 시간이다", "별의 수명을 측정하는 시간 단위이다"], correct: 1 },
      { gate: 8, category: "내용어휘", question: "'천문단위(AU)'란 무엇인가요?", options: ["빛이 1년 동안 가는 거리를 말한다", "지구와 태양 사이의 평균 거리이다", "은하의 크기를 측정하는 단위이다", "우주의 나이를 재는 시간 단위이다"], correct: 1 },
      { gate: 9, category: "내용추론", question: "루미의 빛이 점점 붉어지고 사라지는 이유는?", options: ["에너지가 다해서 사라지는 것이다", "우주 팽창으로 파장이 늘어나 적외선/전파가 되어서", "갈릴이 눈을 감아서 보이지 않는다", "구름이 가려서 안 보이는 것이다"], correct: 1 },
      { gate: 10, category: "내용추론", question: "헬륨(Helium)이라는 원소 이름이 '태양'에서 유래한 이유는?", options: ["태양에서 가져와서 그런 이름이 붙었다", "태양 스펙트럼의 흡수선에서 지구보다 먼저 발견되어서", "태양처럼 뜨거워서 그렇게 이름 지었다", "노란색이라서 태양과 연관지어 붙였다"], correct: 1 }
    ];

    // 시즌3 (중1~2 수준) - 심화 개념
    const quizDataSeason3 = [
      { gate: 1, category: "인물파악", question: "빛(광자)이 '우주에서 가장 빠르다'는 것의 물리학적 의미는?", options: ["그냥 빠른 존재로, 특별한 물리적 의미는 없음", "속도를 정확히 측정하기가 매우 어려운 입자", "가끔 빛보다 빠른 입자가 존재할 수도 있음", "빛의 속도는 진공에서 불변이며 어떤 물체도 이를 초과할 수 없다"], correct: 3 },
      { gate: 2, category: "인물파악", question: "뉴턴이 프리즘으로 햇빛을 분해한 해(연도)는?", options: ["1066년으로 인한 영향", "1666년", "1492년으로 인한 영향", "1969년으로 인한 영향"], correct: 1 },
      { gate: 3, category: "내용일치", question: "우리 은하의 형태와 태양의 위치로 올바른 것은?", options: ["타원은하, 은하의 중심 핵에 위치", "불규칙은하, 은하의 가장자리에 위치", "막대나선은하, 오리온 팔(중심에서 약 26,000광년)", "정상 나선은하, 은하의 핵 근처에 위치"], correct: 2 },
      { gate: 4, category: "내용일치", question: "관측 가능한 우주에 존재하는 은하의 개수는 대략?", options: ["약 2조 개", "약 1만 개으로 인한 영향", "약 100개으로 인한 영향", "무한대 선택지"], correct: 0 },
      { gate: 5, category: "내용구조", question: "태양 질량의 8배 이상인 별이 죽을 때 발생하는 현상은?", options: ["서서히 조용히 식어가며 사라진다", "초신성 폭발 후 중성자별 또는 블랙홀이 된다", "행성상 성운만을 남기고 백색왜성이 된다", "에너지를 계속 생성하며 영원히 빛난다"], correct: 1 },
      { gate: 6, category: "내용구조", question: "은하 회전 곡선이 예상과 다른 이유로 제안된 것은?", options: ["측정 오류으로 인한 영향", "별이 너무 많아서", "암흑물질의 존재", "중력이 약해서"], correct: 2 },
      { gate: 7, category: "내용어휘", question: "'흡광 스펙트럼'에서 검은 선이 나타나는 원리는?", options: ["빛이 프리즘 표면에서 반사되어 손실되기 때문에 효과를 발생시킴", "관측 장비의 결함으로 인해 일부 파장이 누락됨", "프리즘 재질이 손상되어 빛이 불균일하게 분해됨", "별 대기 원소가 특정 파장을 흡수하여 해당 파장이 빠져서"], correct: 3 },
      { gate: 8, category: "내용어휘", question: "빈의 변위 법칙과 관련된 설명으로 올바른 것은?", options: ["온도가 높을수록 파장이 짧은(푸른) 빛을 더 많이 낸다", "온도가 높을수록 파장이 긴 빨간 빛을 더 많이 낸다", "온도와 방출되는 빛의 색은 물리적으로 무관하다", "모든 별은 온도와 관계없이 동일한 색을 방출한다"], correct: 0 },
      { gate: 9, category: "내용추론", question: "안드로메다 은하의 현재 빛을 본다는 것의 의미는?", options: ["지금 현재 안드로메다가 어떤 모습인지를 보는 것(개념)", "약 250만 년 전에 출발한 빛(과거 모습)", "안드로메다가 앞으로 어떻게 변할지 미래의 모습(내용)", "실제가 아닌 인간이 상상으로 만든 이미지의 모습(선택)"], correct: 1 },
      { gate: 10, category: "내용추론", question: "빛이 적외선→전파로 변해도 '사라지지 않는다'는 의미는?", options: ["파장이 변해 다른 종류의 빛이 되었을 뿐이다", "물리적으로 완전히 소멸하여 더 이상 존재하지 않는다", "눈에 보이지 않을 뿐 에너지로 존재한다", "우주 팽창으로 인해 원래의 별로 다시 돌아간다"], correct: 2 }
    ];

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0, selectedAnswer = null;
    let categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 };

    function renderQuiz() { const container = document.getElementById('quizContainer'); const quiz = quizData[currentGate]; container.innerHTML = `<div class="quiz-header"><h1>✨ 관문평가</h1><p class="gate-number">10개 관문 중 ${quiz.gate}번째</p><span class="category-badge">${quiz.category}</span></div><div class="progress-bar-container"><div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div></div><div class="question-box"><p class="question-text">${quiz.question}</p></div><div class="options-container">${quiz.options.map((option, index) => `<button class="option-btn" onclick="selectAnswer(${index})">${index + 1}. ${option}</button>`).join('')}</div><button class="submit-btn" onclick="submitAnswer()" disabled>답안 제출</button>`; }
    function selectAnswer(index) { selectedAnswer = index; document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected')); document.querySelectorAll('.option-btn')[index].classList.add('selected'); document.querySelector('.submit-btn').disabled = false; }
    function submitAnswer() { const quiz = quizData[currentGate]; const buttons = document.querySelectorAll('.option-btn'); buttons.forEach(btn => btn.disabled = true); document.querySelector('.submit-btn').disabled = true; const isCorrect = selectedAnswer === quiz.correct; if (isCorrect) { categoryScores[quiz.category]++; buttons[selectedAnswer].classList.add('correct'); } else { buttons[selectedAnswer].classList.add('wrong'); buttons[quiz.correct].classList.add('correct'); } showResult(isCorrect); }
    function showResult(isCorrect) { const container = document.getElementById('quizContainer'); const resultMsg = document.createElement('div'); resultMsg.className = isCorrect ? 'result-message correct' : 'result-message wrong'; resultMsg.innerHTML = isCorrect ? '🎉 정답입니다! 다음 관문으로 이동합니다...' : '❌ 틀렸습니다. 다음 관문으로 이동합니다...'; container.insertBefore(resultMsg, container.firstChild); setTimeout(() => { currentGate++; selectedAnswer = null; currentGate >= quizData.length ? showCongratulations() : renderQuiz(); }, 1500); }
    function convertToRadarScore(c) { return c === 2 ? 10 : c === 1 ? 5 : 1; }
    function drawRadarChart(scores) { const canvas = document.getElementById('radarCanvas'), ctx = canvas.getContext('2d'); const centerX = 140, centerY = 140, maxRadius = 100; const angles = []; for (let i = 0; i < 5; i++) angles.push((Math.PI * 2 * i / 5) - Math.PI / 2); ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1; [1, 0.5, 0.1].forEach(ratio => { ctx.beginPath(); for (let i = 0; i <= 5; i++) { const angle = angles[i % 5], x = centerX + Math.cos(angle) * maxRadius * ratio, y = centerY + Math.sin(angle) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); }); ctx.strokeStyle = '#d0d0d0'; angles.forEach(angle => { ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius); ctx.stroke(); }); const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론']; ctx.beginPath(); ctx.fillStyle = 'rgba(126, 87, 194, 0.3)'; ctx.strokeStyle = '#7E57C2'; ctx.lineWidth = 2; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#B39DDB'; categories.forEach((cat, i) => { const score = scores[cat], ratio = score / 10, x = centerX + Math.cos(angles[i]) * maxRadius * ratio, y = centerY + Math.sin(angles[i]) * maxRadius * ratio; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill(); }); ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px "Noto Sans KR", sans-serif'; ctx.textAlign = 'center'; const labelOffset = 18; categories.forEach((label, i) => { const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset), y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset); ctx.fillText(label, x, y + 4); }); }
    function showCongratulations() { const container = document.getElementById('quizContainer'); const radarScores = { "인물파악": convertToRadarScore(categoryScores["인물파악"]), "내용일치": convertToRadarScore(categoryScores["내용일치"]), "내용구조": convertToRadarScore(categoryScores["내용구조"]), "내용어휘": convertToRadarScore(categoryScores["내용어휘"]), "내용추론": convertToRadarScore(categoryScores["내용추론"]) }; const totalScore100 = Object.values(radarScores).reduce((a, b) => a + b, 0) * 2; container.innerHTML = `<div class="congrats-container"><h2>🎊 관문평가 완료! 🎊</h2><p>10개의 관문을 모두 완료했습니다!<br>'별빛의 여행' 이야기를 잘 이해하셨네요.</p><div class="radar-container"><canvas id="radarCanvas" width="280" height="280"></canvas></div><div class="score-summary"><h3>📊 영역별 점수 (각 10점 만점)</h3><div class="score-item"><span class="category">👤 인물파악</span><span class="score">${radarScores["인물파악"]} / 10</span></div><div class="score-item"><span class="category">✅ 내용일치</span><span class="score">${radarScores["내용일치"]} / 10</span></div><div class="score-item"><span class="category">🏗️ 내용구조</span><span class="score">${radarScores["내용구조"]} / 10</span></div><div class="score-item"><span class="category">📚 내용어휘</span><span class="score">${radarScores["내용어휘"]} / 10</span></div><div class="score-item"><span class="category">🔍 내용추론</span><span class="score">${radarScores["내용추론"]} / 10</span></div><div class="score-item" style="border-top: 2px solid #512DA8; margin-top: 10px; padding-top: 15px;"><span class="category" style="font-size: 18px;">총점</span><span class="score" style="font-size: 22px; color: #7E57C2;">${totalScore100}점</span></div></div><button class="back-btn" onclick="goBack()">← 목록으로 돌아가기</button><button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">🔄 다시 풀기</button></div>`; setTimeout(() => drawRadarChart(radarScores), 100); saveQuizResult(radarScores, totalScore100); if (window.parent !== window) window.parent.postMessage({ action: 'quizComplete', storyId: 'physics19', season: getSeasonFromUrl(), scores: radarScores, totalScore: totalScore100 }, '*'); }
    function getSeasonFromUrl() { return new URLSearchParams(window.location.search).get('season') || 'season1'; }
    async function saveQuizResult(scores, totalScore) { try { const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}'); if (!userInfo.grade || !userInfo.name) return; await fetch('/api/creative-quiz/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade: userInfo.grade, name: userInfo.name, storyId: 'physics19', season: getSeasonFromUrl(), scores, totalScore }) }); } catch (err) { console.error('[saveQuizResult] 오류:', err); } }
    function goBack() { window.parent !== window ? window.parent.postMessage({ action: 'closeStory' }, '*') : window.history.back(); }
    function retryQuiz() { currentGate = 0; selectedAnswer = null; categoryScores = { "인물파악": 0, "내용일치": 0, "내용구조": 0, "내용어휘": 0, "내용추론": 0 }; renderQuiz(); }
    window.addEventListener('DOMContentLoaded', () => renderQuiz());
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) goBack(); });
  </script>
