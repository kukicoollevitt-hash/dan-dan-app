<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작사회문화01 퀴즈 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작사회문화01/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론
    const quizDataSeason1 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "학교 숙제로 '가족 그리기'를 받고 고민하게 되는 주인공 소녀의 이름은?",
        options: [
          "은솔이",
          "나래",
          "하늘",
          "빛이"
        ],
        correct: 2
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "무지개마을 가족 상담센터에서 '가족의 정의는 형태가 아니라 관계'라고 가르치는 인물은?",
        options: [
          "달님 할머니",
          "나래 선생님",
          "준이 삼촌",
          "은솔이 엄마"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "이야기에서 '혈연으로 연결된 가족'과 대비되어 설명된 가족 유형은?",
        options: [
          "핵가족",
          "입양, 재혼 등 선택에 의해 만들어진 가족",
          "대가족",
          "1인 가구"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "솔이와 빛이가 처음에 서로를 가족으로 받아들이지 못했던 이유는?",
        options: [
          "나이 차이가 커서",
          "피가 섞이지 않은 남남이기 때문에",
          "같은 학교를 다니지 않아서",
          "언어가 달라서"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "이야기의 전개 순서로 올바른 것은?",
        options: [
          "가족 탐험 → 숙제 → 발표 → 결론",
          "숙제 → 가족 탐험 → 갈등 해결 → 발표",
          "발표 → 숙제 → 탐험 → 갈등",
          "갈등 → 탐험 → 숙제 → 발표"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "하늘이가 최종적으로 제출한 '가족 그림'의 특징은?",
        options: [
          "엄마, 아빠, 형제를 그린 전통적 가족 그림",
          "무지개 위에 다양한 사람들이 서 있는 그림",
          "할머니와 자신만 그린 그림",
          "빈 종이를 제출함"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'사회화'가 이야기에서 의미하는 것은?",
        options: [
          "사회에 취업하는 것",
          "가족 안에서 말, 인사, 옳고 그름을 배우는 것",
          "친구를 많이 사귀는 것",
          "도시로 이사하는 것"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "나래 선생님이 설명한 '사랑의 다섯 가지 언어'에 포함되지 않는 것은?",
        options: [
          "말로 표현하기",
          "함께 시간 보내기",
          "돈을 많이 벌어다 주기",
          "봉사하기"
        ],
        correct: 2
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "하늘이가 처음에 자신의 가족을 '이상하다'고 느꼈던 근본적인 이유는?",
        options: [
          "할머니가 요리를 못해서",
          "사회의 정상 가족 틀에 자신이 맞지 않는다고 생각해서",
          "친구가 없어서",
          "학교 성적이 낮아서"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "이 이야기가 전하고자 하는 핵심 메시지는?",
        options: [
          "혈연이 있어야만 진짜 가족이다",
          "가족은 형태가 아니라 서로를 아끼고 돌보는 관계로 정의된다",
          "1인 가구는 가족이 아니다",
          "핵가족이 가장 이상적인 가족 형태이다"
        ],
        correct: 1
      }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "하늘이가 '가족 그리기' 숙제를 받고 유독 고민했던 이유는 무엇일까요?",
        options: [
          "그림을 못 그려서",
          "자신의 가족이 '엄마, 아빠, 형제' 형태가 아니어서 어떻게 그려야 할지 몰랐기 때문에",
          "숙제가 너무 어려워서",
          "색연필이 없어서"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "나래 선생님이 '가족의 정의는 형태가 아니라 관계'라고 강조한 이유는?",
        options: [
          "형태로 정의하면 다양한 가족을 설명할 수 없기 때문에",
          "선생님 본인이 1인 가구라서",
          "학교 교과서에 그렇게 써 있어서",
          "부모님이 그렇게 말씀하셔서"
        ],
        correct: 0
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "'선택에 의해 만들어진 가족'(입양, 재혼 가족)이 중요하게 다뤄지는 이유는?",
        options: [
          "요즘 유행이라서",
          "혈연이 아니어도 사랑과 돌봄으로 진정한 가족이 될 수 있음을 보여주기 때문에",
          "법적으로 인정받지 못해서",
          "경제적으로 유리해서"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "솔이와 빛이가 처음에 서로를 가족으로 받아들이기 어려웠던 근본적인 이유는?",
        options: [
          "성격이 안 맞아서",
          "사회에서 '진짜 가족=피가 섞인 관계'라는 고정관념을 가지고 있었기 때문에",
          "나이가 같아서",
          "같은 방을 써야 해서"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "이야기가 '숙제 → 가족 탐험 → 갈등 해결 → 발표' 순서로 전개되는 이유는?",
        options: [
          "무작위로 정해진 순서라서",
          "문제 인식 → 탐색 → 성장 → 결론이라는 자연스러운 배움의 과정을 보여주기 위해서",
          "선생님이 정해준 순서라서",
          "시간 순서와 상관없이 배치해서"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "하늘이가 '무지개 위에 다양한 사람들' 그림을 그린 것이 의미하는 바는?",
        options: [
          "무지개가 예뻐서",
          "가족은 다양한 모습일 수 있고, 서로 다른 사람들이 함께 어울려 사는 것이 아름답다는 깨달음을 표현한 것",
          "그림 실력을 뽐내려고",
          "선생님이 그렇게 그리라고 해서"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "가족 안에서의 '사회화'가 중요한 이유는 무엇일까요?",
        options: [
          "돈을 벌 수 있어서",
          "사회에서 살아가는 데 필요한 가치관, 언어, 예절 등을 처음 배우는 곳이기 때문에",
          "친구를 사귈 수 있어서",
          "운동을 배울 수 있어서"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'사랑의 다섯 가지 언어'가 가르쳐주는 원리는?",
        options: [
          "외국어를 배워야 한다는 것",
          "사람마다 사랑을 표현하고 느끼는 방식이 다르므로, 상대방의 방식을 이해해야 한다는 것",
          "말을 많이 해야 한다는 것",
          "선물을 자주 사야 한다는 것"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "하늘이가 자신의 가족을 '이상하다'고 느꼈던 것이 결국 잘못된 생각이었던 이유는?",
        options: [
          "가족이 바뀌어서",
          "사회의 '정상 가족' 틀은 하나의 기준일 뿐이고, 다양한 가족 형태가 모두 가치 있기 때문에",
          "친구들이 달라졌어서",
          "숙제를 안 해도 되어서"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "'가족은 형태가 아니라 관계로 정의된다'는 메시지가 중요한 이유는?",
        options: [
          "말이 멋있어서",
          "다양한 가족 구성원들이 소외감을 느끼지 않고, 사랑과 돌봄의 본질에 집중할 수 있게 해주기 때문에",
          "시험에 나와서",
          "선생님이 좋아하셔서"
        ],
        correct: 1
      }
    ];

    // 시즌3 (중1~2 수준) - 표현 더 어렵게
    const quizDataSeason3 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "학교 숙제로 '가족 그리기'를 받고 고민하게 되는 주인공 소녀의 이름은?",

      {

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0;
    let selectedAnswer = null;
    let categoryScores = {
      "인물파악": 0,
      "내용일치": 0,
      "내용구조": 0,
      "내용어휘": 0,
      "내용추론": 0
    };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🌿 관문평가</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
          <span class="category-badge">${quiz.category}</span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');
      if (isCorrect) {
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
      } else {
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      }
      container.insertBefore(resultMsg, container.firstChild);

      // 1.5초 후 다음 문제로
      setTimeout(() => {
        currentGate++;
        selectedAnswer = null;

        if (currentGate >= quizData.length) {
          // 모든 관문 완료!
          showCongratulations();
        } else {
          renderQuiz();
        }
      }, 1500);
    }

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      // 영역별 레이더 점수 계산 (10점 만점)
      const radarScores = {
        "인물파악": convertToRadarScore(categoryScores["인물파악"]),
        "내용일치": convertToRadarScore(categoryScores["내용일치"]),
        "내용구조": convertToRadarScore(categoryScores["내용구조"]),
        "내용어휘": convertToRadarScore(categoryScores["내용어휘"]),
        "내용추론": convertToRadarScore(categoryScores["내용추론"])
      };

      // 총점 계산 (100점 만점)
      const totalRadarScore = Object.values(radarScores).reduce((a, b) => a + b, 0);
      const totalScore100 = totalRadarScore * 2; // 50점 만점 → 100점 만점으로 환산

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 관문평가 완료! 🎊</h2>
          <p>
            10개의 관문을 모두 완료했습니다!<br>
            '창작사회문화01 퀴즈' 이야기를 잘 이해하셨네요.
          </p>

          <div class="radar-container">
            <canvas id="radarCanvas" width="280" height="280"></canvas>
          </div>

          <div class="score-summary">
            <h3>📊 영역별 점수 (각 10점 만점)</h3>
            <div class="score-item">
              <span class="category">👤 인물파악</span>
              <span class="score">${radarScores["인물파악"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">✅ 내용일치</span>
              <span class="score">${radarScores["내용일치"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🏗️ 내용구조</span>
              <span class="score">${radarScores["내용구조"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">📚 내용어휘</span>
              <span class="score">${radarScores["내용어휘"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🔍 내용추론</span>
              <span class="score">${radarScores["내용추론"]} / 10</span>
            </div>
            <div class="score-item" style="border-top: 2px solid #2d6a4f; margin-top: 10px; padding-top: 15px;">
              <span class="category" style="font-size: 18px;">총점</span>
              <span class="score" style="font-size: 22px; color: #1b4332;">${totalScore100}점</span>
            </div>
          </div>

          <button class="back-btn" onclick="goBack()">
            ← 목록으로 돌아가기
          </button>
          <button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">
            🔄 다시 풀기
          </button>
        </div>
      `;

      // 레이더 차트 그리기
      setTimeout(() => {
        drawRadarChart(radarScores);
      }, 100);

      // 결과 저장 (서버 API 호출)
      saveQuizResult(radarScores, totalScore100);

      // 결과 저장 (부모 창에 전달)
      if (window.parent !== window) {
        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'social01',
          season: getSeasonFromUrl(),
          scores: radarScores,
          totalScore: totalScore100
        }, '*');
      }
    }

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'social01',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
