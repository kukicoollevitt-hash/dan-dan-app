<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작사회문화03 퀴즈 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작사회문화03/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론
    const quizDataSeason1 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "마음 거울 교실에서 자신의 정체성을 탐색하는 주인공의 이름은?",
        options: [
          "하늘",
          "민지",
          "수아",
          "준서"
        ],
        correct: 2
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "아이들에게 '마음 거울'을 통해 자아를 탐색하도록 안내하는 선생님의 이름은?",
        options: [
          "나래 선생님",
          "지혜 선생님",
          "마음 선생님",
          "하늘 선생님"
        ],
        correct: 2
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "'자아 정체성'이란 무엇인가?",
        options: [
          "다른 사람이 나를 어떻게 보는지",
          "내가 누구인지에 대한 스스로의 인식과 이해",
          "학교에서 좋은 성적을 받는 것",
          "남들보다 외모가 예쁘고 잘생긴 것"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "이야기에서 '마음 거울'이 상징하는 것은?",
        options: [
          "화장을 위한 도구로 외모를 꾸밈",
          "자기 자신을 있는 그대로 들여다보는 성찰",
          "남을 비판하고 평가하는 도구",
          "미래를 예측하고 점치는 도구"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "주인공이 자아 정체성을 찾아가는 과정의 순서로 올바른 것은?",
        options: [
          "결론 → 혼란 → 탐색 → 수용",
          "혼란 → 탐색 → 이해 → 수용",
          "수용 → 탐색 → 혼란 → 이해",
          "탐색 → 수용 → 혼란 → 이해"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "이야기의 마지막에 주인공이 깨닫는 것은?",
        options: [
          "나는 언제나 모든 면에서 완벽해야만 가치가 있다",
          "나는 변화하고 성장하는 존재이며, 있는 그대로의 나를 받아들이면 된다",
          "다른 사람처럼 되어야만 인정받고 사랑받을 수 있다",
          "자신만의 정체성은 중요하지 않고 남들과 같아야 한다"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'자존감'의 의미로 가장 적절한 것은?",
        options: [
          "다른 사람보다 우월하다고 느끼는 것",
          "자기 자신을 소중히 여기고 가치 있게 느끼는 마음",
          "돈이 많은 것",
          "외모가 뛰어난 것"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'성찰'이 의미하는 것은?",
        options: [
          "다른 사람을 비판하는 것",
          "자기 자신의 마음과 행동을 깊이 들여다보는 것",
          "공부를 열심히 하는 것",
          "체육 시간에 운동을 잘하는 것"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "주인공이 처음에 자신에 대해 혼란스러워했던 이유는?",
        options: [
          "학교 성적이 좋지 않아서 고민했기 때문",
          "다른 사람들의 기대와 자신의 진짜 모습 사이에서 갈등했기 때문",
          "마음을 나눌 친구가 없어서 외로웠기 때문",
          "함께 살던 가족이 없어서 슬펐기 때문"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "이 이야기가 전하고자 하는 핵심 메시지는?",
        options: [
          "남들처럼 되어야 비로소 진정한 행복을 얻을 수 있다",
          "있는 그대로의 자신을 이해하고 받아들이는 것이 건강한 정체성의 시작이다",
          "성장을 위해서 자존감은 필요 없고 노력만 하면 된다",
          "자신보다 다른 사람의 평가가 가장 중요하므로 맞추어 살아야 한다"
        ],
        correct: 1
      }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "수아가 '마음 거울 교실'에서 자아 정체성을 탐색하게 된 근본적인 이유는?",
        options: [
          "숙제라서 어쩔 수 없이 해야 했기 때문에",
          "진짜 나는 어떤 사람인지 궁금증과 혼란이 있었음",
          "친구가 시켜서 함께 탐색하게 되었기 때문에",
          "상을 받으려고 열심히 참여하게 되었기 때문에"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "마음 선생님이 '마음 거울'을 활용하여 가르치는 이유는?",
        options: [
          "거울이 예뻐서 학생들이 좋아하기 때문에",
          "자기 자신을 객관적으로 바라보는 성찰 능력을 키우기 위해",
          "유행하는 방법이라서 학생들이 관심을 가짐",
          "다른 도구가 없어서 거울을 사용하게 되었음"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "'자아 정체성'이 중요한 이유는 무엇일까요?",
        options: [
          "시험에 나와서 꼭 알아야 하는 내용이기 때문에",
          "내가 누구인지 알아야 올바른 선택과 건강한 관계 가능",
          "유행어라서 많은 사람들이 사용하기 때문에",
          "어른들이 좋아해서 아이들도 배워야 하기 때문에"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "'마음 거울'이 성찰을 상징하는 이유는?",
        options: [
          "거울이 비싸서 소중하게 다뤄야 하기 때문에",
          "거울처럼 자기 자신을 있는 그대로 비춰보는 것이 성찰",
          "반짝여서 눈에 잘 띄고 기억에 남기 때문에",
          "크기가 커서 자신의 모습을 잘 볼 수 있기 때문에"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "자아 정체성 형성이 '혼란 → 탐색 → 이해 → 수용' 순서로 진행되는 이유는?",
        options: [
          "선생님이 이 순서대로 하라고 정해주었기 때문에 따라야 해서",
          "혼란을 느끼고, 스스로 탐색하며, 이해한 후에야 수용이 가능한 자연스러운 성장 과정임",
          "특별한 이유 없이 무작위로 정해진 순서라서 그냥 따르는 것",
          "쉬운 것부터 순서대로 진행해야 부담이 적어서 따라하기 좋음"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "'있는 그대로의 나를 받아들이면 된다'는 깨달음이 중요한 이유는?",
        options: [
          "공부 안 해도 되니까 부담이 없어서 좋기 때문에",
          "완벽하지 않아도 자신을 인정해야 건강한 자존감으로 성장",
          "남들이 그렇게 하니까 따라하면 되기 때문에",
          "쉬운 방법이니까 누구나 할 수 있기 때문에"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "건강한 자존감이 삶에 중요한 이유는?",
        options: [
          "자랑할 수 있어서 다른 사람들에게 인정받기 때문",
          "자신을 소중히 여겨야 어려움 극복과 건강한 관계 가능",
          "돈을 벌 수 있어서 경제적으로 풍족해지기 때문에",
          "외모가 좋아져서 다른 사람들에게 인기가 많아짐"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'성찰'이 정체성 형성에 필요한 이유는?",
        options: [
          "어른들이 시켜서 해야 하는 것이기 때문에",
          "자기 생각, 감정, 행동을 돌아봐야 진정한 자신 발견 가능",
          "시간이 남아서 심심할 때 하면 좋기 때문에",
          "유행이라서 많은 사람들이 하고 있기 때문에"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "주인공이 '다른 사람들의 기대와 진짜 나' 사이에서 갈등한 이유는?",
        options: [

    // URL 파라미터에서 시즌 정보 가져오기
    function getSeasonFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('season') || 'season1';
    }

    // 시즌에 따른 퀴즈 데이터 선택
    const season = getSeasonFromUrl();
    const quizData = season === 'season1' ? quizDataSeason1
                   : season === 'season2' ? quizDataSeason2
                   : quizDataSeason3;


    let currentGate = 0;
    let selectedAnswer = null;
    let categoryScores = {
      "인물파악": 0,
      "내용일치": 0,
      "내용구조": 0,
      "내용어휘": 0,
      "내용추론": 0
    };

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🌿 관문평가</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
          <span class="category-badge">${quiz.category}</span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');
      if (isCorrect) {
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
      } else {
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다. 다음 관문으로 이동합니다...';
      }
      container.insertBefore(resultMsg, container.firstChild);

      // 1.5초 후 다음 문제로
      setTimeout(() => {
        currentGate++;
        selectedAnswer = null;

        if (currentGate >= quizData.length) {
          // 모든 관문 완료!
          showCongratulations();
        } else {
          renderQuiz();
        }
      }, 1500);
    }

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      // 영역별 레이더 점수 계산 (10점 만점)
      const radarScores = {

        "내용일치": convertToRadarScore(categoryScores["내용일치"]),
        "내용구조": convertToRadarScore(categoryScores["내용구조"]),
        "내용어휘": convertToRadarScore(categoryScores["내용어휘"]),
        "내용추론": convertToRadarScore(categoryScores["내용추론"])
      };

      // 총점 계산 (100점 만점)
      const totalRadarScore = Object.values(radarScores).reduce((a, b) => a + b, 0);
      const totalScore100 = totalRadarScore * 2; // 50점 만점 → 100점 만점으로 환산

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 관문평가 완료! 🎊</h2>
          <p>
            10개의 관문을 모두 완료했습니다!<br>
            '창작사회문화03 퀴즈' 이야기를 잘 이해하셨네요.
          </p>

          <div class="radar-container">
            <canvas id="radarCanvas" width="280" height="280"></canvas>
          </div>

          <div class="score-summary">
            <h3>📊 영역별 점수 (각 10점 만점)</h3>
            <div class="score-item">
              <span class="category">👤 인물파악</span>
              <span class="score">${radarScores["인물파악"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">✅ 내용일치</span>
              <span class="score">${radarScores["내용일치"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🏗️ 내용구조</span>
              <span class="score">${radarScores["내용구조"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">📚 내용어휘</span>
              <span class="score">${radarScores["내용어휘"]} / 10</span>
            </div>
            <div class="score-item">
              <span class="category">🔍 내용추론</span>
              <span class="score">${radarScores["내용추론"]} / 10</span>
            </div>
            <div class="score-item" style="border-top: 2px solid #2d6a4f; margin-top: 10px; padding-top: 15px;">
              <span class="category" style="font-size: 18px;">총점</span>
              <span class="score" style="font-size: 22px; color: #1b4332;">${totalScore100}점</span>
            </div>
          </div>

          <button class="back-btn" onclick="goBack()">
            ← 목록으로 돌아가기
          </button>
          <button class="submit-btn" onclick="retryQuiz()" style="margin-top: 10px;">
            🔄 다시 풀기
          </button>
        </div>
      `;

      // 레이더 차트 그리기
      setTimeout(() => {
        drawRadarChart(radarScores);
      }, 100);

      // 결과 저장 (서버 API 호출)
      saveQuizResult(radarScores, totalScore100);

      // 결과 저장 (부모 창에 전달)
      if (window.parent !== window) {
        window.parent.postMessage({
          action: 'quizComplete',
          storyId: 'social03',
          season: getSeasonFromUrl(),
          scores: radarScores,
          totalScore: totalScore100
        }, '*');
      }
    }

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'social03',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
