<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작사회문화07 퀴즈 - 시즌1 관문평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url('/images/창작도서/창작사회문화07/00.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 32px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 18px;
      color: #2d6a4f;
      font-weight: 600;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-header .category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #2d6a4f;
    }

    .question-text {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.7;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 17px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: #2d6a4f;
      background: #f0fff4;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #2d6a4f;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45, 106, 79, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .score-summary {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 16px;
      margin: 25px 0;
      text-align: left;
    }

    .score-summary h3 {
      font-size: 18px;
      color: #2d6a4f;
      margin-bottom: 15px;
      text-align: center;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .score-item .category {
      font-weight: 600;
      color: #2c3e50;
    }

    .score-item .score {
      font-weight: 700;
      color: #2d6a4f;
    }

    .back-btn {
      background: white;
      border: 2px solid #2d6a4f;
      color: #2d6a4f;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #2d6a4f;
      color: white;
    }

    /* 레이더 차트 */
    .radar-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .radar-chart {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 24px;
      }
      .question-text {
        font-size: 17px;
      }
      .option-btn {
        font-size: 15px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 - 5가지 카테고리별 2문제씩 총 10문제
    // 카테고리: 인물파악, 내용일치, 내용구조, 내용어휘, 내용추론
    const quizDataSeason1 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "열두 번째 생일에 스마트폰을 받고 SNS를 시작하는 초등학교 6학년 소녀의 이름은?",
        options: [
          "하린",
          "예린",
          "수아",
          "서연"
        ],
        correct: 2
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "SNS의 건강한 사용법과 개인정보 보호를 가르쳐주는 '디지털 시민성의 수호자' 캐릭터의 이름은?",
        options: [
          "라이키",
          "커넥트",
          "아논",
          "가디언"
        ],
        correct: 3
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "이야기에서 SNS의 긍정적인 면으로 설명된 것은?",
        options: [
          "모든 정보가 항상 정확하다",
          "물리적 거리를 뛰어넘어 관심사 기반으로 사람들을 연결한다",
          "온라인에서 익명이므로 책임을 지지 않아도 된다",
          "팔로워 수가 인간의 가치를 결정한다"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "'하이라이트 릴 효과'가 이야기에서 의미하는 것은?",
        options: [
          "SNS에서 재미있는 영상만 찾아보고 시간을 보내는 것",
          "SNS에는 사람들의 가장 좋은 순간만 올라와서 비교하면 자신이 부족해 보이는 현상",
          "좋아요를 많이 받는 게시물이 상위에 노출되는 것",
          "광고가 자주 많이 뜨고 피로감을 주는 현상"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "수아가 SNS의 빛과 그림자를 경험하는 순서로 올바른 것은?",
        options: [
          "악플 → 가입 → 친구 확장 → 정보 활용",
          "가입과 연결의 기쁨 → 악플 피해 → 비교 문화 → 디지털 시민성 배움",
          "비교 문화 → 가입 → 악플 피해 → 연결",
          "디지털 시민성 → 악플 → 연결 → 가입"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "이야기에서 '디지털 시민 헌장'에 포함된 원칙의 순서는?",
        options: [
          "익명성 → 비교 → 연결 → 개인정보",
          "존중 → 책임 → 비판적 사고 → 사생활 존중 → 균형",
          "균형 → 존중 → 책임 → 연결 → 비교",
          "연결 → 악플 → 팔로워 → 좋아요"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'미디어 리터러시'가 이야기에서 의미하는 것은?",
        options: [
          "미디어를 많이 사용하는 능력",
          "정보의 바다에서 진짜와 가짜를 구별하는 능력",
          "사진을 예쁘게 편집하는 능력",
          "팔로워를 늘리는 능력"
        ],
        correct: 1
      },
      // 내용어휘 (8번째)
      {
        gate: 8,
        category: "내용어휘",
        question: "'탈억제 효과'가 이야기에서 설명하는 것은?",
        options: [
          "온라인에서 더 예의 바르게 행동하는 것",
          "익명 상황에서 자기 통제력이 약해지고 공격적 행동을 하기 쉬워지는 것",
          "온라인 세상에서 친구가 많아지고 인기가 높아지는 것",
          "스마트폰을 오래 사용하면서 생기는 중독 현상"
        ],
        correct: 1
      },
      // 내용추론 (9번째)
      {
        gate: 9,
        category: "내용추론",
        question: "수아가 악플 사건 후 SNS를 그만두지 않고 더 현명하게 사용하기로 결심한 이유는?",
        options: [
          "이미 팔로워가 많아서 포기하기 아까웠기 때문",
          "SNS에는 어두운 면도 있지만 밝은 힘도 있고, 안전하게 사용하는 방법을 배웠기 때문",
          "부모님이 계속 SNS를 하라고 권유하고 추천해서",
          "친구들이 모두 사용하니까 따라서 사용하려고"
        ],
        correct: 1
      },
      // 내용추론 (10번째)
      {
        gate: 10,
        category: "내용추론",
        question: "이 이야기가 전하는 핵심 메시지는?",
        options: [
          "SNS는 사람들에게 무조건 해롭기만 하고 좋은 점이 없다",
          "SNS에서 팔로워 수가 많을수록 실제 삶에서도 더 행복해진다",
          "기술은 사용하는 사람에 따라 달라지며, SNS의 주인은 기술이 아니라 우리 자신이다",
          "온라인에서 익명으로 활동하면 어떤 행동을 해도 괜찮다"
        ],
        correct: 2
      }
    ];

    // 시즌2 (5~6학년 수준) - 원리와 이유를 묻는 심화 문제
    const quizDataSeason2 = [
      // 인물파악 (1번째)
      {
        gate: 1,
        category: "인물파악",
        question: "수아가 SNS를 시작하면서 기쁨과 아픔을 모두 경험하게 되는 것이 보여주는 의미는?",
        options: [
          "SNS가 나쁘다는 것을 보여주려는 의도이다",
          "모든 기술은 긍정적인 면과 부정적인 면이 함께 있어 현명하게 사용해야 함",
          "스마트폰이 비싸다는 것을 보여주려는 의도이다",
          "생일 선물이 좋다는 것을 보여주려는 의도이다"
        ],
        correct: 1
      },
      // 인물파악 (2번째)
      {
        gate: 2,
        category: "인물파악",
        question: "'가디언'이 '디지털 시민성의 수호자'로 등장하는 이유는?",
        options: [
          "이름이 멋있어서 캐릭터로 사용된 것이다",
          "디지털 세상에서도 시민으로서 지켜야 할 권리와 책임이 있음을 알려주려고",
          "게임 캐릭터로 인기가 있어서 등장한 것이다",
          "유행하는 이름이라서 이야기에 등장하게 되었다"
        ],
        correct: 1
      },
      // 내용일치 (3번째)
      {
        gate: 3,
        category: "내용일치",
        question: "SNS가 '물리적 거리를 뛰어넘어 연결'하는 것이 긍정적인 이유는?",
        options: [
          "멀리 여행을 안 해도 되니까 편리하기 때문에",
          "관심사가 같은 사람들을 찾아 배우고 교류할 수 있는 기회가 늘어남",
          "전화비가 절약되니까 경제적으로 이득이기 때문에",
          "직접 만나는 친구가 필요 없으니까 혼자 지낼 수 있음"
        ],
        correct: 1
      },
      // 내용일치 (4번째)
      {
        gate: 4,
        category: "내용일치",
        question: "'하이라이트 릴 효과'가 자존감에 해로운 이유는?",
        options: [
          "사진이 예쁘게 보정되어 있어서 실제 모습과 다르게 느껴지기 때문",
          "다른 사람의 최고 순간과 자신의 일상을 비교하면 자존감이 떨어질 수 있음",
          "영상이 너무 길어서 보는 데 시간이 많이 걸리고 피곤해지기 때문",
          "좋아요 숫자가 많이 보여서 다른 사람들이 부러워지기 때문"
        ],
        correct: 1
      },
      // 내용구조 (5번째)
      {
        gate: 5,
        category: "내용구조",
        question: "수아의 경험이 '빛 → 그림자 → 배움' 순서로 진행되는 것이 주는 교훈은?",
        options: [
          "이야기 구조상 순서가 그렇게 정해져 있어서 따라야 해서",
          "좋은 점을 경험하고 문제점을 겪은 후에야 현명하게 사용하는 법 배움",
          "SNS에는 나쁜 점만 있어서 결국 사용을 포기해야 한다는 것을 보여줌",
          "SNS에는 좋은 점만 있어서 무조건 많이 사용해야 한다는 것을 보여줌"
        ],
        correct: 1
      },
      // 내용구조 (6번째)
      {
        gate: 6,
        category: "내용구조",
        question: "'디지털 시민 헌장'에 존중, 책임, 비판적 사고가 포함된 이유는?",
        options: [
          "어른들이 일방적으로 정해서 학생들이 무조건 따라야 함",
          "온라인에서도 서로 존중하고 책임감 있게 행동해야 건강한 커뮤니티 유지",
          "규칙이 많으면 많을수록 좋고 지키기도 쉬워지기 때문",
          "세 가지 단어가 외우기 좋고 기억하기 편리하기 때문"
        ],
        correct: 1
      },
      // 내용어휘 (7번째)
      {
        gate: 7,
        category: "내용어휘",
        question: "'미디어 리터러시'가 현대 사회에서 중요한 이유는?",
        options: [
          "미디어가 재미있고 흥미로워서 많이 보면 좋기 때문",
          "정보가 넘치는 시대에 진짜와 가짜를 구별해야 올바른 판단 가능",
          "학교 시험에 자주 출제되니까 꼭 외워야 하기 때문",
          "어른들이 좋아하는 개념이라서 알아두면 칭찬받기 때문"
        ],

    // URL 파라미터에서 시즌 정보 가져오기

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      const isCorrect = selectedAnswer === quiz.correct;

      if (isCorrect) {
        // 정답 - 카테고리 점수 추가
        categoryScores[quiz.category]++;
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');
        showResult(true);
      } else {
        // 오답 - 정답 표시
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');
        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      // 결과 메시지 추가
      const resultMsg = document.createElement('div');

    // 영역별 점수를 10점 만점으로 환산 (2문제=10점, 1문제=5점, 0문제=1점)
    function convertToRadarScore(correctCount) {
      if (correctCount === 2) return 10;
      if (correctCount === 1) return 5;
      return 1;
    }

    // 레이더 차트 그리기
    function drawRadarChart(scores) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = 140;
      const centerY = 140;
      const maxRadius = 100;

      // 5각형 좌표 계산 (상단부터 시계방향)
      const angles = [];
      for (let i = 0; i < 5; i++) {
        angles.push((Math.PI * 2 * i / 5) - Math.PI / 2);
      }

      // 배경 격자 그리기 (10, 5, 1 레벨)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;

      [1, 0.5, 0.1].forEach(ratio => {
        ctx.beginPath();
        for (let i = 0; i <= 5; i++) {
          const angle = angles[i % 5];
          const x = centerX + Math.cos(angle) * maxRadius * ratio;
          const y = centerY + Math.sin(angle) * maxRadius * ratio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      // 축 그리기
      ctx.strokeStyle = '#d0d0d0';
      angles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      });

      // 데이터 영역 그리기
      const categories = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      ctx.beginPath();
      ctx.fillStyle = 'rgba(45, 106, 79, 0.3)';
      ctx.strokeStyle = '#2d6a4f';
      ctx.lineWidth = 2;

      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 데이터 포인트 그리기
      ctx.fillStyle = '#1b4332';
      categories.forEach((cat, i) => {
        const score = scores[cat];
        const ratio = score / 10;
        const x = centerX + Math.cos(angles[i]) * maxRadius * ratio;
        const y = centerY + Math.sin(angles[i]) * maxRadius * ratio;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 라벨 그리기
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 12px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';

      const labelOffset = 18;
      const labels = ['인물파악', '내용일치', '내용구조', '내용어휘', '내용추론'];
      labels.forEach((label, i) => {
        const x = centerX + Math.cos(angles[i]) * (maxRadius + labelOffset);
        const y = centerY + Math.sin(angles[i]) * (maxRadius + labelOffset);
        ctx.fillText(label, x, y + 4);
      });
    }

      // 레이더 차트 그리기

      if (window.parent !== window) {
        window.parent.postMessage({

    // 서버에 결과 저장
    async function saveQuizResult(scores, totalScore) {
      try {
        // 로그인 정보 가져오기 (sessionStorage 'user' 키 사용)
        const userInfo = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');
        const grade = userInfo.grade || '';
        const name = userInfo.name || '';

        if (!grade || !name) {
          console.log('[saveQuizResult] 로그인 정보 없음 - 저장 건너뜀');
          return;
        }

        // URL 파라미터에서 시즌 가져오기
        const season = getSeasonFromUrl();

        const response = await fetch('/api/creative-quiz/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade,
            name,
            storyId: 'social07',
            season,
            scores,
            totalScore
          })
        });

        const result = await response.json();
        if (result.ok) {
          console.log('[saveQuizResult] 저장 완료:', result);
        } else {
          console.error('[saveQuizResult] 저장 실패:', result.message);
        }
      } catch (err) {
        console.error('[saveQuizResult] 오류:', err);
      }
    }

    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'closeStory' }, '*');
      } else {
        window.history.back();
      }
    }

    function retryQuiz() {
      currentGate = 0;
      selectedAnswer = null;
      categoryScores = {
        "인물파악": 0,
        "내용일치": 0,
        "내용구조": 0,
        "내용어휘": 0,
        "내용추론": 0
      };
      renderQuiz();
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 목록으로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
