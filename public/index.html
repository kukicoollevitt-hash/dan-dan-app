<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>AI BRAIN 문해력 | 메인</title>
  <style>
    /* 🔄 로딩 스피너 - 인라인 크리티컬 CSS (즉시 로드) */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(242, 237, 229, 0.95);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .spinner-container {
      text-align: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(139, 47, 47, 0.2);
      border-top: 4px solid #8b2f2f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    .loading-text {
      color: #8b2f2f;
      font-size: 16px;
      font-weight: 600;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 🔄 로딩 오버레이 -->
  <div id="loading-overlay">
    <div class="spinner-container">
      <div class="spinner"></div>
      <div class="loading-text">AI 학습 인식 중...</div>
    </div>
  </div>

  <h2>로그인</h2>
  <form action="/login" method="POST">
    <label>아이디(전화번호): <input name="id" required /></label><br />
    <label>비밀번호(전화번호): <input type="password" name="pw" required /></label><br />
    <button type="submit">로그인</button>
  </form>
  <a href="/signup.html">회원가입</a>

  <!-- 🔄 로딩 스피너 제어 스크립트 -->
  <script>
    // 페이지 로드 완료 시 스피너 숨김
    window.addEventListener('load', function() {
      const loadingOverlay = document.getElementById('loading-overlay');
      if (loadingOverlay) {
        loadingOverlay.classList.add('fade-out');
        setTimeout(() => {
          loadingOverlay.style.display = 'none';
        }, 500);
      }
    });
  </script>
</body>
</html>
