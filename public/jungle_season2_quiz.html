<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>깊은 정글 - 시즌2 관문</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url(https://cdn.jsdelivr.net/gh/kukicoollevitt-hash/dan-dan-app@main/public/images/jungle-story/jungle_s1_main.jpg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(39, 174, 96, 0.3);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 36px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 20px;
      color: #27ae60;
      font-weight: 600;
      background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #27ae60 0%, #1e8449 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #27ae60;
    }

    .question-text {
      font-size: 22px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.6;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 18px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
    }

    .option-btn:hover {
      border-color: #27ae60;
      background: #e8f5e9;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #27ae60;
      background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(39, 174, 96, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 20px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .back-btn {
      background: white;
      border: 2px solid #27ae60;
      color: #27ae60;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #27ae60;
      color: white;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 28px;
      }
      .question-text {
        font-size: 18px;
      }
      .option-btn {
        font-size: 16px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 (시즌1 스토리 기반)
    const quizData = [
      {
        gate: 1,
        question: "라온이 처음 정글에서 들은 이상한 소리는?",
        options: [
          "새들의 노래 소리",
          "바람 소리",
          "물 흐르는 소리",
          "나무가 부러지는 소리"
        ],
        correct: 1
      },
      {
        gate: 2,
        question: "라온과 함께 모험을 떠난 두 친구의 이름은?",
        options: [
          "하리와 준오",
          "민호와 나래",
          "지우와 태양",
          "준호와 수지"
        ],
        correct: 0
      },
      {
        gate: 3,
        question: "정글 입구에서 세 친구가 발견한 첫 수수께끼가 새겨진 곳은?",
        options: [
          "나무 기둥",
          "바위",
          "동굴 입구",
          "나뭇잎"
        ],
        correct: 1
      },
      {
        gate: 4,
        question: "살아 움직이는 식물의 길을 통과하기 위해 필요했던 것은?",
        options: [
          "빠른 달리기",
          "식물과의 대화",
          "조용한 발걸음과 존중",
          "마법의 주문"
        ],
        correct: 2
      },
      {
        gate: 5,
        question: "정글의 수호자 이름은?",
        options: [
          "그로아",
          "라오",
          "모아나",
          "타우"
        ],
        correct: 0
      },
      {
        gate: 6,
        question: "첫 번째 시험에서 아이들이 맞춰야 했던 것은?",
        options: [
          "정글의 노래",
          "정글의 균형",
          "정글의 색깔",
          "정글의 비밀"
        ],
        correct: 1
      },
      {
        gate: 7,
        question: "숨겨진 길을 여는 빛의 열쇠는 무엇으로 만들어졌나?",
        options: [
          "황금",
          "다이아몬드",
          "빛 자체",
          "나무"
        ],
        correct: 2
      },
      {
        gate: 8,
        question: "두 번째 시험인 어둠의 미로에서 중요한 것은?",
        options: [
          "빠른 속도",
          "서로를 믿는 마음",
          "강한 힘",
          "좋은 시력"
        ],
        correct: 1
      },
      {
        gate: 9,
        question: "잊힌 도시의 문 앞에서 그로아가 말한 것은?",
        options: [
          "용기를 가진 자만 들어갈 수 있다",
          "순수한 마음을 가진 자만 도시를 깨울 수 있다",
          "힘이 센 자만 문을 열 수 있다",
          "지혜로운 자만 보물을 찾을 수 있다"
        ],
        correct: 1
      },
      {
        gate: 10,
        question: "잊힌 도시가 다시 빛으로 깨어났을 때 무엇이 나타났나?",
        options: [
          "보물 상자",
          "마법의 책",
          "정글 전체가 빛으로 반짝이며 살아났다",
          "거대한 나무"
        ],
        correct: 2
      }
    ];

    let currentGate = 0;
    let selectedAnswer = null;

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>🚪 시즌2 관문 ${quiz.gate}</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      if (selectedAnswer === quiz.correct) {
        // 정답!
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');

        showResult(true);
      } else {
        // 오답!
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');

        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      if (isCorrect) {
        // 정답 메시지 추가
        const resultMsg = document.createElement('div');
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
        container.insertBefore(resultMsg, container.firstChild);

        // 1.5초 후 다음 문제로
        setTimeout(() => {
          currentGate++;
          selectedAnswer = null;

          if (currentGate >= quizData.length) {
            // 모든 관문 통과!
            showCongratulations();
          } else {
            renderQuiz();
          }
        }, 1500);
      } else {
        // 오답 메시지 추가
        const resultMsg = document.createElement('div');
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다! 관문 1로 돌아갑니다...';
        container.insertBefore(resultMsg, container.firstChild);

        // 2초 후 관문 1로
        setTimeout(() => {
          currentGate = 0;
          selectedAnswer = null;
          renderQuiz();
        }, 2000);
      }
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 축하합니다! 🎊</h2>
          <p>
            10개의 관문을 모두 통과했습니다!<br>
            시즌1의 이야기를 완벽하게 기억하고 계시네요.<br><br>
            <strong>시즌2의 새로운 모험이 곧 시작됩니다...</strong>
          </p>
          <button class="back-btn" onclick="goBack()">
            ← 시즌1로 돌아가기
          </button>
          <button class="submit-btn" onclick="goToSeason2()" style="margin-top: 10px;">
            🚀 시즌2 시작하기
          </button>
        </div>
      `;
    }

    function goBack() {
      window.history.back();
    }

    function goToSeason2() {
      window.location.href = '/jungle_journey_season2.html';
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 시즌1로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
