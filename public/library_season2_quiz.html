<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>살아 있는 신비의 도서관 - 시즌2 관문</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gmarket Sans", "Noto Sans KR", sans-serif;
      background: url(https://cdn.jsdelivr.net/gh/kukicoollevitt-hash/dan-dan-app@main/public/images/library-story/library_part1_main.jpg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 0;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .quiz-header h1 {
      font-size: 36px;
      color: #2c3e50;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-header .gate-number {
      font-size: 20px;
      color: #8B4789;
      font-weight: 600;
      background: linear-gradient(135deg, #8B4789 0%, #5B2C6F 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #8B4789 0%, #5B2C6F 100%);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-box {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      border-left: 5px solid #8B4789;
    }

    .question-text {
      font-size: 22px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.6;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 20px 25px;
      border-radius: 15px;
      font-size: 18px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
    }

    .option-btn:hover {
      border-color: #8B4789;
      background: #f0f4ff;
      transform: translateX(5px);
    }

    .option-btn.selected {
      border-color: #8B4789;
      background: linear-gradient(135deg, #8B4789 0%, #5B2C6F 100%);
      color: white;
    }

    .option-btn.correct {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .option-btn.wrong {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #8B4789 0%, #5B2C6F 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139, 71, 137, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-message {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-message.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result-message.wrong {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }

    .congrats-container {
      text-align: center;
      animation: scaleIn 0.6s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .congrats-container h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .congrats-container p {
      font-size: 20px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .back-btn {
      background: white;
      border: 2px solid #8B4789;
      color: #8B4789;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 10px;
    }

    .back-btn:hover {
      background: #8B4789;
      color: white;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .quiz-container {
        padding: 30px 20px;
      }
      .quiz-header h1 {
        font-size: 28px;
      }
      .question-text {
        font-size: 18px;
      }
      .option-btn {
        font-size: 16px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <!-- 퀴즈 내용이 여기에 동적으로 생성됩니다 -->
  </div>

  <script>
    // 퀴즈 문제 데이터 (시즌2 - 5~6학년 수준)
    const quizData = [
      {
        gate: 1,
        question: "민준이 도서관에서 우연히 발견하게 된 책의 정확한 제목은 무엇인가요?",
        options: [
          "도서관에 숨겨진 비밀",
          "밤의 도서관 수호록",
          "신비로운 도서관 이야기",
          "마법이 깃든 책"
        ],
        correct: 1
      },
      {
        gate: 2,
        question: "민준이 그 책의 첫 페이지를 펼쳤을 때 경험한 감각은 무엇인가요?",
        options: [
          "온기가 느껴지는 미풍",
          "서늘하고 차가운 기운",
          "희미한 빛의 파동이 손끝을 스쳐 지나가는 느낌",
          "갑작스러운 전기적 자극"
        ],
        correct: 2
      },
      {
        gate: 3,
        question: "민준과 함께 신비로운 모험을 시작하게 된 두 동료의 이름은 무엇인가요?",
        options: [
          "수아와 태영",
          "지우와 나래",
          "민호와 수지",
          "준호와 지연"
        ],
        correct: 0
      },
      {
        gate: 4,
        question: "책 속 세계에서 등장하여 아이들을 안내한 고양이의 이름은 무엇인가요?",
        options: [
          "미미",
          "나비",
          "루미",
          "별이"
        ],
        correct: 2
      },
      {
        gate: 5,
        question: "루미가 설명해 준 이 도서관만의 독특한 마법적 특성은 무엇인가요?",
        options: [
          "낮 시간이 되면 책들이 스스로 깨어난다",
          "밤이 찾아오면 책 속 인물들이 실제 세계로 나타난다",
          "새벽이 오면 책들이 흔적 없이 사라진다",
          "해질녘이 되면 도서관 전체가 이동한다"
        ],
        correct: 1
      },
      {
        gate: 6,
        question: "고대 서적에 담긴 힘을 탈취하려는 악당 조직의 명칭은 무엇인가요?",
        options: [
          "암흑의 결사단",
          "블랙 페이지단",
          "그림자 속 독서회",
          "심야의 비밀단"
        ],
        correct: 1
      },
      {
        gate: 7,
        question: "《요정 숲의 비밀》이라는 책이 아이들을 위해 만들어낸 보호 장치는 무엇인가요?",
        options: [
          "모습을 감추는 투명 망토",
          "주문을 걸 수 있는 마법 지팡이",
          "거미줄처럼 섬세한 빛의 은신 장막",
          "공격을 막아주는 방어막"
        ],
        correct: 2
      },
      {
        gate: 8,
        question: "루미가 세 아이에게 각각 나누어 준 인장의 총 개수는 몇 개인가요?",
        options: [
          "두 개",
          "세 개",
          "네 개",
          "다섯 개"
        ],
        correct: 1
      },
      {
        gate: 9,
        question: "민준에게 특별히 부여된 인장의 명칭은 무엇인가요?",
        options: [
          "용기의 인장",
          "관찰의 인장",
          "지혜의 인장",
          "힘의 인장"
        ],
        correct: 2
      },
      {
        gate: 10,
        question: "루미가 아이들에게 공식적으로 부여한 새로운 직함은 무엇인가요?",
        options: [
          "도서관의 수호 지킴이",
          "책들의 영원한 수호자",
          "밤의 수호자",
          "빛을 지키는 전사"
        ],
        correct: 2
      }
    ];

    let currentGate = 0;
    let selectedAnswer = null;

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      const quiz = quizData[currentGate];

      container.innerHTML = `
        <div class="quiz-header">
          <h1>📚 시즌2 관문 ${quiz.gate}</h1>
          <p class="gate-number">10개 관문 중 ${quiz.gate}번째</p>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${(quiz.gate / 10) * 100}%"></div>
        </div>

        <div class="question-box">
          <p class="question-text">${quiz.question}</p>
        </div>

        <div class="options-container">
          ${quiz.options.map((option, index) => `
            <button class="option-btn" onclick="selectAnswer(${index})">
              ${index + 1}. ${option}
            </button>
          `).join('')}
        </div>

        <button class="submit-btn" onclick="submitAnswer()" disabled>
          답안 제출
        </button>
      `;
    }

    function selectAnswer(index) {
      selectedAnswer = index;

      // 모든 버튼 선택 해제
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 선택한 버튼 표시
      buttons[index].classList.add('selected');

      // 제출 버튼 활성화
      document.querySelector('.submit-btn').disabled = false;
    }

    function submitAnswer() {
      const quiz = quizData[currentGate];
      const buttons = document.querySelectorAll('.option-btn');
      const submitBtn = document.querySelector('.submit-btn');

      // 버튼 비활성화
      buttons.forEach(btn => btn.disabled = true);
      submitBtn.disabled = true;

      if (selectedAnswer === quiz.correct) {
        // 정답!
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('correct');

        showResult(true);
      } else {
        // 오답!
        buttons[selectedAnswer].classList.remove('selected');
        buttons[selectedAnswer].classList.add('wrong');
        buttons[quiz.correct].classList.add('correct');

        showResult(false);
      }
    }

    function showResult(isCorrect) {
      const container = document.getElementById('quizContainer');

      if (isCorrect) {
        // 정답 메시지 추가
        const resultMsg = document.createElement('div');
        resultMsg.className = 'result-message correct';
        resultMsg.innerHTML = '🎉 정답입니다! 다음 관문으로 이동합니다...';
        container.insertBefore(resultMsg, container.firstChild);

        // 1.5초 후 다음 문제로
        setTimeout(() => {
          currentGate++;
          selectedAnswer = null;

          if (currentGate >= quizData.length) {
            // 모든 관문 통과!
            showCongratulations();
          } else {
            renderQuiz();
          }
        }, 1500);
      } else {
        // 오답 메시지 추가
        const resultMsg = document.createElement('div');
        resultMsg.className = 'result-message wrong';
        resultMsg.innerHTML = '❌ 틀렸습니다! 관문 1로 돌아갑니다...';
        container.insertBefore(resultMsg, container.firstChild);

        // 2초 후 관문 1로
        setTimeout(() => {
          currentGate = 0;
          selectedAnswer = null;
          renderQuiz();
        }, 2000);
      }
    }

    function showCongratulations() {
      const container = document.getElementById('quizContainer');

      container.innerHTML = `
        <div class="congrats-container">
          <h2>🎊 축하합니다! 🎊</h2>
          <p>
            10개의 관문을 모두 통과했습니다!<br>
            시즌1의 이야기를 완벽하게 기억하고 계시네요.<br><br>
            <strong>시즌2의 새로운 모험이 곧 시작됩니다...</strong>
          </p>
          <button class="back-btn" onclick="goBack()">
            ← 시즌1로 돌아가기
          </button>
          <button class="submit-btn" onclick="goToSeason2()" style="margin-top: 10px;">
            📖 시즌2 시작하기
          </button>
        </div>
      `;
    }

    function goBack() {
      window.location.href = '/library/library_season1.html';
    }

    function goToSeason2() {
      window.location.href = '/library/library_season2.html';
    }

    // 페이지 로드 시 첫 번째 퀴즈 표시
    window.addEventListener('DOMContentLoaded', () => {
      renderQuiz();
    });

    // ESC 키로 뒤로가기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirm('퀴즈를 종료하고 시즌1로 돌아가시겠습니까?')) {
          goBack();
        }
      }
    });
  </script>
</body>
</html>
