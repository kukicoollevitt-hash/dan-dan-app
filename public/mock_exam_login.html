<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단단국어 모의고사 - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 32px;
        }

        .logo-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #888;
        }

        .tab-buttons {
            display: flex;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #fff;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .input-group input::placeholder {
            color: #bbb;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #11998e;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
            font-size: 12px;
            color: #999;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .info-box p {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .info-box strong {
            color: #667eea;
        }

        /* 로딩 스피너 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo-title {
                font-size: 20px;
            }

            .input-group input,
            .input-group select {
                padding: 12px 14px;
                font-size: 14px;
            }

            .submit-btn {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">📝</div>
            <div class="logo-title">단단국어 모의고사</div>
            <div class="logo-subtitle">나의 모의고사 학습실</div>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
            <button class="tab-btn" onclick="switchTab('register')">회원가입</button>
        </div>

        <!-- 로그인 폼 -->
        <div class="form-section active" id="loginForm">
            <div class="input-group">
                <label>학년</label>
                <select id="loginGrade">
                    <option value="">학년 선택</option>
                    <option value="중1">중1</option>
                    <option value="중2">중2</option>
                    <option value="중3">중3</option>
                    <option value="고1">고1</option>
                    <option value="고2">고2</option>
                    <option value="고3">고3</option>
                    <option value="N수">N수</option>
                </select>
            </div>
            <div class="input-group">
                <label>이름</label>
                <input type="text" id="loginName" placeholder="이름 입력">
            </div>
            <div class="input-group">
                <label>비밀번호 <span style="font-weight: 400; color: #888;">(가입 시 등록한 전화번호를 입력하세요)</span></label>
                <input type="tel" id="loginPassword" placeholder="010-0000-0000">
            </div>
            <button class="submit-btn" onclick="handleLogin()">로그인</button>
            <div class="error-message" id="loginError"></div>
        </div>

        <!-- 회원가입 폼 -->
        <div class="form-section" id="registerForm">
            <div class="input-group">
                <label>이름</label>
                <input type="text" id="regName" placeholder="이름 입력">
            </div>
            <div class="input-group">
                <label>학교</label>
                <input type="text" id="regSchool" placeholder="예: ○○고등학교">
            </div>
            <div class="input-group">
                <label>학년</label>
                <select id="regGrade">
                    <option value="">학년 선택</option>
                    <option value="중1">중1</option>
                    <option value="중2">중2</option>
                    <option value="중3">중3</option>
                    <option value="고1">고1</option>
                    <option value="고2">고2</option>
                    <option value="고3">고3</option>
                    <option value="N수">N수</option>
                </select>
            </div>
            <div class="input-group">
                <label>전화번호 <span style="font-weight: 400; color: #ff6b6b;">(비밀번호로 사용됩니다! 정확히 입력해주세요)</span></label>
                <input type="tel" id="regPhone" placeholder="010-0000-0000">
            </div>
            <div class="input-group">
                <label>전화번호 확인</label>
                <input type="tel" id="regPhoneConfirm" placeholder="전화번호 다시 입력">
            </div>
            <button class="submit-btn" onclick="handleRegister()">회원가입</button>
            <div class="error-message" id="registerError"></div>
            <div class="success-message" id="registerSuccess"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">처리 중...</p>
        </div>

        <div class="info-box">
            <p>
                <strong>안내</strong><br>
                회원가입 시 등록한 학년, 이름, 전화번호로 로그인합니다.
            </p>
        </div>
    </div>

    <script>
        // 탭 전환
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }

            // 에러 메시지 초기화
            document.querySelectorAll('.error-message, .success-message').forEach(msg => {
                msg.classList.remove('show');
                msg.textContent = '';
            });
        }

        // 전화번호 포맷팅
        function formatPhone(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            if (value.length > 3 && value.length <= 7) {
                value = value.slice(0, 3) + '-' + value.slice(3);
            } else if (value.length > 7) {
                value = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
            }
            input.value = value;
        }

        // 전화번호 입력 이벤트
        document.getElementById('loginPassword').addEventListener('input', function() { formatPhone(this); });
        document.getElementById('regPhone').addEventListener('input', function() { formatPhone(this); });
        document.getElementById('regPhoneConfirm').addEventListener('input', function() { formatPhone(this); });

        // 로딩 표시
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.querySelectorAll('.form-section').forEach(form => form.style.display = 'none');
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.querySelectorAll('.form-section').forEach(form => {
                if (form.classList.contains('active')) {
                    form.style.display = 'block';
                }
            });
        }

        // 로그인 처리
        async function handleLogin() {
            const grade = document.getElementById('loginGrade').value;
            const name = document.getElementById('loginName').value.trim();
            const phone = document.getElementById('loginPassword').value.trim(); // 비밀번호 = 전화번호
            const errorEl = document.getElementById('loginError');

            // 유효성 검사
            if (!grade) {
                errorEl.textContent = '학년을 선택해주세요.';
                errorEl.classList.add('show');
                return;
            }
            if (!name) {
                errorEl.textContent = '이름을 입력해주세요.';
                errorEl.classList.add('show');
                return;
            }
            if (!phone) {
                errorEl.textContent = '비밀번호(전화번호)를 입력해주세요.';
                errorEl.classList.add('show');
                return;
            }

            errorEl.classList.remove('show');
            showLoading();

            try {
                const response = await fetch('/api/mock-exam/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grade, name, phone })
                });

                const data = await response.json();

                if (data.ok) {
                    // 로그인 성공 - 세션 저장 후 학습실로 이동
                    localStorage.setItem('mockExamUser', JSON.stringify(data.user));
                    window.location.href = '/mock_exam_dashboard.html';
                } else {
                    hideLoading();
                    errorEl.textContent = data.error || '로그인에 실패했습니다.';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                hideLoading();
                errorEl.textContent = '서버 오류가 발생했습니다.';
                errorEl.classList.add('show');
            }
        }

        // 회원가입 처리
        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const school = document.getElementById('regSchool').value.trim();
            const grade = document.getElementById('regGrade').value;
            const phone = document.getElementById('regPhone').value.trim();
            const phoneConfirm = document.getElementById('regPhoneConfirm').value.trim();

            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            // 유효성 검사
            if (!name) {
                errorEl.textContent = '이름을 입력해주세요.';
                errorEl.classList.add('show');
                return;
            }
            if (!school) {
                errorEl.textContent = '학교를 입력해주세요.';
                errorEl.classList.add('show');
                return;
            }
            if (!grade) {
                errorEl.textContent = '학년을 선택해주세요.';
                errorEl.classList.add('show');
                return;
            }
            if (!phone) {
                errorEl.textContent = '전화번호를 입력해주세요.';
                errorEl.classList.add('show');
                return;
            }
            if (phone !== phoneConfirm) {
                errorEl.textContent = '전화번호가 일치하지 않습니다.';
                errorEl.classList.add('show');
                return;
            }

            showLoading();

            try {
                const response = await fetch('/api/mock-exam/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, school, grade, phone })
                });

                const data = await response.json();

                if (data.ok) {
                    hideLoading();
                    successEl.textContent = '회원가입이 완료되었습니다. 로그인해주세요.';
                    successEl.classList.add('show');

                    // 폼 초기화
                    document.getElementById('regName').value = '';
                    document.getElementById('regSchool').value = '';
                    document.getElementById('regGrade').value = '';
                    document.getElementById('regPhone').value = '';
                    document.getElementById('regPhoneConfirm').value = '';

                    // 2초 후 로그인 탭으로 전환
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginGrade').value = grade;
                        document.getElementById('loginName').value = name;
                        document.getElementById('loginPassword').value = phone;
                    }, 2000);
                } else {
                    hideLoading();
                    errorEl.textContent = data.error || '회원가입에 실패했습니다.';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                hideLoading();
                errorEl.textContent = '서버 오류가 발생했습니다.';
                errorEl.classList.add('show');
            }
        }

        // 엔터 키 처리
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('regPhoneConfirm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleRegister();
        });

        // 페이지 로드 시 이미 로그인된 경우 학습실로 이동
        document.addEventListener('DOMContentLoaded', function() {
            const user = localStorage.getItem('mockExamUser');
            if (user) {
                window.location.href = '/mock_exam_dashboard.html';
            }
        });
    </script>
</body>
</html>
