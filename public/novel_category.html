<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작도서 - 고래도서관</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      color: #fff;
      font-size: 2.5em;
      font-weight: 900;
      margin-bottom: 10px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .header p {
      color: #a8dadc;
      font-size: 1.1em;
      font-weight: 300;
    }

    .category-container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
    }

    .category-card {
      width: 320px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .category-card:hover {
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }

    .card-image {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    .card-image.general {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-image.grade34 {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .card-image.grade56 {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .card-content {
      padding: 25px;
    }

    .card-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .general .card-badge {
      background: #667eea20;
      color: #667eea;
    }

    .grade34 .card-badge {
      background: #f5576c20;
      color: #f5576c;
    }

    .grade56 .card-badge {
      background: #4facfe20;
      color: #4facfe;
    }

    .card-content h2 {
      font-size: 1.4em;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    .card-content p {
      font-size: 0.9em;
      color: #666;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .card-count {
      font-size: 0.85em;
      color: #999;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-count span {
      font-weight: 700;
      color: #1a1a2e;
    }

    .back-btn {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.95em;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateX(-5px);
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .category-container {
        flex-direction: column;
        align-items: center;
      }

      .category-card {
        width: 100%;
        max-width: 350px;
      }

      .back-btn {
        top: 15px;
        left: 15px;
        padding: 10px 18px;
        font-size: 0.85em;
      }
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    돌아가기
  </button>

  <div class="header">
    <h1>창작도서</h1>
    <p>카테고리를 선택해주세요</p>
  </div>

  <div class="category-container">

    <!-- 일반 창작도서 공통 -->
    <div class="category-card general" onclick="location.href='/novel_general.html'">
      <div class="card-image general">
        <span>📚</span>
      </div>
      <div class="card-content">
        <div class="card-badge">공통</div>
        <h2>일반 창작도서</h2>
        <p>고래섬, 신비의 도서관, 시간도서관 등 모든 학년이 즐길 수 있는 창작 이야기</p>
        <div class="card-count">시리즈 <span>32개</span></div>
      </div>
    </div>

    <!-- 교과기반 창작도서 3-4학년 -->
    <div class="category-card grade34" onclick="location.href='/novel_grade34.html'">
      <div class="card-image grade34">
        <span>📖</span>
      </div>
      <div class="card-content">
        <div class="card-badge">3-4학년</div>
        <h2>교과기반 창작도서</h2>
        <p>3~4학년 교과 내용을 바탕으로 한 재미있는 창작 이야기</p>
        <div class="card-count">시리즈 <span>104개</span></div>
      </div>
    </div>

    <!-- 교과기반 창작도서 5-6학년 -->
    <div class="category-card grade56" onclick="location.href='/novel_grade56.html'">
      <div class="card-image grade56">
        <span>📕</span>
      </div>
      <div class="card-content">
        <div class="card-badge">5-6학년</div>
        <h2>교과기반 창작도서</h2>
        <p>5~6학년 교과 내용을 바탕으로 한 심화 창작 이야기</p>
        <div class="card-count">시리즈 <span>104개</span></div>
      </div>
    </div>

  </div>

</body>
</html>
