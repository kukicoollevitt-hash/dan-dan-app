<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고래 도서관 독서 감상문</title>

  <!-- Open Graph 메타 태그 (카카오톡, SNS 공유용) -->
  <meta property="og:title" content="고래 도서관 독서 감상문">
  <meta property="og:description" content="브레인문해력 고래 도서관에서 작성한 독서 감상문입니다.">
  <meta property="og:image" content="https://brainmoon.co.kr/images/rudolph.png">
  <meta property="og:type" content="article">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .report-container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .report-header {
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .report-header img {
      width: 70px;
      height: 70px;
      margin-bottom: 15px;
    }

    .report-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .report-header .author {
      font-size: 16px;
      opacity: 0.9;
    }

    .report-header .date {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .report-body {
      padding: 30px;
    }

    .story-badge {
      display: inline-block;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      color: #2d6a4f;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .report-title {
      font-size: 22px;
      font-weight: 700;
      color: #1b4332;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e8f5e9;
    }

    .report-content {
      background: #fcfaf5;
      border-radius: 16px;
      padding: 25px;
      position: relative;
      min-height: 200px;
    }

    .report-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        transparent,
        transparent 27px,
        #e9ecef 27px,
        #e9ecef 28px
      );
      border-radius: 16px;
    }

    .report-content p {
      position: relative;
      z-index: 1;
      font-size: 16px;
      line-height: 2;
      color: #2c3e50;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .report-footer {
      padding: 20px 30px 30px;
      text-align: center;
    }

    .brainmoon-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .brainmoon-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(45, 106, 79, 0.4);
    }

    .watermark {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 80px;
      height: 80px;
      opacity: 0.08;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e0e0e0;
      border-top-color: #2d6a4f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: 60px 30px;
      color: #666;
    }

    .error-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .error h2 {
      font-size: 20px;
      color: #333;
      margin-bottom: 10px;
    }

    .error p {
      font-size: 14px;
      color: #888;
    }

    /* 섹션 스타일 */
    .report-section {
      margin-bottom: 20px;
    }

    .report-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #2d6a4f;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-content {
      background: white;
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #e8f5e9;
      font-size: 15px;
      line-height: 1.8;
      color: #2c3e50;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="report-container" id="reportContainer">
    <div class="loading" id="loadingState">
      <div class="loading-spinner"></div>
      <p>감상문을 불러오는 중...</p>
    </div>
  </div>

  <script>
    // URL에서 shareId 추출
    const pathParts = window.location.pathname.split('/');
    const shareId = pathParts[pathParts.length - 1];

    // 감상문 로드
    async function loadReport() {
      const container = document.getElementById('reportContainer');

      try {
        const response = await fetch(`/api/reading-report/shared/${shareId}`);
        const data = await response.json();

        if (!data.ok) {
          showError(data.message || '감상문을 찾을 수 없습니다');
          return;
        }

        const report = data.report;
        const sharedDate = new Date(report.sharedAt);
        const dateStr = `${sharedDate.getFullYear()}년 ${sharedDate.getMonth() + 1}월 ${sharedDate.getDate()}일`;

        // 내용 파싱 (섹션별로 구분)
        const contentHtml = parseContent(report.content);

        container.innerHTML = `
          <div class="report-header">
            <img src="/images/rudolph.png" alt="고래 도서관">
            <h1>고래 도서관 독서 감상문</h1>
            <div class="author">${report.authorGrade} ${report.authorName}</div>
            <div class="date">${dateStr}</div>
          </div>

          <div class="report-body">
            ${report.storyTitle ? `<div class="story-badge">📖 ${report.storyTitle}</div>` : ''}
            <h2 class="report-title">${escapeHtml(report.title)}</h2>
            <div class="report-content">
              ${contentHtml}
              <img src="/images/rudolph.png" alt="" class="watermark">
            </div>
          </div>

          <div class="report-footer">
            <a href="https://brainmoon.co.kr" class="brainmoon-link" target="_blank">
              🐋 브레인문해력 바로가기
            </a>
          </div>
        `;

        // OG 태그 동적 업데이트
        document.title = `${report.title} - 고래 도서관 독서 감상문`;

      } catch (error) {
        console.error('감상문 로드 오류:', error);
        showError('감상문을 불러오는 중 오류가 발생했습니다');
      }
    }

    // 내용 파싱 (섹션별로 구분)
    function parseContent(content) {
      // 섹션 구분자 확인
      const sectionPatterns = [
        { icon: '📚', title: '줄거리', pattern: /📚\s*줄거리\n?/ },
        { icon: '👤', title: '주인공 성격 & 주인공에게 배울 점', pattern: /👤\s*주인공 성격.*\n?/ },
        { icon: '🎭', title: '내가 만약 주인공이라면', pattern: /🎭\s*내가 만약.*\n?/ },
        { icon: '🎬', title: '재미있었던 장면', pattern: /🎬\s*재미있었던.*\n?/ },
        { icon: '💭', title: '책을 읽고 느낀 점', pattern: /💭\s*책을 읽고.*\n?/ }
      ];

      // 섹션이 있는지 확인
      const hasSection = sectionPatterns.some(s => s.pattern.test(content));

      if (!hasSection) {
        // 섹션이 없으면 그냥 텍스트로 표시
        return `<p>${escapeHtml(content)}</p>`;
      }

      // 섹션별로 분리
      let html = '';
      let remaining = content;

      sectionPatterns.forEach(section => {
        const match = remaining.match(section.pattern);
        if (match) {
          const startIdx = remaining.indexOf(match[0]);
          const afterMatch = remaining.substring(startIdx + match[0].length);

          // 다음 섹션 찾기
          let endIdx = afterMatch.length;
          sectionPatterns.forEach(nextSection => {
            const nextMatch = afterMatch.match(nextSection.pattern);
            if (nextMatch) {
              const nextIdx = afterMatch.indexOf(nextMatch[0]);
              if (nextIdx > 0 && nextIdx < endIdx) {
                endIdx = nextIdx;
              }
            }
          });

          const sectionContent = afterMatch.substring(0, endIdx).trim();
          if (sectionContent) {
            html += `
              <div class="report-section">
                <div class="section-title">${section.icon} ${section.title}</div>
                <div class="section-content">${escapeHtml(sectionContent)}</div>
              </div>
            `;
          }

          remaining = afterMatch.substring(endIdx);
        }
      });

      return html || `<p>${escapeHtml(content)}</p>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showError(message) {
      const container = document.getElementById('reportContainer');
      container.innerHTML = `
        <div class="error">
          <div class="error-icon">🐋</div>
          <h2>감상문을 찾을 수 없어요</h2>
          <p>${message}</p>
        </div>
        <div class="report-footer">
          <a href="https://brainmoon.co.kr" class="brainmoon-link" target="_blank">
            🐋 브레인문해력 바로가기
          </a>
        </div>
      `;
    }

    // 페이지 로드 시 실행
    loadReport();
  </script>
</body>
</html>
