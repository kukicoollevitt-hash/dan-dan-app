    // 필터링 및 렌더링 함수
    function renderTable() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const sidoFilter = document.getElementById('sidoFilter').value;
      const sigunguFilter = document.getElementById('sigunguFilter').value;

      const filtered = schoolData.filter(school => {
        const matchSearch = school.name.toLowerCase().includes(searchTerm) || school.sigungu.toLowerCase().includes(searchTerm);
        const matchSido = !sidoFilter || school.sido === sidoFilter;
        const matchSigungu = !sigunguFilter || school.sigungu === sigunguFilter;
        return matchSearch && matchSido && matchSigungu;
      });

      document.getElementById('resultCount').textContent = filtered.length.toLocaleString();

      // 1500명 이상 학교 수 계산 (가맹 2개 가능)
      const doubleCount = filtered.filter(s => s.students >= 1500).length;
      document.getElementById('doubleCount').textContent = doubleCount.toLocaleString() + '개교';

      // 1000명 이상 학교 수 계산
      const priorityCount = filtered.filter(s => s.students >= 1000).length;
      document.getElementById('priorityCount').textContent = priorityCount.toLocaleString() + '개교';

      // 500~999명 학교 수 계산
      const recommendCount = filtered.filter(s => s.students >= 500 && s.students < 1000).length;
      document.getElementById('recommendCount').textContent = recommendCount.toLocaleString() + '개교';

      const tbody = document.getElementById('schoolTable');

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="no-result">검색 결과가 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map((school, idx) => {
        const schoolId = `${school.sido}_${school.sigungu}_${school.name}`.replace(/\s/g, '_');
        const savedData = JSON.parse(localStorage.getItem('schoolData_' + schoolId) || '{}');
        const competitor = savedData.competitor || '';
        const status = savedData.status || '';

        return `
        <tr class="${school.students >= 1000 ? 'priority' : ''}">
          <td class="num">${idx + 1}</td>
          <td>${school.sido}</td>
          <td>${school.sigungu}</td>
          <td>${school.name}${school.students >= 1500 ? ' <span class="star">⭐⭐⭐</span>' : school.students >= 1000 ? ' <span class="star">⭐⭐</span>' : ' <span class="star">⭐</span>'}</td>
          <td class="students">${school.students.toLocaleString()}명</td>
          <td><input type="text" class="competitor-input" data-id="${schoolId}" value="${competitor}" placeholder="경쟁업체 입력"></td>
          <td>
            <select class="status-select" data-id="${schoolId}">
              <option value="" ${status === '' ? 'selected' : ''}>선택</option>
              <option value="가맹가능" ${status === '가맹가능' ? 'selected' : ''}>가맹가능</option>
              <option value="가맹예정" ${status === '가맹예정' ? 'selected' : ''}>가맹예정</option>
              <option value="가맹확정" ${status === '가맹확정' ? 'selected' : ''}>가맹확정</option>
            </select>
          </td>
        </tr>
      `}).join('');

      // 입력 이벤트 바인딩
      document.querySelectorAll('.competitor-input').forEach(input => {
        input.addEventListener('change', (e) => saveSchoolData(e.target.dataset.id, 'competitor', e.target.value));
      });
      document.querySelectorAll('.status-select').forEach(select => {
        select.addEventListener('change', (e) => saveSchoolData(e.target.dataset.id, 'status', e.target.value));
      });
    }

    // 데이터 저장 함수
    function saveSchoolData(schoolId, field, value) {
      const key = 'schoolData_' + schoolId;
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      data[field] = value;
      localStorage.setItem(key, JSON.stringify(data));
    }

    // 시도 필터 옵션 생성
    function populateSidoFilter() {
      const sidos = [...new Set(schoolData.map(s => s.sido))].sort();
      const select = document.getElementById('sidoFilter');
      sidos.forEach(sido => {
        const option = document.createElement('option');
        option.value = sido;
        option.textContent = sido;
        select.appendChild(option);
      });
    }

    // 시군구 필터 옵션 생성
    function populateSigunguFilter() {
      const sidoFilter = document.getElementById('sidoFilter').value;
      const sigungus = [...new Set(
        schoolData
          .filter(s => !sidoFilter || s.sido === sidoFilter)
          .map(s => s.sigungu)
      )].sort();

      const select = document.getElementById('sigunguFilter');
      select.innerHTML = '<option value="">전체 시군구</option>';
      sigungus.forEach(sigungu => {
        const option = document.createElement('option');
        option.value = sigungu;
        option.textContent = sigungu;
        select.appendChild(option);
      });
    }

    // 이벤트 리스너
    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('sidoFilter').addEventListener('change', () => {
      populateSigunguFilter();
      renderTable();
    });
    document.getElementById('sigunguFilter').addEventListener('change', renderTable);

    // 초기화 - 학생 수 내림차순 정렬 (많은 순)
    schoolData.sort((a, b) => b.students - a.students);

    populateSidoFilter();
    populateSigunguFilter();
    renderTable();
  </script>
