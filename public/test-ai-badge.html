<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 과제 배지 테스트</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .info-box {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
    }
    .info-box p {
      margin: 5px 0;
      font-size: 14px;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 30px;
    }
    button {
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }
    .btn-delete {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }
    .btn-menu {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }
    .btn-assign {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      color: white;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .result.show {
      display: block;
    }
    .result.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .badge-examples {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px dashed #ddd;
    }
    .badge {
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }
    .badge-ai-pending {
      background: #e9d5ff;
      color: #6b21a8;
    }
    .badge-ai-done {
      background: #d1fae5;
      color: #065f46;
    }
    .badge-default {
      background: #fee2e2;
      color: #991b1b;
    }
    .badge-done {
      background: #dcfce7;
      color: #166534;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 AI 과제 배지 테스트</h1>
    <p class="subtitle">AI 추천 과제의 "학습필요" 배지를 확인하기 위한 테스트 페이지</p>

    <div class="info-box">
      <p><strong>현재 상황:</strong></p>
      <p>• AI 추천 과제 3개가 모두 "✅ 복습완료" 상태로 표시됨</p>
      <p>• "🔄 학습필요" 배지를 확인할 수 없음</p>
    </div>

    <div class="info-box">
      <p><strong>해결 방법:</strong></p>
      <p>• 아래 버튼을 클릭하면 geo_01, geo_03, geo_04 단원의 학습 기록이 삭제됩니다</p>
      <p>• 삭제 후 메뉴 페이지로 이동하여 학습실을 다시 열면 "🔄 학습필요" 배지를 확인할 수 있습니다</p>
    </div>

    <div class="btn-group">
      <button class="btn-delete" onclick="deleteLearningLogs()">
        🗑️ 학습 기록 삭제 (geo_01, geo_03, geo_04)
      </button>
      <button class="btn-assign" onclick="assignNewTasks()">
        🤖 AI 과제 새로 부여받기
      </button>
      <button class="btn-menu" onclick="goToMenu()">
        📚 메뉴 페이지로 이동
      </button>
    </div>

    <div id="result" class="result"></div>

    <div class="badge-examples">
      <div>
        <p style="text-align: center; margin-bottom: 10px; font-weight: bold; color: #666;">AI 과제</p>
        <div class="badge badge-ai-pending">🔄 학습필요</div>
        <div class="badge badge-ai-done" style="margin-top: 10px;">✅ 복습완료</div>
      </div>
      <div>
        <p style="text-align: center; margin-bottom: 10px; font-weight: bold; color: #666;">일반 과제</p>
        <div class="badge badge-default">✏️ 미완료</div>
        <div class="badge badge-done" style="margin-top: 10px;">🏆 학습완료</div>
      </div>
    </div>
  </div>

  <script>
    function showResult(message, isSuccess) {
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = message;
      resultDiv.className = 'result show ' + (isSuccess ? 'success' : 'error');
    }

    async function deleteLearningLogs() {
      const grade = localStorage.getItem('grade');
      const name = localStorage.getItem('name');

      if (!grade || !name) {
        showResult('❌ 로그인 정보를 찾을 수 없습니다. 먼저 로그인해주세요.', false);
        return;
      }

      try {
        const response = await fetch('http://localhost:3000/api/learning-log/delete-units', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grade: grade,
            name: name,
            units: ['geo_01', 'geo_03', 'geo_04']
          })
        });

        const data = await response.json();

        if (data.ok) {
          showResult(`✅ ${data.message} 이제 메뉴 페이지로 이동해서 학습실을 확인해보세요!`, true);
        } else {
          showResult('❌ ' + data.message, false);
        }
      } catch (error) {
        showResult('❌ 오류 발생: ' + error.message, false);
      }
    }

    async function assignNewTasks() {
      try {
        const response = await fetch('http://localhost:3000/api/ai-task/manual-assign', {
          method: 'POST'
        });

        const data = await response.json();

        if (data.ok) {
          showResult('✅ ' + data.message + ' 메뉴 페이지로 이동해서 학습실을 확인해보세요!', true);
        } else {
          showResult('❌ ' + data.message, false);
        }
      } catch (error) {
        showResult('❌ 오류 발생: ' + error.message, false);
      }
    }

    function goToMenu() {
      window.location.href = '/menu.html';
    }

    // 페이지 로드 시 로그인 정보 확인
    window.addEventListener('DOMContentLoaded', () => {
      const grade = localStorage.getItem('grade');
      const name = localStorage.getItem('name');

      if (!grade || !name) {
        showResult('⚠️ 로그인 정보를 찾을 수 없습니다. 먼저 로그인해주세요.', false);
      }
    });
  </script>
</body>
</html>
