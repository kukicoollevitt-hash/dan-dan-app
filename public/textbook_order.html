<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교재 신청하기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .icon {
      font-size: 22px;
    }

    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 200px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #667eea;
      outline: none;
    }

    .book-section {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .book-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .book-section-title {
      font-size: 16px;
      font-weight: 700;
      color: #333;
    }

    .add-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .add-btn:hover {
      transform: translateY(-2px);
    }

    .book-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .book-item select,
    .book-item input {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .book-item select {
      min-width: 120px;
    }

    .book-item input[type="number"] {
      width: 80px;
    }

    .book-item .remove-btn {
      padding: 8px 12px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .book-item .remove-btn:hover {
      background: #dc2626;
    }

    .book-item .item-subtotal {
      font-weight: 600;
      color: #667eea;
      min-width: 100px;
      text-align: right;
    }

    .no-items {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 14px;
    }

    /* 주문 요약 */
    .order-summary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      padding: 24px;
      color: white;
    }

    .summary-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
    }

    .summary-table th,
    .summary-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      font-size: 14px;
    }

    .summary-table th {
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px solid rgba(255,255,255,0.3);
    }

    .summary-total-label {
      font-size: 18px;
      font-weight: 600;
    }

    .summary-total-amount {
      font-size: 28px;
      font-weight: 800;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }

    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: #333;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 10px;
      color: #667eea;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 20px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: #667eea;
      color: white;
    }

    /* 알림 모달 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .modal-icon {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }

    .modal-message {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="javascript:history.back()" class="back-btn">← 뒤로가기</a>
    <h1>교재 신청하기</h1>
    <p class="subtitle">브레인문해력 & 고래도서관 교재를 신청하세요</p>

    <!-- 신청자 정보 -->
    <div class="section">
      <div class="section-title">
        <span class="icon">👤</span>
        신청자 정보
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>성함 *</label>
          <input type="text" id="applicantName" placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
          <label>지점명 *</label>
          <input type="text" id="branchName" placeholder="지점명을 입력하세요">
        </div>
        <div class="form-group">
          <label>연락처 *</label>
          <input type="tel" id="phone" placeholder="010-0000-0000">
        </div>
      </div>
    </div>

    <!-- 브레인문해력 교재 -->
    <div class="section">
      <div class="section-title">
        <span class="icon">📚</span>
        브레인문해력 교재
      </div>
      <div class="book-section">
        <div class="book-section-header">
          <div class="book-section-title">교재 목록</div>
          <button class="add-btn" onclick="addBrainItem()">+ 추가</button>
        </div>
        <div id="brainItems">
          <div class="no-items">추가 버튼을 눌러 교재를 추가하세요</div>
        </div>
      </div>
    </div>

    <!-- 고래도서관 월간창작도서 -->
    <div class="section">
      <div class="section-title">
        <span class="icon">🐋</span>
        고래도서관 월간창작도서
      </div>
      <div class="book-section">
        <div class="book-section-header">
          <div class="book-section-title">교재 목록</div>
          <button class="add-btn" onclick="addWhaleItem()">+ 추가</button>
        </div>
        <div id="whaleItems">
          <div class="no-items">추가 버튼을 눌러 교재를 추가하세요</div>
        </div>
      </div>
    </div>

    <!-- 주문 요약 -->
    <div class="order-summary">
      <div class="summary-title">신청 내역 요약</div>
      <table class="summary-table">
        <thead>
          <tr>
            <th>교재 종류</th>
            <th>시리즈</th>
            <th>호수</th>
            <th>권수</th>
            <th>금액</th>
          </tr>
        </thead>
        <tbody id="summaryBody">
          <tr>
            <td colspan="5" style="text-align: center; color: rgba(255,255,255,0.6);">신청할 교재가 없습니다</td>
          </tr>
        </tbody>
      </table>
      <div class="summary-total">
        <div class="summary-total-label">총 <span id="totalQuantity">0</span>권</div>
        <div class="summary-total-amount"><span id="totalAmount">0</span>원</div>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">신청하기</button>
    <a href="javascript:history.back()" class="back-link">← 뒤로가기</a>
  </div>

  <!-- 성공 모달 -->
  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <div class="modal-icon">✅</div>
      <div class="modal-title">신청 완료!</div>
      <div class="modal-message">교재 신청이 완료되었습니다.<br>확인 후 연락드리겠습니다.</div>
      <button class="modal-btn" onclick="goToHistory()">신청 내역 보기</button>
    </div>
  </div>

  <script>
    const UNIT_PRICE = 14000;
    let brainItemId = 0;
    let whaleItemId = 0;

    // 브레인문해력 아이템 추가
    function addBrainItem() {
      const container = document.getElementById('brainItems');
      const noItems = container.querySelector('.no-items');
      if (noItems) noItems.remove();

      brainItemId++;
      const itemHtml = `
        <div class="book-item" id="brain-${brainItemId}">
          <select onchange="updateSummary()">
            <option value="">시리즈 선택</option>
            <option value="브레인온">브레인온</option>
            <option value="브레인업">브레인업</option>
            <option value="브레인핏">브레인핏</option>
            <option value="브레인딥">브레인딥</option>
          </select>
          <select onchange="updateSummary()">
            <option value="">호수 선택</option>
            ${[...Array(12)].map((_, i) => `<option value="${i+1}">${i+1}호</option>`).join('')}
          </select>
          <input type="number" min="1" value="1" placeholder="권수" onchange="updateSummary()" oninput="updateSummary()">
          <span class="item-subtotal">14,000원</span>
          <button class="remove-btn" onclick="removeItem('brain-${brainItemId}')">삭제</button>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', itemHtml);
      updateSummary();
    }

    // 고래도서관 아이템 추가
    function addWhaleItem() {
      const container = document.getElementById('whaleItems');
      const noItems = container.querySelector('.no-items');
      if (noItems) noItems.remove();

      whaleItemId++;
      const itemHtml = `
        <div class="book-item" id="whale-${whaleItemId}">
          <select onchange="updateSummary()">
            <option value="">시리즈 선택</option>
            <option value="시즌1">시즌1</option>
            <option value="시즌2">시즌2</option>
            <option value="시즌3">시즌3</option>
          </select>
          <select onchange="updateSummary()">
            <option value="">호수 선택</option>
            ${[...Array(12)].map((_, i) => `<option value="${i+1}">${i+1}호</option>`).join('')}
          </select>
          <input type="number" min="1" value="1" placeholder="권수" onchange="updateSummary()" oninput="updateSummary()">
          <span class="item-subtotal">14,000원</span>
          <button class="remove-btn" onclick="removeItem('whale-${whaleItemId}')">삭제</button>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', itemHtml);
      updateSummary();
    }

    // 아이템 삭제
    function removeItem(itemId) {
      document.getElementById(itemId).remove();

      // 비어있으면 안내 메시지 표시
      const brainContainer = document.getElementById('brainItems');
      const whaleContainer = document.getElementById('whaleItems');

      if (brainContainer.children.length === 0) {
        brainContainer.innerHTML = '<div class="no-items">추가 버튼을 눌러 교재를 추가하세요</div>';
      }
      if (whaleContainer.children.length === 0) {
        whaleContainer.innerHTML = '<div class="no-items">추가 버튼을 눌러 교재를 추가하세요</div>';
      }

      updateSummary();
    }

    // 요약 업데이트
    function updateSummary() {
      const items = [];
      let totalQty = 0;
      let totalAmt = 0;

      // 브레인문해력 아이템 수집
      document.querySelectorAll('#brainItems .book-item').forEach(item => {
        const selects = item.querySelectorAll('select');
        const input = item.querySelector('input');
        const subtotalEl = item.querySelector('.item-subtotal');

        const series = selects[0].value;
        const issue = selects[1].value;
        const qty = parseInt(input.value) || 0;

        if (series && issue && qty > 0) {
          const subtotal = qty * UNIT_PRICE;
          subtotalEl.textContent = subtotal.toLocaleString() + '원';
          items.push({
            bookType: '브레인문해력',
            series,
            issueNumber: parseInt(issue),
            quantity: qty,
            unitPrice: UNIT_PRICE,
            subtotal
          });
          totalQty += qty;
          totalAmt += subtotal;
        } else {
          subtotalEl.textContent = '-';
        }
      });

      // 고래도서관 아이템 수집
      document.querySelectorAll('#whaleItems .book-item').forEach(item => {
        const selects = item.querySelectorAll('select');
        const input = item.querySelector('input');
        const subtotalEl = item.querySelector('.item-subtotal');

        const series = selects[0].value;
        const issue = selects[1].value;
        const qty = parseInt(input.value) || 0;

        if (series && issue && qty > 0) {
          const subtotal = qty * UNIT_PRICE;
          subtotalEl.textContent = subtotal.toLocaleString() + '원';
          items.push({
            bookType: '고래도서관',
            series,
            issueNumber: parseInt(issue),
            quantity: qty,
            unitPrice: UNIT_PRICE,
            subtotal
          });
          totalQty += qty;
          totalAmt += subtotal;
        } else {
          subtotalEl.textContent = '-';
        }
      });

      // 요약 테이블 업데이트
      const summaryBody = document.getElementById('summaryBody');
      if (items.length === 0) {
        summaryBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: rgba(255,255,255,0.6);">신청할 교재가 없습니다</td></tr>';
      } else {
        summaryBody.innerHTML = items.map(item => `
          <tr>
            <td>${item.bookType}</td>
            <td>${item.series}</td>
            <td>${item.issueNumber}호</td>
            <td>${item.quantity}권</td>
            <td>${item.subtotal.toLocaleString()}원</td>
          </tr>
        `).join('');
      }

      document.getElementById('totalQuantity').textContent = totalQty.toLocaleString();
      document.getElementById('totalAmount').textContent = totalAmt.toLocaleString();

      // 전역 저장
      window.orderItems = items;
    }

    // 신청하기
    async function submitOrder() {
      const applicantName = document.getElementById('applicantName').value.trim();
      const branchName = document.getElementById('branchName').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!applicantName) {
        alert('성함을 입력해주세요.');
        return;
      }
      if (!branchName) {
        alert('지점명을 입력해주세요.');
        return;
      }
      if (!phone) {
        alert('연락처를 입력해주세요.');
        return;
      }

      if (!window.orderItems || window.orderItems.length === 0) {
        alert('신청할 교재를 추가해주세요.');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '신청 중...';

      try {
        const response = await fetch('/api/textbook-orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            applicantName,
            branchName,
            phone,
            items: window.orderItems
          })
        });

        const result = await response.json();

        if (result.ok) {
          // 신청자 정보 로컬 저장 (내역 조회용)
          localStorage.setItem('textbookOrderInfo', JSON.stringify({ branchName, phone }));
          document.getElementById('successModal').classList.add('show');
        } else {
          alert('신청 실패: ' + result.message);
        }
      } catch (err) {
        alert('오류가 발생했습니다: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '신청하기';
      }
    }

    function goToHistory() {
      window.location.href = '/textbook_order_history.html';
    }

    // 초기화
    updateSummary();
  </script>
</body>
</html>
