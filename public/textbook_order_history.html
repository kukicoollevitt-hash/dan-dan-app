<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교재 신청내역</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .filter-section {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-group label {
      font-size: 13px;
      color: #666;
      font-weight: 600;
    }

    .filter-group input {
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }

    .filter-group input:focus {
      border-color: #667eea;
      outline: none;
    }

    .filter-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .filter-btn:hover {
      opacity: 0.9;
    }

    .new-order-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-left: auto;
    }

    .new-order-btn:hover {
      opacity: 0.9;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 10px;
      color: #667eea;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 20px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: #667eea;
      color: white;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: #667eea;
    }

    th {
      padding: 14px 12px;
      text-align: left;
      color: white;
      font-weight: 600;
      white-space: nowrap;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #eee;
    }

    tbody tr:hover {
      background: #f8f9fa;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-신청완료 {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-확인중 {
      background: #fef3c7;
      color: #d97706;
    }

    .status-배송준비 {
      background: #e0e7ff;
      color: #4f46e5;
    }

    .status-배송완료 {
      background: #d1fae5;
      color: #059669;
    }

    .status-취소 {
      background: #fee2e2;
      color: #dc2626;
    }

    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-right: 4px;
    }

    .view-btn {
      background: #667eea;
      color: white;
    }

    .edit-btn {
      background: #f59e0b;
      color: white;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
    }

    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .no-data-icon {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: #333;
    }

    /* 상세보기 모달 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid #eee;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #333;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border: none;
      background: #f5f5f5;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      color: #666;
    }

    .modal-close:hover {
      background: #ef4444;
      color: white;
    }

    .detail-row {
      display: flex;
      margin-bottom: 12px;
    }

    .detail-label {
      width: 100px;
      font-weight: 600;
      color: #555;
    }

    .detail-value {
      flex: 1;
      color: #333;
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 13px;
    }

    .detail-table th,
    .detail-table td {
      padding: 10px;
      border: 1px solid #eee;
      text-align: left;
    }

    .detail-table th {
      background: #f8f9fa;
      font-weight: 600;
    }

    .detail-total {
      margin-top: 16px;
      text-align: right;
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    /* 수정 모달 */
    .edit-form-group {
      margin-bottom: 16px;
    }

    .edit-form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .edit-form-group input,
    .edit-form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }

    .edit-form-group input:focus,
    .edit-form-group select:focus {
      border-color: #667eea;
      outline: none;
    }

    .modal-footer {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .modal-btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/school_list.html" class="back-btn">← 뒤로가기</a>
    <h1>교재 신청내역</h1>
    <p class="subtitle">신청한 교재 내역을 확인하고 관리하세요</p>

    <div class="filter-section">
      <div class="filter-group">
        <label>지점명</label>
        <input type="text" id="filterBranch" placeholder="지점명 입력">
      </div>
      <div class="filter-group">
        <label>연락처</label>
        <input type="tel" id="filterPhone" placeholder="010-0000-0000">
      </div>
      <button class="filter-btn" onclick="loadOrders()">조회</button>
      <button class="new-order-btn" onclick="location.href='/textbook_order.html'">+ 새 신청</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>신청일시</th>
            <th>지점명</th>
            <th>신청자</th>
            <th>연락처</th>
            <th>교재 수</th>
            <th>총 금액</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="orderTable">
          <tr>
            <td colspan="8" class="no-data">
              <div class="no-data-icon">📋</div>
              <div>지점명과 연락처를 입력하고 조회해주세요</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <a href="/school_list.html" class="back-link">← 목록으로 돌아가기</a>
  </div>

  <!-- 상세보기 모달 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">신청 상세</div>
        <button class="modal-close" onclick="closeDetailModal()">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- 수정 모달 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">신청 수정</div>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <div id="editContent"></div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-secondary" onclick="closeEditModal()">취소</button>
        <button class="modal-btn modal-btn-primary" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </div>

  <script>
    let currentOrders = [];
    let editingOrderId = null;

    // 페이지 로드 시 저장된 정보로 자동 조회
    window.onload = function() {
      const savedInfo = localStorage.getItem('textbookOrderInfo');
      if (savedInfo) {
        const info = JSON.parse(savedInfo);
        document.getElementById('filterBranch').value = info.branchName || '';
        document.getElementById('filterPhone').value = info.phone || '';
        if (info.branchName && info.phone) {
          loadOrders();
        }
      }
    };

    // 주문 목록 조회
    async function loadOrders() {
      const branchName = document.getElementById('filterBranch').value.trim();
      const phone = document.getElementById('filterPhone').value.trim();

      if (!branchName && !phone) {
        alert('지점명 또는 연락처를 입력해주세요.');
        return;
      }

      try {
        let url = '/api/textbook-orders?';
        if (branchName) url += `branchName=${encodeURIComponent(branchName)}&`;
        if (phone) url += `phone=${encodeURIComponent(phone)}`;

        const response = await fetch(url);
        const result = await response.json();

        if (result.ok) {
          currentOrders = result.orders;
          renderOrders();
        } else {
          alert('조회 실패: ' + result.message);
        }
      } catch (err) {
        alert('오류: ' + err.message);
      }
    }

    // 주문 목록 렌더링
    function renderOrders() {
      const tbody = document.getElementById('orderTable');

      if (currentOrders.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="no-data">
              <div class="no-data-icon">📭</div>
              <div>신청 내역이 없습니다</div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = currentOrders.map(order => {
        const date = new Date(order.createdAt);
        const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

        return `
          <tr>
            <td>${dateStr}</td>
            <td>${order.branchName}</td>
            <td>${order.applicantName}</td>
            <td>${order.phone}</td>
            <td>${order.totalQuantity}권</td>
            <td>${order.totalAmount.toLocaleString()}원</td>
            <td><span class="status-badge status-${order.status}">${order.status}</span></td>
            <td>
              <button class="action-btn view-btn" onclick="viewDetail('${order._id}')">상세</button>
              <button class="action-btn edit-btn" onclick="openEditModal('${order._id}')">수정</button>
              <button class="action-btn delete-btn" onclick="deleteOrder('${order._id}')">삭제</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // 상세보기
    function viewDetail(orderId) {
      const order = currentOrders.find(o => o._id === orderId);
      if (!order) return;

      const date = new Date(order.createdAt);
      const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

      document.getElementById('detailContent').innerHTML = `
        <div class="detail-row">
          <div class="detail-label">신청일시</div>
          <div class="detail-value">${dateStr}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">지점명</div>
          <div class="detail-value">${order.branchName}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">신청자</div>
          <div class="detail-value">${order.applicantName}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">연락처</div>
          <div class="detail-value">${order.phone}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">상태</div>
          <div class="detail-value"><span class="status-badge status-${order.status}">${order.status}</span></div>
        </div>

        <table class="detail-table">
          <thead>
            <tr>
              <th>교재 종류</th>
              <th>시리즈</th>
              <th>호수</th>
              <th>권수</th>
              <th>금액</th>
            </tr>
          </thead>
          <tbody>
            ${order.items.map(item => `
              <tr>
                <td>${item.bookType}</td>
                <td>${item.series}</td>
                <td>${item.issueNumber}호</td>
                <td>${item.quantity}권</td>
                <td>${item.subtotal.toLocaleString()}원</td>
              </tr>
            `).join('')}
          </tbody>
        </table>

        <div class="detail-total">
          총 ${order.totalQuantity}권 / ${order.totalAmount.toLocaleString()}원
        </div>
      `;

      document.getElementById('detailModal').classList.add('show');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
    }

    // 수정 모달
    function openEditModal(orderId) {
      const order = currentOrders.find(o => o._id === orderId);
      if (!order) return;

      editingOrderId = orderId;

      document.getElementById('editContent').innerHTML = `
        <div class="edit-form-group">
          <label>성함</label>
          <input type="text" id="editName" value="${order.applicantName}">
        </div>
        <div class="edit-form-group">
          <label>지점명</label>
          <input type="text" id="editBranch" value="${order.branchName}">
        </div>
        <div class="edit-form-group">
          <label>연락처</label>
          <input type="tel" id="editPhone" value="${order.phone}">
        </div>
        <div class="edit-form-group">
          <label>상태</label>
          <select id="editStatus">
            <option value="신청완료" ${order.status === '신청완료' ? 'selected' : ''}>신청완료</option>
            <option value="확인중" ${order.status === '확인중' ? 'selected' : ''}>확인중</option>
            <option value="배송준비" ${order.status === '배송준비' ? 'selected' : ''}>배송준비</option>
            <option value="배송완료" ${order.status === '배송완료' ? 'selected' : ''}>배송완료</option>
            <option value="취소" ${order.status === '취소' ? 'selected' : ''}>취소</option>
          </select>
        </div>
      `;

      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
      editingOrderId = null;
    }

    async function saveEdit() {
      if (!editingOrderId) return;

      const updateData = {
        applicantName: document.getElementById('editName').value.trim(),
        branchName: document.getElementById('editBranch').value.trim(),
        phone: document.getElementById('editPhone').value.trim(),
        status: document.getElementById('editStatus').value
      };

      try {
        const response = await fetch(`/api/textbook-orders/${editingOrderId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updateData)
        });

        const result = await response.json();

        if (result.ok) {
          alert('수정되었습니다.');
          closeEditModal();
          loadOrders();
        } else {
          alert('수정 실패: ' + result.message);
        }
      } catch (err) {
        alert('오류: ' + err.message);
      }
    }

    // 삭제
    async function deleteOrder(orderId) {
      if (!confirm('정말 삭제하시겠습니까?')) return;

      try {
        const response = await fetch(`/api/textbook-orders/${orderId}`, {
          method: 'DELETE'
        });

        const result = await response.json();

        if (result.ok) {
          alert('삭제되었습니다.');
          loadOrders();
        } else {
          alert('삭제 실패: ' + result.message);
        }
      } catch (err) {
        alert('오류: ' + err.message);
      }
    }

    // 모달 외부 클릭 시 닫기
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) closeDetailModal();
    });
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeEditModal();
    });
  </script>
</body>
</html>
